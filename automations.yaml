        action: input_boolean.turn_off
    - conditions:
      - condition: template
        value_template: "{{ cur_mode == 'cool'\n   and (not emergency_latched)\n   and cool_setpoint_effective is not none\n   and ac_set_effective_normalized is not none\n   and (cool_sync_delta | float(0)) >= 0.2\n   and (not manual_override_active)\n   and (not manual_sp_override_active)\n   and (not manual_sp_feedback_future_only_active) }}"
      sequence:
      - target:
          entity_id: climate.0200009211c7_climate
        data:
          temperature: '{{ cool_setpoint_effective }}'
