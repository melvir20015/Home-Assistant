          entity_id: climate.0200009211c7_climate
    default: []
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ states(''input_text.ac_matriz_160_fase_ciclo'') == ''normal'' and states(''climate.0200009211c7_climate'') == ''heat'' }}'
      sequence:
      - service: climate.set_temperature
        target:
          entity_id: climate.0200009211c7_climate
        data:
          temperature: 28
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ action_target in [''turn_on_cool'',''turn_on_heat'',''turn_off''] and dedup_ok }}'
      sequence:
      - service: notify.mobile_app_samsung_s24
        data:
          title: AC-Matriz 160
          message: '{% set modo_final = ''Frío'' if action_target == ''turn_on_cool'' else ''Calor'' if action_target == ''turn_on_heat'' else ''Apagado'' %}{% set sp_msg = ''SP= '' ~ sp_cool_normal ~ ''°C'' if action_target == ''turn_on_cool'' and states(''input_text.ac_matriz_160_fase_ciclo'') != ''turbo_cool'' else ''SP= 18°C (Turbo)'' if action_target == ''turn_on_cool'' else ''SP= 28°C'' if action_target == ''turn_on_heat'' else ''SP= N/A'' %}{% set fan_msg = ''FAN= '' ~ fan_cool_normal_target|title if action_target == ''turn_on_cool'' and states(''input_text.ac_matriz_160_fase_ciclo'') != ''turbo_cool'' else ''FAN= High (Turbo)'' if action_target == ''turn_on_cool'' else ''FAN= N/A'' %}{{ now().strftime(''%I:%M %p'') }} | EVENTO= {{ ''Encendido'' if action_target in [''turn_on_cool'',''turn_on_heat''] else ''Apagado'' }} | MODO= {{ modo_final }} | INTERIOR= {{ tin }}°C/{{ hin }}% | EXTERIOR= {{ tout if tout is not none else ''No disponible'' }}°C/{{ hout }}% | {{ sp_msg }} | {{ fan_msg }} | UMBRAL APLICADO= {{ eff_t_on_cool if action_target == ''turn_on_cool'' else eff_t_on_heat if action_target == ''turn_on_heat'' else eff_t_off_cool if climate_mode == ''cool'' else eff_t_off_heat }} | CONTEXTO= {{ col_humana }}'
      - service: input_text.set_value
        target:
          entity_id: input_text.ac_matriz_160_ultima_firma_notificacion
        data:
