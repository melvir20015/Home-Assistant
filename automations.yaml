- id: ac_noche_muestreo_tendencia_off
  alias: AC - Noche Muestreo tendencia solo AC OFF
  description: Muestrea cada 2 min entre 19:00-22:00 cuando AC está off o fan_only.
    Filtra Coco con clamp anti-cocina.
  mode: single
  trigger:
  - platform: time_pattern
    minutes: /2
  condition:
  - condition: time
    after: '19:00:00'
    before: '22:00:00'
  - condition: template
    value_template: '{{ states(''climate.0200009211c7_climate'') in [''off'',''fan_only'']
      }}'
  action:
  - variables:
      t_cuarto_raw: '{{ states(''sensor.lumi_lumi_weather_cuarto_temperatura'') }}'
      t_coco_raw: '{{ states(''sensor.lumi_lumi_weather_coco_temperatura'') }}'
      t_cuarto: '{{ t_cuarto_raw | float(none) }}'
      t_coco: '{{ t_coco_raw | float(none) }}'
      sensores_validos: '{{ t_cuarto is not none and t_coco is not none }}'
      cap: 0.7
      t_coco_filtrado: "{% if not sensores_validos %}\n  {{ none }}\n{% elif (t_coco - t_cuarto) > cap %}\n  {{ (t_cuarto + cap) | round(2) }}\n{% else %}\n  {{ t_coco | round(2) }}\n{% endif %}"
      avg: '{{ ((t_cuarto + (t_coco_filtrado | float)) / 2) | round(2) if sensores_validos else none }}'
      n: '{{ states(''input_number.ac_off_muestras_19_00_21_59'') | int(0) }}'
  - choose:
    - conditions: '{{ not sensores_validos }}'
      sequence:
      - service: logbook.log
        data:
          name: AC Noche Sensores
          message: >-
            Se omite la muestra nocturna porque la entrada no es numérica: cuarto={{ t_cuarto_raw }}, coco={{ t_coco_raw }}.
          entity_id: climate.0200009211c7_climate
    - conditions: '{{ n == 0 }}'
      sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.ac_off_avg_inicio_19_00_21_59
        data:
          value: '{{ avg }}'
      - service: input_number.set_value
        target:
          entity_id: input_number.ac_off_avg_final_19_00_21_59
        data:
          value: '{{ avg }}'
      - service: input_number.set_value
        target:
          entity_id: input_number.ac_off_muestras_19_00_21_59
        data:
          value: '{{ n + 1 }}'
    - conditions: '{{ n > 0 and avg is not none }}'
      sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.ac_off_avg_final_19_00_21_59
        data:
          value: '{{ avg }}'
      - service: input_number.set_value
        target:
          entity_id: input_number.ac_off_muestras_19_00_21_59
        data:
          value: '{{ n + 1 }}'
- id: ac_noche_decide_tendencia_off_2159
  alias: AC - Noche Decide tendencia OFF (21:59)
  description: Decide si la tendencia (filtrada) sube entre 19:00 y 21:59.
  mode: single
  trigger:
  - platform: time
    at: '21:59:00'
  action:
  - variables:
      inicio: '{{ states(''input_number.ac_off_avg_inicio_19_00_21_59'') | float(0)
        }}'
      final: '{{ states(''input_number.ac_off_avg_final_19_00_21_59'') | float(0)
        }}'
      n: '{{ states(''input_number.ac_off_muestras_19_00_21_59'') | int(0) }}'
      delta: '{{ (final - inicio) | round(2) }}'
      umbral: 0.1
      min_muestras: 30
  - choose:
    - conditions: '{{ n >= min_muestras and delta >= umbral }}'
      sequence:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.ac_tendencia_subiendo_con_ac_off
    default:
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.ac_tendencia_subiendo_con_ac_off
- id: ac_noche_decide_modo_2200
  alias: AC - Noche Decide modo final (22:00) con bloqueo (no cae a none si AC estaba
    ON)
  mode: single
  trigger:
  - platform: time
    at: '22:00:00'
  condition:
  - condition: template
    value_template: '{{ states(''input_select.ac_modo_noche_2200'') in [''none'',''unknown'',''unavailable'']
      }}'
  variables:
    cl: '{{ states(''climate.0200009211c7_climate'') }}'
    last_no_fan: '{{ states(''input_select.ac_ultimo_modo_no_fan'') }}'
    t1_raw: '{{ states(''sensor.lumi_lumi_weather_cuarto_temperatura'') }}'
    t2_raw: '{{ states(''sensor.lumi_lumi_weather_coco_temperatura'') }}'
    t1: '{{ t1_raw | float(none) }}'
    t2: '{{ t2_raw | float(none) }}'
    temps_validas: '{{ t1 is not none and t2 is not none }}'
    tendencia_sube: '{{ is_state(''input_boolean.ac_tendencia_subiendo_con_ac_off'',''on'')
      }}'
    calefaccion_reciente: '{{ is_state(''input_boolean.calefaccion_reciente'',''on'')
      }}'
  action:
  - choose:
    - conditions: '{{ cl in [''cool'',''heat''] }}'
      sequence:
      - service: input_select.select_option
        target:
          entity_id: input_select.ac_modo_noche_2200
        data:
          option: '{{ cl }}'
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.ac_bloqueo_modo_noche
    - conditions: '{{ cl == ''fan_only'' and last_no_fan in [''cool'',''heat''] }}'
      sequence:
      - service: input_select.select_option
        target:
          entity_id: input_select.ac_modo_noche_2200
        data:
          option: '{{ last_no_fan }}'
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.ac_bloqueo_modo_noche
    - conditions: '{{ cl == ''off'' }}'
      sequence:
      - choose:
        - conditions: '{{ not temps_validas }}'
          sequence:
          - service: logbook.log
            data:
              name: AC Noche Sensores
              message: >-
                Se mantiene `input_select.ac_modo_noche_2200` sin cambios porque la entrada no es numérica: cuarto={{ t1_raw }}, coco={{ t2_raw }}.
              entity_id: climate.0200009211c7_climate
        - conditions: '{{ t1 > 22.7 and t2 > 22.7 and tendencia_sube and not calefaccion_reciente
            }}'
          sequence:
          - service: input_select.select_option
            target:
              entity_id: input_select.ac_modo_noche_2200
            data:
              option: cool
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.ac_bloqueo_modo_noche
        - conditions: '{{ t1 < 22.5 and t2 < 22.5 }}'
          sequence:
          - service: input_select.select_option
            target:
              entity_id: input_select.ac_modo_noche_2200
            data:
              option: heat
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.ac_bloqueo_modo_noche
        - conditions: '{{ (t1 >= 22.5 and t1 < 23) and (t2 >= 22.5 and t2 < 23) and
            not tendencia_sube }}'
          sequence:
          - service: input_select.select_option
            target:
              entity_id: input_select.ac_modo_noche_2200
            data:
              option: heat
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.ac_bloqueo_modo_noche
        default:
        - service: input_select.select_option
          target:
            entity_id: input_select.ac_modo_noche_2200
          data:
            option: none
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.ac_bloqueo_modo_noche
    default:
    - service: input_select.select_option
      target:
        entity_id: input_select.ac_modo_noche_2200
      data:
        option: none
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.ac_bloqueo_modo_noche
- id: ac_noche_desbloquea_modo_0700
  alias: AC - Noche Desbloquea modo (07:00)
