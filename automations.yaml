      auto_recent_observed: '{{ auto_transition_active_strict or auto_timestamp_recent }}'
      auto_transition_active: '{{ auto_transition_active_strict }}'
      daytime_scope_ok: "{{ now().strftime('%H:%M:%S') >= '07:01:00' and now().strftime('%H:%M:%S') <= '21:59:00' }}"
