- id: ac_normaliza_helper_ultimo_modo_no_fan
  alias: AC - Normaliza helper último modo no fan
  description: 'Autocorrige estados restaurados inválidos de `input_select.ac_ultimo_modo_no_fan`.
    El helper sólo admite `off`, `cool`, `heat` o `emergency_cool`; si Home Assistant
    restaura un valor legacy como `False`, se fuerza a `off` para evitar errores posteriores.

    '
  mode: single
  trigger:
  - platform: homeassistant
    event: start
  - platform: state
    entity_id: input_select.ac_ultimo_modo_no_fan
  condition:
  - condition: template
    value_template: "{{ states('input_select.ac_ultimo_modo_no_fan') not in ['off','cool','heat','emergency_cool'] }}"
  action:
  - service: input_select.select_option
    target:
      entity_id: input_select.ac_ultimo_modo_no_fan
    data:
      option: 'off'
    # Si Home Assistant restaura un valor histórico inválido como `False`, se
    # normaliza inmediatamente a `off` para mantener el contrato del helper.

- id: ac_saneamiento_banderas_auto_ac
  alias: AC - Saneamiento defensivo banderas auto
  description: 'Evita que `input_boolean.ac_on_por_automatizacion` o `input_boolean.ac_off_por_automatizacion`
    queden pegadas más allá de una ventana operativa razonable y refuerza la clasificación
    del último origen de cambio sin generar ruido al usuario.

    '
  mode: single
  trigger:
  - platform: time_pattern
    minutes: /1
  variables:
    last_auto_ts_raw: '{{ states(''input_datetime.ac_last_auto_ts'') }}'
    minutes_since_last_auto: "{% set raw = last_auto_ts_raw | default('', true) | trim %}{% set raw_lower = raw | lower %}{% if raw_lower in ['unknown','unavailable','none',''] %}99999{% else %}{% set ts = as_timestamp(raw, default=none) %}{{ 99999 if ts is none else (((as_timestamp(now()) - ts) / 60) | round(1)) }}{% endif %}"
    on_stuck: '{{ is_state(''input_boolean.ac_on_por_automatizacion'',''on'') and (minutes_since_last_auto | float(99999)) >= 2 }}'
    off_stuck: '{{ is_state(''input_boolean.ac_off_por_automatizacion'',''on'') and (minutes_since_last_auto | float(99999)) >= 10 }}'
  action:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ on_stuck or off_stuck }}'
      sequence:
      - service: input_boolean.turn_off
        target:
          entity_id:
          - input_boolean.ac_on_por_automatizacion
          - input_boolean.ac_off_por_automatizacion
      - service: logbook.log
        data:
          name: AC Auto Trace
          message: >-
            saneamiento_banderas_auto | on_stuck={{ on_stuck }} | off_stuck={{ off_stuck }} | minutes_since_last_auto={{ minutes_since_last_auto }}
          entity_id: climate.0200009211c7_climate
    default: []

- id: ac_audita_helpers_telemetria_runtime
  alias: AC - Audita helpers de telemetría en runtime
  description: 'Verifica al iniciar Home Assistant que los helpers críticos del AC
    existan realmente en runtime. Si alguno responde `unknown` o `unavailable`,
    se deja evidencia en logbook para diagnóstico sin generar ruido en producción.

    '
  mode: single
  trigger:
  - platform: homeassistant
    event: start
  variables:
    helper_states:
      input_text.ac_last_auto_branch: '{{ states(''input_text.ac_last_auto_branch'') }}'
      input_text.ac_last_auto_action: '{{ states(''input_text.ac_last_auto_action'') }}'
      input_text.ac_last_auto_mode: '{{ states(''input_text.ac_last_auto_mode'') }}'
      input_text.ac_last_auto_fan: '{{ states(''input_text.ac_last_auto_fan'') }}'
      input_text.ac_last_manual_event_type: '{{ states(''input_text.ac_last_manual_event_type'') }}'
      input_text.ac_last_manual_learning_type: '{{ states(''input_text.ac_last_manual_learning_type'') }}'
      input_text.ac_last_manual_feedback_mode: '{{ states(''input_text.ac_last_manual_feedback_mode'') }}'
      input_text.ac_last_change_origin: '{{ states(''input_text.ac_last_change_origin'') }}'
    missing_helpers: >-
      {% set ns = namespace(items=[]) %}
      {% for entity_id, value in helper_states.items() %}
        {% if value in ['unknown','unavailable'] %}
          {% set ns.items = ns.items + [entity_id ~ '=' ~ value] %}
        {% endif %}
      {% endfor %}
      {{ ns.items | join(', ') }}
  action:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ missing_helpers | trim != '''' }}'
      sequence:
      - service: logbook.log
        data:
          name: AC Runtime Helpers
          message: 'Helpers faltantes o no cargados: {{ missing_helpers }}'
          entity_id: climate.0200009211c7_climate
    default:
    - service: logbook.log
      data:
        name: AC Runtime Helpers
        message: 'Helpers críticos cargados correctamente en runtime.'
        entity_id: climate.0200009211c7_climate

- id: ac_memoria_y_bloqueo_2h_cool_heat
  alias: AC - Memoria último modo + Bloqueo 2h Cool/Heat (rolling, a prueba de fan_only)
  mode: single
  trigger:
  - platform: state
    entity_id: climate.0200009211c7_climate
    to:
    - cool
    - heat
    for: 00:00:02
  variables:
    to_mode: '{{ trigger.to_state.state if trigger.to_state else ''unknown'' }}'
  action:
  - service: input_select.select_option
    target:
      entity_id: input_select.ac_ultimo_modo_no_fan
    data:
      option: '{{ to_mode if to_mode in [''cool'',''heat''] else ''off'' }}'
    # `input_select.ac_ultimo_modo_no_fan` es un input_select: siempre debe recibir
    # texto exacto (`off`, `cool`, `heat`, `emergency_cool`), nunca booleanos ni null.
    # Sólo `cool` y `heat` se conservan aquí como memoria operativa útil; si luego
    # el sistema entra en reposo, otra rama debe resetear el helper a `off`.
  - service: input_datetime.set_datetime
    target:
      entity_id: input_datetime.ac_ultimo_cambio_modo
    data:
      timestamp: '{{ now().timestamp() }}'
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.ac_bloqueo_cambio_modo_2h
- id: ac_bloqueo_cambio_modo_2h_expira
  alias: AC - Bloqueo cambio modo 2h (expira por timestamp, rolling)
  mode: single
  trigger:
  - platform: time_pattern
    minutes: /1
  - platform: state
    entity_id:
    - input_datetime.ac_ultimo_cambio_modo
    - input_select.ac_ultimo_modo_no_fan
  variables:
    last_ts: '{{ state_attr(''input_datetime.ac_ultimo_cambio_modo'',''timestamp'')
      | float(0) }}'
    last_mode: '{{ states(''input_select.ac_ultimo_modo_no_fan'') }}'
    expired: '{{ last_ts > 0 and (now().timestamp() - last_ts) >= 7200 }}'
    invalid_mode: '{{ last_mode not in [''cool'',''heat''] }}'
  action:
  - choose:
    - conditions: '{{ expired or invalid_mode or last_ts == 0 }}'
      sequence:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.ac_bloqueo_cambio_modo_2h
    default: []
- id: ac_dinamico_por_tendencia_con_ac_off
  alias: AC - Modo dinámico por tendencia con AC OFF (23:00-07:00) + cooldown afinado
  mode: single
  trigger:
  - platform: time_pattern
    minutes: /5
  condition:
  - condition: time
    after: '23:00:00'
    before: 07:00:00
  - condition: template
    value_template: '{{ states(''climate.0200009211c7_climate'') in [''off'',''fan_only'']
      }}'
  variables:
    t_cuarto_raw: '{{ states(''sensor.lumi_lumi_weather_cuarto_temperatura'') }}'
    t_coco_raw: '{{ states(''sensor.lumi_lumi_weather_coco_temperatura'') }}'
    t_cuarto: '{{ t_cuarto_raw | float(none) }}'
    t_coco: '{{ t_coco_raw | float(none) }}'
    sensores_validos: '{{ t_cuarto is not none and t_coco is not none }}'
    # Contrato defensivo: cualquier mínimo/agregado nocturno (incluyendo un futuro
    # `sensor.minima_23_a_07` creado por UI) sólo debe usarse si ya viene numérico;
    # si no, se salta el cálculo para no propagar `unknown` ni convertirlo a 0.
    cap: 0.7
    t_coco_filtrado: "{% if not sensores_validos %}\n  {{ none }}\n{% elif (t_coco - t_cuarto) > cap %}\n  {{ (t_cuarto + cap) | round(2) }}\n{% else %}\n  {{ t_coco | round(2) }}\n{% endif %}"
    avg: '{{ ((t_cuarto + (t_coco_filtrado | float)) / 2) | round(2) if sensores_validos else none }}'
    prev: '{{ states(''input_number.ac_off_avg_previo_dinamico'') | float(0) }}'
    delta: '{{ (avg - prev) | round(2) if avg is not none else none }}'
    umbral: 0.1
    cooldown_min: 15
    last_off_ts: '{{ state_attr(''input_datetime.ac_ultimo_apagado'', ''timestamp'')
      | float(0) }}'
    cooldown_ok: '{{ last_off_ts > 0 and (now().timestamp() - last_off_ts) >= (cooldown_min
      * 60) }}'
    prev_inicializado: '{{ prev > 0 }}'
  action:
  - choose:
    - conditions: '{{ not sensores_validos }}'
      sequence:
      - service: logbook.log
        data:
          name: AC Noche Sensores
          message: >-
            Se omite modo dinámico nocturno porque la entrada no es numérica: cuarto={{ t_cuarto_raw }}, coco={{ t_coco_raw }}.
          entity_id: climate.0200009211c7_climate
    - conditions: '{{ not cooldown_ok }}'
      sequence: []
    - conditions: '{{ cooldown_ok and not prev_inicializado }}'
      sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.ac_off_avg_previo_dinamico
        data:
          value: '{{ avg }}'
    - conditions: '{{ cooldown_ok and prev_inicializado and avg is not none }}'
      sequence:
      - choose:
        - conditions: '{{ delta >= umbral }}'
          sequence:
          - service: input_select.select_option
            target:
              entity_id: input_select.ac_modo_dinamico
            data:
              option: cool
        - conditions: '{{ delta <= (0 - umbral) }}'
          sequence:
          - service: input_select.select_option
            target:
              entity_id: input_select.ac_modo_dinamico
            data:
              option: heat
      - service: input_number.set_value
        target:
          entity_id: input_number.ac_off_avg_previo_dinamico
        data:
          value: '{{ avg }}'
- id: ac_dormitorio_noche_on
  alias: AC - Noche Enciende Cool sobre 22.7 con tendencia
  description: 'Enciende el AC en modo COOL si está dentro del horario nocturno y
    el selector activo lo permite. Respeta bloqueo anti-cambio cool<->heat 2h. Presencia
    válida: (S24 home) OR (movimiento ON por 5 min).

    '
  triggers:
  - entity_id: sensor.lumi_lumi_weather_cuarto_temperatura
    above: 22.7
    trigger: numeric_state
  - entity_id: sensor.lumi_lumi_weather_coco_temperatura
    above: 22.7
    trigger: numeric_state
  - entity_id: binary_sensor.tze204_gkfbdvyx_ts0601
    to: 'on'
    for: 00:05:00
    id: presencia_on
    trigger: state
  - entity_id: device_tracker.samsung_s24
    to: home
    for: 00:10:00
    id: s24_home
    trigger: state
  - entity_id: input_select.ac_modo_noche_2200
    trigger: state
  - entity_id: input_select.ac_modo_dinamico
    trigger: state
  - entity_id: input_boolean.calefaccion_reciente
    to: 'off'
    trigger: state
  - entity_id: input_boolean.ac_bloqueo_cambio_modo_2h
    to: 'off'
    trigger: state
  conditions:
  - condition: or
    conditions:
    - condition: time
      after: '22:00:00'
    - condition: time
      before: 07:00:00
  - condition: template
    value_template: "{% set hm = now().strftime('%H:%M:%S') %} {% if hm >= '22:00:00'
      and hm < '23:00:00' %}\n  {{ is_state('input_select.ac_modo_noche_2200','cool')
      }}\n{% else %}\n  {{ is_state('input_select.ac_modo_dinamico','cool') }}\n{%
      endif %}"
  - condition: state
    entity_id: climate.0200009211c7_climate
    state:
    - 'off'
    - cool
    - fan_only
  - condition: template
    value_template: "{% set last = states('input_select.ac_ultimo_modo_no_fan') %}
      {% if last == 'heat' %}\n  {{ is_state('input_boolean.ac_bloqueo_cambio_modo_2h','off')
      }}\n{% else %}\n  true\n{% endif %}"
  - condition: state
    entity_id: input_boolean.calefaccion_reciente
    state: 'off'
  - condition: numeric_state
    entity_id: sensor.lumi_lumi_weather_cuarto_temperatura
    above: 22.7
  - condition: numeric_state
    entity_id: sensor.lumi_lumi_weather_coco_temperatura
    above: 22.7
  - condition: or
    conditions:
    - condition: state
      entity_id: device_tracker.samsung_s24
      state: home
    - condition: state
      entity_id: binary_sensor.tze204_gkfbdvyx_ts0601
      state: 'on'
  actions:
  - target:
      entity_id: climate.0200009211c7_climate
    action: climate.turn_on
  - target:
      entity_id: climate.0200009211c7_climate
    data:
      hvac_mode: cool
    action: climate.set_hvac_mode
  - target:
      entity_id: climate.0200009211c7_climate
    data:
      temperature: 20
    action: climate.set_temperature
  - target:
      entity_id: climate.0200009211c7_climate
    data:
      fan_mode: Low
    action: climate.set_fan_mode
  - target:
      entity_id: input_boolean.ac_bloqueo_modo_noche
    action: input_boolean.turn_on
  mode: single
