      - target:
          entity_id: input_text.ac_last_auto_fan
        data:
          value: Low
        action: input_text.set_value
      - target:
          entity_id: input_number.ac_last_auto_tin
        data:
          value: '{{ tin if tin is not none else 0 }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_t1
        data:
          value: '{{ t1 if t1 is not none else 0 }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_t2
        data:
          value: '{{ t2 if t2 is not none else 0 }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_hin
        data:
          value: '{{ hin if hin is not none else 0 }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_tout
        data:
          value: '{{ tout if tout is not none else 0 }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_setpoint
        data:
          value: '{{ cool_setpoint }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_sensor_delta
        data:
          value: '{{ sensor_delta }}'
        action: input_number.set_value
      - target:
          entity_id: climate.0200009211c7_climate
        data:
          hvac_mode: cool
        action: climate.set_hvac_mode
      - target:
          entity_id: climate.0200009211c7_climate
        data:
          temperature: '{{ cool_setpoint }}'
        action: climate.set_temperature
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ state_attr(climate_ent,'fan_modes') is not none\n
              \  and 'Low' in state_attr(climate_ent,'fan_modes') }}"
          sequence:
          - target:
              entity_id: climate.0200009211c7_climate
            data:
              fan_mode: Low
            action: climate.set_fan_mode
        - conditions:
          - condition: template
            value_template: "{{ state_attr(climate_ent,'fan_modes') is not none\n
              \  and 'Auto' in state_attr(climate_ent,'fan_modes') }}"
          sequence:
          - target:
              entity_id: climate.0200009211c7_climate
            data:
              fan_mode: Auto
            action: climate.set_fan_mode
        default: []
      - data:
          title: AC ON (cool)
          message: '{{ ts }} | Prom={{ tin }}°C | T1={{ t1 }}°C | T2={{ t2 }}°C |
            Ext={{ tout }}°C | Hum={{ hin }}% | CoolON={{ cool_on }}°C | CoolOFF={{
            cool_off }}°C | Set={{ cool_setpoint }}°C | SensorOFF={{ cool_sensor_off
            }}°C | Lock2h={{ lock_txt }} | ManualBlock={{ manual_off_block_txt }}'
          data:
            ttl: 0
            priority: high
        action: notify.mobile_app_samsung_s24
    default: []
  variables:
    climate_ent: climate.0200009211c7_climate
    fan_dry_delay: 00:05:00
    t1: '{{ states(''sensor.lumi_lumi_weather_cuarto_temperatura'') | float(none)
      }}'
    t2: '{{ states(''sensor.lumi_lumi_weather_coco_temperatura'') | float(none) }}'
    h1: '{{ states(''sensor.lumi_lumi_weather_cuarto_humedad'') | float(none) }}'
    h2: '{{ states(''sensor.lumi_lumi_weather_coco_humedad'') | float(none) }}'
    tin: "{% if t1 is not none and t2 is not none %}\n  {{ ((t1 + t2) / 2) | round(2)
      }}\n{% elif t1 is not none %}\n  {{ t1 | round(2) }}\n{% elif t2 is not none
      %}\n  {{ t2 | round(2) }}\n{% else %}\n  {{ none }}\n{% endif %}"
    hin: "{% if h1 is not none and h2 is not none %}\n  {{ ((h1 + h2) / 2) | round(1)
      }}\n{% elif h1 is not none %}\n  {{ h1 | round(1) }}\n{% elif h2 is not none
      %}\n  {{ h2 | round(1) }}\n{% else %}\n  {{ none }}\n{% endif %}"
    sensor_delta: "{% if t1 is not none and t2 is not none %}\n  {{ (t1 - t2) | abs
      | round(2) }}\n{% else %}\n  {{ 0 }}\n{% endif %}"
    tout: '{{ state_attr(''weather.openweathermap'',''apparent_temperature'') | float(none)
      }}'
    wind_kmh: '{{ state_attr(''weather.openweathermap'',''wind_speed'') | float(0)
      }}'
    wind: '{{ (wind_kmh / 3.6) | round(2) }}'
    cur_mode: '{{ states(climate_ent) }}'
    ac_set: '{{ state_attr(climate_ent,''temperature'') | float(none) }}'
    ac_fan: "{{ state_attr(climate_ent,'fan_mode')\n   if state_attr(climate_ent,'fan_mode')
      is not none else 'n/a' }}"
    locked: '{{ is_state(''input_boolean.ac_bloqueo_cambio_modo_2h'',''on'') }}'
    lock_txt: '{{ ''ON'' if locked else ''OFF'' }}'
    last_mode_no_fan: '{{ states(''input_select.ac_ultimo_modo_no_fan'') }}'
    mov_raw: '{{ states(''binary_sensor.presencia_movimiento_estable'') }}'
    s24_raw: '{{ states(''device_tracker.samsung_s24'') }}'
    person_raw: '{{ states(''person.ivan'') }}'
    presence_ok: '{{ is_state(''binary_sensor.presencia_ok_estable'',''on'') }}'
    presence_real_now: '{{ mov_raw == ''on'' }}'
    presence_phone_home: '{{ (s24_raw in [''home'',''on'']) or (person_raw == ''home'')
      }}'
    manual_presence_until_raw: '{{ states(''input_datetime.ac_manual_presence_until'')
      }}'
    presence_temp_from_manual: "{% if manual_presence_until_raw in ['unknown','unavailable','none','']
      %}\n  false\n{% else %}\n  {{ as_timestamp(now()) < as_timestamp(manual_presence_until_raw)
      }}\n{% endif %}"
    presence_sensor_strict: '{{ presence_ok and presence_real_now }}'
    presence_effective: '{{ presence_phone_home or presence_sensor_strict or presence_temp_from_manual
      }}'
    auto_on_allowed: '{{ presence_effective and (not manual_off_block) }}'
    presence_away_30m: "{{ (not presence_effective)\n   and is_state('binary_sensor.presencia_movimiento_estable','off')\n
      \  and (person_raw != 'home')\n   and (s24_raw not in ['home','on']) }}"
    away30_txt: '{{ ''YES'' if presence_away_30m else ''NO'' }}'
    learning_enabled: '{{ is_state(''input_boolean.ac_learning_enabled'',''on'') }}'
    bias_cool_on: '{{ states(''input_number.ac_bias_cool_on'') | float(0) }}'
    bias_cool_off: '{{ states(''input_number.ac_bias_cool_off'') | float(0) }}'
    bias_cool_setpoint: '{{ states(''input_number.ac_bias_cool_setpoint'') | float(0)
      }}'
    bias_heat_on: '{{ states(''input_number.ac_bias_heat_on'') | float(0) }}'
    bias_heat_off: '{{ states(''input_number.ac_bias_heat_off'') | float(0) }}'
    bias_heat_setpoint: '{{ states(''input_number.ac_bias_heat_setpoint'') | float(0)
      }}'
    fan_day_mode: '{{ ''Low'' if now().hour < 9 else ''Auto'' }}'
    emergency_window: "{% set t = now().strftime('%H:%M:%S') %} {% if '10:00:00' <=
      t < '16:00:00' %}\n  10-16\n{% else %}\n  07-10/16-21\n{% endif %}"
    emergency_on_avg: '{% set t = now().strftime(''%H:%M:%S'') %} {{ 24.5 if ''10:00:00''
      <= t < ''16:00:00'' else 25.0 }}'
    emergency_off_avg: '{% set t = now().strftime(''%H:%M:%S'') %} {{ 23.5 if ''10:00:00''
      <= t < ''16:00:00'' else 24.0 }}'
    emergency_setpoint: 22
    emergency_fan_mode: '{% set t = now().strftime(''%H:%M:%S'') %} {{ ''Auto'' if
      ''10:00:00'' <= t < ''16:00:00'' else ''Low'' }}'
    emergency_hot: '{{ tin is not none and (tin | float) >= (emergency_on_avg | float)
      }}'
    emergency_off_ready: '{{ tin is not none and (tin | float) <= (emergency_off_avg
      | float) }}'
    emergency_latched: '{{ last_mode_no_fan == ''emergency_cool'' }}'
    heat_force_off_outdoor: 20
    heat_on_base: "{% if tout is none %}\n  {{ none }}\n{% else %}\n  {% set base
      = 23.0 if tout <= 5 else 22.0 if tout >= 17 else (23.0 - ((tout-5)/12)) %}\n
      \ {{ (base + min(wind*0.05,0.8)) | round(2) }}\n{% endif %}"
    heat_on: "{% if heat_on_base is none %}\n  {{ none }}\n{% else %}\n  {% set raw
      = (heat_on_base | float) + (bias_heat_on if learning_enabled else 0) %}\n  {{
      [[raw, 23.8] | min, 21.0] | max | round(2) }}\n{% endif %}"
    heat_off: "{% if heat_on is none %}\n  {{ none }}\n{% else %}\n  {% set raw =
      (heat_on | float) + 1.5 + (bias_heat_off if learning_enabled else 0) %}\n  {{
      [[raw, 25.5] | min, (heat_on | float) + 0.6] | max | round(2) }}\n{% endif %}"
    heat_setpoint: '{% set raw = 28 + (bias_heat_setpoint if learning_enabled else
      0) %} {{ [[raw, 30] | min, 24] | max | round(1) }}'
    cool_on_base: "{% if tout is none %}\n  {{ none }}\n{% elif tout < 17 %}\n  {{
      none }}\n{% else %}\n  {% set anchor_tout = 18.1 %}\n  {% set anchor_cool_on
      = 24.0 %}\n  {% set k = 0.10 %}\n  {% set offset = 0.5 %}\n  {% set humidity_adj
      = 0 if hin is none else (-0.25 if hin >= 65 else -0.10 if hin >= 58 else 0)
      %}\n  {% set raw = (anchor_cool_on - (k * (tout - anchor_tout))) + offset +
      humidity_adj %}\n  {{ [[raw, 24.7] | min, 24.0] | max | round(2) }}\n{% endif
      %}"
    cool_on: "{% if cool_on_base is none %}\n  {{ none }}\n{% else %}\n  {% set raw
      = (cool_on_base | float) + (bias_cool_on if learning_enabled else 0) %}\n  {{
      [[raw, 25.2] | min, 23.8] | max | round(2) }}\n{% endif %}"
    cool_off_base: "{% if cool_on is none %}\n  {{ none }}\n{% else %}\n  {{ ((cool_on
      | float) - 0.5) | round(2) }}\n{% endif %}"
    cool_off: "{% if cool_off_base is none %}\n  {{ none }}\n{% else %}\n  {% set
      raw = (cool_off_base | float) + (bias_cool_off if learning_enabled else 0) %}\n
      \ {% set hi = (cool_on | float) - 0.4 %}\n  {{ [[raw, hi] | min, 22.8] | max
      | round(2) }}\n{% endif %}"
    cool_sensor_off: "{% if cool_off is none %}\n  {{ 23.2 }}\n{% else %}\n  {% set
      raw = (cool_off | float) - 0.3 %}\n  {{ [[raw, 24.0] | min, 22.8] | max | round(2)
      }}\n{% endif %}"
    cool_setpoint_base: "{% if cool_off is none %}\n  {{ none }}\n{% else %}\n  {%
      set flo = (cool_off | float) | int %}\n  {{ [(flo - 1), 16] | max }}\n{% endif
      %}"
    cool_setpoint: "{% if cool_setpoint_base is none %}\n  {{ none }}\n{% else %}\n
      \ {% set raw = (cool_setpoint_base | float) + (bias_cool_setpoint if learning_enabled
      else 0) %}\n  {{ [[raw, 24] | min, 21] | max | round(1) }}\n{% endif %}"
    last_auto_ts_raw: '{{ states(''input_datetime.ac_last_auto_ts'') }}'
    minutes_since_last_auto: "{% if last_auto_ts_raw in ['unknown','unavailable','none','']
      %}\n  99999\n{% else %}\n  {{ ((as_timestamp(now()) - as_timestamp(last_auto_ts_raw))
      / 60) | round(1) }}\n{% endif %}"
    last_auto_action: '{{ states(''input_text.ac_last_auto_action'') }}'
    last_auto_mode: '{{ states(''input_text.ac_last_auto_mode'') }}'
    last_auto_branch: '{{ states(''input_text.ac_last_auto_branch'') }}'
    recent_any_auto_on: "{{ last_auto_action == 'auto_on'\n   and (minutes_since_last_auto
      | float(99999)) <= 2 }}"
    last_manual_off_ts_raw: '{{ states(''input_datetime.ac_last_manual_off_ts'') }}'
    manual_off_hold_minutes: 5
    minutes_since_manual_off: "{% if last_manual_off_ts_raw in ['unknown','unavailable','none','']
      %}\n  99999\n{% else %}\n  {{ ((as_timestamp(now()) - as_timestamp(last_manual_off_ts_raw))
      / 60) | round(1) }}\n{% endif %}"
    manual_off_block: '{{ (minutes_since_manual_off | float(99999)) < (manual_off_hold_minutes
      | float) }}'
    manual_off_block_txt: '{{ ''ON'' if manual_off_block else ''OFF'' }}'
    ts: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
    trig: "{% if trigger is defined %}\n  {% if trigger.platform == 'time_pattern'
      %}\n    /5min\n  {% elif trigger.platform == 'state' %}\n    {{ trigger.entity_id
      }}={{ trigger.to_state.state if trigger.to_state else 'n/a' }}\n  {% else %}\n
      \   {{ trigger.platform }}\n  {% endif %}\n{% else %}\n  manual\n{% endif %}"
  mode: single
- id: '1769981375283'
  alias: AC - Iniciar bloqueo 2h al apagarse
  description: ''
  triggers:
  - entity_id: climate.0200009211c7_climate
    to: 'off'
    trigger: state
  actions:
  - target:
      entity_id: input_boolean.ac_bloqueo_cambio_modo_2h
    action: input_boolean.turn_on
  - delay: 02:00:00
  - target:
      entity_id: input_boolean.ac_bloqueo_cambio_modo_2h
    action: input_boolean.turn_off
  mode: restart
- id: '1773894905330'
  alias: AC - Learning - Manual OFF feedback
  description: 'Evalúa si un apagado manual detectado previamente constituye feedback
    válido para aprendizaje. Esta automatización sólo escribe telemetría de aprendizaje:
    `input_datetime.ac_last_manual_feedback_ts` se actualiza exclusivamente cuando
    el apagado manual corrige un `auto_on` reciente dentro de la ventana de feedback.
    La detección del apagado manual vive en `input_datetime.ac_last_manual_off_ts`
    y el resultado del aprendizaje queda clasificado en `input_text.ac_last_manual_learning_type`.

    '
  triggers:
  - trigger: state
    entity_id: climate.0200009211c7_climate
    to: 'off'
  conditions:
  - condition: time
    after: 07:01:00
    before: '20:59:00'
  - condition: state
    entity_id: input_boolean.ac_off_por_automatizacion
    state: 'off'
  actions:
  - variables:
      t1: '{{ states(''sensor.lumi_lumi_weather_cuarto_temperatura'') | float(none)
        }}'
      t2: '{{ states(''sensor.lumi_lumi_weather_coco_temperatura'') | float(none)
        }}'
      h1: '{{ states(''sensor.lumi_lumi_weather_cuarto_humedad'') | float(none) }}'
      h2: '{{ states(''sensor.lumi_lumi_weather_coco_humedad'') | float(none) }}'
      tin: "{% if t1 is not none and t2 is not none %}
  {{ ((t1 + t2) / 2) | round(2)
        }}
{% elif t1 is not none %}
  {{ t1 | round(2) }}
{% elif t2 is not none
        %}
  {{ t2 | round(2) }}
{% else %}
  {{ none }}
{% endif %}"
      hin: "{% if h1 is not none and h2 is not none %}
  {{ ((h1 + h2) / 2) | round(1)
        }}
{% elif h1 is not none %}
  {{ h1 | round(1) }}
{% elif h2 is not none
        %}
  {{ h2 | round(1) }}
{% else %}
  {{ none }}
{% endif %}"
      sensor_delta: "{% if t1 is not none and t2 is not none %}
  {{ (t1 - t2) |
        abs | round(2) }}
{% else %}
  {{ 0 }}
{% endif %}"
      tout: '{{ state_attr(''weather.openweathermap'',''apparent_temperature'') |
        float(none) }}'
      last_auto_ts_raw: '{{ states(''input_datetime.ac_last_auto_ts'') }}'
      last_auto_action: '{{ states(''input_text.ac_last_auto_action'') }}'
      last_auto_mode: '{{ states(''input_text.ac_last_auto_mode'') }}'
      last_auto_branch: '{{ states(''input_text.ac_last_auto_branch'') }}'
      feedback_window_min: '{{ states(''input_number.ac_feedback_window_minutes'')
        | float(30) }}'
      lr_small: '{{ states(''input_number.ac_learning_rate_small'') | float(0.05)
        }}'
      lr_large: '{{ states(''input_number.ac_learning_rate_large'') | float(0.10)
        }}'
      learning_enabled: '{{ is_state(''input_boolean.ac_learning_enabled'',''on'')
        }}'
      minutes_since_last_auto: "{% if last_auto_ts_raw in ['unknown','unavailable','none','']
        %}
  99999
{% else %}
  {{ ((as_timestamp(now()) - as_timestamp(last_auto_ts_raw))
        / 60) | round(1) }}
{% endif %}"
      quick_feedback: '{{ (minutes_since_last_auto | float(99999)) <= 8 }}'
      valid_feedback: "{{ learning_enabled
   and last_auto_action == 'auto_on'

        \  and last_auto_mode in ['cool','heat']
   and (minutes_since_last_auto
        | float(99999)) <= (feedback_window_min | float(30)) }}"
      cur_bias_cool_on: '{{ states(''input_number.ac_bias_cool_on'') | float(0) }}'
      cur_bias_cool_off: '{{ states(''input_number.ac_bias_cool_off'') | float(0)
        }}'
      cur_bias_cool_setpoint: '{{ states(''input_number.ac_bias_cool_setpoint'') |
        float(0) }}'
      cur_bias_heat_on: '{{ states(''input_number.ac_bias_heat_on'') | float(0) }}'
      cur_bias_heat_off: '{{ states(''input_number.ac_bias_heat_off'') | float(0)
        }}'
      cur_bias_heat_setpoint: '{{ states(''input_number.ac_bias_heat_setpoint'') |
        float(0) }}'
      step_main: '{{ (lr_large if quick_feedback else lr_small) | float }}'
      debug_enabled: '{{ is_state(''input_boolean.ac_learning_debug'',''on'') }}'
      ts: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      learning_type: "{% if valid_feedback and last_auto_mode == 'cool' %}
  manual_off_feedback_valid_after_auto_on_cool
{%
        elif valid_feedback and last_auto_mode == 'heat' %}
  manual_off_feedback_valid_after_auto_on_heat
{%
        elif not learning_enabled %}
  manual_off_feedback_ignored_learning_disabled
{% elif last_auto_action
        != 'auto_on' %}
  manual_off_feedback_ignored_last_action_not_auto_on
{% elif last_auto_mode
        not in ['cool','heat'] %}
  manual_off_feedback_ignored_last_mode_not_learnable
{% elif (minutes_since_last_auto
        | float(99999)) > (feedback_window_min | float(30)) %}
  manual_off_feedback_ignored_window_expired
{%
        else %}
  manual_off_feedback_ignored_no_valid_learning
{% endif %}"
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ valid_feedback }}'
      sequence:
      - target:
          entity_id: input_datetime.ac_last_manual_feedback_ts
        data:
          datetime: '{{ ts }}'
        action: input_datetime.set_datetime
    default: []
  - target:
      entity_id: input_number.ac_last_manual_tin
    data:
      value: '{{ tin if tin is not none else 0 }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.ac_last_manual_t1
    data:
      value: '{{ t1 if t1 is not none else 0 }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.ac_last_manual_t2
    data:
      value: '{{ t2 if t2 is not none else 0 }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.ac_last_manual_hin
    data:
      value: '{{ hin if hin is not none else 0 }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.ac_last_manual_tout
    data:
      value: '{{ tout if tout is not none else 0 }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.ac_last_manual_sensor_delta
    data:
      value: '{{ sensor_delta }}'
    action: input_number.set_value
  - target:
      entity_id: input_text.ac_last_manual_learning_type
    data:
      value: '{{ learning_type }}'
    action: input_text.set_value
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ valid_feedback and last_auto_mode == ''cool'' }}'
      sequence:
      - target:
          entity_id: input_text.ac_last_manual_feedback_mode
        data:
          value: cool
        action: input_text.set_value
      - target:
          entity_id: input_text.ac_last_manual_feedback_fan
        data:
          value: 'off'
        action: input_text.set_value
      - target:
          entity_id: input_number.ac_bias_cool_on
        data:
          value: '{% set raw = (cur_bias_cool_on | float) + (step_main | float) %}
            {{ [[raw, 2] | min, -2] | max | round(2) }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_bias_cool_off
        data:
          value: '{% set raw = (cur_bias_cool_off | float) + (step_main | float) %}
            {{ [[raw, 2] | min, -2] | max | round(2) }}'
        action: input_number.set_value
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ quick_feedback }}'
          sequence:
          - target:
              entity_id: input_number.ac_bias_cool_setpoint
            data:
              value: '{% set raw = (cur_bias_cool_setpoint | float) + 0.5 %} {{ [[raw,
                2] | min, -2] | max | round(1) }}'
            action: input_number.set_value
        default: []
    - conditions:
      - condition: template
        value_template: '{{ valid_feedback and last_auto_mode == ''heat'' }}'
      sequence:
      - target:
          entity_id: input_text.ac_last_manual_feedback_mode
        data:
          value: heat
        action: input_text.set_value
      - target:
          entity_id: input_text.ac_last_manual_feedback_fan
        data:
          value: 'off'
        action: input_text.set_value
      - target:
          entity_id: input_number.ac_bias_heat_on
        data:
          value: '{% set raw = (cur_bias_heat_on | float) - (step_main | float) %}
            {{ [[raw, 2] | min, -2] | max | round(2) }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_bias_heat_off
        data:
          value: '{% set raw = (cur_bias_heat_off | float) - (step_main | float) %}
            {{ [[raw, 2] | min, -2] | max | round(2) }}'
        action: input_number.set_value
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ quick_feedback }}'
          sequence:
          - target:
              entity_id: input_number.ac_bias_heat_setpoint
            data:
              value: '{% set raw = (cur_bias_heat_setpoint | float) - 0.5 %} {{ [[raw,
                2] | min, -2] | max | round(1) }}'
            action: input_number.set_value
        default: []
    default:
    - choose:
      - conditions:
        - condition: state
          entity_id: input_boolean.ac_learning_debug
          state: 'on'
        sequence:
        - data:
            title: AC Learning - Manual OFF sin ajuste
            message: '{{ ts }} | Learning={{ learning_type }} | learning={{ learning_enabled
              }} | last_action={{ last_auto_action }} | last_mode={{ last_auto_mode
              }} | min={{ minutes_since_last_auto }} | branch={{ last_auto_branch
              }}'
            data:
              ttl: 0
              priority: high
          action: notify.mobile_app_samsung_s24
      default: []
  mode: restart
- id: '1773895045305'
  alias: AC - Learning - Manual ON feedback
  description: 'Evalúa si un encendido manual detectado previamente constituye feedback
    válido para aprendizaje. Esta automatización sólo clasifica el aprendizaje manual
    y ajusta sesgos cuando el encendido corrige un `auto_off` reciente dentro de la
    ventana válida. `input_datetime.ac_last_manual_feedback_ts` se actualiza sólo
    para feedback válido; la detección del encendido manual se registra aparte en
    `input_datetime.ac_last_manual_on_ts` y el estado final del usuario en
    `input_datetime.ac_last_manual_final_ts`.

    '
  triggers:
  - trigger: state
    entity_id: climate.0200009211c7_climate
    from: 'off'
    to:
    - cool
    - heat
    - fan_only
    for: 00:00:02
  conditions:
  - condition: time
    after: 07:01:00
    before: '20:59:00'
  - condition: state
    entity_id: input_boolean.ac_off_por_automatizacion
    state: 'off'
  actions:
  - delay: 00:00:15
  - variables:
      climate_ent: climate.0200009211c7_climate
      final_mode: '{{ states(climate_ent) }}'
      final_setpoint: '{{ state_attr(climate_ent,''temperature'') | float(none) }}'
      final_fan: "{{ state_attr(climate_ent,'fan_mode')
   if state_attr(climate_ent,'fan_mode')
        is not none else 'n/a' }}"
      last_auto_ts_raw: '{{ states(''input_datetime.ac_last_auto_ts'') }}'
      last_auto_action: '{{ states(''input_text.ac_last_auto_action'') }}'
      last_auto_mode: '{{ states(''input_text.ac_last_auto_mode'') }}'
      last_auto_branch: '{{ states(''input_text.ac_last_auto_branch'') }}'
      feedback_window_min: '{{ states(''input_number.ac_feedback_window_minutes'')
        | float(30) }}'
      lr_small: '{{ states(''input_number.ac_learning_rate_small'') | float(0.05)
        }}'
      lr_large: '{{ states(''input_number.ac_learning_rate_large'') | float(0.10)
        }}'
      learning_enabled: '{{ is_state(''input_boolean.ac_learning_enabled'',''on'')
        }}'
      minutes_since_last_auto: "{% if last_auto_ts_raw in ['unknown','unavailable','none','']
        %}
  99999
{% else %}
  {{ ((as_timestamp(now()) - as_timestamp(last_auto_ts_raw))
        / 60) | round(1) }}
{% endif %}"
      quick_feedback: '{{ (minutes_since_last_auto | float(99999)) <= 10 }}'
      valid_feedback: "{{ learning_enabled
   and last_auto_action == 'auto_off'

        \  and final_mode in ['cool','heat']
   and (minutes_since_last_auto | float(99999))
        <= (feedback_window_min | float(30)) }}"
      cur_bias_cool_on: '{{ states(''input_number.ac_bias_cool_on'') | float(0) }}'
      cur_bias_cool_off: '{{ states(''input_number.ac_bias_cool_off'') | float(0)
        }}'
      cur_bias_cool_setpoint: '{{ states(''input_number.ac_bias_cool_setpoint'') |
        float(0) }}'
      cur_bias_heat_on: '{{ states(''input_number.ac_bias_heat_on'') | float(0) }}'
      cur_bias_heat_off: '{{ states(''input_number.ac_bias_heat_off'') | float(0)
        }}'
      cur_bias_heat_setpoint: '{{ states(''input_number.ac_bias_heat_setpoint'') |
        float(0) }}'
      step_main: '{{ (lr_large if quick_feedback else lr_small) | float }}'
      debug_enabled: '{{ is_state(''input_boolean.ac_learning_debug'',''on'') }}'
      ts: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      learning_type: "{% if valid_feedback and final_mode == 'cool' %}
  manual_on_feedback_valid_after_auto_off_cool
{%
        elif valid_feedback and final_mode == 'heat' %}
  manual_on_feedback_valid_after_auto_off_heat
{%
        elif not learning_enabled %}
  manual_on_feedback_ignored_learning_disabled
{% elif last_auto_action
        != 'auto_off' %}
  manual_on_feedback_ignored_last_action_not_auto_off
{% elif final_mode
        not in ['cool','heat'] %}
  manual_on_feedback_ignored_final_mode_not_learnable
{% elif (minutes_since_last_auto
        | float(99999)) > (feedback_window_min | float(30)) %}
  manual_on_feedback_ignored_window_expired
{%
        else %}
  manual_on_feedback_ignored_no_valid_learning
{% endif %}"
  - target:
      entity_id: input_text.ac_last_manual_learning_type
    data:
      value: '{{ learning_type }}'
    action: input_text.set_value
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ valid_feedback }}'
      sequence:
      - target:
          entity_id: input_datetime.ac_last_manual_feedback_ts
        data:
          datetime: '{{ ts }}'
        action: input_datetime.set_datetime
    default: []
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ valid_feedback and final_mode == ''cool'' }}'
      sequence:
      - target:
          entity_id: input_text.ac_last_manual_feedback_mode
        data:
          value: cool
        action: input_text.set_value
      - target:
          entity_id: input_text.ac_last_manual_feedback_fan
        data:
          value: '{{ final_fan }}'
        action: input_text.set_value
      - target:
          entity_id: input_number.ac_bias_cool_on
        data:
          value: '{% set raw = (cur_bias_cool_on | float) - (step_main | float) %}
            {{ [[raw, 2] | min, -2] | max | round(2) }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_bias_cool_off
        data:
          value: '{% set raw = (cur_bias_cool_off | float) - (step_main | float) %}
            {{ [[raw, 2] | min, -2] | max | round(2) }}'
        action: input_number.set_value
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ quick_feedback }}'
          sequence:
          - target:
              entity_id: input_number.ac_bias_cool_setpoint
            data:
              value: '{% set raw = (cur_bias_cool_setpoint | float) - 0.5 %} {{ [[raw,
                2] | min, -2] | max | round(1) }}'
            action: input_number.set_value
        default: []
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ debug_enabled }}'
          sequence:
          - data:
              title: AC Learning - Manual ON corrige COOL OFF
              message: '{{ ts }} | Learning={{ learning_type }} | Branch={{ last_auto_branch }} | Min={{ minutes_since_last_auto
                }} | step={{ step_main }} | FinalSet={{ final_setpoint }} | Fan={{
                final_fan }}'
              data:
                ttl: 0
                priority: high
            action: notify.mobile_app_samsung_s24
        default: []
    - conditions:
      - condition: template
        value_template: '{{ valid_feedback and final_mode == ''heat'' }}'
      sequence:
      - target:
          entity_id: input_text.ac_last_manual_feedback_mode
        data:
          value: heat
        action: input_text.set_value
      - target:
          entity_id: input_text.ac_last_manual_feedback_fan
        data:
          value: '{{ final_fan }}'
        action: input_text.set_value
      - target:
          entity_id: input_number.ac_bias_heat_on
        data:
          value: '{% set raw = (cur_bias_heat_on | float) + (step_main | float) %}
            {{ [[raw, 2] | min, -2] | max | round(2) }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_bias_heat_off
        data:
          value: '{% set raw = (cur_bias_heat_off | float) + (step_main | float) %}
            {{ [[raw, 2] | min, -2] | max | round(2) }}'
        action: input_number.set_value
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ quick_feedback }}'
          sequence:
          - target:
              entity_id: input_number.ac_bias_heat_setpoint
            data:
              value: '{% set raw = (cur_bias_heat_setpoint | float) + 0.5 %} {{ [[raw,
                2] | min, -2] | max | round(1) }}'
            action: input_number.set_value
        default: []
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ debug_enabled }}'
          sequence:
          - data:
              title: AC Learning - Manual ON corrige HEAT OFF
              message: '{{ ts }} | Learning={{ learning_type }} | Branch={{ last_auto_branch }} | Min={{ minutes_since_last_auto
                }} | step={{ step_main }} | FinalSet={{ final_setpoint }} | Fan={{
                final_fan }}'
              data:
                ttl: 0
                priority: high
            action: notify.mobile_app_samsung_s24
        default: []
    default:
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ debug_enabled }}'
        sequence:
        - data:
            title: AC Learning - Manual ON sin ajuste
            message: '{{ ts }} | Learning={{ learning_type }} | learning={{ learning_enabled
              }} | last_action={{ last_auto_action }} | last_mode={{ last_auto_mode
              }} | min={{ minutes_since_last_auto }} | branch={{ last_auto_branch
              }} | final_mode={{ final_mode }} | set={{ final_setpoint }} | fan={{
              final_fan }}'
            data:
              ttl: 0
              priority: high
          action: notify.mobile_app_samsung_s24
      default: []
  mode: restart
- id: '1773939304415'
  alias: AC - Manual OFF guard + pausa 5 min
  description: 'Detecta el instante exacto en que el usuario apaga manualmente el AC.
    Sólo escribe telemetría del evento manual inicial: actualiza
    `input_datetime.ac_last_manual_off_ts`, clasifica el evento en
    `input_text.ac_last_manual_event_type`, limpia `input_select.ac_ultimo_modo_no_fan`
    a `off` y deja la pausa operativa de 5 minutos. No marca feedback de aprendizaje
    ni estado final manual.

    '
  triggers:
  - trigger: state
    entity_id: climate.0200009211c7_climate
    to: 'off'
  conditions:
  - condition: time
    after: 07:01:00
    before: '20:59:00'
  - condition: state
    entity_id: input_boolean.ac_off_por_automatizacion
    state: 'off'
  actions:
  - variables:
      ts: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
  - target:
      entity_id: input_datetime.ac_last_manual_off_ts
    data:
      datetime: '{{ ts }}'
    action: input_datetime.set_datetime
  - data:
      name: AC Manual OFF audit
      message: '{{ ts }} | input_datetime.ac_last_manual_off_ts={{ ts }} | Ventana anti-rebote activada por 5 min antes de cualquier AUTO ON.'
      entity_id: climate.0200009211c7_climate
    action: logbook.log
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.ac_learning_debug
        state: 'on'
      sequence:
      - data:
          title: AC DEBUG - Manual OFF auditado
          message: '{{ ts }} | input_datetime.ac_last_manual_off_ts={{ ts }} | Ventana anti-rebote activa por 5 min antes de cualquier AUTO ON.'
          data:
            ttl: 0
            priority: high
        action: notify.mobile_app_samsung_s24
    default: []
  - target:
      entity_id: input_text.ac_last_manual_event_type
    data:
      value: manual_off_detected
    action: input_text.set_value
  - target:
      entity_id: input_select.ac_ultimo_modo_no_fan
    data:
      option: off
    # Consistencia del helper: los apagados manuales limpian el estado a `off`,
    # porque ese valor representa reposo explícito y reemplaza cualquier noción
    # previa de `idle`.
    action: input_select.select_option
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.ac_learning_debug
        state: 'on'
      sequence:
      - data:
          title: AC Manual OFF detectado
          message: '{{ ts }} | Evento=manual_off_detected | Se registró apagado manual. AUTO ON bloqueado por 5 min.'
          data:
            ttl: 0
            priority: high
        action: notify.mobile_app_samsung_s24
    default: []
  mode: restart
- id: '1773947560399'
  alias: AC - Manual ON guard + presencia temporal
  description: 'Detecta el encendido manual inicial y, tras estabilizarse el equipo, registra
    el estado final elegido por el usuario. Esta automatización separa ambos momentos:
    `input_datetime.ac_last_manual_on_ts` marca la detección del encendido manual,
    `input_datetime.ac_last_manual_final_ts` marca cuándo quedó consolidado el estado
    final, `input_text.ac_last_manual_event_type` clasifica el evento y los helpers
    `ac_last_manual_final_*` guardan la elección final del usuario. No marca feedback
    de aprendizaje por sí sola.

    '
  triggers:
  - trigger: state
    entity_id: climate.0200009211c7_climate
    from: 'off'
    to:
    - cool
    - heat
    - fan_only
    for: 00:00:02
  conditions:
  - condition: time
    after: 07:01:00
    before: '20:59:00'
  - condition: state
    entity_id: input_boolean.ac_off_por_automatizacion
    state: 'off'
  actions:
  - variables:
      detected_ts: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
  - target:
      entity_id: input_datetime.ac_last_manual_on_ts
    data:
      datetime: '{{ detected_ts }}'
    action: input_datetime.set_datetime
  - target:
      entity_id: input_text.ac_last_manual_event_type
    data:
      value: manual_on_detected
    action: input_text.set_value
  - delay: 00:00:15
  - variables:
      climate_ent: climate.0200009211c7_climate
      ts: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      manual_presence_until: '{{ (now() + timedelta(hours=1)).strftime(''%Y-%m-%d
        %H:%M:%S'') }}'
      final_mode: '{{ states(climate_ent) }}'
      final_setpoint: '{{ state_attr(climate_ent,''temperature'') | float(none) }}'
      final_fan: "{{ state_attr(climate_ent,'fan_mode')\n   if state_attr(climate_ent,'fan_mode')
        is not none else 'n/a' }}"
      t1: '{{ states(''sensor.lumi_lumi_weather_cuarto_temperatura'') | float(none)
        }}'
      t2: '{{ states(''sensor.lumi_lumi_weather_coco_temperatura'') | float(none)
        }}'
      h1: '{{ states(''sensor.lumi_lumi_weather_cuarto_humedad'') | float(none) }}'
      h2: '{{ states(''sensor.lumi_lumi_weather_coco_humedad'') | float(none) }}'
      tin: "{% if t1 is not none and t2 is not none %}\n  {{ ((t1 + t2) / 2) | round(2)
        }}\n{% elif t1 is not none %}\n  {{ t1 | round(2) }}\n{% elif t2 is not none
        %}\n  {{ t2 | round(2) }}\n{% else %}\n  {{ none }}\n{% endif %}"
      hin: "{% if h1 is not none and h2 is not none %}\n  {{ ((h1 + h2) / 2) | round(1)
        }}\n{% elif h1 is not none %}\n  {{ h1 | round(1) }}\n{% elif h2 is not none
        %}\n  {{ h2 | round(1) }}\n{% else %}\n  {{ none }}\n{% endif %}"
      sensor_delta: "{% if t1 is not none and t2 is not none %}\n  {{ (t1 - t2) |
        abs | round(2) }}\n{% else %}\n  {{ 0 }}\n{% endif %}"
      tout: '{{ state_attr(''weather.openweathermap'',''apparent_temperature'') |
        float(none) }}'
  - target:
      entity_id: input_datetime.ac_last_manual_final_ts
    data:
      datetime: '{{ ts }}'
    action: input_datetime.set_datetime
  - target:
      entity_id: input_datetime.ac_manual_presence_until
    data:
      datetime: '{{ manual_presence_until }}'
    action: input_datetime.set_datetime
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ final_mode in [''cool'',''heat''] }}'
      sequence:
      - target:
          entity_id: input_select.ac_ultimo_modo_no_fan
        data:
          option: '{{ final_mode }}'
        # Si el encendido manual termina en `cool` o `heat`, ese modo sí debe quedar
        # recordado; cualquier otro resultado debe dejar el helper en `off`.
        action: input_select.select_option
    default: []
  - target:
      entity_id: input_text.ac_last_manual_final_mode
    data:
      value: '{{ final_mode }}'
    action: input_text.set_value
  - target:
      entity_id: input_text.ac_last_manual_final_fan
    data:
      value: '{{ final_fan }}'
    action: input_text.set_value
  - target:
      entity_id: input_number.ac_last_manual_tin
    data:
      value: '{{ tin if tin is not none else 0 }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.ac_last_manual_t1
    data:
      value: '{{ t1 if t1 is not none else 0 }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.ac_last_manual_t2
    data:
      value: '{{ t2 if t2 is not none else 0 }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.ac_last_manual_hin
    data:
      value: '{{ hin if hin is not none else 0 }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.ac_last_manual_tout
    data:
      value: '{{ tout if tout is not none else 0 }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.ac_last_manual_setpoint
    data:
      value: '{{ final_setpoint if final_setpoint is not none else 0 }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.ac_last_manual_sensor_delta
    data:
      value: '{{ sensor_delta }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.ac_last_manual_final_setpoint
    data:
      value: '{{ final_setpoint if final_setpoint is not none else 0 }}'
    action: input_number.set_value
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.ac_learning_debug
        state: 'on'
      sequence:
      - data:
          title: AC Manual ON detectado
          message: '{{ ts }} | Mode={{ final_mode }} | Set={{ final_setpoint }} |
            Fan={{ final_fan }} | Presencia manual hasta={{ manual_presence_until
            }}'
          data:
            ttl: 0
            priority: high
        action: notify.mobile_app_samsung_s24
    default: []
  mode: restart
