            }} | off_raw={{ contract_cycle_off_raw }}'
          entity_id: climate.0200009211c7_climate
    default: []
  - service: notify.mobile_app_samsung_s24
    data:
      title: AC Manual ON
      message: '{{ now().strftime(''%I:%M %p'') | regex_replace(''^0'','''') }} Tin={{ ''%.1f'' | format(tin | float) if tin is not none else ''n/a'' }} Tout={{ ''%.1f'' | format(tout | float) if tout is not none else ''n/a'' }} H={{ ''%.0f'' | format(hout_owm | float) if hout_owm is not none else ''n/a'' }} W={{ cond_owm if cond_owm not in ['''', ''unknown'', ''unavailable'', ''none''] else ''n/a'' }} On={{ ''%.1f'' | format(cool_on_final | float) if cool_on_final is not none else ''n/a'' }} Off={{ ''%.1f'' | format(cool_off_final | float) if cool_off_final is not none else ''n/a'' }} SP={{ ''%.1f'' | format(final_setpoint | float) if final_setpoint is not none else ''n/a'' }} Fan={{ final_fan }} Src=ManualON Resultado={{ ''capturado'' if persistence_ready_for_trigger else ''error_controlado'' }} Razón={{ persistence_gate_reason }} Stage1Diag={{ persistence_stage_1_diag }} Trace={{ trace_id }}'
  mode: queued
  max: 2
- id: ac_cool_manual_setpoint_feedback
  alias: AC - Feedback manual de setpoint en cool activo
  trace:
    stored_traces: 50
  description: Detecta cambios manuales del setpoint mientras `cool` sigue activo,
    ignora autoacciones recientes, clasifica si el usuario bajó o subió el SP respecto
    al automático y aprende por bucket contextual. Además distingue ajuste inmediato
    tras auto-on frente a feedback a los 20-40 minutos y, si el ciclo no progresa,
    refuerza el mapa del setpoint efectivo requerido.
  triggers:
  - trigger: state
    entity_id: climate.0200009211c7_climate
    attribute: temperature
  conditions:
  - condition: state
    entity_id: climate.0200009211c7_climate
    state: cool
  actions:
  - variables:
      climate_ent: climate.0200009211c7_climate
      prev_sp: '{{ trigger.from_state.attributes.temperature if trigger.from_state
        is not none and trigger.from_state.attributes.temperature is defined else
        none }}'
      new_sp: '{{ trigger.to_state.attributes.temperature if trigger.to_state is not
        none and trigger.to_state.attributes.temperature is defined else none }}'
      prev_sp_num: '{{ prev_sp | float(none) }}'
      new_sp_num: '{{ new_sp | float(none) }}'
      ts: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      t1: '{{ states(''sensor.lumi_lumi_weather_cuarto_temperatura'') | float(none)
        }}'
      t2: '{{ states(''sensor.lumi_lumi_weather_coco_temperatura'') | float(none)
        }}'
      h1: '{{ states(''sensor.lumi_lumi_weather_cuarto_humedad'') | float(none) }}'
      h2: '{{ states(''sensor.lumi_lumi_weather_coco_humedad'') | float(none) }}'
      tin: '{% if t1 is not none and t2 is not none %}{{ ((t1 + t2) / 2) | round(2)
        }} {% elif t1 is not none %}{{ t1 | round(2) }} {% elif t2 is not none %}{{
        t2 | round(2) }} {% else %}{{ none }}{% endif %}'
      hin: '{% if h1 is not none and h2 is not none %}{{ ((h1 + h2) / 2) | round(1)
        }} {% elif h1 is not none %}{{ h1 | round(1) }} {% elif h2 is not none %}{{
        h2 | round(1) }} {% else %}{{ none }}{% endif %}'
      tout_owm: '{{ state_attr(''weather.openweathermap'',''temperature'') | float(none) }}'
      hout_owm: '{{ state_attr(''weather.openweathermap'',''humidity'') | float(none) }}'
      cond_owm: '{{ states(''weather.openweathermap'') | lower }}'
      tout: '{{ tout_owm if tout_owm is not none else none }}'
      contract_on_raw: '{{ states(''input_number.ac_dda_cool_cycle_contract_on'') }}'
      contract_off_raw: '{{ states(''input_number.ac_dda_cool_cycle_contract_off'') }}'
      contract_on: '{{ contract_on_raw | float(none) }}'
      contract_off: '{{ contract_off_raw | float(none) }}'
      contract_valid: '{{ contract_on is not none and contract_off is not none and
        (contract_on | float) > (contract_off | float) and (contract_off | float)
        >= 22 and (contract_off | float) <= 25.7 and (contract_on | float) <= 26.2
        }}'
      cool_on_validated: "{% if contract_valid %}\n  {{ (contract_on | float) | round(2)
        }}\n{% else %}\n  {{ none }}\n{% endif %}"
      cool_off_validated: "{% if contract_valid %}\n  {{ (contract_off | float) |
        round(2) }}\n{% else %}\n  {{ none }}\n{% endif %}"
      contract_on_fallback_raw: '{{ states(''input_number.ac_dda_cool_cycle_contract_on'')
        }}'
      contract_off_fallback_raw: '{{ states(''input_number.ac_dda_cool_cycle_contract_off'')
        }}'
      contract_on_fallback: '{{ contract_on_fallback_raw | float(none) }}'
      contract_off_fallback: '{{ contract_off_fallback_raw | float(none) }}'
      contract_fallback_valid: '{{ contract_on_fallback is not none and contract_off_fallback
        is not none and (contract_on_fallback | float) > (contract_off_fallback |
        float) and (contract_off_fallback | float) >= 22 and (contract_off_fallback
        | float) <= 25.7 and (contract_on_fallback | float) <= 26.2 }}'
      contract_on_display: "{% if cool_on_validated is not none %}\n  {{ cool_on_validated
        }}\n{% elif contract_fallback_valid %}\n  {{ (contract_on_fallback | float)
        | round(2) }}\n{% else %}\n  {{ none }}\n{% endif %}"
      contract_off_display: "{% if cool_off_validated is not none %}\n  {{ cool_off_validated
        }}\n{% elif contract_fallback_valid %}\n  {{ (contract_off_fallback | float)
        | round(2) }}\n{% else %}\n  {{ none }}\n{% endif %}"
      presence_effective: '{% set mov_raw = states(''binary_sensor.presencia_movimiento_estable'')
        %} {% set s24_raw = states(''device_tracker.samsung_s24'') %} {% set person_raw
        = states(''person.ivan'') %} {% set presence_ok = is_state(''binary_sensor.presencia_ok_estable'',''on'')
        %} {% set presence_real_now = mov_raw == ''on'' %} {% set presence_phone_home
        = (s24_raw in [''home'',''on'']) or (person_raw == ''home'') %} {% set manual_presence_until_raw
        = states(''input_datetime.ac_dda_manual_presence_until'') %} {% set presence_temp_from_manual
        = manual_presence_until_raw not in [''unknown'',''unavailable'',''none'','''']
        and as_timestamp(now()) < as_timestamp(manual_presence_until_raw) %} {{ presence_phone_home
        or (presence_ok and presence_real_now) or presence_temp_from_manual }}'
      cool_tod_bucket: '{% set hm = now().strftime(''%H:%M'') %} {% if ''07:00'' <=
        hm <= ''10:00'' %}franja_0700_1000{% elif ''10:01'' <= hm <= ''15:00'' %}franja_1001_1500{%
        elif ''15:01'' <= hm <= ''18:00'' %}franja_1501_1800{% elif ''18:01'' <= hm
        <= ''21:59'' %}franja_1801_2059{% else %}franja_fuera_rango{% endif %}'
      cool_outdoor_bucket: '{% if tout is none %}exterior_templado {% elif (tout |
        float) >= 31 %}exterior_muy_caliente {% elif (tout | float) >= 27 %}exterior_caliente
        {% else %}exterior_templado{% endif %}'
      cool_humidity_bucket: '{% if hin is not none and (hin | float) >= 66 %}humedad_muy_alta{%
        elif hin is not none and (hin | float) >= 58 %}humedad_alta{% else %}humedad_normal{%
        endif %}'
      cool_weather_state_raw: '{{ cond_owm | default(''unknown'', true) | lower }}'
      cool_weather_bucket: '{% set raw = cool_weather_state_raw %} {% if raw in [''sunny'',
        ''clear-night''] %}soleado {% elif raw in [''partlycloudy'', ''windy'', ''windy-variant'']
        %}parcial {% elif raw in [''cloudy'', ''overcast''] %}nublado {% elif raw
        in [''rainy'', ''pouring'', ''hail'', ''snowy-rainy'', ''snowy''] %}lluvia
        {% elif raw in [''fog''] %}niebla {% elif raw in [''lightning'', ''lightning-rainy'']
        %}tormenta {% else %}desconocido{% endif %}'
      cool_presence_bucket: '{{ ''presencia'' if presence_effective else ''ausencia''
        }}'
      cool_context_bucket: '{{ cool_outdoor_bucket ~ '':'' ~ cool_humidity_bucket
        ~ '':'' ~ cool_tod_bucket ~ '':'' ~ cool_weather_bucket ~ '':'' ~ cool_presence_bucket
        }}'
      cool_thermal_trend_bucket: '{% set trend_raw = states(''input_select.ac_trend_temp'')
        | default(''estable'', true) | lower %} {% if trend_raw in [''subiendo'',''bajando'',''estable'']
        %}{{ trend_raw }}{% else %}estable{% endif %}'
      cool_context_detail: '{{ cool_context_bucket ~ '':'' ~ cool_thermal_trend_bucket
        }}'
      last_auto_bucket_raw: '{{ states(''input_text.ac_dda_last_context_bucket'')
        | trim }}'
      cool_bucket_context_detail: "{% if last_auto_bucket_raw in ['','unknown','unavailable','none']
        %}\n  {{ cool_context_detail }}\n{% else %}\n  {{ last_auto_bucket_raw }}\n{%
        endif %}"
      cool_bucket_selected: "{% if last_auto_bucket_raw in ['','unknown','unavailable','none']
        %}\n  {{ cool_context_bucket }}\n{% else %}\n  {{ last_auto_bucket_raw.split(':subiendo')[0].split(':bajando')[0].split(':estable')[0]
        }}\n{% endif %}"
      last_auto_setpoint: '{{ states(''input_number.ac_last_auto_setpoint'') | float(none)
        }}'
      cycle_last_applied_setpoint: '{{ states(''input_number.ac_cool_cycle_last_applied_setpoint'')
        | float(none) }}'
      manual_sp_lock_window_min: '{% set raw = states(''input_number.ac_manual_setpoint_override_hold_minutes'')
        | float(50) %} {{ [[raw, 60] | min, 45] | max }}'
      last_auto_ts_raw: '{{ states(''input_datetime.ac_last_auto_ts'') }}'
      last_step_ts_raw: '{{ states(''input_datetime.ac_cool_cycle_last_step_at'')
        }}'
      start_ts_raw: '{{ states(''input_datetime.ac_cool_cycle_started_at'') }}'
      minutes_since_last_auto: '{% set raw = last_auto_ts_raw | default('''', true)
        | trim %} {% set raw_lower = raw | lower %} {% if raw_lower in [''unknown'',''unavailable'',''none'','''']
        %}99999 {% else %}{% set ts = as_timestamp(raw, default=none) %}{{ 99999 if
        ts is none else (((as_timestamp(now()) - ts) / 60) | round(1)) }}{% endif
        %}'
      minutes_since_last_step: '{% if last_step_ts_raw in [''unknown'',''unavailable'',''none'','''']
        %}99999 {% else %}{{ ((as_timestamp(now()) - as_timestamp(last_step_ts_raw))
        / 60) | round(1) }}{% endif %}'
      runtime_min: '{% if start_ts_raw in [''unknown'',''unavailable'',''none'','''']
        %}99999 {% else %}{{ ((as_timestamp(now()) - as_timestamp(start_ts_raw)) /
        60) | round(1) }}{% endif %}'
      start_temp: '{{ states(''input_number.ac_cool_cycle_start_tin'') | float(none)
        }}'
      cool_off_target: '{% if states(''input_number.ac_last_auto_setpoint'') in [''unknown'',''unavailable'',''none'','''']
        %}{{ none }} {% else %}{{ (states(''input_number.ac_last_auto_tin'') | float(0))
        - ((states(''input_number.ac_last_auto_setpoint'') | float(0)) - 0.5) }}{%
        endif %}'
      progress_temp: '{% if start_temp is none or tin is none %}{{ none }} {% else
        %}{{ ((start_temp | float) - (tin | float)) | round(2) }}{% endif %}'
      remaining_delta: '{% if tin is none or cool_off_target is none %}{{ none }}
        {% else %}{{ ((tin | float) - (cool_off_target | float)) | round(2) }}{% endif
        %}'
      window_min: '{{ states(''input_number.ac_cool_adaptive_window_minutes'') | float(30)
        }}'
      initial_delay_min: '{{ states(''input_number.ac_cool_adaptive_initial_delay_minutes'')
        | float(30) }}'
      min_progress_per_window: '{{ states(''input_number.ac_cool_adaptive_min_progress_per_window'')
        | float(0.3) }}'
      windows_elapsed: '{{ [((runtime_min | float(0)) / (window_min | float(30))),
        0] | max | round(2) }}'
      expected_progress: '{{ ((windows_elapsed | float(0)) * (min_progress_per_window
        | float(0.3))) | round(2) }}'
      insufficient_progress: "{{ progress_temp is not none\n   and remaining_delta
        is not none\n   and (runtime_min | float(0)) >= (initial_delay_min | float(30))\n
        \  and (remaining_delta | float(0)) > (states('input_number.ac_cool_adaptive_close_enough_delta')
        | float(0.2))\n   and ((progress_temp | float(0)) + 0.05) < (expected_progress
        | float(0)) }}"
      last_auto_action: '{{ states(''input_text.ac_last_auto_action'') }}'
      last_auto_mode: '{{ states(''input_text.ac_last_auto_mode'') }}'
      last_change_origin: '{{ states(''input_text.ac_dda_last_change_origin'') | default('''',
        true) | trim }}'
      last_change_origin_normalized: '{% set origin = last_change_origin | lower %}
        {% if origin in [''unknown'',''unavailable'',''none'',''''] %}none{% else
        %}{{ origin }}{% endif %}'
      trigger_user_id: "{% if trigger is defined and trigger.to_state is not none
        and trigger.to_state.context is defined and trigger.to_state.context.user_id
        is defined %}\n  {{ trigger.to_state.context.user_id }}\n{% else %}\n  {{
        none }}\n{% endif %}"
      manual_user_confirmed: '{{ trigger_user_id not in [none, '''', ''None''] }}'
      last_manual_final_ts_raw: '{{ states(''input_datetime.ac_dda_last_manual_final_ts'')
        | default('''', true) | trim }}'
      minutes_since_manual_interaction: "{% if last_manual_final_ts_raw in ['unknown','unavailable','none','']
        %}99999 {% else %}\n  {% set ts = as_timestamp(last_manual_final_ts_raw, default=none)
        %}\n  {{ 99999 if ts is none else (((as_timestamp(now()) - ts) / 60) | round(1))
        }}\n{% endif %}"
      manual_interaction_recent: "{{ manual_user_confirmed\n   or (\n     last_change_origin_normalized
        in ['manual_on','manual_off','manual_override','manual_sp_feedback','manual_sp_feedback_future_only']\n
        \    and (minutes_since_manual_interaction | float(99999)) <= 20\n   ) }}"
      manual_sp_real_change: "{{ new_sp_num is not none\n   and prev_sp_num is not
        none\n   and ((((new_sp_num | float) - (prev_sp_num | float)) | abs) >= 0.09)
        }}"
      change_matches_last_auto_sp: "{{ last_auto_setpoint is not none\n   and new_sp_num
        is not none\n   and (((new_sp_num | float) - (last_auto_setpoint | float))
        | abs) <= 0.11 }}"
      change_matches_cycle_step_sp: "{{ cycle_last_applied_setpoint is not none\n
        \  and new_sp_num is not none\n   and (((new_sp_num | float) - (cycle_last_applied_setpoint
        | float)) | abs) <= 0.11 }}"
      recent_auto_cycle_window: "{{ last_auto_mode == 'cool'\n   and (\n     (minutes_since_last_auto
        | float(99999)) <= 4\n     or (minutes_since_last_step | float(99999)) <=
        4\n     or (runtime_min | float(99999)) <= 6\n   ) }}"
      auto_setpoint_recent: "{{ last_auto_mode == 'cool'\n   and (\n     (\n        last_auto_action
        in ['auto_on','ramp_start']\n       and (minutes_since_last_auto | float(99999))
        <= 4\n       and change_matches_last_auto_sp\n     )\n     or (\n       (minutes_since_last_step
        | float(99999)) <= 4\n       and change_matches_cycle_step_sp\n     )\n     or
        (\n       recent_auto_cycle_window\n       and change_matches_last_auto_sp\n
        \    )\n   ) }}"
      origin_points_to_auto: '{{ last_change_origin_normalized in [''auto_on'',''auto_off'',''manual_sp_feedback'',''cool_cycle_step'',''cool_sp_sync'',''device_echo'']
        }}'
      immediate_same_value_echo: "{{ manual_sp_real_change\n   and (\n     (change_matches_cycle_step_sp
        and (minutes_since_last_step | float(99999)) <= 3)\n     or (change_matches_last_auto_sp
        and (minutes_since_last_auto | float(99999)) <= 3)\n   )\n   and origin_points_to_auto\n
        \  and (not manual_user_confirmed) }}"
      device_echo_candidate: "{{ (not manual_sp_real_change)\n   or immediate_same_value_echo\n
        \  or (\n     auto_setpoint_recent\n     and origin_points_to_auto\n     and
        (not manual_interaction_recent)\n     and (change_matches_last_auto_sp or
        change_matches_cycle_step_sp)\n   ) }}"
      manual_override_candidate: "{{ manual_sp_real_change\n   and last_auto_mode
        == 'cool'\n   and (manual_interaction_recent or (minutes_since_last_auto |
        float(99999)) <= 60)\n   and (last_auto_setpoint is none or ((((new_sp_num
        | float) - (last_auto_setpoint | float)) | abs) >= 0.2))\n   and (not change_matches_last_auto_sp)\n
        \  and (not change_matches_cycle_step_sp) }}"
      manual_override_until_ts: '{{ (as_timestamp(now()) + ((manual_sp_lock_window_min
        | float(50)) * 60)) | timestamp_custom(''%Y-%m-%d %H:%M:%S'', true) }}'
      manual_override_notify_message: SP respetado en este ciclo | manual={{ new_sp_num
        if new_sp_num is not none else 'na' }} | auto={{ last_auto_setpoint if last_auto_setpoint
        is not none else 'na' }} | pausa_sync={{ manual_sp_lock_window_min | float(50)
        }} min | aprendizaje={{ 'sí' if apply_feedback else 'pendiente' }}
      ignore_reason: "{% if not manual_sp_real_change %}\n  sin_cambio_real\n{% elif
        manual_interaction_recent and not immediate_same_value_echo %}\n  none\n{%
        elif immediate_same_value_echo %}\n  eco_inmediato_mismo_valor\n{% elif is_state('input_boolean.ac_dda_on_por_automatizacion','on')
        or is_state('input_boolean.ac_dda_off_por_automatizacion','on') %}\n  bandera_auto_activa\n{%
        elif device_echo_candidate and auto_setpoint_recent and change_matches_cycle_step_sp
        %}\n  setpoint_echo_from_device\n{% elif device_echo_candidate and auto_setpoint_recent
        and change_matches_last_auto_sp %}\n  device_report_lag\n{% elif device_echo_candidate
        and auto_setpoint_recent %}\n  post_auto_sync\n{% elif last_change_origin_normalized
        in ['auto_on','auto_off','cool_cycle_step','cool_sp_sync'] and recent_auto_cycle_window
        %}\n  post_auto_sync\n{% elif last_change_origin_normalized in ['auto_on','auto_off']
        and (minutes_since_last_auto | float(99999)) <= 0.5 %}\n  origen_auto_reciente\n{%
        else %}\n  none\n{% endif %}"
      delta_sp: '{{ ((new_sp_num | float(0)) - (last_auto_setpoint | float(new_sp_num
        | float(0)))) | round(2) if new_sp_num is not none else none }}'
      manual_feedback_kind: '{% if ignore_reason != ''none'' %}ignored {% elif last_auto_setpoint
        is none %}manual_sp_without_auto_reference {% elif (delta_sp | float(0)) <
        -0.09 %}manual_sp_lower_than_auto {% elif (delta_sp | float(0)) > 0.09 %}manual_sp_higher_than_auto
        {% else %}manual_sp_equal_to_auto {% endif %}'
      feedback_phase: '{% if (runtime_min | float(99999)) <= 8 %}ajuste_inmediato_post_auto_on
        {% elif 20 <= (runtime_min | float(99999)) <= 40 %}ajuste_20_40_min {% else
        %}ajuste_intermedio {% endif %}'
      stabilization_window_active: '{{ (runtime_min | float(99999)) <= 1 }}'
      manual_change_unequivocal: "{{ manual_sp_real_change\n   and manual_interaction_recent\n
        \  and (not immediate_same_value_echo)\n   and (ignore_reason == 'none')\n
        \  and manual_feedback_kind in ['manual_sp_lower_than_auto','manual_sp_higher_than_auto']
        }}"
      apply_feedback: '{{ manual_change_unequivocal }}'
      feedback_or_override_apply: '{{ apply_feedback or manual_override_candidate
        }}'
      feedback_policy: '{% if not feedback_or_override_apply %}sin_feedback {% elif
        not apply_feedback %}proteccion_manual_sin_delta_auto {% else %}aprendizaje_y_adopcion_inmediata
        {% endif %}'
      manual_override_should_activate: '{{ ignore_reason == ''none'' and manual_override_candidate
        }}'
      learning_applied_this_cycle: '{{ feedback_or_override_apply }}'
      sync_should_pause_after_feedback: false
      feedback_ignored_relevant_user_cause: "{{ (not apply_feedback)\n   and manual_sp_real_change\n
        \  and manual_interaction_recent\n   and (not immediate_same_value_echo)\n
        \  and (ignore_reason == 'none') }}"
      feedback_mobile_notify: true
      aprendizaje_aplicado_en_este_ciclo: "{% if stabilization_window_active %}\n
        \ Aprendió (ventana temprana): ajuste suave aplicado y confirmado.\n{% else
        %}\n  Aprendió en este ciclo: ajuste aplicado.\n{% endif %}"
      aprendizaje_guardado_para_proximo_ciclo: Aprendizaje guardado para próximo ciclo
        (sin aplicar ahora).
      feedback_ignored_short_reason: "{% if manual_feedback_kind == 'manual_sp_equal_to_auto'
        %}\n  ignorado: SP manual igual al automático\n{% elif manual_feedback_kind
        == 'manual_sp_without_auto_reference' %}\n  ignorado: sin referencia automática
        reciente\n{% elif ignore_reason not in ['none',''] %}\n  ignorado: {{ ignore_reason
        }}\n{% else %}\n  ignorado: sin delta útil para aprendizaje\n{% endif %}"
      feedback_mobile_state: '{{ ''aprendió'' if apply_feedback else ''ignorado''
        }}'
      bucket_short_id: '{% set bucket_parts = (cool_bucket_selected | default('''',
        true) | trim).split('':'') %} {% set out = bucket_parts[0] if bucket_parts
        | count > 0 else ''na'' %} {% set hum = bucket_parts[1] if bucket_parts |
        count > 1 else ''na'' %} {% set tod = bucket_parts[2] if bucket_parts | count
        > 2 else ''na'' %} {% set weather = bucket_parts[3] if bucket_parts | count
        > 3 else ''na'' %} {% set pres = bucket_parts[4] if bucket_parts | count >
        4 else ''na'' %} {{ (out[0:3] ~ hum[0:3] ~ tod[0:3] ~ weather[0:3] ~ pres[0:3])
        | lower }}'
      feedback_mobile_message: "{% if apply_feedback %}\n  {{ aprendizaje_aplicado_en_este_ciclo
        }}\n{% elif feedback_ignored_relevant_user_cause %}\n  {{ aprendizaje_guardado_para_proximo_ciclo
        }} | {{ feedback_ignored_short_reason }}\n{% else %}\n  {{ feedback_ignored_short_reason
        }}\n{% endif %}"
      manual_sp_override_active: "{{ is_state('input_boolean.ac_manual_setpoint_override_active','on')\n
        \  and manual_sp_override_until_raw not in ['unknown','unavailable','none','']\n
        \  and as_timestamp(manual_sp_override_until_raw, 0) > as_timestamp(now())
        }}"
      manual_sp_recent_user_evidence: "{{ last_auto_mode == 'cool'\n   and last_change_origin_normalized
        in ['manual_override','manual_sp_feedback','manual_sp_feedback_future_only']\n
        \  and (minutes_since_last_auto | float(99999)) <= (manual_sp_lock_window_min
        | float(50)) }}"
      manual_sp_lock_active: "{{ manual_override_should_activate\n   or manual_sp_override_active\n
        \  or manual_sp_recent_user_evidence }}"
      effective_summary_raw: '{{ states(''input_text.ac_cool_effective_setpoint_map'')
        | trim }}'
      effective_bucket_helper: '{{ ''input_number.ac_dda_cool_effective_sp_bucket_'' ~
        (cool_bucket_selected | replace('':'',''_'') ) }}'
      effective_bucket_summary_value: "{% set raw = effective_summary_raw | default('',
        true) | trim %} {% set prefix = cool_bucket_selected ~ '=' %} {% if raw.startswith(prefix)
        %}\n  {{ raw | replace(prefix, '', 1) | float(none) }}\n{% else %}\n  {{ none
        }}\n{% endif %}"
      effective_bucket_previous_value: '{% set helper_raw = states(effective_bucket_helper)
        %} {% set helper_value = helper_raw | float(none) %} {{ helper_value if helper_value
        is not none else (effective_bucket_summary_value if effective_bucket_summary_value
        is not none else (last_auto_setpoint if last_auto_setpoint is not none else
        new_sp_num)) }}'
      effective_sp_soft_gap: '{{ states(''input_number.ac_cool_effective_sp_soft_gap'')
        | float(0.8) }}'
      effective_sp_hard_gap: '{{ states(''input_number.ac_cool_effective_sp_hard_gap'')
        | float(1.4) }}'
      effective_sp_previous_delta_from_auto: "{% if effective_bucket_previous_value
        is none or last_auto_setpoint is none %}\n  {{ none }}\n{% else %}\n  {{ ((effective_bucket_previous_value
        | float) - (last_auto_setpoint | float)) | abs | round(2) }}\n{% endif %}"
      effective_sp_inconsistency_reason: "{% if effective_sp_previous_delta_from_auto
        is none %}\n  none\n{% elif (effective_sp_previous_delta_from_auto | float(0))
        >= (effective_sp_hard_gap | float(1.4)) and feedback_phase == 'ajuste_inmediato_post_auto_on'
        %}\n  hard_recent_feedback\n{% elif (effective_sp_previous_delta_from_auto
        | float(0)) >= (effective_sp_hard_gap | float(1.4)) %}\n  hard_gap\n{% elif
        (effective_sp_previous_delta_from_auto | float(0)) >= (effective_sp_soft_gap
        | float(0.8)) %}\n  soft_gap\n{% else %}\n  none\n{% endif %}"
      feedback_weight: '{% if feedback_phase == ''ajuste_inmediato_post_auto_on''
        %}0.18 {% elif feedback_phase == ''ajuste_20_40_min'' %}0.55 {% else %}0.40{%
        endif %}'
      effective_sp_feedback_weight: '{% if effective_sp_inconsistency_reason in [''hard_recent_feedback'',''hard_gap'']
        %}0 {% elif stabilization_window_active %}{{ [feedback_weight | float(0.18),
        0.12] | min }} {% elif effective_sp_inconsistency_reason == ''soft_gap'' %}{{
        [feedback_weight | float(0.4), 0.20] | min }} {% else %}{{ feedback_weight
        }} {% endif %}'
      effective_sp_after: "{% if feedback_or_override_apply and new_sp_num is not none %}
  {{ [[(new_sp_num | float) | round(0), 23] | min, 17] | max | int }}
{% else %}
  {{ [[(effective_bucket_previous_value | float(22)) | round(0), 23] | min, 17] | max | int }}
{% endif %}"
      effective_summary: '{{ ((cool_bucket_selected ~ ''='' ~ (''%.2f'' | format(effective_sp_after
        | float(0))))[:255]) }}'
      cool_learning_summary_raw: '{{ states(''input_text.ac_cool_contextual_learning_map'')
        | trim }}'
      cool_learning_bucket_helper: '{{ ''input_number.ac_dda_cool_learning_bucket_'' ~
        (cool_bucket_selected | replace('':'',''_'') ) }}'
      cool_learning_bucket_summary_value: "{% set raw = cool_learning_summary_raw
        | default('', true) | trim %} {% set prefix = cool_bucket_selected ~ '=' %}
        {% if raw.startswith(prefix) %}\n  {{ raw | replace(prefix, '', 1) | float(none)
        }}\n{% else %}\n  {{ none }}\n{% endif %}"
      cool_learning_previous_value: '{% set helper_raw = states(cool_learning_bucket_helper)
        %} {% set helper_value = helper_raw | float(none) %} {{ helper_value if helper_value
        is not none else (cool_learning_bucket_summary_value if cool_learning_bucket_summary_value
        is not none else ((last_auto_setpoint | float(new_sp_num | float(24))) + 0.5))
        }}'
      reinforce_effective_needed: '{{ apply_feedback and manual_feedback_kind == ''manual_sp_lower_than_auto''
        and insufficient_progress }}'
      manual_sp_preferido_ctx: "{% if new_sp_num is none %}
  {{ none }}
{% else %}
  {{ [[(new_sp_num | float) | round(0), 23] | min, 17] | max | int }}
{% endif %}"
      contextual_learning_sp_target: "{% if feedback_or_override_apply %}
  {{ manual_sp_preferido_ctx if manual_sp_preferido_ctx is not none else ([[ (cool_learning_previous_value | float(22)) | round(0), 23] | min, 17] | max | int) }}
{% else %}
  {{ [[(cool_learning_previous_value | float(22)) | round(0), 23] | min, 17] | max | int }}
{% endif %}"
      cool_learning_after: "{% if feedback_or_override_apply %}
  {{ contextual_learning_sp_target }}
{% elif not reinforce_effective_needed %}
  {{ [[(cool_learning_previous_value | float(22)) | round(0), 23] | min, 17] | max | int }}
{% else %}
  {% set target = manual_sp_preferido_ctx if manual_sp_preferido_ctx is not none else 22 %}
  {{ [[target, 23] | min, 17] | max | int }}
{% endif %}"
      cool_learning_summary: '{% set final_value = cool_learning_after if feedback_or_override_apply
        else (cool_learning_after if reinforce_effective_needed else cool_learning_previous_value)
        %} {{ ((cool_bucket_selected ~ ''='' ~ (''%.2f'' | format(final_value | float(0))))[:255])
        }}'
      compact_context: tin={{ tin if tin is not none else 'na' }},tout={{ tout if
        tout is not none else 'na' }},h={{ hin if hin is not none else 'na' }},hr={{
        now().strftime('%H:%M') }},p={{ '1' if presence_effective else '0' }},trend={{
        cool_thermal_trend_bucket }},bucket_ctx={{ cool_bucket_context_detail }},m={{
        runtime_min }}
      manual_sp_event_status: '{{ ''valid'' if feedback_or_override_apply else ''ignored''
        }}'
      manual_sp_event_reason: "{% if manual_sp_event_status == 'valid' %}\n  {{ manual_feedback_kind
        if manual_feedback_kind != 'ignored' else 'manual_override' }}\n{% else %}\n
        \ {{ ignore_reason if ignore_reason != 'none' else 'sin_aprendizaje' }}\n{%
        endif %}"
      manual_sp_resultado: '{{ ''aprendido'' if feedback_or_override_apply else ''ignorado''
        }}'
      manual_sp_reason_output: '{{ manual_sp_event_reason }}'
      manual_sp_resumen: "{{ ('resultado=' ~ manual_sp_resultado\n    ~ '|razon='
        ~ manual_sp_reason_output\n    ~ '|bucket=' ~ cool_bucket_selected\n    ~
        '|bucket_id=' ~ bucket_short_id\n    ~ '|sp_manual=' ~ (new_sp_num if new_sp_num
        is not none else 'na')\n    ~ '|sp_guardado=' ~ (effective_sp_after if effective_sp_after
        is not none else 'na'))[:255] }}"
      manual_sp_result_log: sp_manual_result | {{ manual_sp_resumen }}
      audit_message: "{% if feedback_or_override_apply %}\n  sp_manual_feedback |
        manual_sp_event={{ manual_sp_event_status }} | reason={{ manual_sp_event_reason
        }} | política={{ 'solo aprendizaje futuro' if feedback_policy == 'solo_aprendizaje_futuro'
        else 'aprendizaje + adopción inmediata' }} | SP auto={{ last_auto_setpoint
        if last_auto_setpoint is not none else 'na' }} | SP manual={{ new_sp_num }}
        | ΔSP={{ delta_sp }} | tipo={{ manual_feedback_kind }} | fase={{ feedback_phase
        }} | SPh(hist_prev)={{ effective_bucket_previous_value if effective_bucket_previous_value
        is not none else 'na' }} | W={{ effective_sp_feedback_weight }} | sanity={{
        effective_sp_inconsistency_reason }} | ctx={{ compact_context }} | bucket={{
        cool_bucket_selected }} | bucket_detalle={{ cool_bucket_context_detail }}{%
        if reinforce_effective_needed %} | refuerzo=sp_efectivo{% endif %}{% if sync_should_pause_after_feedback
        %} | sync=pausado{% endif %}\n{% else %}\n  sp_manual_feedback_ignored | manual_sp_event={{
        manual_sp_event_status }} | reason={{ manual_sp_event_reason }} | SPsrc={{
        'device_echo' if ignore_reason in ['setpoint_echo_from_device','device_report_lag','post_auto_sync','eco_inmediato_mismo_valor']
        else 'manual_candidate' }} | SP auto={{ last_auto_setpoint if last_auto_setpoint
        is not none else 'na' }} | SP manual={{ new_sp_num if new_sp_num is not none
        else 'na' }} | ΔSP={{ delta_sp if delta_sp is not none else 'na' }} | SPh(hist_prev)={{
        effective_bucket_previous_value if effective_bucket_previous_value is not
        none else 'na' }} | reason_detalle={{ ignore_reason if ignore_reason != 'none'
        else effective_sp_inconsistency_reason }} | ctx={{ compact_context }} | bucket={{
        cool_bucket_selected }} | bucket_detalle={{ cool_bucket_context_detail }}\n{%
        endif %}"
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ feedback_or_override_apply }}'
      sequence:
      - target:
          entity_id: input_text.ac_dda_last_change_origin
        data:
          value: '{{ ''manual_override'' if manual_override_should_activate else ''manual_sp_feedback''
            }}'
        service: input_text.set_value
      - choose:
