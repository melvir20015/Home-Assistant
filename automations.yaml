  actions:
  - variables:
      trace_id: '{{ now().strftime(''%Y%m%d%H%M%S%f'') ~ ''-np'' }}'
      s24_state: '{{ states(''device_tracker.samsung_s24'') }}'
      movimiento_state: '{{ states(''binary_sensor.presencia_movimiento_estable'')
        }}'
      hvac_mode: '{{ states(''climate.0200009211c7_climate'') }}'
      hvac_scope_ok: '{{ hvac_mode in [''cool'',''heat''] }}'
      manual_off_block_until_raw: '{{ states(''input_datetime.ac_matriz_160_manual_off_block_until'')
        }}'
      manual_off_block_until_ts: '{% if manual_off_block_until_raw in [''unknown'',''unavailable'',''none'','''']
        %}{{ 0 }}{% else %}{{ as_timestamp(manual_off_block_until_raw, default=0)
        }}{% endif %}'
      manual_off_block_active: '{{ as_timestamp(now()) < (manual_off_block_until_ts
        | float(0)) }}'
      override_until_raw: '{{ states(''input_datetime.ac_matriz_160_manual_presence_override_until'')
        }}'
      override_until_ts: '{% if override_until_raw in [''unknown'',''unavailable'',''none'','''']
        %}{{ 0 }}{% else %}{{ as_timestamp(override_until_raw, default=0) }}{% endif
        %}'
      manual_presence_override_active: '{{ as_timestamp(now()) < (override_until_ts
        | float(0)) }}'
      event_signature: '{{ trigger.id ~ ''|'' ~ s24_state ~ ''|'' ~ movimiento_state
        ~ ''|'' ~ hvac_mode ~ ''|'' ~ now().strftime(''%Y-%m-%d %H:%M'') }}'
      dedup_window_s: 90
      dedup_last_signature: '{{ states(''input_text.ac_matriz_160_no_presencia_firma'')
        | default('''', true) | trim }}'
      dedup_last_ts_raw: '{{ states(''input_datetime.ac_matriz_160_no_presencia_firma_ts'')
        }}'
      dedup_last_ts: '{% if dedup_last_ts_raw in [''unknown'',''unavailable'',''none'','''']
        %}{{ 0 }}{% else %}{{ as_timestamp(dedup_last_ts_raw, default=0) }}{% endif
        %}'
      dedup_in_window: '{{ (as_timestamp(now()) - (dedup_last_ts | float(0))) < (dedup_window_s
        | float(90)) }}'
      dedup_ok: '{{ event_signature != dedup_last_signature or not dedup_in_window
        }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.id in [''s24_home'',''person_home''] }}'
      sequence:
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: hito=auto_off_no_presencia_cancelado | trace_id={{ trace_id }}
            | modo_previo={{ hvac_mode }} | s24_state={{ s24_state }} | movimiento_state={{
            movimiento_state }} | resultado_terminal=cancelado | razon=s24_en_casa
            | override_activo={{ manual_presence_override_active }} | override_until={{
            override_until_raw }}
          entity_id: climate.0200009211c7_climate
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''hvac_mode_changed'' and states(''climate.0200009211c7_climate'')
          not in [''cool'',''heat''] }}'
      sequence:
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: hito=auto_off_no_presencia_cancelado | trace_id={{ trace_id }}
            | modo_previo={{ hvac_mode }} | s24_state={{ s24_state }} | movimiento_state={{
            movimiento_state }} | resultado_terminal=cancelado | razon=hvac_fuera_de_alcance
          entity_id: climate.0200009211c7_climate
    - conditions:
      - condition: template
        value_template: '{{ manual_presence_override_active }}'
      sequence:
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: hito=auto_off_no_presencia_cancelado_por_override | trace_id={{
            trace_id }} | modo_previo={{ hvac_mode }} | s24_state={{ s24_state }}
            | movimiento_state={{ movimiento_state }} | override_until={{ override_until_raw
            }} | resultado_terminal=cancelado | razon=override_activo
          entity_id: climate.0200009211c7_climate
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''s24_away'' and dedup_ok and hvac_scope_ok
          }}'
      sequence:
      - service: input_text.set_value
        target:
          entity_id: input_text.ac_matriz_160_no_presencia_firma
        data:
          value: '{{ event_signature }}'
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ac_matriz_160_no_presencia_firma_ts
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      - choose:
        - conditions:
          - condition: state
            entity_id: binary_sensor.presencia_movimiento_estable
            state: 'off'
          sequence:
          - delay: 00:10:00
          - variables:
              modo_previo: '{{ states(''climate.0200009211c7_climate'') }}'
              s24_guard_ok: '{{ states(''device_tracker.samsung_s24'') == ''not_home''
                }}'
              motion_guard_ok: '{{ states(''binary_sensor.presencia_movimiento_estable'')
                == ''off'' }}'
              hvac_guard_ok: '{{ modo_previo in [''cool'',''heat''] }}'
              security_guard_ok: '{{ not (as_timestamp(now()) < (manual_off_block_until_ts
                | float(0))) and not manual_presence_override_active }}'
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ s24_guard_ok and motion_guard_ok and hvac_guard_ok
                  and security_guard_ok }}'
              sequence:
              - choose:
                - conditions:
                  - condition: template
                    value_template: '{{ modo_previo == ''cool'' }}'
                  sequence:
                  - service: logbook.log
                    data:
                      name: AC-Matriz 160
                      message: hito=post_cool_dry_start | trace_id={{ trace_id }}
                        | modo_previo={{ modo_previo }} | resultado_terminal=en_progreso
                        | razon=auto_off_no_presencia_10m
                      entity_id: climate.0200009211c7_climate
                  - service: climate.set_hvac_mode
                    target:
                      entity_id: climate.0200009211c7_climate
                    data:
                      hvac_mode: fan_only
                  - wait_template: '{{ states(''climate.0200009211c7_climate'') ==
                      ''fan_only'' }}'
                    timeout: 00:00:08
                    continue_on_timeout: true
                  - variables:
                      post_cool_fan_only_ok_1: '{{ states(''climate.0200009211c7_climate'')
                        == ''fan_only'' }}'
                  - choose:
                    - conditions:
                      - condition: template
                        value_template: '{{ not post_cool_fan_only_ok_1 }}'
                      sequence:
                      - service: climate.set_hvac_mode
                        target:
                          entity_id: climate.0200009211c7_climate
                        data:
                          hvac_mode: fan_only
                      - wait_template: '{{ states(''climate.0200009211c7_climate'')
                          == ''fan_only'' }}'
                        timeout: 00:00:08
                        continue_on_timeout: true
                  - variables:
                      post_cool_fan_only_ok: '{{ (post_cool_fan_only_ok_1 | default(false)) or states(''climate.0200009211c7_climate'')
                        == ''fan_only'' }}'
                  - choose:
                    - conditions:
                      - condition: template
                        value_template: '{{ post_cool_fan_only_ok }}'
                      sequence:
                      - service: climate.set_fan_mode
                        target:
                          entity_id: climate.0200009211c7_climate
                        data:
                          fan_mode: Low
                      - delay: 00:02:00
                      - service: climate.turn_off
                        target:
                          entity_id: climate.0200009211c7_climate
                      - service: logbook.log
                        data:
                          name: AC-Matriz 160
                          message: hito=post_cool_dry_completed | trace_id={{ trace_id
                            }} | modo_previo={{ modo_previo }} | resultado_terminal=off
                            | razon=secado_2m_completado
                          entity_id: climate.0200009211c7_climate
                    default:
                    - service: climate.set_hvac_mode
                      target:
                        entity_id: climate.0200009211c7_climate
                      data:
                        hvac_mode: 'off'
                    - service: logbook.log
                      data:
                        name: AC-Matriz 160
                        message: hito=post_cool_dry_fallback_off | trace_id={{ trace_id
                          }} | modo_previo={{ modo_previo }} | resultado_terminal=off
                          | razon=fan_only_no_disponible_tras_reintento
                        entity_id: climate.0200009211c7_climate
                default:
                - service: climate.turn_off
                  target:
                    entity_id: climate.0200009211c7_climate
              - service: notify.mobile_app_samsung_s24
                data:
                  title: AC-Matriz 160 · Apagado por no presencia
                  message: 'Se apagó el AC ({{ modo_previo }}) por no presencia: S24
                    fuera y sin movimiento durante 10 min.'
              - service: logbook.log
                data:
                  name: AC-Matriz 160
                  message: hito=auto_off_no_presencia_10m | trace_id={{ trace_id }}
                    | modo_previo={{ modo_previo }} | s24_state={{ states('device_tracker.samsung_s24')
                    }} | movimiento_state={{ states('binary_sensor.presencia_movimiento_estable')
                    }} | resultado_terminal=aplicado | razon=s24_fuera_y_10m_sin_movimiento
                  entity_id: climate.0200009211c7_climate
            default:
            - service: logbook.log
              data:
                name: AC-Matriz 160
                message: hito=auto_off_no_presencia_cancelado | trace_id={{ trace_id
                  }} | modo_previo={{ modo_previo }} | s24_state={{ states('device_tracker.samsung_s24')
                  }} | movimiento_state={{ states('binary_sensor.presencia_movimiento_estable')
                  }} | resultado_terminal=cancelado | razon={{ 'override_activo' if
                  manual_presence_override_active else 'guardas_no_cumplidas_10m'
                  }} | override_activo={{ manual_presence_override_active }} | override_until={{
                  override_until_raw }}
                entity_id: climate.0200009211c7_climate
        default:
        - wait_for_trigger:
          - trigger: state
            entity_id: binary_sensor.presencia_movimiento_estable
            to: 'off'
            for: 00:30:00
          timeout: 86400
          continue_on_timeout: false
        - variables:
            modo_previo: '{{ states(''climate.0200009211c7_climate'') }}'
            s24_guard_ok: '{{ states(''device_tracker.samsung_s24'') == ''not_home''
              }}'
            motion_guard_ok: '{{ states(''binary_sensor.presencia_movimiento_estable'')
              == ''off'' }}'
            hvac_guard_ok: '{{ modo_previo in [''cool'',''heat''] }}'
            security_guard_ok: '{{ not (as_timestamp(now()) < (manual_off_block_until_ts
              | float(0))) and not manual_presence_override_active }}'
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ s24_guard_ok and motion_guard_ok and hvac_guard_ok
                and security_guard_ok }}'
            sequence:
            - choose:
              - conditions:
                - condition: template
                  value_template: '{{ modo_previo == ''cool'' }}'
                sequence:
                - service: logbook.log
                  data:
                    name: AC-Matriz 160
                    message: hito=post_cool_dry_start | trace_id={{ trace_id }} |
                      modo_previo={{ modo_previo }} | resultado_terminal=en_progreso
                      | razon=auto_off_no_presencia_30m
                    entity_id: climate.0200009211c7_climate
                - service: climate.set_hvac_mode
                  target:
                    entity_id: climate.0200009211c7_climate
                  data:
                    hvac_mode: fan_only
                - wait_template: '{{ states(''climate.0200009211c7_climate'') == ''fan_only''
                    }}'
                  timeout: 00:00:08
                  continue_on_timeout: true
                - variables:
                    post_cool_fan_only_ok_1: '{{ states(''climate.0200009211c7_climate'')
                      == ''fan_only'' }}'
                - choose:
                  - conditions:
                    - condition: template
                      value_template: '{{ not post_cool_fan_only_ok_1 }}'
                    sequence:
                    - service: climate.set_hvac_mode
                      target:
                        entity_id: climate.0200009211c7_climate
                      data:
                        hvac_mode: fan_only
                    - wait_template: '{{ states(''climate.0200009211c7_climate'')
                        == ''fan_only'' }}'
                      timeout: 00:00:08
                      continue_on_timeout: true
                - variables:
                    post_cool_fan_only_ok: '{{ (post_cool_fan_only_ok_1 | default(false)) or states(''climate.0200009211c7_climate'')
                      == ''fan_only'' }}'
                - choose:
                  - conditions:
                    - condition: template
                      value_template: '{{ post_cool_fan_only_ok }}'
                    sequence:
                    - service: climate.set_fan_mode
                      target:
                        entity_id: climate.0200009211c7_climate
                      data:
                        fan_mode: Low
                    - delay: 00:02:00
                    - service: climate.turn_off
                      target:
                        entity_id: climate.0200009211c7_climate
                    - service: logbook.log
                      data:
                        name: AC-Matriz 160
                        message: hito=post_cool_dry_completed | trace_id={{ trace_id
                          }} | modo_previo={{ modo_previo }} | resultado_terminal=off
                          | razon=secado_2m_completado
                        entity_id: climate.0200009211c7_climate
                  default:
                  - service: climate.set_hvac_mode
                    target:
                      entity_id: climate.0200009211c7_climate
                    data:
                      hvac_mode: 'off'
                  - service: logbook.log
                    data:
                      name: AC-Matriz 160
                      message: hito=post_cool_dry_fallback_off | trace_id={{ trace_id
                        }} | modo_previo={{ modo_previo }} | resultado_terminal=off
                        | razon=fan_only_no_disponible_tras_reintento
                      entity_id: climate.0200009211c7_climate
              default:
              - service: climate.turn_off
                target:
                  entity_id: climate.0200009211c7_climate
            - service: notify.mobile_app_samsung_s24
              data:
                title: AC-Matriz 160 · Apagado por no presencia
                message: 'Se apagó el AC ({{ modo_previo }}) por no presencia: S24
                  fuera y 30 min continuos sin movimiento.'
            - service: logbook.log
              data:
                name: AC-Matriz 160
                message: hito=auto_off_no_presencia_30m | trace_id={{ trace_id }}
                  | modo_previo={{ modo_previo }} | s24_state={{ states('device_tracker.samsung_s24')
                  }} | movimiento_state={{ states('binary_sensor.presencia_movimiento_estable')
                  }} | resultado_terminal=aplicado | razon=s24_fuera_y_30m_continuos_sin_movimiento
                entity_id: climate.0200009211c7_climate
          default:
          - service: logbook.log
            data:
              name: AC-Matriz 160
              message: hito=auto_off_no_presencia_cancelado | trace_id={{ trace_id
                }} | modo_previo={{ modo_previo }} | s24_state={{ states('device_tracker.samsung_s24')
                }} | movimiento_state={{ states('binary_sensor.presencia_movimiento_estable')
                }} | resultado_terminal=cancelado | razon={{ 'override_activo' if
                manual_presence_override_active else 'guardas_no_cumplidas_30m' }}
                | override_activo={{ manual_presence_override_active }} | override_until={{
                override_until_raw }}
              entity_id: climate.0200009211c7_climate
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''s24_away'' and (not dedup_ok) }}'
      sequence:
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: hito=auto_off_no_presencia_cancelado | trace_id={{ trace_id }}
            | modo_previo={{ hvac_mode }} | s24_state={{ s24_state }} | movimiento_state={{
            movimiento_state }} | resultado_terminal=cancelado | razon=dedup_ventana
          entity_id: climate.0200009211c7_climate
- id: ac_matriz_160_learning_manual_v1
  alias: AC-Matriz 160 - Aprendizaje manual por columna
  description: Aprende offset por columna y modo desde ON/OFF manual con clasificación
    explícita y notificación transaccional.
  mode: queued
  max: 20
  trace:
    stored_traces: 200
  triggers:
  - trigger: state
    entity_id: climate.0200009211c7_climate
  actions:
  - variables:
      ts_evento: '{{ now().strftime(''%Y-%m-%d %H:%M:%S.%f'') }}'
      hora_evento: '{{ now().strftime(''%I:%M:%S %p'') }}'
      modo_anterior: '{{ trigger.from_state.state | lower if trigger.from_state is
        not none else ''unknown'' }}'
      modo_nuevo: '{{ trigger.to_state.state | lower if trigger.to_state is not none
        else ''unknown'' }}'
      tin: '{{ [states(''sensor.lumi_lumi_weather_cuarto_temperatura'')|float(0),
        states(''sensor.lumi_lumi_weather_coco_temperatura'')|float(0)] | average
        | round(2) }}'
      transicion_real: '{{ modo_anterior != modo_nuevo }}'
      transicion_hvac_real: '{{ (modo_anterior == ''off'' and modo_nuevo in [''cool'',''heat''])
        or (modo_nuevo == ''off'' and modo_anterior in [''cool'',''heat'']) }}'
      modo_aprendizaje: '{% if modo_nuevo in [''cool'',''heat''] %}{{ modo_nuevo }}{%
        elif modo_anterior in [''cool'',''heat''] %}{{ modo_anterior }}{% else %}fuera_alcance{%
        endif %}'
      evento_manual_tipo: '{% if transicion_real and modo_nuevo in [''cool'',''heat'']
        and modo_anterior == ''off'' %}encendido_manual{% elif transicion_real and
        modo_nuevo == ''off'' and modo_anterior in [''cool'',''heat''] %}apagado_manual{%
        else %}ignorado{% endif %}'
      contexto: '{{ states(''input_text.ac_matriz_160_columna_activa_humana'') | default(''Contexto
        no disponible'', true) }}'
      col_idx: '{{ states(''input_text.ac_matriz_160_columna_activa_idx'') | int(0)
        }}'
      slot_name_resuelto: '{% set t = now().strftime(''%H:%M'') %}{% if ''07:01''
        <= t <= ''10:00'' %}Mañana{% elif ''10:01'' <= t <= ''13:00'' %}Media mañana{%
        elif ''13:01'' <= t <= ''16:00'' %}Mediodía{% elif ''16:01'' <= t <= ''19:00''
        %}Tarde{% else %}Noche temprana{% endif %}'
      slot_idx_resuelto: '{% set t = now().strftime(''%H:%M'') %}{% if ''07:01'' <=
        t <= ''10:00'' %}0{% elif ''10:01'' <= t <= ''13:00'' %}1{% elif ''13:01''
        <= t <= ''16:00'' %}2{% elif ''16:01'' <= t <= ''19:00'' %}3{% else %}4{%
        endif %}'
      season_name_resuelto: '{% set m = now().month %}{% if m in [12,1,2] %}Invierno{%
        elif m in [3,4,5] %}Primavera{% elif m in [6,7,8] %}Verano{% else %}Otoño{%
        endif %}'
      season_idx_resuelto: '{% if season_name_resuelto == ''Primavera'' %}0{% elif
        season_name_resuelto == ''Verano'' %}1{% elif season_name_resuelto == ''Otoño''
        %}2{% else %}3{% endif %}'
      wx_raw_resuelto: '{{ states(''weather.openweathermap'') | lower }}'
      weather_cat_resuelto: '{% set s = wx_raw_resuelto %}{% if ''thunder'' in s %}Tormenta{%
        elif ''snow'' in s or ''sleet'' in s or ''ice'' in s %}Nieve - Hielo{% elif
        ''fog'' in s or ''mist'' in s or ''haze'' in s %}Niebla - Neblina{% elif ''heavy''
        in s and ''rain'' in s %}Lluvia fuerte{% elif ''rain'' in s or ''drizzle''
        in s %}Lluvia suave{% elif ''cloud'' in s and (''few'' in s or ''scattered''
        in s or ''partly'' in s) %}Parcialmente nublado{% elif ''cloud'' in s %}Nublado{%
        else %}Soleado - Despejado{% endif %}'
      weather_idx_resuelto: '{% set c = weather_cat_resuelto %}{% if c == ''Soleado
        - Despejado'' %}0{% elif c == ''Parcialmente nublado'' %}1{% elif c == ''Nublado''
        %}2{% elif c == ''Lluvia suave'' %}3{% elif c == ''Lluvia fuerte'' %}4{% elif
        c == ''Tormenta'' %}5{% elif c == ''Niebla - Neblina'' %}6{% else %}7{% endif
        %}'
      contexto_resuelto: '{{ weather_cat_resuelto }} | {{ season_name_resuelto }}
        | Horario {{ slot_name_resuelto }}'
      col_idx_recalculado: '{{ (weather_idx_resuelto|int * 20) + (season_idx_resuelto|int
        * 5) + (slot_idx_resuelto|int) + 1 }}'
      col_idx_resuelto: '{{ col_idx if col_idx|int > 0 else col_idx_recalculado|int(0)
        }}'
      contexto_activo_resuelto: '{{ contexto if col_idx|int > 0 else contexto_resuelto
        }}'
      marker_kind: '{{ states(''input_text.ac_matriz_160_auto_origin_kind'') | trim
        }}'
      marker_trace_id: '{{ states(''input_text.ac_matriz_160_auto_origin_trace'')
        | trim }}'
      marker_last_action: '{{ states(''input_text.ac_matriz_160_auto_origin_last_action'')
        | trim }}'
      marker_expires_raw: '{{ states(''input_text.ac_matriz_160_auto_origin_expires_at'')
        | trim }}'
      marker_consumed_raw: '{{ states(''input_text.ac_matriz_160_auto_origin_consumed'')
        | trim | lower }}'
      marker_expires_ts: '{% if marker_expires_raw in [''unknown'',''unavailable'',''none'','''']
        %}{{ 0 }}{% else %}{{ as_timestamp(marker_expires_raw, default=0) }}{% endif
        %}'
      marker_consumed: '{{ marker_consumed_raw in [''true'',''1'',''yes'',''on'']
        }}'
      marker_vigente: '{{ marker_kind == ''automatico_ac_matriz_160'' and (not marker_consumed)
        and as_timestamp(now()) < (marker_expires_ts | float(0)) }}'
      marker_transition_expected: '{% if marker_last_action == ''turn_on_cool'' %}off->cool{%
        elif marker_last_action == ''turn_on_heat'' %}off->heat{% elif marker_last_action
        == ''turn_off'' and modo_anterior in [''cool'',''heat''] %}{{ modo_anterior
        ~ ''->off'' }}{% elif marker_last_action == ''turn_off'' %}*->off{% else %}none{%
        endif %}'
      marker_transition_observed: '{{ modo_anterior ~ ''->'' ~ modo_nuevo }}'
      marker_compatible: '{{ marker_vigente and (marker_transition_expected == marker_transition_observed
        or (marker_transition_expected == ''*->off'' and modo_nuevo == ''off'')) }}'
      evento_last_changed_ts: '{{ as_timestamp(trigger.to_state.last_changed, default=0)
        | int(0) if trigger.to_state is not none else 0 }}'
      evento_last_changed_iso: '{{ as_local(trigger.to_state.last_changed).strftime(''%Y-%m-%d
        %H:%M:%S'') if trigger.to_state is not none else ''unknown'' }}'
      evento_context_id: '{{ trigger.to_state.context.id if trigger.to_state is not
        none and trigger.to_state.context is not none else ''no_context'' }}'
      learning_bucket_corto: '{{ (as_timestamp(now()) | int(0) // 15) }}'
      learning_bucket_error_5s: '{{ (as_timestamp(now()) | int(0) // 5) }}'
      firma_evento: '{{ evento_context_id ~ ''|'' ~ evento_last_changed_ts ~ ''|''
        ~ modo_anterior ~ ''->'' ~ modo_nuevo ~ ''|'' ~ modo_aprendizaje ~ ''|'' ~
        learning_bucket_corto }}'
      firma_learning_manual: '{{ evento_last_changed_ts ~ ''|'' ~ evento_context_id
        ~ ''|'' ~ modo_anterior ~ ''->'' ~ modo_nuevo }}'
      firma_learning_manual_previa: '{{ states(''input_text.ac_matriz_160_learning_manual_evento_firma'')
        | trim }}'
      firma_previa: '{{ states(''input_text.ac_matriz_160_learning_last_signature'')
        | trim }}'
      dedup_ok: '{{ firma_previa != firma_evento }}'
