              }} | target_valid={{ fan_target_valid }} | needs_change={{ fan_needs_change }} | cool_normal_active={{ cool_normal_active }} | turbo_activo={{ states('input_text.ac_matriz_160_fase_ciclo') == 'turbo_cool' }} | col={{ col_humana }}
