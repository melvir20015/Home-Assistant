      - action: logbook.log
        data:
          name: AC Auto Trace
          message: >-
            cool_sp_sync | SPsrc=sync | {{ cool_ctx_brief }} | SPf={{ cool_setpoint_f }} | Mot=sync | Δ={{ cool_sync_delta }} | Min={{ minutes_since_last_auto }}
          entity_id: climate.0200009211c7_climate
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ cool_sync_should_notify }}'
          sequence:
          - target:
              entity_id: input_datetime.ac_last_cool_sp_sync_notify_ts
            data:
              datetime: '{{ ts }}'
            action: input_datetime.set_datetime
          - target:
              entity_id: input_number.ac_last_cool_sp_sync_notified
            data:
              value: '{{ cool_setpoint_effective }}'
            action: input_number.set_value
          - variables:
              cool_push_kind: sync
              cool_push_reason: Mot=sync
              cool_push_summary: 'SP {{ ac_set_effective_normalized }}→{{ cool_setpoint_effective }} | Δ={{ cool_sync_delta }} | SPf={{ cool_setpoint_f }}'
              # `cool_push_*` vive sólo en esta rama; el título/mensaje se renderiza aquí mismo.
              cool_mobile_title_local: 'Cool↺'
              cool_mobile_message_local: >-
                {% set reason = cool_push_reason | default('', true) | trim %}
                {% set summary = cool_push_summary | default('', true) | trim %}
                {{ (reason if reason else 'Mot=sync') ~ ' | ' ~ (summary if summary else 'Sin detalle') }}
          - data:
              title: '{{ cool_mobile_title_local }}'
              message: '{{ cool_mobile_message_local }}'
              data:
                ttl: 0
                priority: high
            action: notify.mobile_app_samsung_s24
        default: []
    default: []
  variables:
    climate_ent: climate.0200009211c7_climate
    fan_dry_delay: 00:05:00
    t1: '{{ states(''sensor.lumi_lumi_weather_cuarto_temperatura'') | float(none)
      }}'
    t2: '{{ states(''sensor.lumi_lumi_weather_coco_temperatura'') | float(none) }}'
    h1: '{{ states(''sensor.lumi_lumi_weather_cuarto_humedad'') | float(none) }}'
    h2: '{{ states(''sensor.lumi_lumi_weather_coco_humedad'') | float(none) }}'
    tin: "{% if t1 is not none and t2 is not none %}\n  {{ ((t1 + t2) / 2) | round(2)
      }}\n{% elif t1 is not none %}\n  {{ t1 | round(2) }}\n{% elif t2 is not none
      %}\n  {{ t2 | round(2) }}\n{% else %}\n  {{ none }}\n{% endif %}"
    hin: "{% if h1 is not none and h2 is not none %}\n  {{ ((h1 + h2) / 2) | round(1)
      }}\n{% elif h1 is not none %}\n  {{ h1 | round(1) }}\n{% elif h2 is not none
      %}\n  {{ h2 | round(1) }}\n{% else %}\n  {{ none }}\n{% endif %}"
    sensor_delta: "{% if t1 is not none and t2 is not none %}\n  {{ (t1 - t2) | abs
      | round(2) }}\n{% else %}\n  {{ 0 }}\n{% endif %}"
    tout: '{{ state_attr(''weather.openweathermap'',''apparent_temperature'') | float(none)
      }}'
    wind_kmh: '{{ state_attr(''weather.openweathermap'',''wind_speed'') | float(0)
      }}'
    wind: '{{ (wind_kmh / 3.6) | round(2) }}'
    cur_mode: '{{ states(climate_ent) }}'
    ac_set: '{{ state_attr(climate_ent,''temperature'') | float(none) }}'
    ac_fan: "{{ state_attr(climate_ent,'fan_mode')\n   if state_attr(climate_ent,'fan_mode')
      is not none else 'n/a' }}"
    locked: '{{ is_state(''input_boolean.ac_bloqueo_cambio_modo_2h'',''on'') }}'
    lock_txt: '{{ ''ON'' if locked else ''OFF'' }}'
    last_mode_no_fan: '{{ states(''input_select.ac_ultimo_modo_no_fan'') }}'
    mov_raw: '{{ states(''binary_sensor.presencia_movimiento_estable'') }}'
    s24_raw: '{{ states(''device_tracker.samsung_s24'') }}'
    person_raw: '{{ states(''person.ivan'') }}'
    presence_ok: '{{ is_state(''binary_sensor.presencia_ok_estable'',''on'') }}'
    presence_real_now: '{{ mov_raw == ''on'' }}'
    presence_phone_home: '{{ (s24_raw in [''home'',''on'']) or (person_raw == ''home'')
      }}'
    manual_presence_until_raw: '{{ states(''input_datetime.ac_manual_presence_until'')
      }}'
    presence_temp_from_manual: "{% if manual_presence_until_raw in ['unknown','unavailable','none','']
      %}\n  false\n{% else %}\n  {{ as_timestamp(now()) < as_timestamp(manual_presence_until_raw)
      }}\n{% endif %}"
    presence_sensor_strict: '{{ presence_ok and presence_real_now }}'
    presence_effective: '{{ presence_phone_home or presence_sensor_strict or presence_temp_from_manual
      }}'
    auto_on_allowed: '{{ presence_effective and (not manual_off_block) }}'
    presence_away_30m: "{{ (not presence_effective)\n   and is_state('binary_sensor.presencia_movimiento_estable','off')\n
      \  and (person_raw != 'home')\n   and (s24_raw not in ['home','on']) }}"
    away30_txt: '{{ ''YES'' if presence_away_30m else ''NO'' }}'
    learning_enabled: '{{ is_state(''input_boolean.ac_learning_enabled'',''on'') }}'
    cool_off_learned_raw: '{{ states(''input_number.ac_cool_off_learned'') | float(0) }}'
    cool_learning_summary_raw: '{{ states(''input_text.ac_cool_contextual_learning_map'') | trim }}'
    cool_effective_sp_summary_raw: '{{ states(''input_text.ac_cool_effective_setpoint_map'') | trim }}'
    last_manual_ts_raw: '{{ states(''input_datetime.ac_last_manual_final_ts'') }}'
    cool_tod_bucket: "{% set hour = now().hour %}\n{% if 7 <= hour < 13 %}\n  day\n{% elif 13 <= hour < 20 %}\n  tarde\n{% else %}\n  noche\n{% endif %}"
    cool_outdoor_bucket: "{% if tout is none %}\n  exterior_templado\n{% elif (tout | float) >= 29 %}\n  exterior_caliente\n{% else %}\n  exterior_templado\n{% endif %}"
    cool_humidity_bucket: "{% if hin is not none and (hin | float) >= 60 %}\n  humedad_alta\n{% else %}\n  humedad_normal\n{% endif %}"
    cool_presence_bucket: '{{ ''presencia'' if presence_effective else ''ausencia'' }}'
    cool_thermal_trend_bucket: "{% set prev = states('input_number.ac_last_auto_tin') | float(none) %}\n{% set last_auto_ts = states('input_datetime.ac_last_auto_ts') %}\n{% set recent = last_auto_ts not in ['unknown','unavailable','none',''] and ((as_timestamp(now()) - as_timestamp(last_auto_ts)) / 60) <= 20 %}\n{% if tin is none or prev is none or prev == 0 or not recent %}\n  estable\n{% else %}\n  {% set delta = (tin | float) - prev %}\n  {{ 'subiendo' if delta >= 0.3 else 'bajando' if delta <= -0.3 else 'estable' }}\n{% endif %}"
    cool_context_bucket: "{{ cool_outdoor_bucket ~ ':' ~ cool_humidity_bucket ~ ':' ~ cool_tod_bucket ~ ':' ~ cool_presence_bucket }}"
    cool_context_detail: "{{ cool_context_bucket ~ ':' ~ cool_thermal_trend_bucket }}"
    cool_contextual_base_off: "{% if tout is none %}\n  {{ none }}\n{% elif (tout | float) < 17 %}\n  {{ none }}\n{% else %}\n  {% set base = 24.2 %}\n  {% set base = base - (0.35 if cool_outdoor_bucket == 'exterior_caliente' else 0) %}\n  {% set base = base - (0.20 if cool_humidity_bucket == 'humedad_alta' else 0) %}\n  {% set base = base - (0.15 if cool_tod_bucket == 'day' else 0.05 if cool_tod_bucket == 'tarde' else 0) %}\n  {% set base = base + (0.25 if cool_presence_bucket == 'ausencia' else 0) %}\n  {% set base = base - (0.20 if cool_thermal_trend_bucket == 'subiendo' else -0.10 if cool_thermal_trend_bucket == 'bajando' else 0) %}\n  {% if tin is not none %}\n    {% set demand = ((tin | float) - 23.6) * 0.35 %}\n    {% set base = base - ([demand, 0.45] | min) %}\n  {% endif %}\n  {% if tout is not none %}\n    {% set outdoor_push = ((tout | float) - 24) * 0.03 %}\n    {% set base = base - ([outdoor_push, 0.30] | min) %}\n  {% endif %}\n  {{ [[base, 25.4] | min, 22.4] | max | round(2) }}\n{% endif %}"
    cool_learning_summary_note: >-
      {% if cool_learning_summary_raw in ['', 'unknown', 'unavailable', 'none'] %}sin_resumen
      {% else %}{{ cool_learning_summary_raw }}{% endif %}
    cool_effective_sp_summary_note: >-
      {% if cool_effective_sp_summary_raw in ['', 'unknown', 'unavailable', 'none'] %}sin_resumen
      {% else %}{{ cool_effective_sp_summary_raw }}{% endif %}
    cool_context_learning_helper: '{{ ''input_number.ac_cool_learning_bucket_'' ~ (cool_context_bucket | replace('':'',''_'') ) }}'
    cool_effective_sp_helper: '{{ ''input_number.ac_cool_effective_sp_bucket_'' ~ (cool_context_bucket | replace('':'',''_'') ) }}'
    # Dependencia crítica: si un helper contextual todavía no cargó tras reinicio,
    # el resumen `bucket=valor` evita que una rama auto/manual quede sin fallback.
    # En plantillas HA/Jinja no usar len(); parsear el bucket con replace()/split() compatibles.
    cool_context_learning_summary_value: >-
      {% set raw = cool_learning_summary_note | default('', true) | trim %}
      {% set prefix = cool_context_bucket ~ '=' %}
      {% if raw.startswith(prefix) %}
        {{ raw | replace(prefix, '', 1) | float(none) }}
      {% else %}
        {{ none }}
      {% endif %}
    cool_effective_sp_summary_value: >-
      {% set raw = cool_effective_sp_summary_note | default('', true) | trim %}
      {% set prefix = cool_context_bucket ~ '=' %}
      {% if raw.startswith(prefix) %}
        {{ raw | replace(prefix, '', 1) | float(none) }}
      {% else %}
        {{ none }}
      {% endif %}
    cool_context_learning_entry: >-
      {% set helper_raw = states(cool_context_learning_helper) %}
      {% set helper_value = helper_raw | float(none) %}
      {{ helper_value if helper_value is not none else cool_context_learning_summary_value }}
    cool_effective_sp_entry: >-
      {% set helper_raw = states(cool_effective_sp_helper) %}
      {% set helper_value = helper_raw | float(none) %}
      {{ helper_value if helper_value is not none else cool_effective_sp_summary_value }}
    # Cool deja de aprender una única rama universal.
    # Desde este rediseño el aprendizaje manual se aplica por bucket contextual
    # (`exterior × humedad × franja × presencia`) para no mezclar confort de
    # horas o calores distintos. Se mantiene geometría simple:
    #   cool_on_target = cool_off_target + 0.5
    #   cool_setpoint = cool_off_target - 0.5
    # Heat queda explícitamente fuera de este rediseño para no contaminar reglas futuras.
    bias_heat_on: '{{ states(''input_number.ac_bias_heat_on'') | float(0) }}'
    bias_heat_off: '{{ states(''input_number.ac_bias_heat_off'') | float(0) }}'
    bias_heat_setpoint: '{{ states(''input_number.ac_bias_heat_setpoint'') | float(0)
      }}'
    fan_day_mode: '{{ ''Low'' if now().hour < 9 else ''Auto'' }}'
    emergency_window: "{% set t = now().strftime('%H:%M:%S') %} {% if '10:00:00' <=
      t < '16:00:00' %}\n  10-16\n{% else %}\n  07-10/16-21\n{% endif %}"
    emergency_on_avg: '{% set t = now().strftime(''%H:%M:%S'') %} {{ 25.6 if ''10:00:00''
      <= t < ''16:00:00'' else 26.0 }}'
    emergency_off_avg: '{% set t = now().strftime(''%H:%M:%S'') %} {{ 24.4 if ''10:00:00''
      <= t < ''16:00:00'' else 24.8 }}'
    emergency_setpoint: 22
    emergency_fan_mode: '{% set t = now().strftime(''%H:%M:%S'') %} {{ ''Auto'' if
      ''10:00:00'' <= t < ''16:00:00'' else ''Low'' }}'
    emergency_hot: '{{ tin is not none and tout is not none and (tout | float) >= 24
      and (tin | float) >= (emergency_on_avg | float) }}'
    emergency_off_ready: '{{ tin is not none and (tin | float) <= (emergency_off_avg
      | float) }}'
    emergency_latched: '{{ last_mode_no_fan == ''emergency_cool'' }}'
    heat_force_off_outdoor: 20
    heat_on_base: "{% if tout is none %}\n  {{ none }}\n{% else %}\n  {% set base
      = 23.0 if tout <= 5 else 22.0 if tout >= 17 else (23.0 - ((tout-5)/12)) %}\n
      \ {{ (base + min(wind*0.05,0.8)) | round(2) }}\n{% endif %}"
    heat_on: "{% if heat_on_base is none %}\n  {{ none }}\n{% else %}\n  {% set raw
      = (heat_on_base | float) + (bias_heat_on if learning_enabled else 0) %}\n  {{
      [[raw, 24.5] | min, 20.5] | max | round(2) }}\n{% endif %}"
    heat_off: "{% if heat_on is none %}\n  {{ none }}\n{% else %}\n  {% set raw =
      (heat_on | float) + 1.5 + (bias_heat_off if learning_enabled else 0) %}\n  {{
      [[raw, 26.0] | min, (heat_on | float) + 0.6] | max | round(2) }}\n{% endif %}"
    heat_setpoint: '{% set raw = 28 + (bias_heat_setpoint if learning_enabled else
      0) %} {{ [[raw, 30] | min, 24] | max | round(1) }}'
    cool_on_base: "{% if tout is none %}\n  {{ none }}\n{% elif tout < 17 %}\n  {{
      none }}\n{% else %}\n  {% set anchor_tout = 18.1 %}\n  {% set anchor_cool_on
      = 24.0 %}\n  {% set k = 0.10 %}\n  {% set offset = 0.5 %}\n  {% set humidity_adj
      = 0 if hin is none else (-0.25 if hin >= 65 else -0.10 if hin >= 58 else 0)
      %}\n  {% set raw = (anchor_cool_on - (k * (tout - anchor_tout))) + offset +
      humidity_adj %}\n  {{ [[raw, 24.7] | min, 24.0] | max | round(2) }}\n{% endif
      %}"
    cool_demand_score: "{% if cool_contextual_base_off is none %}\n  {{ none }}\n{% else %}\n  {% set score = 0 %}\n  {% if tin is not none %}\n    {% set score = score + ((((tin | float) - 23.0) * 18) | round(0) | int) %}\n  {% endif %}\n  {% if tout is not none %}\n    {% set score = score + ((((tout | float) - 24.0) * 7) | round(0) | int) %}\n  {% endif %}\n  {% if hin is not none %}\n    {% set score = score + ((((hin | float) - 55.0) * 0.8) | round(0) | int) %}\n  {% endif %}\n  {% set score = score + (8 if cool_tod_bucket == 'day' else 4 if cool_tod_bucket == 'tarde' else 0) %}\n  {% set score = score + (-8 if cool_presence_bucket == 'ausencia' else 6) %}\n  {% set score = score + (6 if cool_thermal_trend_bucket == 'subiendo' else -4 if cool_thermal_trend_bucket == 'bajando' else 0) %}\n  {{ score | int }}\n{% endif %}"
    cool_off_target: "{% if cool_contextual_base_off is none %}\n  {{ none }}\n{% else %}\n  {% set learned = cool_context_learning_entry %}\n  {% set raw = learned if learned is not none else cool_contextual_base_off %}\n  {{ [[raw, 25.7] | min, 22.4] | max | round(2) }}\n{% endif %}"
    cool_off: '{{ cool_off_target }}'
    cool_on_target: "{% if cool_off_target is none %}\n  {{ none }}\n{% else %}\n  {% set raw = (cool_off_target | float) + 0.5 %}\n  {{ [[raw, 26.2] | min, 22.9] | max | round(2) }}\n{% endif %}"
    cool_on: '{{ cool_on_target }}'
    cool_sensor_off: "{% if cool_off is none %}\n  {{ 23.2 }}\n{% else %}\n  {% set
      raw = (cool_off | float) - 0.3 %}\n  {{ [[raw, 24.0] | min, 22.8] | max | round(2)
      }}\n{% endif %}"
    # El panel del AC opera con pasos efectivos de 1 °F. Por eso Home Assistant
    # puede mostrar un valor en °C distinto al que redondea visualmente el equipo:
    # primero calculamos el setpoint teórico (`SPt`), luego validamos el setpoint
    # histórico efectivo por bucket (`SPh`) y recién después normalizamos al entero
    # en °F realmente aceptado por el equipo (`SPf`) para obtener el efectivo final
    # (`SPe`). `SPh` es histórico/contextual, no el valor enviado directamente.
    cool_setpoint_theoretical: "{% if cool_off is none %}\n  {{ none }}\n{% else %}\n  {{ ((cool_off | float) - 0.5) | round(2) }}\n{% endif %}"
    cool_setpoint: "{% if cool_setpoint_theoretical is none %}\n  {{ none }}\n{% else %}\n  {% set raw = cool_setpoint_theoretical | float %}\n  {{ [[raw, 24] | min, 21] | max | round(2) }}\n{% endif %}"
    cool_effective_sp_soft_gap: '{{ states(''input_number.ac_cool_effective_sp_soft_gap'') | float(0.8) }}'
    cool_effective_sp_hard_gap: '{{ states(''input_number.ac_cool_effective_sp_hard_gap'') | float(1.4) }}'
    cool_effective_sp_recent_guard_minutes: '{{ states(''input_number.ac_cool_effective_sp_recent_guard_minutes'') | float(90) }}'
    cool_effective_sp_reset_repeat_limit: '{{ states(''input_number.ac_cool_effective_sp_reset_repeat_limit'') | float(2) | round(0) | int }}'
    cool_last_manual_learning_type: '{{ states(''input_text.ac_last_manual_learning_type'') | default('''', true) | trim }}'
    cool_last_inconsistent_bucket: '{{ states(''input_text.ac_cool_effective_sp_last_inconsistent_bucket'') | default('''', true) | trim }}'
    cool_inconsistency_hits: '{{ states(''input_number.ac_cool_effective_sp_inconsistency_hits'') | float(0) | round(0) | int }}'
    cool_related_daytime_bucket: >-
      {% if cool_presence_bucket == 'presencia' and cool_tod_bucket == 'noche' %}
        {{ cool_outdoor_bucket ~ ':' ~ cool_humidity_bucket ~ ':day:' ~ cool_presence_bucket }}
      {% elif cool_presence_bucket == 'presencia' and cool_tod_bucket == 'day' %}
        {{ cool_outdoor_bucket ~ ':' ~ cool_humidity_bucket ~ ':noche:' ~ cool_presence_bucket }}
      {% else %}
        {{ none }}
      {% endif %}
    cool_related_daytime_helper: >-
      {% if cool_related_daytime_bucket is not none %}
        {{ 'input_number.ac_cool_effective_sp_bucket_' ~ (cool_related_daytime_bucket | replace(':','_')) }}
      {% else %}
        {{ none }}
      {% endif %}
    cool_effective_sp_delta: >-
      {% if cool_setpoint is none or cool_effective_sp_entry is none %}
        {{ none }}
      {% else %}
        {{ ((cool_setpoint | float) - (cool_effective_sp_entry | float)) | abs | round(2) }}
      {% endif %}
    cool_effective_sp_doubtful_recent_feedback: >-
      {% set recent_manual = last_manual_ts_raw not in ['unknown','unavailable','none','']
         and ((as_timestamp(now()) - as_timestamp(last_manual_ts_raw)) / 60) <= (cool_effective_sp_recent_guard_minutes | float(90)) %}
      {% set learning = cool_last_manual_learning_type | lower %}
      {{ recent_manual and ('ajuste_inmediato_post_auto_on' in learning or 'ignored' in learning or 'manual_sp_without_auto_reference' in learning) }}
    cool_effective_sp_inconsistency_reason: >-
      {% if cool_effective_sp_entry is none %}
        none
      {% elif cool_effective_sp_delta is none %}
        none
      {% elif (cool_effective_sp_delta | float(0)) >= (cool_effective_sp_hard_gap | float(1.4)) and cool_effective_sp_doubtful_recent_feedback %}
        hard_recent_feedback
      {% elif (cool_effective_sp_delta | float(0)) >= (cool_effective_sp_hard_gap | float(1.4)) %}
        hard_gap
      {% elif (cool_effective_sp_delta | float(0)) >= (cool_effective_sp_soft_gap | float(0.8)) and cool_effective_sp_doubtful_recent_feedback %}
        soft_recent_feedback
      {% elif (cool_effective_sp_delta | float(0)) >= (cool_effective_sp_soft_gap | float(0.8)) %}
        soft_gap
      {% else %}
        none
      {% endif %}
    cool_effective_sp_hist_weight: >-
      {% if cool_effective_sp_entry is none %}
        0
      {% elif cool_effective_sp_inconsistency_reason in ['hard_recent_feedback','hard_gap'] %}
        0
      {% elif cool_effective_sp_inconsistency_reason in ['soft_recent_feedback','soft_gap'] %}
        0.15
      {% else %}
        0.40
      {% endif %}
    cool_effective_sp_ignored: '{{ cool_effective_sp_entry is not none and (cool_effective_sp_hist_weight | float(0)) == 0 }}'
    cool_effective_sp_reset_hits: >-
      {% if not cool_effective_sp_ignored %}
        0
      {% elif cool_last_inconsistent_bucket == cool_context_bucket %}
        {{ (cool_inconsistency_hits | int(0)) + 1 }}
      {% else %}
        1
      {% endif %}
    cool_effective_sp_reset_bucket: >-
      {{ cool_effective_sp_ignored
         and cool_effective_sp_inconsistency_reason == 'hard_recent_feedback'
         and (cool_effective_sp_reset_hits | int(0)) >= (cool_effective_sp_reset_repeat_limit | int(2)) }}
    cool_setpoint_learned_blended: "{% if cool_setpoint is none %}\n  {{ none }}\n{% else %}\n  {% set historical = cool_effective_sp_entry %}\n  {% set hist_weight = cool_effective_sp_hist_weight | float(0) %}\n  {% if historical is none or hist_weight <= 0 %}\n    {{ cool_setpoint | float | round(2) }}\n  {% else %}\n    {% set theory_weight = 1 - hist_weight %}\n    {% set blended = ((cool_setpoint | float) * theory_weight) + ((historical | float) * hist_weight) %}\n    {{ [[blended, 24] | min, 20] | max | round(2) }}\n  {% endif %}\n{% endif %}"
    cool_setpoint_f: "{% if cool_setpoint_learned_blended is none %}\n  {{ none }}\n{% else %}\n  {% set sp_f = (((cool_setpoint_learned_blended | float) * 9 / 5) + 32) | round(0) %}\n  {{ [[sp_f, 75] | min, 68] | max | int }}\n{% endif %}"
    cool_setpoint_effective: "{% if cool_setpoint_f is none %}\n  {{ none }}\n{% else %}\n  {{ (((cool_setpoint_f | float) - 32) * 5 / 9) | round(2) }}\n{% endif %}"
    ac_set_normalized_f: "{% if ac_set is none %}\n  {{ none }}\n{% else %}\n  {% set sp_f = (((ac_set | float) * 9 / 5) + 32) | round(0) %}\n  {{ [[sp_f, 75] | min, 70] | max | int }}\n{% endif %}"
    ac_set_effective_normalized: "{% if ac_set_normalized_f is none %}\n  {{ none }}\n{% else %}\n  {{ (((ac_set_normalized_f | float) - 32) * 5 / 9) | round(2) }}\n{% endif %}"
    cool_sync_delta: "{% if ac_set_effective_normalized is none or cool_setpoint_effective is none %}\n  {{ none }}\n{% else %}\n  {{ ((cool_setpoint_effective | float) - (ac_set_effective_normalized | float)) | abs | round(2) }}\n{% endif %}"
    cool_sync_push_enabled: '{{ is_state(''input_boolean.ac_cool_sync_push_enabled'',''on'') }}'
    cool_sync_notify_window_min: 20
    last_cool_sync_notify_ts_raw: '{{ states(''input_datetime.ac_last_cool_sp_sync_notify_ts'') }}'
    minutes_since_cool_sync_notify: "{% if last_cool_sync_notify_ts_raw in ['unknown','unavailable','none',''] %}\n  99999\n{% else %}\n  {{ ((as_timestamp(now()) - as_timestamp(last_cool_sync_notify_ts_raw)) / 60) | round(1) }}\n{% endif %}"
    last_cool_sync_notified_sp: '{{ states(''input_number.ac_last_cool_sp_sync_notified'') | float(none) }}'
    # Depende de `input_datetime.ac_last_auto_ts` para compuertas de recencia y auditoría.
    last_auto_ts_raw: '{{ states(''input_datetime.ac_last_auto_ts'') }}'
    minutes_since_last_auto: >-
      {% set raw = last_auto_ts_raw | default('', true) | trim %}
      {% set raw_lower = raw | lower %}
      {% if raw_lower in ['unknown', 'unavailable', 'none', ''] %}
        99999
      {% else %}
        {% set ts = as_timestamp(raw, default=none) %}
        {{ 99999 if ts is none else (((as_timestamp(now()) - ts) / 60) | round(1)) }}
      {% endif %}
    cool_sync_recent_auto_on: "{{ states('input_text.ac_last_auto_action') == 'auto_on'
   and states('input_text.ac_last_auto_branch') == 'cool_normal_on'
   and (minutes_since_last_auto | float(99999)) <= 3 }}"
    last_auto_action: '{{ states(''input_text.ac_last_auto_action'') }}'
    last_auto_mode: '{{ states(''input_text.ac_last_auto_mode'') }}'
    last_auto_branch: '{{ states(''input_text.ac_last_auto_branch'') }}'
    recent_any_auto_on: "{{ last_auto_action == 'auto_on'\n   and (minutes_since_last_auto
      | float(99999)) <= 2 }}"
    manual_sp_override_hold_minutes: '{{ states(''input_number.ac_manual_setpoint_override_hold_minutes'') | float(12) }}'
    manual_sp_override_until_raw: '{{ states(''input_datetime.ac_manual_setpoint_override_until'') }}'
    manual_sp_override_until_ts: >-
      {% set raw = manual_sp_override_until_raw | default('', true) | trim %}
      {% set raw_lower = raw | lower %}
      {% if raw_lower in ['unknown', 'unavailable', 'none', ''] %}
        0
      {% else %}
        {{ as_timestamp(raw, default=0) | float(0) }}
      {% endif %}
    manual_sp_override_minutes_left: >-
      {% if (manual_sp_override_until_ts | float(0)) <= 0 %}
        0
      {% else %}
        {{ [(((manual_sp_override_until_ts | float(0)) - as_timestamp(now())) / 60), 0] | max | round(1) }}
      {% endif %}
    manual_sp_override_active: >-
      {{ is_state('input_boolean.ac_manual_setpoint_override_active','on')
         and (manual_sp_override_until_ts | float(0)) > as_timestamp(now()) }}
    manual_sp_feedback_future_only_active: >-
      {{ states('input_text.ac_last_change_origin') == 'manual_sp_feedback_future_only'
         and (minutes_since_last_auto | float(99999)) <= 2 }}
    cool_sync_should_notify: "{{ cool_sync_push_enabled\n   and (not manual_sp_override_active)\n   and (not manual_sp_feedback_future_only_active)\n   and cool_sync_delta is not none\n   and (cool_sync_delta | float(0)) >= 0.2\n   and (\n     cool_sync_recent_auto_on\n     or last_cool_sync_notified_sp is none\n     or ((last_cool_sync_notified_sp | float) - (cool_setpoint_effective | float)) | abs >= 0.2\n     or (minutes_since_cool_sync_notify | float(99999)) >= (cool_sync_notify_window_min | float(20))\n   ) }}"
    last_manual_on_ts_raw: '{{ states(''input_datetime.ac_last_manual_on_ts'') }}'
    last_manual_final_ts_raw: '{{ states(''input_datetime.ac_last_manual_final_ts'') }}'
    manual_on_hold_minutes: 12
    last_manual_override_ts: "{% set on_ts = as_timestamp(last_manual_on_ts_raw, 0)
      %}
      {% set final_ts = as_timestamp(last_manual_final_ts_raw, 0) %}
      {{ [on_ts, final_ts] | max }}"
    minutes_since_manual_on: "{% if (last_manual_override_ts | float(0)) <= 0 %}
  99999
{% else %}
  {{ ((as_timestamp(now()) - (last_manual_override_ts | float(0))) / 60) | round(1) }}
{% endif %}"
    manual_on_guard_active: '{{ (minutes_since_manual_on | float(99999)) < (manual_on_hold_minutes
      | float) }}'
    last_manual_event_type: '{{ states(''input_text.ac_last_manual_event_type'') }}'
    manual_presence_override_active: "{{ last_manual_event_type in ['manual_on_due_to_presence_gap','manual_on_due_to_presence_gap_cool','manual_on_due_to_presence_gap_heat'] and presence_temp_from_manual }}"
    manual_override_active: '{{ manual_on_guard_active or manual_presence_override_active }}'
    last_manual_off_ts_raw: '{{ states(''input_datetime.ac_last_manual_off_ts'') }}'
    manual_off_hold_minutes: 5
    minutes_since_manual_off: "{% if last_manual_off_ts_raw in ['unknown','unavailable','none','']
      %}\n  99999\n{% else %}\n  {{ ((as_timestamp(now()) - as_timestamp(last_manual_off_ts_raw))
      / 60) | round(1) }}\n{% endif %}"
    manual_off_block: '{{ (minutes_since_manual_off | float(99999)) < (manual_off_hold_minutes
      | float) }}'
    manual_off_block_txt: '{{ ''ON'' if manual_off_block else ''OFF'' }}'
    cool_main_control_demand: >-
      {{ (not emergency_latched)
         and cur_mode != 'cool'
         and tin is not none
         and cool_on is not none
         and (tin | float) >= (cool_on | float) }}
    cool_main_control_error: >-
      {{ cool_main_control_demand
         and auto_on_allowed
         and (not recent_any_auto_on)
         and (not locked or last_mode_no_fan != 'heat')
         and (cool_setpoint is none or cool_setpoint_effective is none) }}
    cool_main_control_ready: >-
      {{ cool_main_control_demand
         and auto_on_allowed
         and (not recent_any_auto_on)
         and cool_setpoint is not none
         and cool_setpoint_effective is not none
         and (not locked or last_mode_no_fan != 'heat') }}
    cool_main_control_blocked: >-
      {{ cool_main_control_demand and (not cool_main_control_ready) and (not cool_main_control_error) }}
    cool_main_control_block_reason: >-
      {% if not presence_effective %}sin_pres
      {% elif manual_off_block %}pausa_manual
      {% elif recent_any_auto_on %}auto_reciente
      {% elif locked and last_mode_no_fan == 'heat' %}lock_heat
      {% else %}compuerta{% endif %}
    cool_main_control_audit: >-
      {% if cool_main_control_error %}
        main_control_error | branch=cool | reason=sp_template | Tin={{ tin if tin is not none else 'na' }} | On={{ cool_on if cool_on is not none else 'na' }} | SPt={{ cool_setpoint if cool_setpoint is not none else 'na' }} | SPe={{ cool_setpoint_effective if cool_setpoint_effective is not none else 'na' }} | Bucket={{ cool_context_detail }} | Trig={{ trig }}
      {% elif cool_main_control_blocked %}
        main_control_blocked | branch=cool | reason={{ cool_main_control_block_reason }} | Tin={{ tin if tin is not none else 'na' }} | On={{ cool_on if cool_on is not none else 'na' }} | Bucket={{ cool_context_detail }} | Trig={{ trig }}
      {% else %}
        none
      {% endif %}
    ts: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
    trig: "{% if trigger is defined %}\n  {% if trigger.platform == 'time_pattern'
      %}\n    /5min\n  {% elif trigger.platform == 'state' %}\n    {{ trigger.entity_id
      }}={{ trigger.to_state.state if trigger.to_state else 'n/a' }}\n  {% else %}\n
      \   {{ trigger.platform }}\n  {% endif %}\n{% else %}\n  manual\n{% endif %}"
  mode: single
- id: '1769981375283'
  alias: AC - Iniciar bloqueo 2h al apagarse
  description: ''
  triggers:
  - entity_id: climate.0200009211c7_climate
    to: 'off'
    trigger: state
  actions:
  - target:
      entity_id: input_boolean.ac_bloqueo_cambio_modo_2h
    action: input_boolean.turn_on
  - delay: 02:00:00
  - target:
      entity_id: input_boolean.ac_bloqueo_cambio_modo_2h
    action: input_boolean.turn_off
  mode: restart
- id: '1773894905330'
  alias: AC - Learning - Manual OFF feedback
  description: 'Evalúa si un apagado manual detectado previamente constituye feedback
    válido para aprendizaje. Esta automatización sólo escribe telemetría de aprendizaje:
    `input_datetime.ac_last_manual_feedback_ts` se actualiza exclusivamente cuando
    el apagado manual corrige un `auto_on` reciente dentro de la ventana de feedback.
    La detección del apagado manual vive en `input_datetime.ac_last_manual_off_ts`
    y el resultado del aprendizaje queda clasificado en `input_text.ac_last_manual_learning_type`.

    '
  triggers:
  - trigger: state
    entity_id: input_datetime.ac_last_manual_off_ts
  conditions:
  - condition: time
    after: 07:01:00
    before: '20:59:00'
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.ac_on_por_automatizacion
        state: 'on'
      sequence:
      - stop: 'Ignorado: AUTO ON en curso.'
    - conditions:
      - condition: state
        entity_id: input_boolean.ac_off_por_automatizacion
        state: 'on'
      sequence:
      - stop: 'Ignorado: AUTO OFF en curso.'
    default: []
  - variables:
      t1: '{{ states(''sensor.lumi_lumi_weather_cuarto_temperatura'') | float(none)
        }}'
      t2: '{{ states(''sensor.lumi_lumi_weather_coco_temperatura'') | float(none)
        }}'
      h1: '{{ states(''sensor.lumi_lumi_weather_cuarto_humedad'') | float(none) }}'
      h2: '{{ states(''sensor.lumi_lumi_weather_coco_humedad'') | float(none) }}'
      tin: "{% if t1 is not none and t2 is not none %}
  {{ ((t1 + t2) / 2) | round(2)
        }}
{% elif t1 is not none %}
  {{ t1 | round(2) }}
{% elif t2 is not none
        %}
  {{ t2 | round(2) }}
{% else %}
  {{ none }}
{% endif %}"
      hin: "{% if h1 is not none and h2 is not none %}
  {{ ((h1 + h2) / 2) | round(1)
        }}
{% elif h1 is not none %}
  {{ h1 | round(1) }}
{% elif h2 is not none
        %}
  {{ h2 | round(1) }}
{% else %}
  {{ none }}
{% endif %}"
      sensor_delta: "{% if t1 is not none and t2 is not none %}
  {{ (t1 - t2) |
        abs | round(2) }}
{% else %}
  {{ 0 }}
{% endif %}"
      tout: '{{ state_attr(''weather.openweathermap'',''apparent_temperature'') |
        float(none) }}'
      last_auto_ts_raw: '{{ states(''input_datetime.ac_last_auto_ts'') }}'
      last_auto_action: '{{ states(''input_text.ac_last_auto_action'') }}'
      last_auto_mode: '{{ states(''input_text.ac_last_auto_mode'') }}'
      last_auto_branch: '{{ states(''input_text.ac_last_auto_branch'') }}'
      feedback_window_min: '{{ states(''input_number.ac_feedback_window_minutes'')
        | float(120) }}'
      last_change_origin: '{{ states(''input_text.ac_last_change_origin'') }}'
      lr_small: '{{ states(''input_number.ac_learning_rate_small'') | float(0.05)
        }}'
      lr_large: '{{ states(''input_number.ac_learning_rate_large'') | float(0.10)
        }}'
      learning_enabled: '{{ is_state(''input_boolean.ac_learning_enabled'',''on'')
        }}'
      minutes_since_last_auto: "{% set raw = last_auto_ts_raw | default('', true) | trim %}
{% set raw_lower = raw | lower %}
{% if raw_lower in ['unknown','unavailable','none',''] %}
  99999
{% else %}
  {% set ts = as_timestamp(raw, default=none) %}
  {{ 99999 if ts is none else (((as_timestamp(now()) - ts) / 60) | round(1)) }}
{% endif %}"
      quick_feedback: '{{ (minutes_since_last_auto | float(99999)) <= 12 }}'
      valid_feedback: "{{ learning_enabled
   and last_change_origin == 'manual_off'
   and last_auto_action == 'auto_on'

        \  and last_auto_mode in ['cool','heat']
   and (minutes_since_last_auto
        | float(99999)) <= (feedback_window_min | float(120)) }}"
      cur_cool_off_learned: '{{ states(''input_number.ac_cool_off_learned'') | float(24.0) }}'
      cool_learning_summary_raw: '{{ states(''input_text.ac_cool_contextual_learning_map'') | trim }}'
      last_auto_context_bucket: '{{ states(''input_text.ac_last_auto_context_bucket'') | trim }}'
      cool_learning_bucket: "{% set raw = last_auto_context_bucket %}\n{% if raw in ['', 'unknown', 'unavailable', 'none'] %}\n  exterior_templado:humedad_normal:day:presencia\n{% else %}\n  {{ raw.split(':subiendo')[0].split(':bajando')[0].split(':estable')[0] }}\n{% endif %}"
      cool_learning_bucket_helper: '{{ ''input_number.ac_cool_learning_bucket_'' ~ (cool_learning_bucket | replace('':'',''_'') ) }}'
      cool_learning_bucket_summary_value: >-
        {% set raw = cool_learning_summary_raw | default('', true) | trim %}
        {% set prefix = cool_learning_bucket ~ '=' %}
        {% if raw.startswith(prefix) %}
          {{ raw | replace(prefix, '', 1) | float(none) }}
        {% else %}
          {{ none }}
        {% endif %}
      cur_bias_heat_on: '{{ states(''input_number.ac_bias_heat_on'') | float(0) }}'
      cur_bias_heat_off: '{{ states(''input_number.ac_bias_heat_off'') | float(0)
        }}'
      cur_bias_heat_setpoint: '{{ states(''input_number.ac_bias_heat_setpoint'') |
        float(0) }}'
      step_main: '{{ (lr_large if quick_feedback else lr_small) | float }}'
      # Fase cool: mover sólo el bucket contextual correspondiente.
      # Cool ya no aprende de forma universal; el bucket de la última acción auto
      # evita mezclar confort de franjas, humedad o calor exterior distintos.
      # Fase heat: se mantiene intacta y se revisará por separado.
      cool_branch_step: 0.25
      cool_bucket_previous_value: >-
        {% set helper_raw = states(cool_learning_bucket_helper) %}
        {% set helper_value = helper_raw | float(none) %}
        {{ helper_value if helper_value is not none else (cool_learning_bucket_summary_value if cool_learning_bucket_summary_value is not none else cur_cool_off_learned) }}
      debug_enabled: '{{ is_state(''input_boolean.ac_learning_debug'',''on'') }}'
      ts: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      final_mode: 'off'
      final_setpoint: "{% set sp = state_attr('climate.0200009211c7_climate','temperature') %}{{ sp if sp is not none else 'n/a' }}"
      final_fan: "{% set fan = state_attr('climate.0200009211c7_climate','fan_mode') %}{{ fan if fan is not none else 'n/a' }}"
      manual_off_block: 'true'
