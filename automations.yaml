  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.ausencia_prolongada_calefaccion
- id: helper_calefaccion_reciente_3h
  alias: Helper - Marca calefaccion reciente 2 horas
  trace:
    stored_traces: 50
  description: Mantiene la bandera en on durante 2 horas desde el último cambio SALIENDO
    de heat
  mode: restart
  trigger:
  - platform: state
    entity_id: climate.0200009211c7_climate
    from: heat
  action:
