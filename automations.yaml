        service: input_boolean.turn_on
      - target:
          entity_id: input_text.ac_dda_last_change_origin
        data:
          value: auto_off
        service: input_text.set_value
      - target:
          entity_id: input_datetime.ac_last_auto_off_marker_ts
        data:
