      context_scope_ok: '{{ contract_context_key not in ['''', ''unknown'', ''unavailable'', ''none''] }}'
      learning_day_scope_ok: '{{ daytime_scope_ok }}'
      last_manual_on_ts_raw: '{{ states(''input_datetime.ac_dda_last_manual_on_ts'') | default('''', true) | trim }}'
