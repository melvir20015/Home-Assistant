  - service: input_select.select_option
    target:
      entity_id: input_select.ac_modo_dinamico
    data:
      option: none
  - service: input_number.set_value
    target:
      entity_id: input_number.ac_off_avg_previo_dinamico
    data:
      value: 0
- id: ac_noche_muestreo_tendencia_off
  alias: AC - Noche Muestreo tendencia solo AC OFF
  trace:
    stored_traces: 50
  description: Muestrea cada 2 min entre 19:00-22:00 cuando AC está off o fan_only.
    Filtra Coco con clamp anti-cocina.
  mode: single
  trigger:
  - platform: time_pattern
    minutes: /2
  condition:
  - condition: time
    after: '19:00:00'
    before: '22:00:00'
  - condition: template
    value_template: '{{ states(''climate.0200009211c7_climate'') in [''off'',''fan_only'']
      }}'
  action:
  - variables:
      t_cuarto_raw: '{{ states(''sensor.lumi_lumi_weather_cuarto_temperatura'') }}'
      t_coco_raw: '{{ states(''sensor.lumi_lumi_weather_coco_temperatura'') }}'
      t_cuarto: '{{ t_cuarto_raw | float(none) }}'
      t_coco: '{{ t_coco_raw | float(none) }}'
      sensores_validos: '{{ t_cuarto is not none and t_coco is not none }}'
      cap: 0.7
      t_coco_filtrado: "{% if not sensores_validos %}\n  {{ none }}\n{% elif (t_coco
        - t_cuarto) > cap %}\n  {{ (t_cuarto + cap) | round(2) }}\n{% else %}\n  {{
        t_coco | round(2) }}\n{% endif %}"
      avg: '{{ ((t_cuarto + (t_coco_filtrado | float)) / 2) | round(2) if sensores_validos
        else none }}'
      n: '{{ states(''input_number.ac_off_muestras_19_00_21_59'') | int(0) }}'
  - choose:
    - conditions: '{{ not sensores_validos }}'
      sequence:
      - service: logbook.log
        data:
          name: AC Noche Sensores
          message: 'Se omite la muestra nocturna porque la entrada no es numérica:
            cuarto={{ t_cuarto_raw }}, coco={{ t_coco_raw }}.'
          entity_id: climate.0200009211c7_climate
    - conditions: '{{ n == 0 }}'
      sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.ac_off_avg_inicio_19_00_21_59
        data:
          value: '{{ avg }}'
      - service: input_number.set_value
        target:
          entity_id: input_number.ac_off_avg_final_19_00_21_59
        data:
          value: '{{ avg }}'
      - service: input_number.set_value
        target:
          entity_id: input_number.ac_off_muestras_19_00_21_59
        data:
          value: '{{ n + 1 }}'
    - conditions: '{{ n > 0 and avg is not none }}'
      sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.ac_off_avg_final_19_00_21_59
        data:
          value: '{{ avg }}'
      - service: input_number.set_value
        target:
          entity_id: input_number.ac_off_muestras_19_00_21_59
        data:
          value: '{{ n + 1 }}'
- id: ac_noche_decide_tendencia_off_2159
  alias: AC - Noche Decide tendencia OFF (21:59)
  trace:
    stored_traces: 50
  description: Decide si la tendencia (filtrada) sube entre 19:00 y 21:59.
  mode: single
  trigger:
  - platform: time
    at: '21:59:00'
  action:
  - variables:
      inicio: '{{ states(''input_number.ac_off_avg_inicio_19_00_21_59'') | float(0)
        }}'
      final: '{{ states(''input_number.ac_off_avg_final_19_00_21_59'') | float(0)
        }}'
      n: '{{ states(''input_number.ac_off_muestras_19_00_21_59'') | int(0) }}'
      delta: '{{ (final - inicio) | round(2) }}'
      umbral: 0.1
      min_muestras: 30
  - choose:
    - conditions: '{{ n >= min_muestras and delta >= umbral }}'
      sequence:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.ac_tendencia_subiendo_con_ac_off
    default:
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.ac_tendencia_subiendo_con_ac_off
- id: ac_noche_decide_modo_2200
  alias: AC - Noche Decide modo final (22:00) con bloqueo (no cae a none si AC estaba
    ON)
  trace:
    stored_traces: 50
  mode: single
  trigger:
  - platform: time
    at: '22:00:00'
  condition:
  - condition: template
    value_template: '{{ states(''input_select.ac_modo_noche_2200'') in [''none'',''unknown'',''unavailable'']
      }}'
  variables:
    cl: '{{ states(''climate.0200009211c7_climate'') }}'
    last_no_fan: '{{ states(''input_select.ac_ultimo_modo_no_fan'') }}'
    t1_raw: '{{ states(''sensor.lumi_lumi_weather_cuarto_temperatura'') }}'
    t2_raw: '{{ states(''sensor.lumi_lumi_weather_coco_temperatura'') }}'
    t1: '{{ t1_raw | float(none) }}'
    t2: '{{ t2_raw | float(none) }}'
    temps_validas: '{{ t1 is not none and t2 is not none }}'
    tendencia_sube: '{{ is_state(''input_boolean.ac_tendencia_subiendo_con_ac_off'',''on'')
      }}'
    calefaccion_reciente: '{{ is_state(''input_boolean.calefaccion_reciente'',''on'')
      }}'
  action:
  - choose:
    - conditions: '{{ cl in [''cool'',''heat''] }}'
      sequence:
      - service: input_select.select_option
        target:
          entity_id: input_select.ac_modo_noche_2200
        data:
          option: '{{ cl }}'
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.ac_bloqueo_modo_noche
    - conditions: '{{ cl == ''fan_only'' and last_no_fan in [''cool'',''heat''] }}'
      sequence:
      - service: input_select.select_option
        target:
          entity_id: input_select.ac_modo_noche_2200
        data:
          option: '{{ last_no_fan }}'
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.ac_bloqueo_modo_noche
    - conditions: '{{ cl == ''off'' }}'
      sequence:
      - choose:
        - conditions: '{{ not temps_validas }}'
          sequence:
          - service: logbook.log
            data:
              name: AC Noche Sensores
              message: 'Se mantiene `input_select.ac_modo_noche_2200` sin cambios
                porque la entrada no es numérica: cuarto={{ t1_raw }}, coco={{ t2_raw
                }}.'
              entity_id: climate.0200009211c7_climate
        - conditions: '{{ t1 > 22.7 and t2 > 22.7 and tendencia_sube and not calefaccion_reciente
            }}'
          sequence:
          - service: input_select.select_option
            target:
              entity_id: input_select.ac_modo_noche_2200
            data:
              option: cool
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.ac_bloqueo_modo_noche
        - conditions: '{{ t1 < 22.5 and t2 < 22.5 }}'
          sequence:
          - service: input_select.select_option
            target:
              entity_id: input_select.ac_modo_noche_2200
            data:
              option: heat
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.ac_bloqueo_modo_noche
        - conditions: '{{ (t1 >= 22.5 and t1 < 23) and (t2 >= 22.5 and t2 < 23) and
            not tendencia_sube }}'
          sequence:
          - service: input_select.select_option
            target:
              entity_id: input_select.ac_modo_noche_2200
            data:
              option: heat
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.ac_bloqueo_modo_noche
        default:
        - service: input_select.select_option
          target:
            entity_id: input_select.ac_modo_noche_2200
          data:
            option: none
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.ac_bloqueo_modo_noche
    default:
    - service: input_select.select_option
      target:
        entity_id: input_select.ac_modo_noche_2200
      data:
        option: none
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.ac_bloqueo_modo_noche
- id: ac_noche_desbloquea_modo_0700
  alias: AC - Noche Desbloquea modo (07:00)
  trace:
    stored_traces: 50
  mode: single
  trigger:
  - platform: time
    at: 07:00:00
  action:
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.ac_bloqueo_modo_noche
  - service: input_select.select_option
    target:
      entity_id: input_select.ac_modo_noche_2200
    data:
      option: none
  - service: input_select.select_option
    target:
      entity_id: input_select.ac_modo_dinamico
    data:
      option: none
- id: notifica_movimiento_despues_1h
  alias: Notificación - Movimiento después de 1h sin actividad
  trace:
    stored_traces: 50
  description: Notifica cuando hay movimiento tras 60+ min sin actividad (08:00-20:00).
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.tze204_gkfbdvyx_ts0601
    to: 'on'
  condition:
  - condition: time
    after: 08:00:00
    before: '20:00:00'
  - condition: template
    value_template: "{{ trigger.from_state is not none\n   and trigger.from_state.state
      == 'off'\n   and (as_timestamp(trigger.to_state.last_changed)\n        - as_timestamp(trigger.from_state.last_changed))
      >= 3600 }}"
  action:
  - service: notify.mobile_app_samsung_s24
    data:
      title: Movimiento detectado en casa
      message: Hubo movimiento después de 1 hora o mas sin actividad.
- id: aviso_afuera_mas_fresco_cool
  alias: Aviso - Afuera más fresco que adentro (AC en cool, OWM)
  trace:
    stored_traces: 50
  description: Notifica si el AC está en cool y afuera está 5°C más fresco (solo de
    día).
  mode: single
  trigger:
  - platform: state
    entity_id:
    - climate.0200009211c7_climate
    - sensor.lumi_lumi_weather_cuarto_temperatura
    - sensor.lumi_lumi_weather_coco_temperatura
    - weather.openweathermap
  - platform: time_pattern
    minutes: /10
  condition:
  - condition: time
    after: 08:00:00
    before: '20:00:00'
  - condition: state
    entity_id: climate.0200009211c7_climate
    state: cool
  - condition: template
    value_template: '{% set t_cuarto = states(''sensor.lumi_lumi_weather_cuarto_temperatura'')|float(0)
      %} {% set t_coco   = states(''sensor.lumi_lumi_weather_coco_temperatura'')|float(0)
      %} {% set t_in     = (t_cuarto + t_coco) / 2 %} {% set t_out    = state_attr(''weather.openweathermap'',''temperature'')|float(none)
      %} {{ t_out is not none and (t_in - t_out) >= 5 }}'
  action:
  - service: notify.mobile_app_samsung_s24
    data:
      title: Afuera está más fresco
      message: El aire acondicionado está en modo COOL y afuera está al menos 5 °C
        más fresco que adentro.
- id: shield_programa_apagado_30m
  alias: TV Dormitorio - Programar apagado 30 min
  trace:
    stored_traces: 50
  description: Inicia o cancela el timer de apagado de la SHIELD
  mode: restart
  trigger:
  - platform: state
    entity_id: input_boolean.apagar_shield_en_30_min
  action:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.apagar_shield_en_30_min
        state: 'on'
      sequence:
      - service: timer.start
        target:
          entity_id: timer.timer_apagado_tv_dormitorio
    - conditions:
      - condition: state
        entity_id: input_boolean.apagar_shield_en_30_min
        state: 'off'
      sequence:
      - service: timer.cancel
        target:
          entity_id: timer.timer_apagado_tv_dormitorio
- id: shield_apaga_al_terminar_timer_30m
  alias: TV Dormitorio - Apaga SHIELD al terminar timer
  trace:
    stored_traces: 50
  description: Apaga la SHIELD cuando termina el timer de 30 min
  mode: single
  trigger:
  - platform: event
    event_type: timer.finished
    event_data:
      entity_id: timer.timer_apagado_tv_dormitorio
  condition:
  - condition: state
    entity_id: media_player.shield_android_tv_2
    state: 'on'
  action:
  - service: media_player.turn_off
    target:
      entity_id: media_player.shield_android_tv_2
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.apagar_shield_en_30_min
- id: '1766870769686'
  alias: AC - Guardar último apagado (solo OFF)
  trace:
    stored_traces: 50
  mode: single
  trigger:
  - platform: state
    entity_id: climate.0200009211c7_climate
    to: 'off'
  action:
  - service: input_datetime.set_datetime
    target:
      entity_id: input_datetime.ac_ultimo_apagado
    data:
      timestamp: '{{ now().timestamp() }}'
- id: '1768016118285'
  alias: AC - Noche dinámico (OpenWeather) + Presencia estable + Fan Low + Notificaciones
  trace:
    stored_traces: 50
  description: '22:00–06:59: Control nocturno inteligente HEAT/COOL/OFF usando temperatura
    interior vs exterior (OpenWeather apparent_temperature), presencia estable, histéresis,
    bloqueo 2h y ajuste de emergencia por humedad (punto de rocío). Emergencia COOL
    SOLO si exterior aparente < 17°C. Promedio de 2 sensores (temp y humedad). Notifica
    SOLO cuando hace ON/OFF.

    '
  trigger:
  - minutes: /5
    platform: time_pattern
  - entity_id:
    - weather.openweathermap
    - sensor.lumi_lumi_weather_cuarto_temperatura
    - sensor.lumi_lumi_weather_coco_temperatura
    - sensor.lumi_lumi_weather_cuarto_humedad
    - sensor.lumi_lumi_weather_coco_humedad
    - input_boolean.ac_bloqueo_cambio_modo_2h
    - binary_sensor.presencia_ok_estable
    - binary_sensor.presencia_s24_estable
    - binary_sensor.presencia_movimiento_estable
    platform: state
  - entity_id: binary_sensor.presencia_movimiento_estable
    to: 'on'
    platform: state
  - entity_id: binary_sensor.presencia_s24_estable
    to: 'on'
    platform: state
  condition:
  - condition: time
    after: '22:00:00'
    before: 06:59:00
  action:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ night_ramp_in_progress }}'
      sequence:
      - target:
          entity_id: input_text.ac_last_auto_branch
        data:
          value: night_loop_preempted_by_new_trigger
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_auto_action
        data:
          value: night_loop_preempted_by_new_trigger
        service: input_text.set_value
      - service: logbook.log
        data:
          name: AC Auto Trace
          message: night_loop_preempted_by_new_trigger | trigger={{ trigger.platform
            if trigger is defined else 'unknown' }} | ts={{ now().strftime('%Y-%m-%d
            %H:%M:%S') }}
          entity_id: '{{ climate_ent }}'
    default: []
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ (not presence_ok) and cur_mode != ''off'' }}'
      sequence:
      - target:
          entity_id: '{{ climate_ent }}'
        data:
          hvac_mode: 'off'
        service: climate.set_hvac_mode
      - data:
          title: AC OFF (sin presencia)
          message: '{{ notif_base }} | Prev={{ cur_mode }} | R=sin_pres'
        service: '{{ notify_service }}'
    - conditions:
      - condition: template
        value_template: '{{ tin is none or tout is none }}'
      sequence: []
    - conditions:
      - condition: template
        value_template: '{{ cur_mode==''cool'' and tout < cool_emergency_outdoor_min
          }}'
      sequence:
      - target:
          entity_id: '{{ climate_ent }}'
        data:
          hvac_mode: 'off'
        service: climate.set_hvac_mode
      - data:
          title: AC OFF (cool bloqueado por frío exterior)
          message: '{{ notif_base }} | Prev=cool | R=ext_bajo | Min={{ cool_emergency_outdoor_min
            }}'
        service: '{{ notify_service }}'
    - conditions:
      - condition: template
        value_template: '{{ cur_mode==''heat'' and tout >= heat_force_off_outdoor
          }}'
      sequence:
      - target:
          entity_id: '{{ climate_ent }}'
        data:
          hvac_mode: 'off'
        service: climate.set_hvac_mode
      - data:
          title: AC OFF (heat bloqueado por exterior templado)
          message: '{{ notif_base }} | Prev=heat | R=ext_templ | Umbral={{ heat_force_off_outdoor
            }}'
        service: '{{ notify_service }}'
    - conditions:
      - condition: template
        value_template: '{{ cur_mode==''heat'' and heat_off is not none and tin>=heat_off
          }}'
      sequence:
      - target:
          entity_id: '{{ climate_ent }}'
        data:
          hvac_mode: 'off'
        service: climate.set_hvac_mode
      - data:
          title: AC AUTO OFF
          message: '{{ notif_base }} | Prev=heat | R=heat_off | On={{ heat_on }} Off={{
            heat_off }}'
        service: '{{ notify_service }}'
    - conditions:
      - condition: template
        value_template: "{{ cur_mode == 'cool'\n   and tin is not none and tout is
          not none\n   and (cool_off_reason | trim) != 'none'\n}}"
      sequence:
      - target:
          entity_id: '{{ climate_ent }}'
        data:
          hvac_mode: 'off'
        service: climate.set_hvac_mode
      - service: logbook.log
        data:
          name: AC Auto Trace
          message: cool_off_dynamic_trace | ctx={{ 'emergency' if (tout|float) < 17
            else 'normal' }} | base_off={{ cool_off }} | dp_offset={{ dp_offset }}
            | dyn_off={{ cool_normal_off_dynamic if (tout|float) >= 17 else 'n/a'
            }} | stop={{ (cool_emergency_off|float) if (tout|float) < 17 else (cool_stop_threshold|float)
            }} | reason={{ cool_off_reason | trim }}
          entity_id: '{{ climate_ent }}'
      - data:
          title: AC AUTO OFF
          message: '{{ notif_base }} | Prev=cool | Act=Off | Stop={{ (cool_emergency_off|float)
            if (tout|float) < 17 else (cool_stop_threshold|float) }} | R={{ ''cool_emergency_off''
            if (tout|float) < 17 else ''cool_off/cool_sensor_off'' }} | Source={{
            cool_off_reason | trim }} | TriggerSensor={{ cool_sensor_off_name if (cool_off_reason
            | trim) != ''Promedio'' else ''Promedio'' }} | SensorDelta={{ sensor_temp_delta
            }} | SensorColdEnabled={{ ''ON'' if cool_sensor_off_enabled else ''OFF''
            }} | Ctx={{ ''Emerg'' if (tout|float) < 17 else ''Normal'' }} | On={{
            cool_on }} | OffBase={{ cool_off }} | OffDyn={{ cool_normal_off_dynamic
            if (tout|float) >= 17 else ''n/a'' }} | Bedroom={{ bedroom_temp }} | Cold={{
            cold_sensor_name }}={{ cold_temp }} | SensorOFF={{ cool_sensor_off_name
            }}={{ cool_sensor_off_temp }}<= {{ cool_sensor_off_trigger if (tout|float)
            >= 17 else ''n/a'' }} | EOn={{ cool_emergency_on }} EOff={{ cool_emergency_off
            }} | LastUseful={{ last_effective_setpoint }} | Set={{ cool_setpoint_emerg
            if (tout|float) < 17 else cool_setpoint_normal }}'
        service: '{{ notify_service }}'
    - conditions:
      - condition: template
        value_template: "{{ cur_mode == 'cool'\n   and tout is not none\n   and (tout|float)
          < 17\n   and (tout|float) >= (cool_emergency_outdoor_min|float)\n   and
          tin is not none\n   and (cool_emergency_off is not none)\n   and (tin|float)
          > (cool_emergency_off|float)\n}}"
      sequence:
      - target:
          entity_id: '{{ climate_ent }}'
        data:
          temperature: '{{ cool_setpoint_emerg }}'
        service: climate.set_temperature
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ state_attr(climate_ent,'fan_modes') is not none and\n
              \  'Low' in state_attr(climate_ent,'fan_modes') }}"
          sequence:
          - target:
              entity_id: '{{ climate_ent }}'
            data:
              fan_mode: Low
            service: climate.set_fan_mode
        default: []
    - conditions:
      - condition: template
        value_template: "{{ heat_on is not none\n   and tin is not none and (tin|float)
          <= (heat_on|float)\n   and (tout|float) < (heat_force_off_outdoor|float)\n
          \  and cur_mode != 'heat'\n   and (not locked or last_mode_no_fan == 'heat'
          or last_mode_no_fan not in ['cool','heat'])\n}}"
      sequence:
      - target:
          entity_id: '{{ climate_ent }}'
        data:
          hvac_mode: heat
        service: climate.set_hvac_mode
      - target:
          entity_id: '{{ climate_ent }}'
        data:
          temperature: 28
        service: climate.set_temperature
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ state_attr(climate_ent,'fan_modes') is not none and\n
              \  'Low' in state_attr(climate_ent,'fan_modes') }}"
          sequence:
          - target:
              entity_id: '{{ climate_ent }}'
            data:
              fan_mode: Low
            service: climate.set_fan_mode
        default: []
      - data:
          title: AC HEAT ON
          message: '{{ notif_base }} | Act=HEAT | On={{ heat_on }} Off={{ heat_off
            }} | Set=28 Fan=Low | Prev={{ cur_mode }}'
        service: '{{ notify_service }}'
    - conditions:
      - condition: template
        value_template: "{{ night_ramp_in_progress\n   and cur_mode != 'cool'\n   and (minutes_since_last_off | float(99999)) >= (night_ramp_stale_reset_min |
          float(20))\n}}"
      sequence:
      - target:
          entity_id: input_boolean.ac_night_cool_bootstrap_in_progress
        service: input_boolean.turn_off
      - target:
          entity_id: input_text.ac_last_auto_branch
        data:
          value: cool_night_ramp_stale_flag_reset
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_auto_action
        data:
          value: ramp_flag_auto_reset
        service: input_text.set_value
      - service: logbook.log
        data:
          name: AC Auto Trace
          message: cool_night_ramp_stale_flag_reset | cur_mode={{ cur_mode }} | minutes_since_last_off={{
            (minutes_since_last_off | float(99999)) | round(2) }} | threshold={{ night_ramp_stale_reset_min
            }} | ts={{ now().strftime('%Y-%m-%d %H:%M:%S') }}
          entity_id: '{{ climate_ent }}'
    - conditions:
      - condition: template
        value_template: "{{ cur_mode != 'cool'\n   and tin is not none and tout is
          not none\n   and (\n     (\n       (tout|float) < 17\n       and (tout|float)
          >= (cool_emergency_outdoor_min|float)\n       and (cool_emergency_on is
          not none)\n       and (tin|float) >= (cool_emergency_on|float)\n     )\n
          \    or\n     (\n       (tout|float) >= 17\n       and cool_on is not none\n
          \      and (tin|float) >= (cool_on|float)\n     )\n   )\n   and (not locked
          or last_mode_no_fan == 'cool' or last_mode_no_fan not in ['cool','heat'])\n
          and (not night_ramp_in_progress)\n   and ((minutes_since_last_off | float(99999))
          >= cool_ramp_short_cycle_guard_min)\n}}"
      sequence:
      - variables:
          cool_context: '{{ ''emergency'' if ((tout|float) < 17) else ''normal'' }}'
          cool_context_bucket_selected: '{{ cool_night_context_bucket }}'
          cool_stop_threshold_selected: '{{ cool_emergency_off if ((tout|float) <
            17) else cool_stop_threshold }}'
          cool_initial_setpoint_selected: '{{ cool_setpoint_emerg if ((tout|float)
            < 17) else cool_normal_initial_setpoint_dynamic }}'
          cool_initial_setpoint_source: '{{ ''contractual_fallback'' if ((tout|float)
            < 17) else cool_normal_initial_setpoint_source }}'
          cool_learning_reference_selected: '{{ cool_setpoint_emerg if ((tout|float)
            < 17) else cool_last_useful_setpoint }}'
      - target:
          entity_id: input_boolean.ac_dda_on_por_automatizacion
        service: input_boolean.turn_on
      - target:
          entity_id: input_boolean.ac_night_cool_bootstrap_in_progress
        service: input_boolean.turn_on
      - target:
          entity_id: input_select.ac_ultimo_modo_no_fan
        data:
          option: cool
        service: input_select.select_option
      - target:
          entity_id:
          - input_datetime.ac_ultimo_cambio_modo
          - input_datetime.ac_last_auto_ts
          - input_datetime.ac_night_cool_last_bootstrap_ts
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        service: input_datetime.set_datetime
      - target:
          entity_id: input_text.ac_last_auto_branch
        data:
          value: cool_night_ramp_start
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_auto_action
        data:
          value: ramp_start
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_dda_last_change_origin
        data:
          value: auto_on
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_auto_mode
        data:
          value: cool
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_auto_fan
        data:
          value: Low
        service: input_text.set_value
      - target:
          entity_id: input_number.ac_last_auto_setpoint
        data:
          value: '{{ cool_initial_setpoint_selected | float }}'
        service: input_number.set_value
      - target:
          entity_id: '{{ climate_ent }}'
        data:
          hvac_mode: cool
        service: climate.set_hvac_mode
      - variables:
          sp_before: '{{ state_attr(climate_ent, ''temperature'') | float(none) }}'
          sp_target: '{{ cool_initial_setpoint_selected }}'
          writer_id: auto_on
          manual_lock_state: '{{ manual_sp_lock_active }}'
          bucket: '{{ cool_context }}'
      - target:
          entity_id: '{{ climate_ent }}'
        data:
          temperature: '{{ cool_initial_setpoint_selected }}'
        service: climate.set_temperature
      - variables:
          sp_after: '{{ state_attr(climate_ent, ''temperature'') | float(none) }}'
          sp_write_status: "{% if sp_after is not none and sp_target is not none and
            ((sp_after | float) - (sp_target | float)) | abs < 0.11 %}\n  applied\n{%
            else %}\n  blocked\n{% endif %}"
      - service: logbook.log
        data:
          name: AC Auto Trace
          message: sp_write | writer={{ writer_id }} | before={{ sp_before if sp_before
            is not none else 'na' }} | target={{ sp_target if sp_target is not none
            else 'na' }} | lock={{ manual_lock_state }} | blocked_by_manual_lock={{
            'yes' if manual_lock_state else 'no' }} | bucket={{ bucket if bucket is
            not none else 'na' }} | after={{ sp_after if sp_after is not none else
            'na' }} | status={{ sp_write_status }}
          entity_id: '{{ climate_ent }}'
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ state_attr(climate_ent,'fan_modes') is not none and\n
              \  'Low' in state_attr(climate_ent,'fan_modes') }}"
          sequence:
          - target:
              entity_id: '{{ climate_ent }}'
            data:
              fan_mode: Low
            service: climate.set_fan_mode
        default: []
      - service: logbook.log
        data:
          name: AC Auto Trace
          message: cool_night_ramp_start | ctx={{ cool_context }} | init={{ cool_initial_setpoint_selected
            }} | source={{ cool_initial_setpoint_source }} | bucket={{ cool_context_bucket_selected
            }} | off_dynamic={{ cool_normal_off_dynamic if cool_context == 'normal' else
            'n/a' }} | off_floor={{ ((cool_normal_off_dynamic | float) | int(0, 'floor'))
            if cool_context == 'normal' and cool_normal_off_dynamic is not none else
            'n/a' }} | setpoint_fijo_contractual={{ (((cool_normal_off_dynamic | float)
            - 1.5) | int(0, 'floor')) if cool_context == 'normal' and cool_normal_off_dynamic
            is not none else 'n/a' }} | stop={{ cool_stop_threshold_selected }} |
            learn_ref={{ cool_learning_reference_selected }} | wait_initial={{ cool_ramp_initial_wait_min
            }}m | wait_step={{ cool_ramp_followup_wait_min }}m
          entity_id: '{{ climate_ent }}'
      - variables:
          cool_push_reason: '{{ ''Mot=auto emergencia'' if cool_context == ''emergency''
            else ''Mot=auto umbral'' }}'
          cool_push_summary: Rampa térmica | Init={{ cool_initial_setpoint_selected
            }} | OffDyn={{ cool_normal_off_dynamic if cool_context == 'normal' else
            'n/a' }} | dp_offset={{ dp_offset }} | dewpoint={{ dewpoint }} | Espera={{
            cool_ramp_initial_wait_min }}m/{{ cool_ramp_followup_wait_min }}m | Stop={{
            cool_stop_threshold_selected }} | Learn={{ cool_learning_reference_selected
            }}
          cool_mobile_title_local: Cool noche
          cool_mobile_message_local: '{% set reason = cool_push_reason | default('''',
            true) | trim %} {% set summary = cool_push_summary | default('''', true)
            | trim %} {{ (reason if reason else ''Mot=sin detalle'') ~ '' | '' ~ (summary
            if summary else ''Sin detalle'') }}'
      - data:
          title: '{{ cool_mobile_title_local }}'
          message: '{{ cool_mobile_message_local }}'
          data:
            ttl: 0
            priority: high
        service: '{{ notify_service }}'
      - variables:
          loop_started_ts: '{{ as_timestamp(now()) }}'
          cool_ramp_loop_timeout_min: 180
      - repeat:
          sequence:
          - variables:
              ramp_wait_minutes: '{{ cool_ramp_initial_wait_min if repeat.index ==
                1 else cool_ramp_followup_wait_min }}'
          - delay:
              minutes: '{{ ramp_wait_minutes | int }}'
          - variables:
              loop_now_ts: '{{ as_timestamp(now()) }}'
              loop_elapsed_min: '{{ ((loop_now_ts | float) - (loop_started_ts | float(loop_now_ts)))
                / 60 }}'
              loop_within_night_window: '{{ now().hour >= 21 or now().hour < 7 }}'
              loop_t1: '{{ states(''sensor.lumi_lumi_weather_cuarto_temperatura'')
                | float(none) }}'
              loop_t2: '{{ states(''sensor.lumi_lumi_weather_coco_temperatura'') |
                float(none) }}'
              loop_hvac_mode: '{{ states(climate_ent) }}'
              loop_tin: '{% if loop_t1 is not none and loop_t2 is not none %} {{ ((loop_t1
                + loop_t2) / 2) | round(2) }} {% elif loop_t1 is not none %} {{ loop_t1
                | round(2) }} {% elif loop_t2 is not none %} {{ loop_t2 | round(2)
                }} {% else %} {{ none }} {% endif %}'
              loop_presence_ok: '{{ is_state(''binary_sensor.presencia_ok_estable'',''on'')
                }}'
              loop_sensor_temp_delta: '{% if loop_t1 is not none and loop_t2 is not
                none %} {{ ((loop_t1 - loop_t2) | abs) | round(2) }} {% else %} {{
                none }} {% endif %}'
              loop_cold_temp: '{% if loop_t1 is none and loop_t2 is none %} {{ none
                }} {% elif loop_t2 is none %} {{ loop_t1 | round(2) }} {% elif loop_t1
                is none %} {{ loop_t2 | round(2) }} {% else %} {{ (loop_t1 if loop_t1
                <= loop_t2 else loop_t2) | round(2) }} {% endif %}'
              loop_cold_sensor_name: '{% if loop_t1 is none and loop_t2 is none %}
                none {% elif loop_t2 is none %} Cuarto {% elif loop_t1 is none %}
                Sala {% else %} {{ ''Cuarto'' if loop_t1 <= loop_t2 else ''Sala''
                }} {% endif %}'
              loop_bedroom_temp: '{% if loop_t1 is not none %} {{ loop_t1 | round(2)
                }} {% elif loop_cold_temp is not none %} {{ loop_cold_temp | round(2)
                }} {% else %} {{ none }} {% endif %}'
              loop_cool_sensor_off_name: '{% if loop_bedroom_temp is not none %} Cuarto
                {% elif loop_cold_temp is not none %} {{ cold_sensor_name }} {% else
                %} none {% endif %}'
              loop_cool_sensor_off_temp: '{% if loop_bedroom_temp is not none %} {{
                loop_bedroom_temp | round(2) }} {% elif loop_cold_temp is not none
                %} {{ loop_cold_temp | round(2) }} {% else %} {{ none }} {% endif
                %}'
              loop_hot_temp: '{% if loop_t1 is none and loop_t2 is none %} {{ none
                }} {% elif loop_t2 is none %} {{ loop_t1 | round(2) }} {% elif loop_t1
                is none %} {{ loop_t2 | round(2) }} {% else %} {{ (loop_t1 if loop_t1
                >= loop_t2 else loop_t2) | round(2) }} {% endif %}'
              loop_cool_sensor_off_enabled: '{% if loop_sensor_temp_delta is none
                %} {{ true }} {% else %} {{ (loop_sensor_temp_delta | float(99)) <=
                (cool_sensor_off_delta_max | float(1)) }} {% endif %}'
              loop_asymmetric_off_ready: '{% if cool_off is none or loop_cold_temp
                is none or loop_hot_temp is none %} {{ false }} {% else %} {{ (loop_cold_temp
                | float) <= (cool_off | float) and (((loop_hot_temp | float) - (loop_cold_temp
                | float)) >= (cool_asymmetry_delta_trigger | float(1))) }} {% endif
                %}'
              loop_cool_off_reason: '{% if loop_hvac_mode != ''cool'' or loop_tin
                is none or tout is none %} none {% elif (tout|float) < 17 and (tout|float)
                >= (cool_emergency_outdoor_min|float) and (cool_emergency_off is not
                none) and (loop_tin|float) <= (cool_emergency_off|float) %} Promedio
                {% elif (tout|float) >= 17 and (cool_off is not none) %} {% if (loop_tin|float)
                <= (cool_off|float) %} Promedio {% elif loop_asymmetric_off_ready
                %} Asimetria_1C {% elif loop_cool_sensor_off_enabled and (loop_cool_sensor_off_temp
                is not none) and (cool_sensor_off_trigger is not none) and ((loop_cool_sensor_off_temp|float)
                <= (cool_sensor_off_trigger|float)) %} {{ loop_cool_sensor_off_name
                }} {% else %} none {% endif %} {% else %} none {% endif %}'
              loop_setpoint: '{{ state_attr(climate_ent, ''temperature'') | float(cool_initial_setpoint_selected)
                }}'
              loop_cycle_active: '{{ loop_hvac_mode == ''cool'' and loop_presence_ok
                and loop_tin is not none and cool_stop_threshold_selected is not none
                and (loop_tin|float) > (cool_stop_threshold_selected|float) }}'
              loop_bedroom_comfort_reached: '{% if loop_cool_sensor_off_temp is none
                or cool_sensor_off_trigger is none %} {{ false }} {% else %} {{ (loop_cool_sensor_off_temp
                | float) <= (cool_sensor_off_trigger | float) }} {% endif %}'
              loop_high_delta_block: '{% if loop_sensor_temp_delta is none %} {{ false
                }} {% else %} {{ (loop_sensor_temp_delta | float(99)) > (cool_sensor_off_delta_max
                | float(1)) }} {% endif %}'
              loop_no_more_cooldown: '{{ loop_high_delta_block or loop_bedroom_comfort_reached
                }}'
              loop_can_reduce: '{{ false }}'
              loop_next_setpoint: '{{ loop_setpoint }}'
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ not loop_within_night_window }}'
              sequence:
              - target:
                  entity_id: input_text.ac_last_auto_branch
                data:
                  value: cool_night_ramp_window_exit
                service: input_text.set_value
              - target:
                  entity_id: input_text.ac_last_auto_action
                data:
                  value: ramp_window_exit
                service: input_text.set_value
              - service: logbook.log
                data:
                  name: AC Auto Trace
                  message: cool_night_ramp_window_exit | idx={{ repeat.index }} |
                    elapsed={{ loop_elapsed_min | round(1) }}m
                  entity_id: '{{ climate_ent }}'
              - target:
                  entity_id: input_boolean.ac_night_cool_bootstrap_in_progress
                service: input_boolean.turn_off
              - target:
                  entity_id: input_boolean.ac_dda_on_por_automatizacion
                service: input_boolean.turn_off
              - stop: Rampa detenida por salir de la ventana 22:00-06:59.
            - conditions:
              - condition: template
                value_template: '{{ (loop_elapsed_min | float(0)) >= (cool_ramp_loop_timeout_min
                  | float(0)) }}'
              sequence:
              - target:
                  entity_id: input_text.ac_last_auto_branch
                data:
                  value: cool_night_ramp_timeout_exit
                service: input_text.set_value
              - target:
                  entity_id: input_text.ac_last_auto_action
                data:
                  value: ramp_timeout_exit
                service: input_text.set_value
              - service: logbook.log
                data:
                  name: AC Auto Trace
                  message: cool_night_ramp_timeout_exit | idx={{ repeat.index }} |
                    elapsed={{ loop_elapsed_min | round(1) }}m | set={{ loop_setpoint
                    }}
                  entity_id: '{{ climate_ent }}'
              - target:
                  entity_id: input_boolean.ac_night_cool_bootstrap_in_progress
                service: input_boolean.turn_off
              - target:
                  entity_id: input_boolean.ac_dda_on_por_automatizacion
                service: input_boolean.turn_off
              - stop: Rampa detenida por timeout de seguridad.
            - conditions:
              - condition: template
                value_template: '{{ not loop_presence_ok }}'
              sequence:
              - target:
                  entity_id: input_text.ac_last_auto_branch
                data:
                  value: cool_night_ramp_presence_exit
                service: input_text.set_value
              - target:
                  entity_id: input_text.ac_last_auto_action
                data:
                  value: ramp_presence_exit
                service: input_text.set_value
              - service: logbook.log
                data:
                  name: AC Auto Trace
                  message: cool_night_ramp_presence_exit | idx={{ repeat.index }}
                    | set={{ loop_setpoint }} | tin={{ loop_tin }}
                  entity_id: '{{ climate_ent }}'
              - target:
                  entity_id: input_boolean.ac_night_cool_bootstrap_in_progress
                service: input_boolean.turn_off
              - target:
                  entity_id: input_boolean.ac_dda_on_por_automatizacion
                service: input_boolean.turn_off
              - stop: Rampa detenida por pérdida de presencia.
            - conditions:
              - condition: template
                value_template: '{{ loop_hvac_mode != ''cool'' }}'
              sequence:
              - target:
                  entity_id: input_text.ac_last_auto_branch
                data:
                  value: cool_night_ramp_hvac_exit
                service: input_text.set_value
              - target:
                  entity_id: input_text.ac_last_auto_action
                data:
                  value: ramp_hvac_exit
                service: input_text.set_value
              - service: logbook.log
                data:
                  name: AC Auto Trace
                  message: cool_night_ramp_hvac_exit | idx={{ repeat.index }} | hvac={{
                    loop_hvac_mode }} | set={{ loop_setpoint }}
                  entity_id: '{{ climate_ent }}'
              - target:
                  entity_id: input_boolean.ac_night_cool_bootstrap_in_progress
                service: input_boolean.turn_off
              - target:
                  entity_id: input_boolean.ac_dda_on_por_automatizacion
                service: input_boolean.turn_off
              - stop: Rampa detenida porque el equipo salió de cool.
            - conditions:
              - condition: template
                value_template: '{{ (loop_cool_off_reason | trim) != ''none'' }}'
              sequence:
              - target:
                  entity_id: input_number.ac_night_cool_last_effective_setpoint
                data:
                  value: '{{ loop_setpoint }}'
                service: input_number.set_value
              - target:
                  entity_id: input_text.ac_night_cool_last_effective_bucket
                data:
                  value: '{{ cool_context_bucket_selected }}'
                service: input_text.set_value
              - target:
                  entity_id: input_datetime.ac_night_cool_last_effective_ts
                data:
                  datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
                service: input_datetime.set_datetime
              - target:
                  entity_id: input_number.ac_last_auto_setpoint
                data:
                  value: '{{ loop_setpoint }}'
                service: input_number.set_value
              - target:
                  entity_id: input_text.ac_last_auto_branch
                data:
                  value: cool_night_ramp_ready_for_comfort_off
                service: input_text.set_value
              - target:
                  entity_id: input_text.ac_last_auto_action
                data:
                  value: ramp_ready_for_off
                service: input_text.set_value
              - service: logbook.log
                data:
                  name: AC Auto Trace
                  message: cool_night_ramp_ready_for_comfort_off | idx={{ repeat.index
                    }} | useful_set={{ loop_setpoint }} | bucket={{ cool_context_bucket_selected
                    }} | source=effective_memory | tin={{ loop_tin }} | stop={{ cool_stop_threshold_selected
                    }} | reason={{ loop_cool_off_reason | trim }} | sensor_off={{ loop_cool_sensor_off_temp
                    }}
                  entity_id: '{{ climate_ent }}'
              - target:
                  entity_id: input_boolean.ac_night_cool_bootstrap_in_progress
                service: input_boolean.turn_off
              - target:
                  entity_id: input_boolean.ac_dda_on_por_automatizacion
                service: input_boolean.turn_off
              - stop: Rampa detenida; sigue apagado normal por confort.
            - conditions:
              - condition: template
                value_template: '{{ loop_can_reduce }}'
              sequence:
              - target:
                  entity_id: input_text.ac_last_auto_branch
                data:
                  value: cool_night_setpoint_fijo_contractual
                service: input_text.set_value
              - target:
                  entity_id: input_text.ac_last_auto_action
                data:
                  value: setpoint_fijo_contractual
                service: input_text.set_value
              - service: logbook.log
                data:
                  name: AC Auto Trace
                  message: cool_night_setpoint_fijo_contractual | idx={{ repeat.index
                    }} | wait={{ ramp_wait_minutes }}m | set={{ loop_setpoint }} |
                    tin={{ loop_tin }} | stop={{ cool_stop_threshold_selected }} |
                    sensor_off={{ loop_cool_sensor_off_temp }}
                  entity_id: '{{ climate_ent }}'
            default:
            - target:
                entity_id: input_text.ac_last_auto_branch
              data:
                value: cool_night_ramp_hold
              service: input_text.set_value
            - target:
                entity_id: input_text.ac_last_auto_action
              data:
                value: ramp_hold
              service: input_text.set_value
            - service: logbook.log
              data:
                name: AC Auto Trace
                message: cool_night_ramp_hold | idx={{ repeat.index }} | set={{ loop_setpoint
                  }} | tin={{ loop_tin }} | stop={{ cool_stop_threshold_selected }}
                  | reason={{ loop_cool_off_reason | trim }} | no_more={{ loop_no_more_cooldown
                  }} | delta={{ loop_sensor_temp_delta }} | comfort={{ loop_bedroom_comfort_reached
                  }}
                entity_id: '{{ climate_ent }}'
          until:
          - condition: template
            value_template: '{{ false }}'
      - target:
          entity_id: input_boolean.ac_night_cool_bootstrap_in_progress
        service: input_boolean.turn_off
      - wait_template: '{{ is_state(''climate.0200009211c7_climate'', ''cool'') }}'
        timeout: 00:00:30
        continue_on_timeout: true
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ is_state(''climate.0200009211c7_climate'', ''cool'') }}'
          sequence:
          - target:
              entity_id: input_boolean.ac_dda_on_por_automatizacion
            service: input_boolean.turn_off
          - service: logbook.log
            data:
              name: AC Auto Trace
              message: transition_closed=ok | hvac_confirmed=cool
              entity_id: climate.0200009211c7_climate
        default:
        - service: logbook.log
          data:
            name: AC Auto Trace
            message: transition_closed=timeout | hvac_expected=cool
            entity_id: climate.0200009211c7_climate
    default: []
  mode: restart
  variables:
    climate_ent: climate.0200009211c7_climate
    notify_service: notify.mobile_app_samsung_s24
    t1: '{{ states(''sensor.lumi_lumi_weather_cuarto_temperatura'')|float(none) }}'
    t2: '{{ states(''sensor.lumi_lumi_weather_coco_temperatura'')|float(none) }}'
    h1: '{{ states(''sensor.lumi_lumi_weather_cuarto_humedad'')|float(none) }}'
    h2: '{{ states(''sensor.lumi_lumi_weather_coco_humedad'')|float(none) }}'
    tin: "{% if t1 is not none and t2 is not none %}\n  {{ ((t1 + t2) / 2) | round(2)
      }}\n{% elif t1 is not none %}\n  {{ t1 | round(2) }}\n{% elif t2 is not none
      %}\n  {{ t2 | round(2) }}\n{% else %}\n  {{ none }}\n{% endif %}"
    hin: "{% if h1 is not none and h2 is not none %}\n  {{ ((h1 + h2) / 2) | round(1)
      }}\n{% elif h1 is not none %}\n  {{ h1 | round(1) }}\n{% elif h2 is not none
      %}\n  {{ h2 | round(1) }}\n{% else %}\n  {{ none }}\n{% endif %}"
    hot_temp: "{% if t1 is none and t2 is none %}\n  {{ none }}\n{% elif t2 is none
      %}\n  {{ t1 | round(2) }}\n{% elif t1 is none %}\n  {{ t2 | round(2) }}\n{%
      else %}\n  {{ (t1 if t1 >= t2 else t2) | round(2) }}\n{% endif %}"
    hot_sensor_name: "{% if t1 is none and t2 is none %}\n  none\n{% elif t2 is none
      %}\n  Cuarto\n{% elif t1 is none %}\n  Sala\n{% else %}\n  {{ 'Cuarto' if t1
      >= t2 else 'Sala' }}\n{% endif %}"
    cold_temp: "{% if t1 is none and t2 is none %}\n  {{ none }}\n{% elif t2 is none
      %}\n  {{ t1 | round(2) }}\n{% elif t1 is none %}\n  {{ t2 | round(2) }}\n{%
      else %}\n  {{ (t1 if t1 <= t2 else t2) | round(2) }}\n{% endif %}"
    cold_sensor_name: "{% if t1 is none and t2 is none %}\n  none\n{% elif t2 is none
      %}\n  Cuarto\n{% elif t1 is none %}\n  Sala\n{% else %}\n  {{ 'Cuarto' if t1
      <= t2 else 'Sala' }}\n{% endif %}"
    bedroom_temp: "{% if t1 is not none %}\n  {{ t1 | round(2) }}\n{% elif cold_temp
      is not none %}\n  {{ cold_temp | round(2) }}\n{% else %}\n  {{ none }}\n{% endif
      %}"
    dewpoint: "{% if tin is none or hin is none %}\n  {{ none }}\n{% else %}\n  {%
      set T = tin|float %}\n  {% set RH = hin|float %}\n  {% set a = 17.62 %}\n  {%
      set b = 243.12 %}\n  {% set gamma = (a*T/(b+T)) + (RH/100)|log %}\n  {{ ((b*gamma)/(a-gamma))
      | round(2) }}\n{% endif %}"
    dp_offset: "{% if dewpoint is none %}\n  {{ 0 }}\n{% else %}\n  {% set dp = dewpoint|float
      %}\n  {% if dp >= 20 %}\n    {{ -0.6 }}\n  {% elif dp >= 18 %}\n    {{ -0.4
      }}\n  {% elif dp >= 16 %}\n    {{ -0.2 }}\n  {% elif dp >= 14 %}\n    {{ -0.1
      }}\n  {% else %}\n    {{ 0 }}\n  {% endif %}\n{% endif %}"
    tout_owm: '{{ state_attr(''weather.openweathermap'',''temperature'') | float(none) }}'
    hout_owm: '{{ state_attr(''weather.openweathermap'',''humidity'') | float(none) }}'
    cond_owm: '{{ states(''weather.openweathermap'') | lower }}'
    tout: '{{ tout_owm if tout_owm is not none else none }}'
    wind_kmh: '{{ state_attr(''weather.openweathermap'',''wind_speed'')|float(0) }}'
    wind: '{{ (wind_kmh / 3.6) | round(2) }}'
    month: '{{ now().month }}'
    cur_mode: '{{ states(climate_ent) }}'
    locked: '{{ is_state(''input_boolean.ac_bloqueo_cambio_modo_2h'',''on'') }}'
    last_mode_no_fan: '{{ states(''input_select.ac_ultimo_modo_no_fan'') }}'
    presence_ok: '{{ is_state(''binary_sensor.presencia_ok_estable'',''on'') }}'
    sensor_temp_delta: "{% if t1 is not none and t2 is not none %}\n  {{ ((t1 - t2)
      | abs) | round(2) }}\n{% else %}\n  {{ none }}\n{% endif %}"
    cool_sensor_off_delta_max: 1.0
    cool_sensor_off_enabled: "{% if sensor_temp_delta is none %}\n  {{ true }}\n{%
      else %}\n  {{ (sensor_temp_delta | float(99)) <= (cool_sensor_off_delta_max
      | float(1)) }}\n{% endif %}"
    night_ramp_in_progress: '{{ is_state(''input_boolean.ac_night_cool_bootstrap_in_progress'',''on'')
      }}'
    last_off_ts: '{{ state_attr(''input_datetime.ac_ultimo_apagado'', ''timestamp'')
      | float(0) }}'
    minutes_since_last_off: '{{ ((as_timestamp(now()) - last_off_ts) / 60) if last_off_ts
      else 99999 }}'
    night_ramp_stale_reset_min: 20
    last_effective_ts: '{{ state_attr(''input_datetime.ac_night_cool_last_effective_ts'',
      ''timestamp'') | float(0) }}'
    hours_since_last_effective: '{{ ((as_timestamp(now()) - last_effective_ts) / 3600)
      if last_effective_ts else 99999 }}'
    last_effective_setpoint: '{{ states(''input_number.ac_night_cool_last_effective_setpoint'')
      | float(none) }}'
    last_effective_bucket: '{{ states(''input_text.ac_night_cool_last_effective_bucket'')
      | default('''', true) | trim }}'
    cool_last_useful_memory_hours: 72
    cool_ramp_short_cycle_guard_min: 8
    cool_ramp_step: 0.2
    cool_ramp_initial_wait_min: 30
    cool_ramp_followup_wait_min: 10
    cool_ramp_min_setpoint: 20
    heat_force_off_outdoor: 20
    cool_emergency_outdoor_min: 8
    cool_emergency_on_base: 24
    cool_emergency_on: '{{ (cool_emergency_on_base + (dp_offset|float)) | round(2)
      }}'
    cool_emergency_off: '{{ (cool_emergency_on|float - 0.3) | round(2) }}'
    cool_setpoint_emerg: '{{ max(((cool_emergency_off|float) - 2) | round(0,''floor''),
      16) | int }}'
    cool_on: "{% if tout is none %}\n  {{ none }}\n{% elif tout >= 17 %}\n  {{ 23.5
      if month in [11,12,1,2,3] else 22.8 if (month in [6,7,8,9] and tout>=30) else
      23.3 }}\n{% else %}\n  {{ none }}\n{% endif %}"
    cool_off: "{% if cool_on is none %}\n  {{ none }}\n{% else %}\n  {{ 23.0 if month
      in [11,12,1,2,3] else 21.3 if (month in [6,7,8,9] and tout>=30) else 22.5 }}\n{%
      endif %}"
    cool_normal_off_min: 20.8
    cool_normal_off_max: 23.4
    cool_normal_off_dynamic: "{% if cool_off is none %}\n  {{ none }}\n{% else %}\n
      \ {% set base_off = cool_off | float %}\n  {% set humidity_adjustment = dp_offset
      | float(0) %}\n  {% set raw_off = base_off + humidity_adjustment %}\n  {{ [[raw_off,
      cool_normal_off_max | float] | min, cool_normal_off_min | float] | max | round(2)
      }}\n{% endif %}"
    cool_night_branch: cool_night_ramp
    cool_night_context_bucket: '{{ cool_night_branch ~ '':'' ~ (''emergency'' if ((tout|float)
      < 17) else ''normal'') }}'
    cool_normal_initial_setpoint_dynamic: "{% if cool_normal_off_dynamic is none %}\n
      \ {{ none }}\n{% else %}\n  {% set sp_raw = (cool_normal_off_dynamic | float)
      - 1.5 %}\n  {% set sp_int = sp_raw | int(0, 'floor') %}\n  {% set sp_contractual
      = [sp_int, (cool_ramp_min_setpoint | float)] | max %}\n  {# Contrato entero:
      23.3 -> 21, 23.5 -> 22 #}\n  {{ sp_contractual | int }}\n{% endif %}"
    cool_stop_threshold: '{{ cool_normal_off_dynamic if (tout is not none and (tout|float)
      >= 17) else cool_off }}'
    cool_last_useful_base_setpoint: "{% if cool_stop_threshold is none %}\n  {{ none
      }}\n{% else %}\n  {{ [((cool_stop_threshold | float) - 1.0), cool_ramp_min_setpoint]
      | max | round(1) }}\n{% endif %}"
    cool_last_useful_setpoint: "{% set memory_recent = last_effective_setpoint is not
      none and (hours_since_last_effective | float(99999)) <= (cool_last_useful_memory_hours
      | float) %}\n{% set memory_bucket_match = (last_effective_bucket == cool_night_context_bucket)
      %}\n{% set memory_consistent = memory_recent and memory_bucket_match and cool_last_useful_base_setpoint
      is not none and ((((last_effective_setpoint | float) - (cool_last_useful_base_setpoint
      | float)) | abs) <= 0.7) %}\n{% if cool_last_useful_base_setpoint is none %}\n
      \ {{ none }}\n{% elif memory_consistent %}\n  {{ last_effective_setpoint | float
      | round(1) }}\n{% else %}\n  {{ cool_last_useful_base_setpoint | float | round(1)
      }}\n{% endif %}"
    cool_normal_initial_setpoint_source: "{% set memory_recent = last_effective_setpoint
      is not none and (hours_since_last_effective | float(99999)) <= (cool_last_useful_memory_hours
      | float) %}\n{% set memory_bucket_match = (last_effective_bucket == cool_night_context_bucket)
      %}\n{% set memory_consistent = memory_recent and memory_bucket_match and cool_last_useful_base_setpoint
      is not none and ((((last_effective_setpoint | float) - (cool_last_useful_base_setpoint
      | float)) | abs) <= 0.7) %}\n{{ 'effective_memory' if memory_consistent else
      'contractual_fallback' }}"
    cool_ramp_initial_setpoint: "{% if cool_last_useful_base_setpoint is none %}\n
      \  {{ none }}\n{% else %}\n  {{ cool_last_useful_base_setpoint | float | round(1)
      }}\n{% endif %}"
    cool_setpoint_normal: '{{ cool_last_useful_setpoint }}'
    cool_sensor_off_trigger: "{% if cool_off is none %}\n  {{ none }}\n{% elif month
      in [11,12,1,2,3] %}\n  {{ 23.2 }}\n{% else %}\n  {{ cool_off | round(1) }}\n{%
      endif %}"
    cool_sensor_off_temp: "{% if bedroom_temp is not none %}\n  {{ bedroom_temp |
      round(2) }}\n{% elif cold_temp is not none %}\n  {{ cold_temp | round(2) }}\n{%
      else %}\n  {{ none }}\n{% endif %}"
    cool_asymmetry_delta_trigger: 1.0
    cool_asymmetric_off_ready: "{% if cool_off is none or cold_temp is none or hot_temp
      is none %}\n  {{ false }}\n{% else %}\n  {{ (cold_temp | float) <= (cool_off
      | float) and (((hot_temp | float) - (cold_temp | float)) >= (cool_asymmetry_delta_trigger
      | float(1))) }}\n{% endif %}"
    cool_sensor_off_name: "{% if bedroom_temp is not none %}\n  Cuarto\n{% elif cold_sensor_name
      is not none %}\n  {{ loop_cold_sensor_name }}\n{% else %}\n  none\n{% endif
      %}"
    cool_off_reason: "{% if cur_mode != 'cool' or tin is none or tout is none %}\n
      \  none\n{% elif (tout|float) < 17 and (tout|float) >= (cool_emergency_outdoor_min|float)
      and (cool_emergency_off is not none) and (tin|float) <= (cool_emergency_off|float)
      %}\n  Promedio\n{% elif (tout|float) >= 17 and (cool_stop_threshold is not none)
      %}\n  {% if (tin|float) <= (cool_stop_threshold|float) %}\n    Promedio\n  {%
      elif cool_asymmetric_off_ready %}\n    Asimetria_1C\n  {% elif cool_sensor_off_enabled
      and (cool_sensor_off_temp is not none) and (cool_sensor_off_trigger is not none)
      and ((cool_sensor_off_temp|float) <= (cool_sensor_off_trigger|float)) %}\n    {{
      cool_sensor_off_name }}\n  {% else %}\n    none\n  {% endif %}\n{% else %}\n
      \ none\n{% endif %}"
    cool_emergency_active: "{{ tout is not none and tin is not none\n   and (tout|float)
      < 17\n   and (tout|float) >= (cool_emergency_outdoor_min|float)\n   and (\n
      \    (tin|float) >= (cool_emergency_on|float)\n     or (cur_mode == 'cool' and
      (tin|float) > (cool_emergency_off|float))\n   )\n}}"
    heat_on: "{% if tout is none %}\n  {{ none }}\n{% else %}\n  {% set base = 23.0
      if tout <= 5 else 22.0 if tout >= 17 else (23.0 - ((tout-5)/12)) %}\n  {{ (base
      + min(wind*0.05,0.8)) | round(2) }}\n{% endif %}"
    heat_off: '{{ (heat_on + 2) if heat_on is not none else none }}'
    auto_off_marker_nonce: '{{ now().strftime(''%Y%m%d%H%M%S%f'') }}'
    manual_on_session_ttl_s: 110
    manual_on_active_session_raw: '{{ states(''input_text.ac_dda_manual_on_active_session'') | default('''', true) | trim }}'
    manual_on_session_trace_id: "{% set parsed = manual_on_active_session_raw | regex_findall_index('trace_id=([^|]+)', 0) %}{{ parsed if parsed is not none and parsed | string | length > 0 else 'trace_missing' }}"
    manual_on_session_status: "{% set parsed = manual_on_active_session_raw | regex_findall_index('status=([^|]+)', 0) %}{{ parsed if parsed is not none and parsed | string | length > 0 else 'closed' }}"
    manual_on_session_branch: "{% set parsed = manual_on_active_session_raw | regex_findall_index('branch=([^|]+)', 0) %}{{ parsed if parsed is not none and parsed | string | length > 0 else 'unknown' }}"
    manual_on_session_started_ts_raw: "{% set parsed = manual_on_active_session_raw | regex_findall_index('started_ts=([^|]+)', 0) %}{{ parsed if parsed is not none and parsed | string | length > 0 else '' }}"
    manual_on_session_started_epoch: "{% if manual_on_session_started_ts_raw | trim | length == 0 %}{{ none }}{% else %}{{ as_timestamp(manual_on_session_started_ts_raw, default=none) }}{% endif %}"
    manual_on_session_age_s: "{% if manual_on_session_started_epoch is none %}99999{% else %}{{ (as_timestamp(now()) - (manual_on_session_started_epoch | float)) | round(1) }}{% endif %}"
    manual_on_session_ttl_valid: '{{ manual_on_session_age_s | float(99999) >= 0 and manual_on_session_age_s | float(99999) <= (manual_on_session_ttl_s | float(110)) }}'
    manual_on_session_active: '{{ manual_on_session_status in [''detected'', ''pending'', ''captured''] and manual_on_session_trace_id != ''trace_missing'' }}'
    manual_on_session_protected: '{{ manual_on_session_active and manual_on_session_ttl_valid }}'
    trig: "{% if trigger is defined %}\n  {% if trigger.platform == 'time_pattern'
      %}\n    t(/5)\n  {% elif trigger.platform == 'state' %}\n    s:{{ trigger.entity_id.split('.')[-1]
      }}=>{{ trigger.to_state.state if trigger.to_state else 'n/a' }}\n  {% else %}\n
      \   {{ trigger.platform }}\n  {% endif %}\n{% else %}\n  manual\n{% endif %}"
    notif_base: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }} | Trig={{ trig }} | C_T={{
      t1 }}°C S_T={{ t2 }}°C PromT={{ tin }}°C | C_H={{ h1 }}% S_H={{ h2 }}% PromH={{
      hin }}% | DP={{ dewpoint }}°C | Ext={{ tout }}°C V={{ wind }}m/s | Pres={{ ''ON''
      if presence_ok else ''OFF'' }} | Lock={{ ''ON'' if locked else ''OFF'' }} |
      Last={{ last_mode_no_fan }}'
- id: '1768159303322'
  alias: AC - Día dinámico aprendido (principal)
  trace:
    stored_traces: 50
  description: 'Automatización principal diurna 07:01–21:59. Usa fórmula base + sesgos
    aprendidos. Respeta presencia jerárquica, pausa manual de 5 min, presencia temporal
    por encendido manual y aprendizaje por feedback. Presencia telefónica limitada a
    `device_tracker.samsung_s24` y `person.ivan`. En `input_select.ac_ultimo_modo_no_fan`,
    `off` representa reposo/sin modo recordado; no se usa `idle`.

    '
  trigger:
  - platform: time_pattern
    minutes: /5
  - platform: state
    entity_id:
    - weather.openweathermap
    - sensor.lumi_lumi_weather_cuarto_temperatura
    - sensor.lumi_lumi_weather_coco_temperatura
    - sensor.lumi_lumi_weather_cuarto_humedad
    - sensor.lumi_lumi_weather_coco_humedad
    - binary_sensor.presencia_ok_estable
    - binary_sensor.presencia_movimiento_estable
    - device_tracker.samsung_s24
    - person.ivan
    - input_boolean.ac_bloqueo_cambio_modo_2h
    - input_select.ac_ultimo_modo_no_fan
  condition:
  - condition: time
    after: 07:01:00
    before: '21:59:00'
  action:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ cool_main_control_error }}'
      sequence:
      - service: logbook.log
        data:
          name: AC Main
          message: '{{ cool_main_control_audit }}'
          entity_id: climate.0200009211c7_climate
      - data:
          title: AC ctrl!
          message: '{{ cool_main_control_audit }}'
          data:
            ttl: 0
            priority: high
        service: notify.mobile_app_samsung_s24
    - conditions:
      - condition: template
        value_template: '{{ cool_main_control_blocked }}'
      sequence:
      - service: logbook.log
        data:
          name: AC Main
          message: '{{ cool_main_control_audit }}'
          entity_id: climate.0200009211c7_climate
    - conditions:
      - condition: template
        value_template: '{{ cur_mode == ''off'' and last_mode_no_fan == ''emergency_cool''
          and (minutes_since_last_auto | float(99999)) > 2 }}'
      sequence:
      - target:
          entity_id: input_select.ac_ultimo_modo_no_fan
        data:
          option: 'off'
        service: input_select.select_option
      - service: logbook.log
        data:
          name: AC Auto Trace
          message: latch_emergency_cleared | reason=ac_off | last_mode_no_fan={{ last_mode_no_fan
            }}
          entity_id: climate.0200009211c7_climate
    - conditions:
      - condition: template
        value_template: '{{ presence_away_30m and cur_mode != ''off'' and (not manual_override_active)
          }}'
      sequence:
      - service: logbook.log
        data:
          name: AC DDA Audit
          message: ac_dda_branch=presence_off | trigger={{ trig }} | mode={{ cur_mode }} | presence_source={{ presence_source }}
          entity_id: climate.0200009211c7_climate
      - variables:
          cool_cycle_contract_snapshot: >-
            Calc={{ cool_cycle_contract_reason if cool_cycle_contract_reason not in ['', 'unknown', 'unavailable', 'none'] else cool_off_learning_source }}
            | Bucket={{ cool_cycle_contract_bucket if cool_cycle_contract_bucket not in ['', 'unknown', 'unavailable', 'none'] else cool_context_detail }}
            | On={{ cool_cycle_contract_on if cool_cycle_contract_on is not none else 'n/a' }}
            | Off={{ cool_cycle_contract_off if cool_cycle_contract_off is not none else 'n/a' }}
            | OffSensor={{ cool_cycle_contract_sensor_off if cool_cycle_contract_sensor_off is not none else 'n/a' }}
            | SP={{ cool_cycle_contract_setpoint_effective if cool_cycle_contract_setpoint_effective is not none else 'n/a' }}
          cool_cycle_real_off_cause: ausencia
          cool_cycle_real_off_detail: >-
            Modo={{ cur_mode }} | Aus=30m
          cool_cycle_branch: presence_off
          cool_cycle_hito_ts: '{{ now().isoformat() }}'
          cool_cycle_final_title: Cool↓
          cool_cycle_final_message: >-
            {{ now().strftime('%I:%M %p') | regex_replace('^0','') }}
            Tin={{ '%.1f' | format(tin | float) if tin is not none else 'n/a' }}
            Tout={{ '%.1f' | format(tout | float) if tout is not none else 'n/a' }}
            H={{ '%.0f' | format(hin | float) if hin is not none else 'n/a' }}
            On={{ '%.1f' | format(cool_cycle_contract_on_validated | float) if cool_cycle_contract_on_validated is not none and (cool_cycle_contract_on_validated | float) >= 17 else 'n/a' }}
            Off={{ '%.1f' | format(cool_cycle_contract_off_validated | float) if cool_cycle_contract_off_validated is not none and (cool_cycle_contract_off_validated | float) >= 17 else 'n/a' }}
            SP={{ '%.1f' | format(cool_cycle_contract_setpoint_effective | float) if cool_cycle_contract_setpoint_effective is not none else 'n/a' }}
            Fan={{ ac_fan if ac_fan not in ['', 'unknown', 'unavailable', 'none'] else 'n/a' }}
            Src=AutoOFF Delta=n/a Resultado=aplicado Razón={{ cool_cycle_real_off_cause }}
      - target:
          entity_id:
          - input_boolean.ac_dda_off_por_automatizacion
          - input_boolean.ac_dda_cycle_lock
        service: input_boolean.turn_on
      - target:
          entity_id: input_datetime.ac_dda_cycle_lock_since
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        service: input_datetime.set_datetime
      - target:
          entity_id: input_text.ac_dda_transition_token
        data:
          value: '{{ now().strftime(''%Y%m%d%H%M%S%f'') }}-auto-off'
        service: input_text.set_value
      - target:
          entity_id: input_datetime.ac_dda_transition_ts
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        service: input_datetime.set_datetime
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ cur_mode == ''cool'' }}'
          sequence:
          - service: logbook.log
            data:
              name: AC Auto Trace
              message: hito=entrada_fan_only | {{ cool_cycle_final_message }}
              entity_id: climate.0200009211c7_climate
          - target:
              entity_id: climate.0200009211c7_climate
            data:
              hvac_mode: fan_only
            service: climate.set_hvac_mode
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ state_attr(climate_ent,''fan_modes'') is not none   and
                  ''Low'' in state_attr(climate_ent,''fan_modes'') }}'
              sequence:
              - target:
                  entity_id: climate.0200009211c7_climate
                data:
                  fan_mode: Low
                service: climate.set_fan_mode
            default: []
          - delay: '{{ fan_dry_delay }}'
          - service: logbook.log
            data:
              name: AC Auto Trace
              message: hito=fan_dry_delay_finalizado | delay={{ fan_dry_delay }} |
                {{ cool_cycle_final_message }}
              entity_id: climate.0200009211c7_climate
        default: []
      - target:
          entity_id:
          - input_datetime.ac_ultimo_apagado
          - input_datetime.ac_last_auto_ts
        data:
          datetime: '{{ ts }}'
        service: input_datetime.set_datetime
      - target:
          entity_id: input_text.ac_last_auto_branch
        data:
          value: presence_off
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_auto_action
        data:
          value: auto_off
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_dda_last_change_origin
        data:
          value: auto_off
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_auto_mode
        data:
          value: '{{ cur_mode }}'
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_auto_fan
        data:
          value: '{{ ac_fan }}'
        service: input_text.set_value
      - target:
          entity_id: input_number.ac_last_auto_tin
        data:
          value: '{{ tin if tin is not none else 0 }}'
        service: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_t1
        data:
          value: '{{ t1 if t1 is not none else 0 }}'
        service: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_t2
        data:
          value: '{{ t2 if t2 is not none else 0 }}'
        service: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_hin
        data:
