      contract_context_delta_on: '{{ states(contract_context_delta_on_helper) | float(0) }}'
      contract_context_delta_on_after_normal: '{{ [[((contract_context_delta_on | float(0)) + ((learning_step | float) * 0.08)), 0.55] | min, -0.55] | max | round(2) }}'
      normal_hysteresis_after: "{% set base = 0.52 %}{% set raw = (base + (contract_context_delta_on_after_normal | float(0))) %}{{ [[raw, 1.1] | min, 0.35] | max | round(2) }}"
      normal_on_after: "{% if context_after_normal is none %}{{ none }}{% else %}{{ [[((context_after_normal | float) + (normal_hysteresis_after | float)), 26.2] | min, ((context_after_normal | float) + 0.35)] | max | round(2) }}{% endif %}"
      tin_outside_current_contract: '{{ tin is not none and contract_cycle_valid and ((tin | float) < (contract_cycle_off | float) or (tin | float) > (contract_cycle_on | float)) }}'
      tin_outside_normal_adjusted: '{{ tin is not none and normal_on_after is not none and context_after_normal is not none and ((tin | float) < (context_after_normal | float) or (tin | float) > (normal_on_after | float)) }}'
      hard_learning_applicable: '{{ learning_gate_ok and (not event_already_processed) and final_mode_cool_required and tin_outside_current_contract and tin_outside_normal_adjusted }}'
      hard_new_on_raw: '{{ tin | round(2) if tin is not none else none }}'
      hard_new_off_raw: '{{ ((tin | float) - 0.5) | round(2) if tin is not none else none }}'
      hard_new_off_clamped: '{{ [[hard_new_off_raw | float(22.0), 25.7] | min, 22.0] | max | round(2) if hard_new_off_raw is not none else none }}'
      hard_new_on_max_clamped: '{{ [hard_new_on_raw | float(26.2), 26.2] | min | round(2) if hard_new_on_raw is not none else none }}'
      hard_new_on_clamped: "{% if hard_new_off_clamped is none or hard_new_on_max_clamped is none %}{{ none }}{% else %}{{ [[hard_new_on_max_clamped | float, (hard_new_off_clamped | float) + 0.1] | max, 26.2] | min | round(2) }}{% endif %}"
      hard_clamp_reason: "{% set reasons = [] %}{% if hard_new_off_raw is not none and hard_new_off_clamped is not none and (hard_new_off_raw | float) != (hard_new_off_clamped | float) %}{% set reasons = reasons + ['off_clamped'] %}{% endif %}{% if hard_new_on_raw is not none and hard_new_on_max_clamped is not none and (hard_new_on_raw | float) != (hard_new_on_max_clamped | float) %}{% set reasons = reasons + ['on_clamped_max'] %}{% endif %}{% if hard_new_on_clamped is not none and hard_new_off_clamped is not none and (hard_new_on_clamped | float) <= (hard_new_off_clamped | float) %}{% set reasons = reasons + ['on_adjusted_gt_off'] %}{% endif %}{{ reasons | join('+') if reasons | count > 0 else 'none' }}"
      apply_learning_hard: '{{ hard_learning_applicable }}'
      apply_learning_normal: '{{ learning_gate_ok and (not event_already_processed) and (not hard_learning_applicable) }}'
      apply_learning: '{{ apply_learning_hard or apply_learning_normal }}'
      context_after: '{{ hard_new_off_clamped if apply_learning_hard else context_after_normal }}'
      contract_context_delta_on_after: '{{ contract_context_delta_on if apply_learning_hard else contract_context_delta_on_after_normal }}'
      contextual_off_candidate: "{% set v = context_prev_raw | float(none) %}{{ [[v, 25.7] | min, 22.0] | max | round(2) if v is not none else none }}"
      contextual_hysteresis_candidate: "{% set base = 0.52 %}{% set raw = (base + (contract_context_delta_on | float(0))) %}{{ [[raw, 1.1] | min, 0.35] | max | round(2) if contextual_off_candidate is not none else none }}"
      contextual_on_candidate: "{% if contextual_off_candidate is none or contextual_hysteresis_candidate is none %}{{ none }}{% else %}{{ [[((contextual_off_candidate | float) + (contextual_hysteresis_candidate | float)), 26.2] | min, ((contextual_off_candidate | float) + 0.35)] | max | round(2) }}{% endif %}"
      contextual_contract_valid: '{{ contextual_on_candidate is not none and contextual_off_candidate is not none and (contextual_on_candidate | float) > (contextual_off_candidate | float) }}'
      threshold_source: "{% if apply_learning_hard %}hard_learning_anchor{% elif contract_cycle_valid %}cycle_contract_helpers{% elif contextual_contract_valid %}contextual_contract_recalc{% else %}no_disponible{% endif %}"
      fallback_used: '{{ ''yes'' if threshold_source in [''contextual_contract_recalc'', ''hard_learning_anchor''] else ''no'' }}'
      cool_on_final: "{% if apply_learning_hard %}{{ hard_new_on_clamped }}{% elif threshold_source == 'cycle_contract_helpers' %}{{ contract_cycle_on | round(2) }}{% elif threshold_source == 'contextual_contract_recalc' %}{{ contextual_on_candidate }}{% else %}{{ none }}{% endif %}"
      cool_off_final: "{% if apply_learning_hard %}{{ hard_new_off_clamped }}{% elif threshold_source == 'cycle_contract_helpers' %}{{ contract_cycle_off | round(2) }}{% elif threshold_source == 'contextual_contract_recalc' %}{{ contextual_off_candidate }}{% else %}{{ none }}{% endif %}"
      contract_values_valid: '{{ cool_on_final is not none and cool_off_final is not none and (cool_on_final | float) > (cool_off_final | float) and (cool_off_final | float) >= 22 and (cool_off_final | float) <= 25.7 and (cool_on_final | float) <= 26.2 }}'
      contract_invalid_reason: "{% if cool_on_final is none or cool_off_final is none %}missing_contract_values{% else %}reject_invalid_contract_values{% endif %}"
      threshold_status: '{{ ''ok'' if contract_values_valid else ''no_disponible'' }}'
      sp_final: '{{ state_attr(''climate.0200009211c7_climate'', ''temperature'') | float(none) }}'
      fan_final: '{{ state_attr(''climate.0200009211c7_climate'', ''fan_mode'') | default(''na'', true) }}'
      diagnostic_snapshot_trace: "{% set warns = [] %}{% if not snapshot_structure_ok %}{% set warns = warns + ['snapshot_missing'] %}{% endif %}{% if snapshot_structure_ok and not snapshot_trace_matches_confirmed %}{% set warns = warns + ['trace_mismatch'] %}{% endif %}{% if snapshot_structure_ok and not snapshot_event_type_ok %}{% set warns = warns + ['event_type_unconfirmed'] %}{% endif %}{{ warns | join('+') if warns | count > 0 else 'ok' }}"
      delta_learning: '{{ (learning_step | float) if apply_learning_normal else 0.0 }}'
      hhmm: '{{ now().strftime(''%I:%M %p'') | regex_replace(''^0'','''') }}'
      learning_type: "{% if apply_learning_hard and force_policy_active %}manual_on_learning_hard_anchor_force_learn_contract_v1{% elif apply_learning_hard %}manual_on_learning_hard_anchor_contract_v1{% elif apply_learning_normal and force_policy_active and not dynamic_helpers_ready %}manual_on_learning_applied_force_learn_fallback_bucket_missing_v1{% elif apply_learning_normal and force_policy_active %}manual_on_learning_applied_force_learn_contract_v1{% elif apply_learning_normal and not dynamic_helpers_ready %}manual_on_learning_applied_fallback_bucket_missing_v1{% elif apply_learning_normal %}manual_on_learning_applied_contract_v1{% elif event_already_processed %}manual_on_learning_ignored_duplicate_event_contract_v1{% elif not learning_day_scope_ok %}manual_on_learning_ignored_out_of_scope_daytime_main_contract_v1{% elif not final_mode_cool_required %}manual_on_learning_ignored_final_mode_not_cool_contract_v1{% elif not manual_event_confirmed %}manual_on_learning_ignored_manual_event_not_confirmed_contract_v1{% else %}manual_on_learning_ignored_unknown_contract_v1{% endif %}"
      apply_learning_pre: '{{ ''true'' if apply_learning else ''false'' }}'
      learning_internal_error: '{{ apply_learning and (context_after is none or cool_on_final is none or cool_off_final is none) }}'
      controlled_error_detected: '{{ learning_internal_error or (apply_learning_normal and (not dynamic_delta_helper_exists) and (not fallback_delta_helper_exists)) }}'
      learning_reason_code: "{% if controlled_error_detected %}learning_on_internal_error{% elif apply_learning_hard %}manual_on_hard_anchor_applied{% elif apply_learning_normal and not dynamic_helpers_ready %}manual_on_learning_applied_fallback_bucket_missing_v1{% elif apply_learning_normal %}manual_on_normal_applied{% elif not active_session_ttl_valid and not final_mode_cool_required %}manual_on_session_expired_without_cool{% elif not learning_day_scope_ok %}out_of_scope_daytime_main{% elif not final_mode_cool_required %}final_mode_not_cool{% elif event_already_processed %}event_already_processed{% elif trace_mismatch_cross_run %}trace_mismatch_cross_run{% elif not manual_event_confirmed %}manual_event_not_confirmed{% else %}learning_gate_closed{% endif %}"
      final_result_label: "{% if controlled_error_detected %}error_controlado{% elif apply_learning %}aplicado{% else %}ignorado{% endif %}"
      final_reason_label: "{% if controlled_error_detected %}learning_on_internal_error{% elif apply_learning_hard and force_policy_active %}manual_on_hard_anchor_applied_force_learn{% elif apply_learning_hard %}manual_on_hard_anchor_applied{% elif apply_learning_normal and force_policy_active %}manual_on_normal_applied_force_learn{% elif apply_learning_normal %}manual_on_normal_applied{% elif not active_session_ttl_valid and not final_mode_cool_required %}manual_on_session_expired_without_cool{% elif not learning_day_scope_ok %}out_of_scope_daytime_main{% elif not final_mode_cool_required %}final_mode_not_cool{% elif event_already_processed %}event_already_processed{% elif trace_mismatch_cross_run %}trace_mismatch_cross_run{% elif not manual_event_confirmed %}manual_event_not_confirmed{% else %}learning_gate_closed{% endif %}"
      policy_mode: '{{ ''force'' if force_policy_active else ''strict'' }}'
      hard_flag: '{{ ''yes'' if apply_learning_hard else ''no'' }}'
      ctxoff_notify: '{{ ''%.2f'' | format(context_after | float) if apply_learning else ''n/a'' }}'
      hyson_notify: '{{ ''%.2f'' | format(contract_context_delta_on_after | float) if apply_learning_normal else ''n/a'' }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ learning_apply_with_fallback }}'
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ dynamic_context_helper_exists }}'
          sequence:
          - continue_on_error: true
            action: logbook.log
            data:
              name: AC Learning Manual ON
              message: '{{ contract_version }} | hito=learning_on_helper_write_before | helper={{ contract_context_helper }} | prev={{ context_prev_raw }} | after={{ ''%.2f'' | format(context_after | float) if context_after is not none else ''none'' }} | reason_code={{ learning_reason_code }} | learning_type={{ learning_type }} | Trace={{ trace_id }}'
              entity_id: climate.0200009211c7_climate
          - continue_on_error: true
            target:
              entity_id: '{{ contract_context_helper }}'
            data:
              value: '{{ context_after }}'
            service: input_number.set_value
          - continue_on_error: true
            action: logbook.log
            data:
              name: AC Learning Manual ON
              message: '{{ contract_version }} | hito=learning_on_helper_write_after | helper={{ contract_context_helper }} | prev={{ context_prev_raw }} | after={{ states(contract_context_helper) }} | expected_after={{ ''%.2f'' | format(context_after | float) if context_after is not none else ''none'' }} | reason_code={{ learning_reason_code }} | learning_type={{ learning_type }} | Trace={{ trace_id }}'
              entity_id: climate.0200009211c7_climate
        default:
        - continue_on_error: true
          action: logbook.log
          data:
            name: AC Learning Manual ON
            message: '{{ contract_version }} | hito=learning_on_helper_write_before | helper={{ fallback_learning_helper }} | prev={{ states(fallback_learning_helper) }} | after={{ ''%.2f'' | format(context_after | float) if context_after is not none else ''none'' }} | reason_code={{ learning_reason_code }} | learning_type={{ learning_type }} | Trace={{ trace_id }}'
            entity_id: climate.0200009211c7_climate
        - continue_on_error: true
          target:
            entity_id: '{{ fallback_learning_helper }}'
          data:
            value: '{{ context_after }}'
          service: input_number.set_value
        - continue_on_error: true
          action: logbook.log
          data:
            name: AC Learning Manual ON
            message: '{{ contract_version }} | hito=learning_on_helper_write_after | helper={{ fallback_learning_helper }} | prev={{ context_prev_raw }} | after={{ states(fallback_learning_helper) }} | expected_after={{ ''%.2f'' | format(context_after | float) if context_after is not none else ''none'' }} | reason_code={{ learning_reason_code }} | learning_type={{ learning_type }} | Trace={{ trace_id }}'
            entity_id: climate.0200009211c7_climate
        - continue_on_error: true
          action: logbook.log
          data:
            name: AC Learning Manual ON
            message: '{{ contract_version }} | controlled_error=missing_contract_context_helper | Trace={{ trace_id }} | contract_context_key={{ contract_context_key }} | contract_context_helper={{ contract_context_helper }} | fallback_used=yes'
            entity_id: climate.0200009211c7_climate
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ dynamic_delta_helper_exists }}'
          sequence:
