      reconcile_sp_target: '{% if reconcile_target_mode == ''cool'' %} {{ [hvac_max_sp|int,
        [hvac_min_sp|int, ((helper_t_off_cool | float(24)) | round(0, ''floor'') |
        int - 1)] | max] | min | int }} {% else %}28{% endif %}'
      reconcile_cool_delta: '{{ (tin|float(0) - helper_t_off_cool|float(24)) | round(2)
        }}'
      reconcile_fan_internal: "{% if reconcile_target_mode == 'cool' %}\n  {% if reconcile_cool_delta|float
