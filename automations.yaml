    to: 'on'
    for: 00:05:00
    id: presencia_on
    trigger: state
  - entity_id: input_boolean.ac_bloqueo_cambio_modo_2h
    to: 'off'
    id: desbloqueo_modo
    trigger: state
  conditions:
  - condition: time
    after: 07:01:00
    before: '21:59:00'
  - condition: template
    value_template: "{% set last = states('input_select.ac_ultimo_modo_no_fan') %}
      {% if last == 'cool' %}\n  {{ is_state('input_boolean.ac_bloqueo_cambio_modo_2h','off')
      }}\n{% else %}\n  true\n{% endif %}"
  - condition: or
    conditions:
    - condition: state
      entity_id: device_tracker.samsung_s24
      state: home
    - condition: and
      conditions:
      - condition: state
        entity_id: input_boolean.ausencia_prolongada_calefaccion
        state: 'off'
      - condition: state
        entity_id: binary_sensor.tze204_gkfbdvyx_ts0601
        state: 'on'
  - condition: or
    conditions:
    - condition: and
      conditions:
      - condition: numeric_state
        entity_id: sensor.lumi_lumi_weather_cuarto_temperatura
        below: 22.5
      - condition: numeric_state
        entity_id: sensor.lumi_lumi_weather_coco_temperatura
        below: 22.5
    - condition: and
      conditions:
      - condition: numeric_state
        entity_id: sensor.lumi_lumi_weather_cuarto_temperatura
        above: 22.5
        below: 23
      - condition: numeric_state
        entity_id: sensor.lumi_lumi_weather_coco_temperatura
        above: 22.5
        below: 23
  - condition: template
    value_template: "{{ not (\n  is_state('climate.0200009211c7_climate','heat')\n
      \ and state_attr('climate.0200009211c7_climate','hvac_action') == 'heating'\n)
      }}"
  actions:
  - target:
      entity_id: climate.0200009211c7_climate
    action: climate.turn_on
  - target:
      entity_id: climate.0200009211c7_climate
    data:
      hvac_mode: heat
    action: climate.set_hvac_mode
  - target:
      entity_id: climate.0200009211c7_climate
    data:
      fan_mode: Auto
    action: climate.set_fan_mode
  - target:
      entity_id: climate.0200009211c7_climate
    data:
      temperature: 30
    action: climate.set_temperature
  mode: single
- id: ac_dia_heat_off_por_ausencia_o_calor
  alias: AC - Durante el dia apaga calefaccion por ausencia o calor
  description: Apaga HEAT de día si ambos sensores > 24.5 o ausencia 30m + S24 fuera.
  mode: single
  trigger:
  - platform: numeric_state
    entity_id: sensor.lumi_lumi_weather_cuarto_temperatura
    above: 24.5
  - platform: numeric_state
    entity_id: sensor.lumi_lumi_weather_coco_temperatura
    above: 24.5
  - platform: state
    entity_id: binary_sensor.tze204_gkfbdvyx_ts0601
    to: 'off'
    for: 00:30:00
  condition:
  - condition: time
    after: 07:01:00
    before: '21:59:59'
  - condition: state
    entity_id: climate.0200009211c7_climate
    state: heat
  - condition: or
    conditions:
    - condition: and
      conditions:
      - condition: numeric_state
        entity_id: sensor.lumi_lumi_weather_cuarto_temperatura
        above: 24.5
      - condition: numeric_state
        entity_id: sensor.lumi_lumi_weather_coco_temperatura
        above: 24.5
    - condition: and
      conditions:
      - condition: state
        entity_id: binary_sensor.tze204_gkfbdvyx_ts0601
        state: 'off'
        for: 00:30:00
      - condition: state
        entity_id: device_tracker.samsung_s24
        state: not_home
  action:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ ''fan_only'' in (state_attr(''climate.0200009211c7_climate'',''hvac_modes'')
          or []) }}'
      sequence:
      - service: climate.set_hvac_mode
        target:
          entity_id: climate.0200009211c7_climate
        data:
          hvac_mode: fan_only
      - service: climate.set_fan_mode
        target:
          entity_id: climate.0200009211c7_climate
        data:
          fan_mode: Low
      - delay: 00:05:00
  - service: climate.turn_off
    target:
      entity_id: climate.0200009211c7_climate
  - delay: 00:00:15
  - condition: not
    conditions:
    - condition: state
      entity_id: climate.0200009211c7_climate
      state: 'off'
  - service: climate.turn_off
    target:
      entity_id: climate.0200009211c7_climate
