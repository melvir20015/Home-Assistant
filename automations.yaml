    - conditions:
      - condition: template
        value_template: "{{ not valid_transition }}"
      sequence:
      - service: logbook.log
        data:
          name: AC Night Learning
          message: "trace_id={{ trace_id }} | col_idx={{ col_idx }} | modo={{ modo }} | transicion={{ transicion }} | origen_clasificacion=n/a | delta=0 | offset_anterior=0 | offset_nuevo=0 | resultado_terminal=ignorado | razon=transicion_fuera_de_alcance"
    - conditions:
      - condition: template
        value_template: "{{ signature == last_signature }}"
      sequence:
      - service: logbook.log
        data:
          name: AC Night Learning
          message: "trace_id={{ trace_id }} | col_idx={{ col_idx }} | modo={{ modo }} | transicion={{ transicion }} | origen_clasificacion={{ origen_clasificacion }} | delta={{ delta }} | offset_anterior={{ offset_prev }} | offset_nuevo={{ offset_prev }} | resultado_terminal=ignorado | razon=dedup_signature_repetida"
    default:
    - service: input_text.set_value
      target: {entity_id: input_text.ac_night_learning_last_signature}
      data: {value: "{{ signature }}"}
    - choose:
      - conditions:
        - condition: template
          value_template: "{{ marker_valid }}"
        sequence:
        - service: input_text.set_value
          target: {entity_id: input_text.ac_night_auto_origin_payload}
          data:
            value: "{{ marker_raw.replace('consumed=' ~ marker_consumed, 'consumed=1', 1) if 'consumed=' in marker_raw else marker_raw }}"
        - choose:
          - conditions:
            - condition: template
              value_template: "{{ marker_expected in ['off->cool','cool->off','off->heat','heat->off'] and trigger_context_id not in ['', 'unknown', 'unavailable'] }}"
            sequence:
            - service: input_text.set_value
              target: {entity_id: input_text.ac_night_learning_auto_off_guard_payload}
              data:
                value: "expected_transition={{ marker_expected }}|echo_transition={{ marker_expected_echo_transition }}|col={{ col_idx }}|expires_at={{ (as_timestamp(now()) + 60) | int }}|consumed=0|reason=auto_chain_after_marker|trace={{ trigger_context_id }}"
    - choose:
      - conditions:
        - condition: template
          value_template: "{{ explicit_auto_off_guard_valid }}"
        sequence:
        - service: input_text.set_value
          target: {entity_id: input_text.ac_night_learning_auto_off_guard_payload}
          data:
            value: "{{ explicit_guard_raw.replace('consumed=' ~ explicit_guard_consumed, 'consumed=1', 1) if 'consumed=' in explicit_guard_raw else explicit_guard_raw }}"
    - choose:
      - conditions:
        - condition: template
          value_template: "{{ auto_chain_guard_valid and trigger_context_id not in ['', 'unknown', 'unavailable'] and explicit_guard_expected in ['off->cool','cool->off','off->heat','heat->off'] }}"
        sequence:
        - service: input_text.set_value
          target: {entity_id: input_text.ac_night_learning_auto_off_guard_payload}
          data:
            value: "expected_transition={{ explicit_guard_expected }}|echo_transition={{ explicit_guard_echo_transition }}|col={{ col_idx }}|expires_at={{ (as_timestamp(now()) + 60) | int }}|consumed=0|reason=auto_chain_refresh|trace={{ trigger_context_id }}"
    - choose:
      - conditions:
        - condition: template
          value_template: "{{ origen_clasificacion == 'manual_externo' }}"
        sequence:
        - choose:
          - conditions:
            - condition: template
              value_template: "{{ manual_off_block_should_set }}"
            sequence:
            - service: input_datetime.set_datetime
              target: {entity_id: input_datetime.ac_night_manual_off_block_until}
              data: {datetime: "{{ manual_off_block_until_new }}"}
            - service: logbook.log
              data:
                name: AC Night Learning
                message: "hito=night_manual_off_block_set | trace_id={{ trace_id }} | context_id={{ trigger_context_id }} | user_id={{ trigger_user_id }} | transicion={{ transicion }} | col_idx={{ col_idx }} | block_until={{ manual_off_block_until_new }} | resultado_terminal=aplicado | razon=apagado_manual_real_con_user_id"
        - choose:
          - conditions:
            - condition: template
              value_template: "{{ manual_on_block_should_set }}"
            sequence:
            - service: input_datetime.set_datetime
              target: {entity_id: input_datetime.ac_night_manual_on_block_auto_off_until}
              data: {datetime: "{{ manual_on_block_until_new }}"}
            - service: logbook.log
              data:
                name: AC Night Learning
                message: "hito=night_manual_on_auto_off_block_set | trace_id={{ trace_id }} | context_id={{ trigger_context_id }} | user_id={{ trigger_user_id if trigger_user_id != '' else 'none' }} | transicion={{ transicion }} | col_idx={{ col_idx }} | tin={{ tin }} | off_cool_vigente={{ off_cool_vigente }} | off_cool_resultante={{ off_cool_resultante }} | on_cool_resultante={{ on_cool_resultante }} | block_until={{ manual_on_block_until_new }} | resultado_terminal=aplicado | razon=encendido_manual_protege_auto_off_termico"
        - service: input_number.set_value
          target: {entity_id: "{{ helper_target }}"}
          data: {value: "{{ offset_new }}"}
        - choose:
          - conditions:
            - condition: template
              value_template: "{{ transicion == 'off->cool' }}"
            sequence:
            - service: input_text.set_value
              target: {entity_id: input_text.ac_night_learning_auto_off_guard_payload}
              data:
                value: "expected_transition=cool->off|echo_transition=|col={{ col_idx }}|offset_new={{ '%.2f' | format(offset_new | float(0)) }}|expires_at={{ (as_timestamp(now()) + 60) | int }}|consumed=0|reason=hot_recalc_after_manual_on|trace={{ trace_id }}"
        - service: input_text.set_value
          target: {entity_id: input_text.ac_night_hot_learning_recalc_payload}
          data:
            value: "{{ hot_recalc_payload }}"
        - service: logbook.log
          data:
            name: AC Night Learning
            message: "hito=night_hot_learning_recalc_requested | trace_id={{ trace_id }} | transicion={{ transicion }} | origen_clasificacion={{ origen_clasificacion }} | col_idx={{ col_idx }} | Tin={{ tin }} | off_cool_vigente={{ off_cool_vigente }} | on_cool_vigente={{ on_cool_vigente }} | offset_prev={{ offset_prev }} | decision_branch={{ decision_branch }} | distancia_a_on={{ distancia_a_on }} | delta_tramo={{ delta_tramo }} | delta_aplicado_real={{ delta_aplicado_real }} | offset_new={{ offset_new }} | payload={{ hot_recalc_payload }} | anchor_aplicado={{ (cool_manual_on_anchor_needed | bool(false)) or (cool_manual_off_anchor_needed | bool(false)) }} | manual_off_anchor={{ cool_manual_off_anchor_needed }} | off_cool_anchor_obj={{ off_cool_anchor_obj }} | off_cool_manual_off_anchor_obj={{ off_cool_manual_off_anchor_obj }} | offset_anchor_raw={{ offset_anchor_raw }} | offset_manual_off_anchor_raw={{ offset_manual_off_anchor_raw }} | offset_anchor_clamped={{ offset_anchor_clamped }} | offset_manual_off_anchor_clamped={{ offset_manual_off_anchor_clamped }} | anchor_limited_by_offset_clamp={{ anchor_limited_by_offset_clamp }} | manual_off_anchor_limited_by_offset_clamp={{ manual_off_anchor_limited_by_offset_clamp }} | off_cool_limited_by_thermal_clamp={{ off_cool_limited_by_thermal_clamp }} | manual_off_anchor_limited_by_thermal_clamp={{ manual_off_anchor_limited_by_thermal_clamp }} | hysteresis_eff={{ hysteresis_eff }} | off_cool_resultante={{ off_cool_resultante }} | on_cool_resultante={{ on_cool_resultante }} | resultado_terminal=hot_recalc_requested"
        - service: logbook.log
          data:
            name: AC Night Learning
            message: "trace_id={{ trace_id }} | transicion={{ transicion }} | origen_clasificacion={{ origen_clasificacion }} | col_idx={{ col_idx }} | modo={{ modo }} | Tin={{ tin }} | off_cool_vigente={{ off_cool_vigente }} | on_cool_vigente={{ on_cool_vigente }} | offset_prev={{ offset_prev }} | decision_branch={{ decision_branch }} | distancia_a_on={{ distancia_a_on }} | delta_tramo={{ delta_tramo }} | delta={{ delta }} | delta_aplicado_real={{ delta_aplicado_real }} | offset_new={{ offset_new }} | anchor_aplicado={{ (cool_manual_on_anchor_needed | bool(false)) or (cool_manual_off_anchor_needed | bool(false)) }} | manual_off_anchor={{ cool_manual_off_anchor_needed }} | off_cool_anchor_obj={{ off_cool_anchor_obj }} | off_cool_manual_off_anchor_obj={{ off_cool_manual_off_anchor_obj }} | offset_anchor_raw={{ offset_anchor_raw }} | offset_manual_off_anchor_raw={{ offset_manual_off_anchor_raw }} | offset_anchor_clamped={{ offset_anchor_clamped }} | offset_manual_off_anchor_clamped={{ offset_manual_off_anchor_clamped }} | anchor_limited_by_offset_clamp={{ anchor_limited_by_offset_clamp }} | manual_off_anchor_limited_by_offset_clamp={{ manual_off_anchor_limited_by_offset_clamp }} | off_cool_limited_by_thermal_clamp={{ off_cool_limited_by_thermal_clamp }} | manual_off_anchor_limited_by_thermal_clamp={{ manual_off_anchor_limited_by_thermal_clamp }} | hysteresis_eff={{ hysteresis_eff }} | off_cool_resultante={{ off_cool_resultante }} | on_cool_resultante={{ on_cool_resultante }} | resultado_terminal=aplicado | razon=manual_externo_aplicado"
        - service: notify.mobile_app_samsung_s24
          data:
            title: AC-Matriz Nocturna
            message: "{{ mensaje_humano }}"
      default:
      - service: logbook.log
        data:
          name: AC Night Learning
          message: "trace_id={{ trace_id }} | context_id={{ trigger_context_id }} | parent_id={{ trigger_parent_id }} | user_id={{ trigger_user_id if trigger_user_id != '' else 'none' }} | col_idx={{ col_idx }} | modo={{ modo }} | transicion={{ transicion }} | origen_clasificacion={{ origen_clasificacion }} | marker_raw={{ marker_raw }} | marker_valid={{ marker_valid }} | marker_trace_id={{ marker_trace_id }} | marker_consumed={{ marker_consumed }} | marker_consumed_open={{ marker_consumed_open }} | expected_transition={{ marker_expected }} | expires_at={{ marker_exp }} | context_match_auto={{ context_match_auto }} | auto_chain_guard_valid={{ auto_chain_guard_valid }} | hot_recalc_guard_valid={{ hot_recalc_guard_valid }} | explicit_auto_off_guard_valid={{ explicit_auto_off_guard_valid }} | explicit_guard_context_match={{ explicit_guard_context_match }} | hot_recalc_payload_guard_valid={{ hot_recalc_payload_guard_valid }} | hot_recalc_context_match={{ hot_recalc_context_match }} | explicit_guard_raw={{ explicit_guard_raw }} | hot_recalc_payload={{ hot_recalc_guard_raw }} | hot_recalc_mode={{ hot_recalc_guard_mode }} | hot_recalc_transition={{ hot_recalc_guard_transition }} | hot_recalc_col={{ hot_recalc_guard_col }} | hot_recalc_offset_old={{ hot_recalc_guard_offset_old }} | hot_recalc_offset_new={{ hot_recalc_guard_offset_new }} | hot_recalc_delta={{ hot_recalc_guard_delta }} | hot_recalc_trace={{ hot_recalc_guard_trace }} | hot_recalc_ts={{ hot_recalc_guard_ts }} | Tin={{ tin }} | off_cool_vigente={{ off_cool_vigente }} | on_cool_vigente={{ on_cool_vigente }} | offset_prev={{ offset_prev }} | decision_branch={{ decision_branch }} | distancia_a_on={{ distancia_a_on }} | delta_tramo={{ delta_tramo }} | delta={{ delta }} | delta_aplicado_real=0 | offset_nuevo={{ offset_prev }} | anchor_aplicado={{ (cool_manual_on_anchor_needed | bool(false)) or (cool_manual_off_anchor_needed | bool(false)) }} | manual_off_anchor={{ cool_manual_off_anchor_needed }} | off_cool_anchor_obj={{ off_cool_anchor_obj }} | off_cool_manual_off_anchor_obj={{ off_cool_manual_off_anchor_obj }} | offset_anchor_raw={{ offset_anchor_raw }} | offset_manual_off_anchor_raw={{ offset_manual_off_anchor_raw }} | offset_anchor_clamped={{ offset_anchor_clamped }} | offset_manual_off_anchor_clamped={{ offset_manual_off_anchor_clamped }} | anchor_limited_by_offset_clamp={{ anchor_limited_by_offset_clamp }} | manual_off_anchor_limited_by_offset_clamp={{ manual_off_anchor_limited_by_offset_clamp }} | off_cool_limited_by_thermal_clamp={{ off_cool_limited_by_thermal_clamp }} | manual_off_anchor_limited_by_thermal_clamp={{ manual_off_anchor_limited_by_thermal_clamp }} | hysteresis_eff={{ hysteresis_eff }} | off_cool_resultante={{ off_cool_resultante }} | on_cool_resultante={{ on_cool_resultante }} | resultado_terminal={{ resultado_ignorado_auto }} | razon={{ razon_ignorado_auto }} | offset_protegido=true | notificacion=suprimida_por_origen_automatico"

- id: ac_horario_scheduler_matriz_160_night_v1
  alias: AC Scheduler Matriz 160 + Night
  description: Activa/desactiva AC-Matriz 160 y AC Night Matriz Contextual con 1 minuto de solape en transiciones.
  mode: single
  trigger:
  - platform: time
    at: '06:59:00'
    id: day_on
  - platform: time
    at: '07:00:00'
    id: night_off
  - platform: time
    at: '21:59:00'
    id: night_on
  - platform: time
    at: '22:00:00'
    id: day_off
  action:
  - choose:
    - conditions:
      - condition: trigger
        id: day_on
      sequence:
      - service: automation.turn_on
        target:
          entity_id:
          - automation.ac_matriz_160
          - automation.ac_matriz_160_aprendizaje_manual_por_columna
    - conditions:
      - condition: trigger
        id: night_off
      sequence:
      - service: automation.turn_off
        target:
          entity_id:
          - automation.ac_night_matriz_contextual
          - automation.ac_night_aprendizaje_manual_por_columna
    - conditions:
      - condition: trigger
        id: night_on
      sequence:
      - service: automation.turn_on
        target:
          entity_id:
          - automation.ac_night_matriz_contextual
          - automation.ac_night_aprendizaje_manual_por_columna
    - conditions:
      - condition: trigger
        id: day_off
      sequence:
      - service: automation.turn_off
        target:
          entity_id:
          - automation.ac_matriz_160
          - automation.ac_matriz_160_aprendizaje_manual_por_columna
