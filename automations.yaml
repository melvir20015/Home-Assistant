    target:
      entity_id: input_boolean.calefaccion_reciente
  - delay: 02:00:00
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.calefaccion_reciente
- id: ac_noche_reset_tendencia_off_1900
  alias: AC - Noche Reset tendencia OFF (19:00)
  trace:
    stored_traces: 50
  mode: single
  trigger:
  - platform: time
    at: '19:00:00'
  action:
  - service: input_number.set_value
    target:
      entity_id: input_number.ac_off_muestras_19_00_21_59
    data:
      value: 0
  - service: input_number.set_value
    target:
      entity_id:
      - input_number.ac_off_avg_inicio_19_00_21_59
      - input_number.ac_off_avg_final_19_00_21_59
    data:
      value: 0
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.ac_tendencia_subiendo_con_ac_off
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.ac_bloqueo_modo_noche
  - service: input_select.select_option
    target:
