          entity_id: climate.0200009211c7_climate
      - variables:
          post_learning_target_mode: '{%- set tin_v = tin | float(0) -%}{%- if tin_v >= umbral_on_cool_operacional
            | float(25) -%}cool{%- elif tin_v <= umbral_on_heat_operacional | float(21)
            -%}heat{%- elif (tin_v - umbral_off_cool_operacional | float(24)) | abs <=
            (tin_v - umbral_off_heat_operacional | float(22)) | abs -%}cool{%- else -%}heat{%- endif -%}'
          post_learning_sp_target: '{%- if post_learning_target_mode == ''cool'' -%}{{ [hvac_max_sp|int,
            [hvac_min_sp|int, ((umbral_off_cool_operacional | float(24)) | round(0, ''floor'')
            | int - 1)] | max] | min | int }}{%- else -%}28{%- endif -%}'
          post_learning_cool_delta: '{{ (tin|float(0) - umbral_off_cool_operacional|float(24))
            | round(2) }}'
          post_learning_fan_internal: "{%- if post_learning_target_mode == 'cool' -%}{%- if post_learning_cool_delta|float
            >= 2.0 -%}high{%- elif post_learning_cool_delta|float >= 1.0 -%}medium{%- else -%}low{%- endif -%}{%- else -%}high{%- endif -%}"
          post_learning_fan_candidate_label: '{% if post_learning_fan_internal == ''low'' %}Low{%
            elif post_learning_fan_internal in [''medium'',''med''] %}Med{% elif post_learning_fan_internal
            == ''high'' %}High{% elif post_learning_fan_internal == ''auto'' %}Auto{% else
            %}{{ state_attr(''climate.0200009211c7_climate'',''fan_mode'') | string }}{%
            endif %}'
          post_learning_fan_modes_supported: '{{ (state_attr(''climate.0200009211c7_climate'',
            ''fan_modes'') or []) | list }}'
          post_learning_fan_candidate_supported: '{{ post_learning_fan_candidate_label in post_learning_fan_modes_supported
            }}'
          post_learning_fan_target_final: '{% if post_learning_fan_candidate_supported
            %}{{ post_learning_fan_candidate_label }}{% else %}{{ state_attr(''climate.0200009211c7_climate'',''fan_mode'')
            | string }}{% endif %}'
          post_learning_current_mode: '{{ states(''climate.0200009211c7_climate'') | lower }}'
          post_learning_current_sp: '{{ state_attr(''climate.0200009211c7_climate'',''temperature'')
            | int(-999) }}'
          post_learning_current_fan: '{{ state_attr(''climate.0200009211c7_climate'',''fan_mode'')
            | string }}'
          post_learning_mode_diff: '{{ post_learning_current_mode != post_learning_target_mode }}'
          post_learning_sp_diff: '{{ post_learning_current_sp | int(-999) != post_learning_sp_target
            | int }}'
          post_learning_fan_diff: '{{ post_learning_target_mode == ''cool'' and post_learning_fan_candidate_supported
            and post_learning_current_fan != post_learning_fan_target_final }}'
          post_learning_eligible: '{{ resultado_terminal == ''aplicado'' and evento_manual_tipo
            == ''encendido_manual'' and modo_aprendizaje in [''cool'',''heat''] and origen_clasificacion
            == ''manual_externo'' and not marker_compatible_final and not reconcile_fan_to_thermal_marker_compatible
            and not legacy_manual_hold_active and dedup_ok }}'
          post_learning_has_work: '{{ post_learning_mode_diff or post_learning_sp_diff or post_learning_fan_diff }}'
          post_learning_apply: '{{ post_learning_eligible and post_learning_has_work }}'
          post_learning_skip_reason: '{% if not post_learning_eligible %}{% if resultado_terminal
            != ''aplicado'' %}resultado_no_aplicado{% elif evento_manual_tipo != ''encendido_manual''
            %}evento_no_encendido_manual{% elif modo_aprendizaje not in [''cool'',''heat'']
            %}modo_fuera_alcance{% elif origen_clasificacion != ''manual_externo'' %}origen_no_manual_externo{%
            elif marker_compatible_final or reconcile_fan_to_thermal_marker_compatible %}origen_automatico{%
            elif legacy_manual_hold_active %}hold_manual_activo{% elif not dedup_ok %}dedup{%
            else %}no_elegible{% endif %}{% elif not post_learning_has_work %}sin_diferencia_sp_fan{%
            elif post_learning_target_mode == ''cool'' and not post_learning_fan_candidate_supported
            and not (post_learning_mode_diff or post_learning_sp_diff) %}fan_no_soportado{% else %}no_aplica{% endif %}'
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ post_learning_apply }}'
          sequence:
          - service: input_text.set_value
            target:
              entity_id: input_text.ac_matriz_160_manual_learning_reconcile_marker
            data:
              value: kind=manual_learning_reconcile_ac_matriz_160|root_id={{ evento_causal_root_id }}|context_id={{ evento_context_id }}|expected_transition={{ post_learning_current_mode }}->{{ post_learning_target_mode }}|expires_at={{ (now() + timedelta(seconds=60)).strftime('%Y-%m-%d %H:%M:%S') }}
          - service: logbook.log
            data:
              name: AC-Matriz 160
              message: hito=manual_reconcile_marker_created | root_id={{ evento_causal_root_id }} | context_id={{ evento_context_id }} | expected_transition={{ post_learning_current_mode }}->{{ post_learning_target_mode }} | expires_at={{ (now() + timedelta(seconds=60)).strftime('%Y-%m-%d %H:%M:%S') }}
              entity_id: climate.0200009211c7_climate
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ post_learning_mode_diff }}'
              sequence:
              - service: climate.set_hvac_mode
                target:
                  entity_id: climate.0200009211c7_climate
                data:
                  hvac_mode: '{{ post_learning_target_mode }}'
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ post_learning_sp_diff }}'
              sequence:
              - service: climate.set_temperature
                target:
                  entity_id: climate.0200009211c7_climate
                data:
                  temperature: '{{ post_learning_sp_target | int }}'
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ post_learning_fan_diff }}'
              sequence:
              - service: climate.set_fan_mode
                target:
                  entity_id: climate.0200009211c7_climate
                data:
                  fan_mode: '{{ post_learning_fan_target_final }}'
          - service: logbook.log
            data:
              name: AC-Matriz 160
              message: hito=reconcile_manual_post_learning_applied | contrato=post_learning
                | trace_id={{ trace_id_learning }} | origen={{ origen_clasificacion }} | evento={{ evento_manual_tipo }} | from={{ modo_anterior }} | to={{ modo_nuevo }} | modo_actual={{ post_learning_current_mode }} | modo_objetivo={{ post_learning_target_mode }} | columna={{ col_idx_resuelto }} | contexto={{ contexto_activo_resuelto }} | off_previo={{ off_vigente }} | on_previo={{ on_vigente }} | off_nuevo={{ off_nuevo }} | on_nuevo={{ on_nuevo }} | umbral_off_cool_operacional={{ umbral_off_cool_operacional }} | umbral_on_cool_operacional={{ umbral_on_cool_operacional }} | sp_actual={{ post_learning_current_sp }} | sp_objetivo={{ post_learning_sp_target }} | fan_actual={{ post_learning_current_fan }} | fan_objetivo={{ post_learning_fan_target_final }} | fan_soportado={{ post_learning_fan_candidate_supported }} | mode_diff={{ post_learning_mode_diff }} | sp_diff={{ post_learning_sp_diff }} | fan_diff={{ post_learning_fan_diff }} | anchor_aplicado={{ fuera_rango_anchor }} | tipo_anchor={{ tipo_anchor }} | on_objetivo={{ on_obj_anchor }} | off_objetivo={{ off_obj_anchor }} | delta_anchor={{ delta_anchor }} | anchor_limitado_por_clamp={{ anchor_limitado_por_clamp }} | delta_aplicado_real={{ delta_aplicado_real }} | offset_nuevo={{ offset_nuevo }} | razon=manual_externo_post_learning_reconcile
              entity_id: climate.0200009211c7_climate
        default:
        - service: logbook.log
          data:
            name: AC-Matriz 160
            message: hito=reconcile_manual_post_learning_skip | contrato=post_learning
              | trace_id={{ trace_id_learning }} | origen={{ origen_clasificacion }} | evento={{ evento_manual_tipo }} | from={{ modo_anterior }} | to={{ modo_nuevo }} | modo_actual={{ post_learning_current_mode }} | modo_objetivo={{ post_learning_target_mode }} | columna={{ col_idx_resuelto }} | off_previo={{ off_vigente }} | on_previo={{ on_vigente }} | off_nuevo={{ off_nuevo }} | on_nuevo={{ on_nuevo }} | sp_actual={{ post_learning_current_sp }} | sp_objetivo={{ post_learning_sp_target }} | fan_actual={{ post_learning_current_fan }} | fan_objetivo={{ post_learning_fan_target_final }} | fan_soportado={{ post_learning_fan_candidate_supported }} | marker_compatible_final={{ marker_compatible_final }} | auto_marker_fan_to_thermal={{ reconcile_fan_to_thermal_marker_compatible }} | hold={{ legacy_manual_hold_active }} | dedup_ok={{ dedup_ok }} | mode_diff={{ post_learning_mode_diff }} | sp_diff={{ post_learning_sp_diff }} | fan_diff={{ post_learning_fan_diff }} | razon={{ post_learning_skip_reason }}
            entity_id: climate.0200009211c7_climate
    default:
    - service: logbook.log
      data:
        name: AC-Matriz 160
        message: hito=learning_manual_ignorado | trace_id={{ trace_id_learning }}
          | formula={{ col_formula_resuelta }} | esquema_temporada={{ season_index_schema }} | season_idx={{ season_idx_resuelto }} | weather_idx={{ weather_idx_resuelto }} | slot_idx={{ slot_idx_resuelto }} | helper_desfasado={{ col_idx_helper_desfasado }} | helper_offset_resuelto={{ helper_offset_resuelto }} | helper_offset_previo={{ helper_offset_previo }} | origen_clasificacion={{ origen_clasificacion }} | horario_habilitado={{
          horario_aprendizaje_habilitado }} | marker_vigente={{ marker_vigente }}
          | marker_compatible={{ marker_compatible }} | marker_compatible_final={{ marker_compatible_final }} | marker_transition_expected={{
          marker_transition_expected }} | marker_transition_observed={{ marker_transition_observed_inmediata
          }} | marker_transition_observed_final={{ marker_transition_observed_final }} | cierre_compuesto_valido={{ cierre_compuesto_valido }} | transicion_observada_consolidada={{ transicion_observada_consolidada }} | expires_at={{ marker_expires_raw }} | resultado_terminal={{ resultado_terminal
          }} | razon={{ razon }} | from={{ modo_anterior }} | to={{ modo_nuevo }}
          | final_transition={{ transicion_final_from ~ "->" ~ transicion_final_to
          }} | absorbed={{ intermediate_changes_absorbed }} | dedup_ok={{ dedup_ok }} | delta={{ delta }} | delta_aplicado={{ delta_aplicado_real }} | anchor_aplicado={{ fuera_rango_anchor }} | tipo_anchor={{ tipo_anchor }} | on_objetivo={{ on_obj_anchor }} | off_objetivo={{ off_obj_anchor }} | delta_anchor={{ delta_anchor }} | anchor_limitado_por_clamp={{ anchor_limitado_por_clamp }} | off_previo={{ off_vigente }} | on_previo={{ on_vigente }} | off_nuevo={{ off_nuevo }} | on_nuevo={{ on_nuevo }} | col_idx={{ col_idx_resuelto
          }}
        entity_id: climate.0200009211c7_climate
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ not dedup_ok }}'
      sequence:
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: hito=learning_manual_dedup_descartado | firma_evento={{ firma_evento
            }} | firma_previa={{ firma_previa }} | evento_last_changed={{ evento_last_changed_iso
            }} | evento_context_id={{ evento_context_id }} | trace_id={{ trace_id_learning
            }} | from={{ modo_anterior }} | to={{ modo_nuevo }} | final_transition={{
            transicion_final_from ~ "->" ~ transicion_final_to }} | absorbed={{ intermediate_changes_absorbed
            }} | modo={{ modo_aprendizaje }} | razon_terminal=dedup_consolidado
          entity_id: climate.0200009211c7_climate
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ dedup_ok and evento_estable and resultado_terminal == ''aplicado'' }}'
      sequence:
      - service: input_text.set_value
        target:
          entity_id: input_text.ac_matriz_160_learning_last_signature
        data:
          value: '{{ firma_evento }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ resultado_terminal != ''aplicado'' and evento_manual_tipo
          in [''encendido_manual'',''apagado_manual''] and origen_clasificacion !=
          ''manual_externo'' }}'
      sequence:
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: hito=intento_modificar_offset_bloqueado | origen={{ origen_clasificacion
            }} | razon={{ razon }} | resultado_terminal={{ resultado_terminal }} |
            trace_id={{ trace_id_learning }} | helper={{ helper_offset_resuelto }}
            | from={{ modo_anterior }} | to={{ modo_nuevo }} | final_transition={{
            transicion_final_from ~ "->" ~ transicion_final_to }} | absorbed={{ intermediate_changes_absorbed
            }} | contexto={{ contexto_activo_resuelto }} | ts={{ ts_evento }}
          entity_id: climate.0200009211c7_climate
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ resultado_terminal == ''error_controlado'' and notificacion_error_dedup_ok
          }}'
      sequence:
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: hito=error_controlado_learning_notificacion_suprimida | trace_id={{ trace_id_learning }} | resultado_terminal=error_controlado | razon={{ razon }}
          entity_id: climate.0200009211c7_climate
      - service: input_text.set_value
        target:
          entity_id: input_text.ac_matriz_160_learning_error_last_signature
        data:
          value: '{{ firma_error_learning }}'
    - conditions:
      - condition: template
        value_template: '{{ resultado_terminal == ''error_controlado'' and not notificacion_error_dedup_ok
          }}'
      sequence:
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: hito=error_controlado_suprimido_dedup | trace_id={{ trace_id_learning
            }} | firma_error={{ firma_error_learning }} | firma_previa={{ firma_error_learning_previa
            }} | from={{ modo_anterior }} | to={{ modo_nuevo }} | razon={{ razon }}
            | bucket_5s={{ learning_bucket_error_5s }}
          entity_id: climate.0200009211c7_climate
  - service: input_text.set_value
    target:
      entity_id: input_text.ac_matriz_160_ultimo_estado_notificacion
    data:
      value: '{{ envio_estado }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ evento_manual_tipo == ''apagado_manual'' and resultado_terminal
          == ''aplicado'' }}'
      sequence:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ac_matriz_160_manual_off_block_until
        data:
          datetime: '{{ (now() + timedelta(minutes=5)).strftime(''%Y-%m-%d %H:%M:%S'')
            }}'
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: hito=manual_off_bloqueo_largo_set | trace_id={{ trace_id_learning
            }} | block_until={{ (now() + timedelta(minutes=5)).strftime('%Y-%m-%d
            %H:%M:%S') }} | origen={{ origen_clasificacion }} | resultado_terminal={{
            resultado_terminal }} | razon={{ razon }}
          entity_id: climate.0200009211c7_climate
  - service: input_text.set_value
    target:
      entity_id: input_text.ac_matriz_160_ultima_accion
    data:
      value: '{{ ''learning|'' ~ resultado_terminal ~ ''|'' ~ razon ~ ''|'' ~ modo_anterior
        ~ ''->'' ~ modo_nuevo }}'
  - service: input_text.set_value
    target:
      entity_id: input_text.ac_matriz_160_ultimo_resultado_validacion
    data:
      value: '{{ ''learning|'' ~ resultado_terminal ~ ''|'' ~ razon }}'


- id: ac_night_matrix_v1
  alias: AC Night Matriz Contextual
  trace:
    stored_traces: 300
  mode: queued
  max: 10
  trigger:
  - platform: time_pattern
    minutes: "/5"
  - platform: time
    at: '07:00:00'
    id: night_end
  - platform: state
    entity_id:
    - weather.openweathermap
    - sensor.lumi_lumi_weather_cuarto_temperatura
    - sensor.lumi_lumi_weather_coco_temperatura
    - sensor.lumi_lumi_weather_cuarto_humedad
    - sensor.lumi_lumi_weather_coco_humedad
    - binary_sensor.presencia_ok_estable
    - climate.0200009211c7_climate
    - sensor.0200009211c7_wac_demand_response_power
    - sensor.ac_power_w
    - binary_sensor.ac_compressor_active
  - platform: state
    entity_id: input_text.ac_night_hot_learning_recalc_payload
    id: hot_learning_recalc
  condition:
  - condition: template
    value_template: "{{ (trigger is defined and trigger.id|default('') == 'night_end') or (now().hour >= 22 or now().hour < 7) }}"
  action:
  - variables:
      climate_ent: climate.0200009211c7_climate
      notify_service: notify.mobile_app_samsung_s24
      tin: "{{ ([states('sensor.lumi_lumi_weather_cuarto_temperatura')|float(0), states('sensor.lumi_lumi_weather_coco_temperatura')|float(0)] | average) | round(2) }}"
      hin: "{{ ([states('sensor.lumi_lumi_weather_cuarto_humedad')|float(0), states('sensor.lumi_lumi_weather_coco_humedad')|float(0)] | average) | round(1) }}"
      tout: "{{ state_attr('weather.openweathermap','temperature')|float(0) }}"
      hout: "{{ state_attr('weather.openweathermap','humidity')|float(60) }}"
      weather_raw: "{{ states('weather.openweathermap')|lower }}"
      weather_state: "{% if weather_raw in ['clear-night','clear','sunny'] %}despejado{% elif weather_raw in ['partlycloudy','partly cloudy','few clouds','scattered clouds'] %}parcial{% elif weather_raw in ['cloudy','overcast','broken clouds'] %}nublado{% elif weather_raw in ['rainy','rain','drizzle','pouring'] %}lluvia{% elif 'thunder' in weather_raw %}tormenta{% elif weather_raw in ['fog','mist','haze','smoky'] %}niebla{% elif 'snow' in weather_raw or 'sleet' in weather_raw %}hielo{% else %}despejado{% endif %}"
      month: "{{ now().month }}"
      estacion: "{% if month in [12,1,2] %}invierno{% elif month in [3,4,5] %}primavera{% elif month in [6,7,8] %}verano{% else %}otono{% endif %}"
      franja: "{% set h=now().hour %}{% if h in [22,23,0] %}2200_0059{% elif h in [1,2,3] %}0100_0359{% elif h in [4,5] %}0400_0559{% else %}0600_0700{% endif %}"
      presencia_ok: "{{ is_state('binary_sensor.presencia_ok_estable','on') }}"
      col_idx: "{% set est=['verano','otono','invierno','primavera'] %}{% set fra=['2200_0059','0100_0359','0400_0559','0600_0700'] %}{% set cli=['despejado','nublado','parcial','lluvia','tormenta','niebla','hielo'] %}{{ (est.index(estacion)*28)+(fra.index(franja)*7)+(cli.index(weather_state))+1 }}"
      weather_label_es: "{% if weather_state == 'despejado' %}Despejado{% elif weather_state == 'parcial' %}Parcial{% elif weather_state == 'nublado' %}Nublado{% elif weather_state == 'lluvia' %}Lluvia{% elif weather_state == 'tormenta' %}Tormenta{% elif weather_state == 'niebla' %}Niebla{% elif weather_state == 'hielo' %}Hielo{% else %}Despejado{% endif %}"
      estacion_label: "{{ estacion | capitalize }}"
      franja_label: "{% if franja == '2200_0059' %}22:00-00:59{% elif franja == '0100_0359' %}01:00-03:59{% elif franja == '0400_0559' %}04:00-05:59{% else %}06:00-07:00{% endif %}"
      off_cool_base: 23.5
      off_heat_base: "{{ [24.0, [17.0, 20.5 + ((12-tout)*0.05) + ((hout-60)*0.005)] | max] | min | round(2) }}"
      hysteresis_base: "{{ states('input_number.ac_night_hysteresis_base')|float(0.8) }}"
      dew_point_night: "{% set t = tin | float(0) %}{% set rh = [100, [1, hin | float(0)] | max] | min %}{% set a = 17.625 %}{% set b = 243.04 %}{% set gamma = ((a * t) / (b + t)) + log(rh / 100) %}{{ ((b * gamma) / (a - gamma)) | round(2) }}"
      temp_pressure_x: "{{ [1.0, [0.0, (((tin | float(0)) - 23.0) / 1.2)] | max] | min }}"
      temp_pressure: "{{ (((temp_pressure_x | float) * (temp_pressure_x | float) * (3 - (2 * (temp_pressure_x | float)))) | round(3)) }}"
      hum_pressure_x: "{{ [1.0, [0.0, (((hin | float(0)) - 52.0) / 18.0)] | max] | min }}"
      hum_pressure: "{{ (((hum_pressure_x | float) * (hum_pressure_x | float) * (3 - (2 * (hum_pressure_x | float)))) | round(3)) }}"
      dew_pressure_x: "{{ [1.0, [0.0, (((dew_point_night | float(0)) - 13.8) / 4.5)] | max] | min }}"
      dew_pressure: "{{ (((dew_pressure_x | float) * (dew_pressure_x | float) * (3 - (2 * (dew_pressure_x | float)))) | round(3)) }}"
      night_comfort_pressure: "{{ ((((temp_pressure | float) * 0.50) + ((hum_pressure | float) * 0.25) + ((dew_pressure | float) * 0.25)) | round(3)) }}"
      bochorno_score: "{{ night_comfort_pressure }}"
      exterior_adjust_cool: "{{ ([0.10, [-0.15, (((((tout | float(0)) - 24) * -0.02)) + (((hout | float(60)) - 60) * -0.003))] | max] | min) | round(2) }}"
      comfort_pull: "{{ ((night_comfort_pressure | float) * 0.45) | round(2) }}"
      off_cool_base_plus_offset: "{{ ((off_cool_base | float) + (states('input_number.ac_night_offset_cool_col_' ~ col_idx)|float(0)) + (exterior_adjust_cool | float)) | round(2) }}"
      cool_global_bias: 0
      off_cool_biased_pre_clamp: "{{ ((off_cool_base_plus_offset | float) - (comfort_pull | float)) | round(2) }}"
      off_cool: "{{ ([24.2, [22.7, (off_cool_biased_pre_clamp | float)] | max] | min) | round(2) }}"
      off_cool_final_real: "{{ off_cool | float }}"
      hysteresis_eff: "{{ ([0.70, [0.42, (0.65 - ((night_comfort_pressure | float) * 0.20))] | max] | min) | round(2) }}"
      comfort_bias_cool_raw: "{{ (0 - (comfort_pull | float)) | round(2) }}"
      comfort_bias_cool: "{{ comfort_bias_cool_raw }}"
      on_cool_cap_night_dynamic: "{{ ([23.95, [23.55, (23.95 - ((night_comfort_pressure | float) * 0.45))] | max] | min) | round(2) }}"
      on_cool_pre_cap: "{{ ((off_cool_final_real | float) + (hysteresis_eff | float)) | round(2) }}"
      on_cool_candidate: "{{ [on_cool_cap_night_dynamic | float, on_cool_pre_cap | float] | min }}"
      on_cool: "{{ ([24.3, [((off_cool_final_real | float) + 0.35), (on_cool_candidate | float)] | max] | min) | round(2) }}"
      off_heat: "{{ ([states('input_number.ac_night_offset_heat_col_' ~ col_idx)|float(0) + off_heat_base, 24.0] | min) | round(2) }}"
      on_heat: "{{ (off_heat - (hysteresis_eff | float)) | round(2) }}"
      hvac_min_sp: "{{ state_attr(climate_ent, 'min_temp') | float(17) | round(0, 'floor') | int }}"
      hvac_max_sp: "{{ state_attr(climate_ent, 'max_temp') | float(23) | round(0, 'floor') | int }}"
      off_cool_floor: "{{ (off_cool_final_real | float) | round(0, 'floor') | int }}"
      sp_cool_target_raw: "{{ (off_cool_floor | int) - 1 }}"
      sp_cool_target: "{{ [hvac_max_sp|int, [hvac_min_sp|int, (sp_cool_target_raw|int)] | max] | min | int }}"
      sp_heat_target_base: 24
      sp_heat_target: "{{ [hvac_max_sp|int, [hvac_min_sp|int, (sp_heat_target_base|int)] | max] | min | int }}"
      hvac_mode: "{{ states(climate_ent) }}"
      fan_mode_actual: "{{ state_attr(climate_ent, 'fan_mode') | default('', true) }}"
      sp_reportado_actual: "{{ state_attr(climate_ent, 'temperature') | float(none) }}"
      night_trigger_id: "{{ trigger.id | default('') if trigger is defined else '' }}"
      night_cycle_started_ts_raw: "{{ as_timestamp(states('input_datetime.ac_night_cool_cycle_started_ts'), 0) | int(0) }}"
      night_window_start_ts: "{% set h = now().hour %}{% if h >= 22 %}{{ as_timestamp(now().replace(hour=22, minute=0, second=0, microsecond=0)) | int }}{% else %}{{ (as_timestamp(now().replace(hour=22, minute=0, second=0, microsecond=0)) | int) - 86400 }}{% endif %}"
      night_window_end_ts: "{{ (night_window_start_ts | int(0)) + 32400 }}"
      night_cycle_started_ts: "{{ night_cycle_started_ts_raw | int(0) if (night_cycle_started_ts_raw | int(0)) >= (night_window_start_ts | int(0)) and (night_cycle_started_ts_raw | int(0)) <= ((as_timestamp(now()) | int) + 60) and (as_timestamp(now()) | int) < (night_window_end_ts | int(0)) else 0 }}"
      night_cycle_invalid: "{{ (night_cycle_started_ts_raw | int(0)) > 0 and (night_cycle_started_ts | int(0)) == 0 }}"
      night_cycle_active: "{{ (night_cycle_started_ts | int(0)) > 0 }}"
      night_cycle_elapsed_min: "{{ ([0, (((as_timestamp(now()) | int) - (night_cycle_started_ts | int(0))) / 60)] | max) | round(1) if night_cycle_active else 0 }}"
      dew_moderate: "{{ (dew_point_night | float(0)) >= 14.8 }}"
      dew_high: "{{ (dew_point_night | float(0)) >= 15.6 }}"
      dew_severe: "{{ (dew_point_night | float(0)) >= 16.2 }}"
      muggy_moderate: "{{ dew_moderate or (hin | float(0)) >= 58 or (bochorno_score | float(0)) >= 0.18 }}"
      muggy_high: "{{ dew_high or (hin | float(0)) >= 62 or (bochorno_score | float(0)) >= 0.45 }}"
      muggy_severe: "{{ dew_severe or (hin | float(0)) >= 63 or (bochorno_score | float(0)) >= 0.62 }}"
      normal_off_ready: "{{ hvac_mode == 'cool' and tin <= off_cool }}"
      muggy_guard_active: "{{ dew_moderate or (hin | float(0)) >= 58 or (bochorno_score | float(0)) >= 0.18 }}"
      muggy_guard_max_elapsed_min: "{% if muggy_severe and not ((tin | float(0)) <= ((off_cool | float(0)) - 0.4)) %}90{% elif muggy_high %}75{% else %}60{% endif %}"
      muggy_guard_force_release: "{{ (night_cycle_elapsed_min | float(0)) >= (muggy_guard_max_elapsed_min | float(75)) }}"
      compressor_power_threshold_w: 350
      fan_only_power_threshold_w: 120
      compressor_inactive_min_minutes: 10
      ac_power_primary: "{{ states('sensor.0200009211c7_wac_demand_response_power') | float(none) }}"
      ac_power_fallback: "{{ states('sensor.ac_power_w') | float(none) }}"
      ac_power_w: "{{ ac_power_primary if ac_power_primary is not none else ac_power_fallback }}"
      climate_action_raw: "{{ (state_attr(climate_ent, 'hvac_action') | default(state_attr(climate_ent, 'action'), true) | default('', true)) | lower }}"
      compressor_attr_raw: "{{ (state_attr(climate_ent, 'compressor') | default(state_attr(climate_ent, 'compressor_state'), true) | default(state_attr(climate_ent, 'running'), true) | default('', true)) | string | lower }}"
      compressor_power_active: "{{ ac_power_w is not none and (ac_power_w | float(0)) >= (compressor_power_threshold_w | float(350)) }}"
      compressor_binary_active: "{{ is_state('binary_sensor.ac_compressor_active', 'on') }}"
      compressor_attr_active: "{{ climate_action_raw in ['cooling','drying'] or compressor_attr_raw in ['on','true','active','running','cooling'] }}"
      compressor_last_active_ts_raw: "{{ as_timestamp(states('input_datetime.ac_night_compressor_last_active_ts'), 0) | int(0) }}"
      compressor_minutes_since_active: "{{ ([0, (((as_timestamp(now()) | int) - (compressor_last_active_ts_raw | int(0))) / 60)] | max) | round(1) if (compressor_last_active_ts_raw | int(0)) > 0 else 9999 }}"
      compressor_state: "{% if compressor_power_active or compressor_binary_active or compressor_attr_active %}active{% elif hvac_mode == 'cool' and ac_power_w is not none and (ac_power_w | float(0)) <= (fan_only_power_threshold_w | float(120)) and (compressor_minutes_since_active | float(9999)) >= (compressor_inactive_min_minutes | float(10)) %}inactive_probable{% elif hvac_mode == 'cool' and ac_power_w is none and not compressor_binary_active and not compressor_attr_active %}unknown{% else %}inactive_probable{% endif %}"
      compressor_unknown_diag_raw: "{{ states('input_text.ac_night_compressor_unknown_diag_payload') }}"
      compressor_unknown_diag_cycle: "{{ compressor_unknown_diag_raw.split('cycle=')[1].split('|')[0] if 'cycle=' in compressor_unknown_diag_raw else '0' }}"
      compressor_unknown_diag_count: "{{ compressor_unknown_diag_raw.split('count=')[1].split('|')[0] | int(0) if 'count=' in compressor_unknown_diag_raw else 0 }}"
      compressor_unknown_same_cycle: "{{ compressor_unknown_diag_cycle == (night_cycle_started_ts | string) and (night_cycle_started_ts | int(0)) > 0 }}"
      compressor_unknown_next_count: "{{ ((compressor_unknown_diag_count | int(0)) + 1) if compressor_unknown_same_cycle else 1 }}"
      compressor_unknown_repeated: "{{ compressor_state == 'unknown' and night_cycle_active and (compressor_unknown_next_count | int(0)) >= 2 }}"
      compressor_inactive_while_cool: "{{ hvac_mode == 'cool' and compressor_state == 'inactive_probable' }}"
      tin_at_cycle_start: "{{ states('input_number.ac_night_tin_at_cycle_start') | float(tin) }}"
      hin_at_cycle_start: "{{ states('input_number.ac_night_hin_at_cycle_start') | float(hin) }}"
      dew_at_cycle_start: "{{ states('input_number.ac_night_dew_at_cycle_start') | float(dew_point_night) }}"
      dew_not_improving: "{{ (night_cycle_elapsed_min | float(0)) >= 20 and (dew_point_night | float(0)) >= 14.8 and ((dew_at_cycle_start | float(dew_point_night)) - (dew_point_night | float(0))) < 0.4 }}"
      humidity_not_improving: "{{ (night_cycle_elapsed_min | float(0)) >= 20 and (hin | float(0)) >= 58 and ((hin_at_cycle_start | float(hin)) - (hin | float(0))) < 2.0 }}"
      night_reinforcement_count_raw: "{{ states('input_number.ac_night_cool_reinforcement_count') | int(0) }}"
      night_reinforcement_count: "{{ night_reinforcement_count_raw | int(0) if night_cycle_active else 0 }}"
      night_reinforcement_due_count_normal: "{% set elapsed = night_cycle_elapsed_min | float(0) %}{{ ([3, 3 if elapsed >= 80 else 2 if elapsed >= 50 else 1 if elapsed >= 20 else 0] | min) if night_cycle_active else 0 }}"
      night_reinforcement_due_count_hum: "{% set elapsed = night_cycle_elapsed_min | float(0) %}{% if not night_cycle_active %}0{% elif muggy_severe %}{{ 3 if elapsed >= 55 else 2 if elapsed >= 35 else 1 if elapsed >= 15 else 0 }}{% elif muggy_high or dew_not_improving or humidity_not_improving or (compressor_inactive_while_cool and muggy_high) %}{{ 3 if elapsed >= 70 else 2 if elapsed >= 45 else 1 if elapsed >= 20 else 0 }}{% else %}0{% endif %}"
      night_reinforcement_due_count: "{{ [3, [night_reinforcement_due_count_normal | int(0), night_reinforcement_due_count_hum | int(0)] | max] | min }}"
      night_reinforcement_primary_cause: "{% if compressor_inactive_while_cool and muggy_high %}compressor_inactive_muggy{% elif dew_not_improving %}dew_not_improving{% elif humidity_not_improving %}humidity_not_improving{% elif muggy_severe %}muggy_severe{% elif muggy_high %}muggy_high{% else %}thermal_progressive{% endif %}"
      night_reinforcement_flags: "muggy_high={{ 1 if muggy_high else 0 }},muggy_severe={{ 1 if muggy_severe else 0 }},dew_not_improving={{ 1 if dew_not_improving else 0 }},humidity_not_improving={{ 1 if humidity_not_improving else 0 }},compressor_inactive={{ 1 if compressor_inactive_while_cool else 0 }}"
      night_reinforcement_reason: "{% if night_reinforcement_primary_cause == 'compressor_inactive_muggy' %}compressor_inactive_muggy{% elif night_reinforcement_primary_cause in ['dew_not_improving', 'humidity_not_improving', 'muggy_severe', 'muggy_high'] %}humidity_dew{% else %}thermal_progressive{% endif %}"
      sp_cool_effective: "{{ [hvac_min_sp | int, ((sp_cool_target | int) - (night_reinforcement_count | int(0)))] | max }}"
      sp_cool_reinforced_next: "{{ [hvac_min_sp | int, ((sp_cool_target | int) - (night_reinforcement_due_count | int(0)))] | max }}"
      fan_modes_supported: "{{ state_attr(climate_ent,'fan_modes') | default([], true) }}"
      humidity_fan_boost_enabled: "{{ is_state('input_boolean.ac_night_enable_humidity_fan_boost','on') }}"
      humidity_fan_boost_started_ts_raw: "{{ as_timestamp(states('input_datetime.ac_night_humidity_fan_boost_started_ts'), 0) | int(0) }}"
      humidity_fan_boost_elapsed_min: "{{ ([0, (((as_timestamp(now()) | int) - (humidity_fan_boost_started_ts_raw | int(0))) / 60)] | max) | round(1) if (humidity_fan_boost_started_ts_raw | int(0)) > 0 else 9999 }}"
      humidity_fan_target: "{% if compressor_state == 'active' and muggy_severe and 'High' in fan_modes_supported %}High{% elif compressor_state == 'active' and muggy_high and 'Med' in fan_modes_supported %}Med{% elif compressor_state == 'unknown' and humidity_fan_boost_enabled and muggy_high and (humidity_fan_boost_elapsed_min | float(9999)) < 15 and 'Med' in fan_modes_supported %}Med{% else %}Low{% endif %}"
      night_contract_signature: "sp={{ sp_cool_target }}|off={{ off_cool }}|on={{ on_cool }}|col={{ col_idx }}|franja={{ franja }}|clima={{ weather_state }}|comfort={{ night_comfort_pressure }}|muggy={{ muggy_high }}|compressor={{ compressor_state }}"
      night_resync_sp_needed: "{{ hvac_mode == 'cool' and presencia_ok and sp_reportado_actual is not none and (sp_reportado_actual | float) != (sp_cool_effective | float) }}"
      night_resync_fan_needed: "{{ hvac_mode == 'cool' and presencia_ok and fan_mode_actual != humidity_fan_target }}"
      auto_off_pending_raw: "{{ states('input_text.ac_night_auto_off_pending_payload') }}"
      auto_off_pending_kind: "{{ auto_off_pending_raw.split('kind=')[1].split('|')[0] if 'kind=' in auto_off_pending_raw else '' }}"
      auto_off_pending_climate: "{{ auto_off_pending_raw.split('climate=')[1].split('|')[0] if 'climate=' in auto_off_pending_raw else '' }}"
      auto_off_pending_event: "{{ auto_off_pending_raw.split('event=')[1].split('|')[0] if 'event=' in auto_off_pending_raw else '' }}"
      auto_off_pending_col: "{{ auto_off_pending_raw.split('col=')[1].split('|')[0] if 'col=' in auto_off_pending_raw else '' }}"
      auto_off_pending_exp: "{{ auto_off_pending_raw.split('exp=')[1].split('|')[0] if 'exp=' in auto_off_pending_raw else '0' }}"
      auto_off_pending_trace: "{{ auto_off_pending_raw.split('trace=')[1].split('|')[0] if 'trace=' in auto_off_pending_raw else '' }}"
      auto_off_pending_result: "{{ auto_off_pending_raw.split('result=')[1].split('|')[0] if 'result=' in auto_off_pending_raw else '' }}"
      auto_off_pending_retry: "{{ auto_off_pending_raw.split('retry=')[1].split('|')[0] if 'retry=' in auto_off_pending_raw else '0' }}"
      auto_off_pending_same_context: "{{ auto_off_pending_kind == 'night_auto_off_pending' and auto_off_pending_climate == climate_ent and auto_off_pending_event == 'AUTO_OFF_NIGHT_UMBRAL' and auto_off_pending_col == (col_idx | string) and as_timestamp(now())|int <= (auto_off_pending_exp | int(0)) }}"
      auto_off_pending_timeout_retry_allowed: "{{ auto_off_pending_kind == 'night_auto_off_pending' and auto_off_pending_climate == climate_ent and auto_off_pending_event == 'AUTO_OFF_NIGHT_UMBRAL' and auto_off_pending_col == (col_idx | string) and as_timestamp(now())|int <= (auto_off_pending_exp | int(0)) and auto_off_pending_result == 'pending_timeout' and (auto_off_pending_retry | int(0)) < 1 and hvac_mode == 'cool' and tin <= off_cool }}"
      auto_off_pending_recent: "{{ auto_off_pending_kind == 'night_auto_off_pending' and auto_off_pending_climate == climate_ent and auto_off_pending_event == 'AUTO_OFF_NIGHT_UMBRAL' and auto_off_pending_col == (col_idx | string) and as_timestamp(now())|int <= (auto_off_pending_exp | int(0)) and auto_off_pending_result not in ['confirmed','failed','suppressed'] and not (auto_off_pending_result == 'pending_timeout' and (auto_off_pending_retry | int(0)) < 1 and hvac_mode == 'cool' and tin <= off_cool) }}"
      reinforcement_pending_raw: "{{ states('input_text.ac_night_cool_reinforcement_pending_payload') }}"
      reinforcement_pending_kind: "{{ reinforcement_pending_raw.split('kind=')[1].split('|')[0] if 'kind=' in reinforcement_pending_raw else '' }}"
      reinforcement_pending_climate: "{{ reinforcement_pending_raw.split('climate=')[1].split('|')[0] if 'climate=' in reinforcement_pending_raw else '' }}"
      reinforcement_pending_col: "{{ reinforcement_pending_raw.split('col=')[1].split('|')[0] if 'col=' in reinforcement_pending_raw else '' }}"
      reinforcement_pending_due: "{{ reinforcement_pending_raw.split('due=')[1].split('|')[0] if 'due=' in reinforcement_pending_raw else '0' }}"
      reinforcement_pending_sp: "{{ reinforcement_pending_raw.split('sp=')[1].split('|')[0] if 'sp=' in reinforcement_pending_raw else '' }}"
      reinforcement_pending_exp: "{{ reinforcement_pending_raw.split('exp=')[1].split('|')[0] if 'exp=' in reinforcement_pending_raw else '0' }}"
      reinforcement_pending_retry_at: "{{ reinforcement_pending_raw.split('retry_at=')[1].split('|')[0] if 'retry_at=' in reinforcement_pending_raw else '0' }}"
      reinforcement_pending_result: "{{ reinforcement_pending_raw.split('result=')[1].split('|')[0] if 'result=' in reinforcement_pending_raw else '' }}"
      reinforcement_pending_same_step: "{{ reinforcement_pending_kind == 'night_reinforcement_pending' and reinforcement_pending_climate == climate_ent and reinforcement_pending_col == (col_idx | string) and (reinforcement_pending_due | int(0)) == (night_reinforcement_due_count | int(0)) and (reinforcement_pending_sp | string) == (sp_cool_reinforced_next | string) and as_timestamp(now())|int <= (reinforcement_pending_exp | int(0)) }}"
      reinforcement_retry_allowed: "{{ not reinforcement_pending_same_step or as_timestamp(now())|int >= (reinforcement_pending_retry_at | int(0)) }}"
      trigger_entity: "{{ trigger.entity_id if trigger is defined and trigger.platform == 'state' else '' }}"
      matrix_trigger_from: "{{ trigger.from_state.state | default('unknown') if trigger is defined and trigger.platform == 'state' and trigger.from_state is defined and trigger.from_state is not none else 'unknown' }}"
      matrix_trigger_to: "{{ trigger.to_state.state | default('unknown') if trigger is defined and trigger.platform == 'state' and trigger.to_state is defined and trigger.to_state is not none else 'unknown' }}"
      matrix_trigger_user_id: "{{ trigger.to_state.context.user_id | default('', true) if trigger is defined and trigger.platform == 'state' and trigger.to_state is defined and trigger.to_state is not none and trigger.to_state.context is defined else '' }}"
      matrix_trigger_transition: "{{ matrix_trigger_from }}->{{ matrix_trigger_to }}"
      manual_on_climate_trigger: "{{ trigger_entity == climate_ent and matrix_trigger_from == 'off' and matrix_trigger_to == 'cool' and matrix_trigger_user_id not in ['', 'none', 'unknown', 'unavailable'] }}"
      manual_on_block_until_raw: "{{ states('input_datetime.ac_night_manual_on_block_auto_off_until') }}"
      manual_on_block_until_ts: "{{ as_timestamp(manual_on_block_until_raw, 0) }}"
      manual_on_block_active: "{{ (manual_on_climate_trigger | bool(false)) or (as_timestamp(now()) | float(0) < (manual_on_block_until_ts | float(0))) }}"
      manual_on_block_until_effective: "{{ (now() + timedelta(minutes=3)).strftime('%Y-%m-%d %H:%M:%S') if (manual_on_climate_trigger | bool(false)) else manual_on_block_until_raw }}"
      hot_learning_recalc_requested: "{{ trigger_entity == 'input_text.ac_night_hot_learning_recalc_payload' }}"
      hot_learning_recalc_payload: "{{ states('input_text.ac_night_hot_learning_recalc_payload') }}"
      hot_learning_recalc_transition: "{{ hot_learning_recalc_payload.split('transition=')[1].split('|')[0] if 'transition=' in hot_learning_recalc_payload else '' }}"
      hot_learning_recalc_col: "{{ hot_learning_recalc_payload.split('col=')[1].split('|')[0] if 'col=' in hot_learning_recalc_payload else '' }}"
      hot_learning_recalc_offset_new: "{{ hot_learning_recalc_payload.split('offset_new=')[1].split('|')[0] if 'offset_new=' in hot_learning_recalc_payload else '' }}"
      hot_learning_recalc_trace: "{{ hot_learning_recalc_payload.split('trace=')[1].split('|')[0] if 'trace=' in hot_learning_recalc_payload else '' }}"
      manual_off_block_until_raw: "{{ states('input_datetime.ac_night_manual_off_block_until') }}"
      manual_off_block_until_ts: "{{ as_timestamp(manual_off_block_until_raw, 0) }}"
      manual_off_block_active: "{{ as_timestamp(now()) | float(0) < (manual_off_block_until_ts | float(0)) }}"
  - service: input_text.set_value
    target: {entity_id: input_text.ac_night_contexto_firma_activa}
    data: {value: "{{ estacion ~ '|' ~ franja ~ '|' ~ weather_state }}"}
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ compressor_state == 'unknown' and night_cycle_active }}"
      sequence:
      - service: input_text.set_value
        target: {entity_id: input_text.ac_night_compressor_unknown_diag_payload}
        data:
          value: "kind=compressor_unknown|cycle={{ night_cycle_started_ts }}|count={{ compressor_unknown_next_count }}|last={{ as_timestamp(now()) | int }}|trace={{ context.id|default('na') }}"
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ compressor_unknown_repeated }}"
          sequence:
          - service: logbook.log
            data:
              name: AC Night
              message: "hito=night_compressor_state_low_confidence | trace_id={{ context.id|default('na') }} | compressor_state=unknown | ac_power_w={{ ac_power_w if ac_power_w is not none else 'none' }} | binary_sensor_ac_compressor_active={{ states('binary_sensor.ac_compressor_active') }} | hvac_action={{ climate_action_raw if climate_action_raw != '' else 'none' }} | night_cycle_elapsed_min={{ night_cycle_elapsed_min }} | ocurrencias_ciclo={{ compressor_unknown_next_count }} | resultado_terminal=diagnostic"
    default:
    - service: input_text.set_value
      target: {entity_id: input_text.ac_night_compressor_unknown_diag_payload}
      data:
        value: "sin_unknown"
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ hvac_mode == 'cool' and compressor_state == 'active' }}"
      sequence:
      - service: input_datetime.set_datetime
        target: {entity_id: input_datetime.ac_night_compressor_last_active_ts}
        data: {datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"}
    - conditions:
      - condition: template
        value_template: "{{ hvac_mode == 'cool' and compressor_state == 'unknown' and humidity_fan_boost_enabled and muggy_high and humidity_fan_boost_elapsed_min > 20 }}"
      sequence:
      - service: input_datetime.set_datetime
        target: {entity_id: input_datetime.ac_night_humidity_fan_boost_started_ts}
        data: {datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"}
      - service: logbook.log
        data:
          name: AC Night
          message: "hito=night_humidity_fan_adjustment | trace_id={{ context.id|default('na') }} | motivo=inicio_boost_experimental | fan_target={{ humidity_fan_target }} | compressor_state={{ compressor_state }} | muggy_high={{ muggy_high }} | limite_min=15 | resultado_terminal=boost_timer_started"
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ hot_learning_recalc_requested }}"
      sequence:
      - service: logbook.log
        data:
          name: AC Night
          message: "hito=night_hot_learning_recalc_triggered | trace_id={{ context.id|default('na') }} | payload={{ hot_learning_recalc_payload }} | col_idx={{ col_idx }} | off_cool={{ off_cool }} | on_cool={{ on_cool }} | sp_cool_target={{ sp_cool_target }} | off_heat={{ off_heat }} | on_heat={{ on_heat }} | sp_heat_target={{ sp_heat_target }} | resultado_terminal=hot_recalc_triggered"
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ not presencia_ok and hvac_mode in ['cool','heat'] }}"
      sequence:
      - variables:
          modo_previo_label: "{% if hvac_mode == 'cool' %}Frío{% elif hvac_mode == 'heat' %}Calor{% else %}Apagado{% endif %}"
          sp_previo_real: "{% set sp_real = state_attr(climate_ent, 'temperature') | float(none) %}{{ sp_real if sp_real is not none else sp_cool_effective | float(sp_cool_target | float) }}"
          sp_previo_real_display: "{% set v = sp_previo_real | float(sp_cool_target | float) %}{{ v | round(1) if (v % 1) != 0 else v | round(0) | int }}"
          sp_previo: "{{ sp_previo_real_display if hvac_mode == 'cool' else sp_heat_target if hvac_mode == 'heat' else sp_cool_target }}"
          temp_apagado_prev: "{{ off_cool if hvac_mode == 'cool' else off_heat if hvac_mode == 'heat' else off_cool }}"
      - service: input_text.set_value
        target: {entity_id: input_text.ac_night_auto_origin_payload}
        data:
          value: "kind=night_auto|trace_id={{ context.id|default('na') }}|last_action=turn_off|expected_transition={{ hvac_mode }}->off|expires_at={{ (as_timestamp(now()) + 30) | int }}|consumed=0"
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ muggy_guard_active and muggy_guard_force_release }}"
          sequence:
          - service: logbook.log
            data:
              name: AC Night
              message: "hito=night_auto_off_humidity_guard_released_by_timeout | trace_id={{ context.id|default('na') }} | col_idx={{ col_idx }} | tin={{ tin }} | off_cool={{ off_cool }} | hin={{ hin }} | dew_point_night={{ dew_point_night }} | elapsed={{ night_cycle_elapsed_min }} | max_elapsed={{ muggy_guard_max_elapsed_min }} | limite_dinamico_min={{ muggy_guard_max_elapsed_min }} | resultado_terminal=release"
      - service: climate.turn_off
        target: {entity_id: "{{ climate_ent }}"}
      - service: input_datetime.set_datetime
        target: {entity_id: input_datetime.ac_night_cool_cycle_started_ts}
        data: {datetime: '1970-01-01 00:00:00'}
