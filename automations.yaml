    `input_text.ac_last_manual_event_type`, limpia `input_select.ac_ultimo_modo_no_fan`
    a `off` y deja la pausa operativa de 5 minutos. No marca feedback de aprendizaje
    ni estado final manual.

    '
  triggers:
  - trigger: state
    entity_id: climate.0200009211c7_climate
    to: 'off'
  conditions:
  - condition: time
    after: 07:01:00
    before: '20:59:00'
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.ac_off_por_automatizacion
        state: 'on'
      sequence:
      - stop: 'Ignorado: AUTO OFF en curso.'
    default: []
  - variables:
      ts: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      final_mode: 'off'
      final_setpoint: "{% set sp = state_attr('climate.0200009211c7_climate','temperature') %}{{ sp if sp is not none else 'n/a' }}"
      final_fan: "{% set fan = state_attr('climate.0200009211c7_climate','fan_mode') %}{{ fan if fan is not none else 'n/a' }}"
      last_auto_ts_raw: '{{ states(''input_datetime.ac_last_auto_ts'') }}'
      last_auto_action: '{{ states(''input_text.ac_last_auto_action'') }}'
      last_auto_mode: '{{ states(''input_text.ac_last_auto_mode'') }}'
      last_auto_branch: '{{ states(''input_text.ac_last_auto_branch'') }}'
      feedback_window_min: '{{ states(''input_number.ac_feedback_window_minutes'') | float(120) }}'
      minutes_since_last_auto: "{% set raw = last_auto_ts_raw | default('', true) | trim %}{% set raw_lower = raw | lower %}{% if raw_lower in ['unknown','unavailable','none',''] %}99999{% else %}{% set ts = as_timestamp(raw, default=none) %}{{ 99999 if ts is none else (((as_timestamp(now()) - ts) / 60) | round(1)) }}{% endif %}"
      manual_event_type: "{% if last_auto_action == 'auto_on' and last_auto_mode in ['cool','heat'] and (minutes_since_last_auto | float(99999)) <= (feedback_window_min | float(120)) %}manual_off_detected_after_recent_auto_on_{{ last_auto_mode }}{% else %}manual_off_detected{% endif %}"
      manual_off_block: 'true'
      presence_effective: 'n/a'
      cool_off_learned: '{{ states(''input_number.ac_cool_off_learned'') | float(24.0) }}'
      bias_heat_on: '{{ states(''input_number.ac_bias_heat_on'') | float(0) }}'
      bias_heat_off: '{{ states(''input_number.ac_bias_heat_off'') | float(0) }}'
      bias_heat_setpoint: '{{ states(''input_number.ac_bias_heat_setpoint'') | float(0) }}'
  - target:
      entity_id: input_datetime.ac_last_manual_off_ts
    data:
      datetime: '{{ ts }}'
    action: input_datetime.set_datetime
  - target:
      entity_id: input_datetime.ac_last_manual_final_ts
    data:
      datetime: '{{ ts }}'
    action: input_datetime.set_datetime
  # Compatibilidad: input_text.set_value se mantiene como service: en esta instancia actual.
  - target:
      entity_id: input_text.ac_last_change_origin
    data:
      value: manual_off
    service: input_text.set_value
  - target:
      entity_id: input_text.ac_last_manual_event_type
    data:
      value: '{{ manual_event_type }}'
    service: input_text.set_value
  - target:
      entity_id: input_select.ac_ultimo_modo_no_fan
    data:
      option: 'off'
    # Consistencia del helper: los apagados manuales limpian el estado a `off`,
    # porque ese valor representa reposo explícito y reemplaza cualquier valor
    # legacy inválido como `False` o la noción previa de `idle`.
    action: input_select.select_option
  - data:
      name: AC Manual OFF
      message: 'manual_off | tipo={{ manual_event_type }} | last_auto={{ last_auto_action }}/{{ last_auto_mode }} | {{ minutes_since_last_auto }} min | helper=off'
      entity_id: climate.0200009211c7_climate
    action: logbook.log
  mode: restart
- id: '1773947560399'
  alias: AC - Manual ON guard + presencia temporal
  description: 'Detecta el encendido manual inicial y, tras estabilizarse el equipo, registra
    el estado final elegido por el usuario. Esta automatización separa ambos momentos:
    `input_datetime.ac_last_manual_on_ts` marca la detección del encendido manual,
    `input_datetime.ac_last_manual_final_ts` marca cuándo quedó consolidado el estado
    final, `input_text.ac_last_manual_event_type` clasifica el evento y los helpers
    `ac_last_manual_final_*` guardan la elección final del usuario. No marca feedback
    de aprendizaje por sí sola.

    '
  triggers:
  - trigger: state
    entity_id: climate.0200009211c7_climate
    from: 'off'
    to:
    - cool
    - heat
    - fan_only
    for: 00:00:02
  conditions:
  - condition: time
    after: 07:01:00
    before: '20:59:00'
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.ac_off_por_automatizacion
        state: 'on'
      sequence:
      - stop: 'Ignorado: AUTO OFF en curso.'
    - conditions:
      - condition: state
        entity_id: input_boolean.ac_on_por_automatizacion
        state: 'on'
      sequence:
      - stop: 'Ignorado: AUTO ON en curso.'
    default: []
  - variables:
      detected_ts: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
  - target:
      entity_id: input_datetime.ac_last_manual_on_ts
    data:
      datetime: '{{ detected_ts }}'
    action: input_datetime.set_datetime
  - target:
      entity_id: input_text.ac_last_change_origin
    data:
      value: manual_on
    service: input_text.set_value
  - target:
      entity_id: input_text.ac_last_manual_event_type
    data:
      value: manual_on_detected
    service: input_text.set_value
  - action: logbook.log
    data:
      name: AC Manual Trace
      message: >-
        manual_on_detected | origin=manual_on | trigger={{ trigger.to_state.state if trigger.to_state else 'unknown' }} | automation_flags=on:{{ states('input_boolean.ac_on_por_automatizacion') }},off:{{ states('input_boolean.ac_off_por_automatizacion') }}
      entity_id: climate.0200009211c7_climate
  - delay: 00:00:15
  - variables:
      climate_ent: climate.0200009211c7_climate
      ts: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      final_mode: '{{ states(climate_ent) }}'
      final_setpoint: '{{ state_attr(climate_ent,''temperature'') | float(none) }}'
      final_fan: "{{ state_attr(climate_ent,'fan_mode')\n   if state_attr(climate_ent,'fan_mode')
        is not none else 'n/a' }}"
      t1: '{{ states(''sensor.lumi_lumi_weather_cuarto_temperatura'') | float(none)
        }}'
      t2: '{{ states(''sensor.lumi_lumi_weather_coco_temperatura'') | float(none)
        }}'
      h1: '{{ states(''sensor.lumi_lumi_weather_cuarto_humedad'') | float(none) }}'
      h2: '{{ states(''sensor.lumi_lumi_weather_coco_humedad'') | float(none) }}'
      tin: "{% if t1 is not none and t2 is not none %}\n  {{ ((t1 + t2) / 2) | round(2)
        }}\n{% elif t1 is not none %}\n  {{ t1 | round(2) }}\n{% elif t2 is not none
        %}\n  {{ t2 | round(2) }}\n{% else %}\n  {{ none }}\n{% endif %}"
      hin: "{% if h1 is not none and h2 is not none %}\n  {{ ((h1 + h2) / 2) | round(1)
        }}\n{% elif h1 is not none %}\n  {{ h1 | round(1) }}\n{% elif h2 is not none
        %}\n  {{ h2 | round(1) }}\n{% else %}\n  {{ none }}\n{% endif %}"
      sensor_delta: "{% if t1 is not none and t2 is not none %}\n  {{ (t1 - t2) |
        abs | round(2) }}\n{% else %}\n  {{ 0 }}\n{% endif %}"
      tout: '{{ state_attr(''weather.openweathermap'',''apparent_temperature'') |
        float(none) }}'
      mov_raw: '{{ states(''binary_sensor.presencia_movimiento_estable'') }}'
      s24_raw: '{{ states(''device_tracker.samsung_s24'') }}'
      person_raw: '{{ states(''person.ivan'') }}'
      presence_ok: '{{ is_state(''binary_sensor.presencia_ok_estable'',''on'') }}'
      presence_real_now: '{{ mov_raw == ''on'' }}'
      presence_phone_home: '{{ (s24_raw in [''home'',''on'']) or (person_raw == ''home'')
        }}'
      manual_presence_until_raw: '{{ states(''input_datetime.ac_manual_presence_until'')
        }}'
      presence_temp_from_manual: "{% if manual_presence_until_raw in ['unknown','unavailable','none','']
        %}\n  false\n{% else %}\n  {{ as_timestamp(now()) < as_timestamp(manual_presence_until_raw)
        }}\n{% endif %}"
      presence_sensor_strict: '{{ presence_ok and presence_real_now }}'
      presence_effective: '{{ presence_phone_home or presence_sensor_strict or presence_temp_from_manual
        }}'
      last_auto_ts_raw: '{{ states(''input_datetime.ac_last_auto_ts'') }}'
      minutes_since_last_auto: "{% set raw = last_auto_ts_raw | default('', true) | trim %}
{% set raw_lower = raw | lower %}
{% if raw_lower in ['unknown','unavailable','none',''] %}
  99999
{% else %}
  {% set ts = as_timestamp(raw, default=none) %}
  {{ 99999 if ts is none else (((as_timestamp(now()) - ts) / 60) | round(1)) }}
{% endif %}"
      last_auto_action: '{{ states(''input_text.ac_last_auto_action'') }}'
      learning_enabled: '{{ is_state(''input_boolean.ac_learning_enabled'',''on'') }}'
      cool_off_learned_raw: '{{ states(''input_number.ac_cool_off_learned'') | float(0) }}'
      cool_learning_summary_raw: '{{ states(''input_text.ac_cool_contextual_learning_map'') | trim }}'
      cool_tod_bucket: "{% set hour = now().hour %}\n{% if 7 <= hour < 13 %}\n  day\n{% elif 13 <= hour < 20 %}\n  tarde\n{% else %}\n  noche\n{% endif %}"
      cool_outdoor_bucket: "{% if tout is none %}\n  exterior_templado\n{% elif (tout | float) >= 29 %}\n  exterior_caliente\n{% else %}\n  exterior_templado\n{% endif %}"
      cool_humidity_bucket: "{% if hin is not none and (hin | float) >= 60 %}\n  humedad_alta\n{% else %}\n  humedad_normal\n{% endif %}"
      cool_presence_bucket: '{{ ''presencia'' if presence_effective else ''ausencia'' }}'
      cool_thermal_trend_bucket: "{% set prev = states('input_number.ac_last_auto_tin') | float(none) %}\n{% if tin is none or prev is none or prev == 0 or (minutes_since_last_auto | float(99999)) > 20 %}\n  estable\n{% else %}\n  {% set delta = (tin | float) - prev %}\n  {{ 'subiendo' if delta >= 0.3 else 'bajando' if delta <= -0.3 else 'estable' }}\n{% endif %}"
      cool_context_bucket: "{{ cool_outdoor_bucket ~ ':' ~ cool_humidity_bucket ~ ':' ~ cool_tod_bucket ~ ':' ~ cool_presence_bucket }}"
      cool_context_detail: "{{ cool_context_bucket ~ ':' ~ cool_thermal_trend_bucket }}"
      cool_contextual_base_off: "{% if tout is none %}\n  {{ none }}\n{% elif (tout | float) < 17 %}\n  {{ none }}\n{% else %}\n  {% set base = 24.2 %}\n  {% set base = base - (0.35 if cool_outdoor_bucket == 'exterior_caliente' else 0) %}\n  {% set base = base - (0.20 if cool_humidity_bucket == 'humedad_alta' else 0) %}\n  {% set base = base - (0.15 if cool_tod_bucket == 'day' else 0.05 if cool_tod_bucket == 'tarde' else 0) %}\n  {% set base = base + (0.25 if cool_presence_bucket == 'ausencia' else 0) %}\n  {% set base = base - (0.20 if cool_thermal_trend_bucket == 'subiendo' else -0.10 if cool_thermal_trend_bucket == 'bajando' else 0) %}\n  {% if tin is not none %}\n    {% set demand = ((tin | float) - 23.6) * 0.35 %}\n    {% set base = base - ([demand, 0.45] | min) %}\n  {% endif %}\n  {% if tout is not none %}\n    {% set outdoor_push = ((tout | float) - 24) * 0.03 %}\n    {% set base = base - ([outdoor_push, 0.30] | min) %}\n  {% endif %}\n  {{ [[base, 25.4] | min, 22.4] | max | round(2) }}\n{% endif %}"
      cool_context_learning_helper: '{{ ''input_number.ac_cool_learning_bucket_'' ~ (cool_context_bucket | replace('':'',''_'') ) }}'
      # Dependencia crítica: el guard manual usa el helper contextual si existe y,
      # tras reinicios, cae al resumen corto para no clasificar con datos vacíos.
      cool_context_learning_summary_value: >-
        {% set raw = cool_learning_summary_raw | default('', true) | trim %}
        {% set prefix = cool_context_bucket ~ '=' %}
        {% if raw.startswith(prefix) %}
          {{ raw | replace(prefix, '', 1) | float(none) }}
        {% else %}
          {{ none }}
        {% endif %}
      cool_context_learning_entry: >-
        {% set helper_raw = states(cool_context_learning_helper) %}
        {% set helper_value = helper_raw | float(none) %}
        {{ helper_value if helper_value is not none else cool_context_learning_summary_value }}
      # Cool mantiene geometría simple, pero ahora su base es contextual y el aprendizaje
      # manual se evalúa por bucket. Heat queda fuera de este rediseño por ahora.
      bias_heat_on: '{{ states(''input_number.ac_bias_heat_on'') | float(0) }}'
      bias_heat_setpoint: '{{ states(''input_number.ac_bias_heat_setpoint'') | float(0)
        }}'
      wind_kmh: '{{ state_attr(''weather.openweathermap'',''wind_speed'') | float(0)
        }}'
      wind: '{{ (wind_kmh / 3.6) | round(2) }}'
      heat_force_off_outdoor: 20
      heat_on_base: "{% if tout is none %}\n  {{ none }}\n{% else %}\n  {% set base
        = 23.0 if tout <= 5 else 22.0 if tout >= 17 else (23.0 - ((tout-5)/12)) %}\n
        \  {{ (base + min(wind*0.05,0.8)) | round(2) }}\n{% endif %}"
      heat_on: "{% if heat_on_base is none %}\n  {{ none }}\n{% else %}\n  {% set raw
        = (heat_on_base | float) + (bias_heat_on if learning_enabled else 0) %}\n  {{
        [[raw, 23.8] | min, 21.0] | max | round(2) }}\n{% endif %}"
      heat_setpoint: '{% set raw = 28 + (bias_heat_setpoint if learning_enabled else
        0) %} {{ [[raw, 30] | min, 24] | max | round(1) }}'
      cool_on_base: "{% if tout is none %}\n  {{ none }}\n{% elif tout < 17 %}\n  {{
        none }}\n{% else %}\n  {% set anchor_tout = 18.1 %}\n  {% set anchor_cool_on
        = 24.0 %}\n  {% set k = 0.10 %}\n  {% set offset = 0.5 %}\n  {% set humidity_adj
        = 0 if hin is none else (-0.25 if hin >= 65 else -0.10 if hin >= 58 else 0)
        %}\n  {% set raw = (anchor_cool_on - (k * (tout - anchor_tout))) + offset + humidity_adj
        %}\n  {{ [[raw, 24.7] | min, 24.0] | max | round(2) }}\n{% endif %}"
      cool_off_target: "{% if cool_contextual_base_off is none %}\n  {{ none }}\n{% else %}\n  {% set learned = cool_context_learning_entry %}\n  {% set raw = learned if learned is not none else cool_contextual_base_off %}\n  {{ [[raw, 25.7] | min, 22.4] | max | round(2) }}\n{% endif %}"
      cool_off: '{{ cool_off_target }}'
      cool_on_target: "{% if cool_off_target is none %}\n  {{ none }}\n{% else %}\n  {% set raw = (cool_off_target | float) + 0.5 %}\n  {{ [[raw, 26.2] | min, 22.9] | max | round(2) }}\n{% endif %}"
      cool_on: '{{ cool_on_target }}'
      cool_setpoint_theoretical: "{% if cool_off is none %}\n  {{ none }}\n{% else
        %}\n  {{ ((cool_off | float) - 0.5) | round(2) }}\n{% endif %}"
      cool_setpoint: "{% if cool_setpoint_theoretical is none %}\n  {{ none }}\n{% else
        %}\n  {% set raw = cool_setpoint_theoretical | float %}\n  {{ [[raw, 24] | min,
        21] | max | round(1) }}\n{% endif %}"
      auto_on_blocked_by_presence: '{{ not presence_effective }}'
      cool_auto_blocked_by_threshold: "{{ final_mode == 'cool'
   and (
     cool_on is none
     or tin is none
     or (tin | float(0)) < (cool_on | float(999))
   ) }}"
      heat_auto_blocked_by_threshold: "{{ final_mode == 'heat'
   and (
     heat_on is none
     or tin is none
     or (tin | float(999)) > (heat_on | float(-999))
     or (tout | float(99)) >= (heat_force_off_outdoor | float)
   ) }}"
      manual_event_type_final: "{% if final_mode == 'cool' and auto_on_blocked_by_presence %}\n  manual_on_due_to_presence_gap_cool\n{% elif final_mode == 'heat' and auto_on_blocked_by_presence %}\n  manual_on_due_to_presence_gap_heat\n{% elif final_mode in ['cool','heat','fan_only'] and auto_on_blocked_by_presence %}\n  manual_on_due_to_presence_gap\n{% elif final_mode == 'cool' and cool_auto_blocked_by_threshold %}\n  manual_on_due_to_comfort_gap_cool\n{% elif final_mode == 'heat' and heat_auto_blocked_by_threshold %}\n  manual_on_due_to_comfort_gap_heat\n{% else %}\n  manual_on_detected\n{% endif %}"
      manual_presence_until: "{% if (manual_event_type_final | trim) in ['manual_on_due_to_presence_gap','manual_on_due_to_presence_gap_cool','manual_on_due_to_presence_gap_heat'] %}\n  {{ (now() + timedelta(minutes=90)).strftime('%Y-%m-%d %H:%M:%S') }}\n{% else %}\n  {{ states('input_datetime.ac_manual_presence_until') }}\n{% endif %}"
      manual_off_block: '{{ states(''input_boolean.ac_bloqueo_cambio_modo_2h'') }}'
      notify_message: >-
        {% if (manual_event_type_final | trim) in ['manual_on_due_to_presence_gap','manual_on_due_to_presence_gap_cool','manual_on_due_to_presence_gap_heat'] %}AC aprendió: ON manual por ausencia | presencia temporal activada{% else %}AC manual detectado: {{ final_mode }}{% endif %}
  - target:
      entity_id: input_datetime.ac_last_manual_final_ts
    data:
      datetime: '{{ ts }}'
    action: input_datetime.set_datetime
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ (manual_event_type_final | trim) in ['manual_on_due_to_presence_gap','manual_on_due_to_presence_gap_cool','manual_on_due_to_presence_gap_heat'] }}"
      sequence:
      - target:
          entity_id: input_datetime.ac_manual_presence_until
        data:
          datetime: '{{ manual_presence_until }}'
        action: input_datetime.set_datetime
    default: []
  - target:
      entity_id: input_text.ac_last_manual_event_type
    data:
      value: '{{ manual_event_type_final | trim }}'
    service: input_text.set_value
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ (manual_event_type_final | trim) in ['manual_on_due_to_presence_gap','manual_on_due_to_presence_gap_cool','manual_on_due_to_presence_gap_heat'] }}"
      sequence:
      - action: logbook.log
        data:
          name: AC Manual ON
          message: >-
            manual_on_due_to_presence_gap | modo={{ final_mode }} | presencia temporal hasta {{ manual_presence_until }}
          entity_id: climate.0200009211c7_climate
      - data:
          title: AC manual importante
          message: '{{ notify_message }}'
          data:
            ttl: 0
            priority: high
        action: notify.mobile_app_samsung_s24
    default: []
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ final_mode in [''cool'',''heat''] }}'
      sequence:
      - target:
          entity_id: input_select.ac_ultimo_modo_no_fan
        data:
          option: '{{ final_mode if final_mode in [''cool'',''heat''] else ''off'' }}'
        # Si el encendido manual termina en `cool` o `heat`, ese modo sí debe quedar
        # recordado; cualquier otro resultado debe dejar el helper en `off`.
        action: input_select.select_option
    default: []
  - target:
      entity_id: input_text.ac_last_manual_final_mode
    data:
      value: '{{ final_mode }}'
    service: input_text.set_value
  - target:
      entity_id: input_text.ac_last_manual_final_fan
    data:
      value: '{{ final_fan }}'
    service: input_text.set_value
  - target:
      entity_id: input_number.ac_last_manual_tin
    data:
      value: '{{ tin if tin is not none else 0 }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.ac_last_manual_t1
    data:
      value: '{{ t1 if t1 is not none else 0 }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.ac_last_manual_t2
    data:
      value: '{{ t2 if t2 is not none else 0 }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.ac_last_manual_hin
    data:
      value: '{{ hin if hin is not none else 0 }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.ac_last_manual_tout
    data:
      value: '{{ tout if tout is not none else 0 }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.ac_last_manual_setpoint
    data:
      value: '{{ final_setpoint if final_setpoint is not none else 0 }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.ac_last_manual_sensor_delta
    data:
      value: '{{ sensor_delta }}'
    action: input_number.set_value
  - target:
      entity_id: input_number.ac_last_manual_final_setpoint
    data:
      value: '{{ final_setpoint if final_setpoint is not none else 0 }}'
    action: input_number.set_value
  mode: restart

- id: ac_cool_manual_setpoint_feedback
  alias: AC - Feedback manual de setpoint en cool activo
  description: >-
    Detecta cambios manuales del setpoint mientras `cool` sigue activo, ignora
    autoacciones recientes, clasifica si el usuario bajó o subió el SP respecto al
    automático y aprende por bucket contextual. Además distingue ajuste inmediato
    tras auto-on frente a feedback a los 20-40 minutos y, si el ciclo no progresa,
    refuerza el mapa del setpoint efectivo requerido.
  triggers:
  - trigger: state
    entity_id: climate.0200009211c7_climate
    attribute: temperature
  conditions:
  - condition: state
    entity_id: climate.0200009211c7_climate
    state: cool
  actions:
  - variables:
      climate_ent: climate.0200009211c7_climate
      prev_sp: "{{ trigger.from_state.attributes.temperature if trigger.from_state is not none and trigger.from_state.attributes.temperature is defined else none }}"
      new_sp: "{{ trigger.to_state.attributes.temperature if trigger.to_state is not none and trigger.to_state.attributes.temperature is defined else none }}"
      prev_sp_num: '{{ prev_sp | float(none) }}'
      new_sp_num: '{{ new_sp | float(none) }}'
      ts: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      t1: '{{ states(''sensor.lumi_lumi_weather_cuarto_temperatura'') | float(none) }}'
      t2: '{{ states(''sensor.lumi_lumi_weather_coco_temperatura'') | float(none) }}'
      h1: '{{ states(''sensor.lumi_lumi_weather_cuarto_humedad'') | float(none) }}'
      h2: '{{ states(''sensor.lumi_lumi_weather_coco_humedad'') | float(none) }}'
      tin: >-
        {% if t1 is not none and t2 is not none %}{{ ((t1 + t2) / 2) | round(2) }}
        {% elif t1 is not none %}{{ t1 | round(2) }}
        {% elif t2 is not none %}{{ t2 | round(2) }}
        {% else %}{{ none }}{% endif %}
      hin: >-
        {% if h1 is not none and h2 is not none %}{{ ((h1 + h2) / 2) | round(1) }}
        {% elif h1 is not none %}{{ h1 | round(1) }}
        {% elif h2 is not none %}{{ h2 | round(1) }}
        {% else %}{{ none }}{% endif %}
      tout: '{{ state_attr(''weather.openweathermap'',''apparent_temperature'') | float(none) }}'
      presence_effective: >-
        {% set mov_raw = states('binary_sensor.presencia_movimiento_estable') %}
        {% set s24_raw = states('device_tracker.samsung_s24') %}
        {% set person_raw = states('person.ivan') %}
        {% set presence_ok = is_state('binary_sensor.presencia_ok_estable','on') %}
        {% set presence_real_now = mov_raw == 'on' %}
        {% set presence_phone_home = (s24_raw in ['home','on']) or (person_raw == 'home') %}
        {% set manual_presence_until_raw = states('input_datetime.ac_manual_presence_until') %}
        {% set presence_temp_from_manual = manual_presence_until_raw not in ['unknown','unavailable','none',''] and as_timestamp(now()) < as_timestamp(manual_presence_until_raw) %}
        {{ presence_phone_home or (presence_ok and presence_real_now) or presence_temp_from_manual }}
      cool_tod_bucket: >-
        {% set hour = now().hour %}
        {% if 7 <= hour < 13 %}day{% elif 13 <= hour < 20 %}tarde{% else %}noche{% endif %}
      cool_outdoor_bucket: >-
        {% if tout is none %}exterior_templado
        {% elif (tout | float) >= 29 %}exterior_caliente
        {% else %}exterior_templado{% endif %}
      cool_humidity_bucket: >-
        {% if hin is not none and (hin | float) >= 60 %}humedad_alta{% else %}humedad_normal{% endif %}
      cool_presence_bucket: '{{ ''presencia'' if presence_effective else ''ausencia'' }}'
      cool_context_bucket: '{{ cool_outdoor_bucket ~ '':'' ~ cool_humidity_bucket ~ '':'' ~ cool_tod_bucket ~ '':'' ~ cool_presence_bucket }}'
      last_auto_bucket_raw: '{{ states(''input_text.ac_last_auto_context_bucket'') | trim }}'
      cool_bucket_selected: >-
        {% if last_auto_bucket_raw in ['','unknown','unavailable','none'] %}
          {{ cool_context_bucket }}
        {% else %}
          {{ last_auto_bucket_raw.split(':subiendo')[0].split(':bajando')[0].split(':estable')[0] }}
        {% endif %}
      last_auto_setpoint: '{{ states(''input_number.ac_last_auto_setpoint'') | float(none) }}'
      cycle_last_applied_setpoint: '{{ states(''input_number.ac_cool_cycle_last_applied_setpoint'') | float(none) }}'
      last_auto_ts_raw: '{{ states(''input_datetime.ac_last_auto_ts'') }}'
      last_step_ts_raw: '{{ states(''input_datetime.ac_cool_cycle_last_step_at'') }}'
      start_ts_raw: '{{ states(''input_datetime.ac_cool_cycle_started_at'') }}'
      minutes_since_last_auto: >-
        {% set raw = last_auto_ts_raw | default('', true) | trim %}
        {% set raw_lower = raw | lower %}
        {% if raw_lower in ['unknown','unavailable','none',''] %}99999
        {% else %}{% set ts = as_timestamp(raw, default=none) %}{{ 99999 if ts is none else (((as_timestamp(now()) - ts) / 60) | round(1)) }}{% endif %}
      minutes_since_last_step: >-
        {% if last_step_ts_raw in ['unknown','unavailable','none',''] %}99999
        {% else %}{{ ((as_timestamp(now()) - as_timestamp(last_step_ts_raw)) / 60) | round(1) }}{% endif %}
      runtime_min: >-
        {% if start_ts_raw in ['unknown','unavailable','none',''] %}99999
        {% else %}{{ ((as_timestamp(now()) - as_timestamp(start_ts_raw)) / 60) | round(1) }}{% endif %}
      start_temp: '{{ states(''input_number.ac_cool_cycle_start_tin'') | float(none) }}'
      cool_off_target: >-
        {% if states('input_number.ac_last_auto_setpoint') in ['unknown','unavailable','none',''] %}{{ none }}
        {% else %}{{ (states('input_number.ac_last_auto_tin') | float(0)) - ((states('input_number.ac_last_auto_setpoint') | float(0)) - 0.5) }}{% endif %}
      progress_temp: >-
        {% if start_temp is none or tin is none %}{{ none }}
        {% else %}{{ ((start_temp | float) - (tin | float)) | round(2) }}{% endif %}
      remaining_delta: >-
        {% if tin is none or cool_off_target is none %}{{ none }}
        {% else %}{{ ((tin | float) - (cool_off_target | float)) | round(2) }}{% endif %}
      window_min: '{{ states(''input_number.ac_cool_adaptive_window_minutes'') | float(30) }}'
      initial_delay_min: '{{ states(''input_number.ac_cool_adaptive_initial_delay_minutes'') | float(30) }}'
      min_progress_per_window: '{{ states(''input_number.ac_cool_adaptive_min_progress_per_window'') | float(0.3) }}'
      windows_elapsed: '{{ [((runtime_min | float(0)) / (window_min | float(30))), 0] | max | round(2) }}'
      expected_progress: '{{ ((windows_elapsed | float(0)) * (min_progress_per_window | float(0.3))) | round(2) }}'
      insufficient_progress: >-
        {{ progress_temp is not none
           and remaining_delta is not none
           and (runtime_min | float(0)) >= (initial_delay_min | float(30))
           and (remaining_delta | float(0)) > (states('input_number.ac_cool_adaptive_close_enough_delta') | float(0.2))
           and ((progress_temp | float(0)) + 0.05) < (expected_progress | float(0)) }}
      last_auto_action: '{{ states(''input_text.ac_last_auto_action'') }}'
      last_auto_mode: '{{ states(''input_text.ac_last_auto_mode'') }}'
      last_change_origin: '{{ states(''input_text.ac_last_change_origin'') | default('''', true) | trim }}'
      last_change_origin_normalized: >-
        {% set origin = last_change_origin | lower %}
        {% if origin in ['unknown','unavailable','none',''] %}none{% else %}{{ origin }}{% endif %}
      change_matches_last_auto_sp: >-
        {{ last_auto_setpoint is not none
           and new_sp_num is not none
           and (((new_sp_num | float) - (last_auto_setpoint | float)) | abs) <= 0.11 }}
      change_matches_cycle_step_sp: >-
        {{ cycle_last_applied_setpoint is not none
           and new_sp_num is not none
           and (((new_sp_num | float) - (cycle_last_applied_setpoint | float)) | abs) <= 0.11 }}
      recent_auto_cycle_window: >-
        {{ last_auto_mode == 'cool'
           and (
             (minutes_since_last_auto | float(99999)) <= 4
             or (minutes_since_last_step | float(99999)) <= 4
             or (runtime_min | float(99999)) <= 6
           ) }}
      auto_setpoint_recent: >-
        {{ last_auto_mode == 'cool'
           and (
             (
                last_auto_action in ['auto_on','ramp_start']
               and (minutes_since_last_auto | float(99999)) <= 4
               and change_matches_last_auto_sp
             )
             or (
               (minutes_since_last_step | float(99999)) <= 4
               and change_matches_cycle_step_sp
             )
             or (
               recent_auto_cycle_window
               and change_matches_last_auto_sp
             )
           ) }}
      manual_override_candidate: >-
        {{ last_auto_mode == 'cool'
           and last_auto_action == 'auto_on'
           and new_sp_num is not none
           and prev_sp_num is not none
           and ((((new_sp_num | float) - (prev_sp_num | float)) | abs) >= 0.09)
           and last_auto_setpoint is not none
           and ((((new_sp_num | float) - (last_auto_setpoint | float)) | abs) >= 0.2)
           and (minutes_since_last_auto | float(99999)) <= 12
           and (not change_matches_last_auto_sp)
           and (not change_matches_cycle_step_sp) }}
      manual_override_until_ts: >-
        {{ (as_timestamp(now()) + ((states('input_number.ac_manual_setpoint_override_hold_minutes') | float(12)) * 60)) | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}
      manual_override_notify_message: >-
        SP respetado en este ciclo | manual={{ new_sp_num if new_sp_num is not none else 'na' }}
        | auto={{ last_auto_setpoint if last_auto_setpoint is not none else 'na' }}
        | pausa_sync={{ states('input_number.ac_manual_setpoint_override_hold_minutes') | float(12) }} min
        | aprendizaje={{ 'sí' if apply_feedback else 'pendiente' }}
      ignore_reason: >-
        {% if prev_sp_num is none or new_sp_num is none or (((new_sp_num | float) - (prev_sp_num | float)) | abs) < 0.09 %}
          sin_cambio_real
        {% elif is_state('input_boolean.ac_on_por_automatizacion','on') or is_state('input_boolean.ac_off_por_automatizacion','on') %}
          bandera_auto_activa
        {# El equipo/integración puede reflejar con retraso o cuantización el setpoint aplicado.
           Esos ecos/reportes tardíos no deben alimentar aprendizaje manual automáticamente. #}
        {% elif auto_setpoint_recent and (not manual_override_candidate) and last_change_origin_normalized in ['auto_on','auto_off','manual_sp_feedback','cool_cycle_step','cool_sp_sync'] %}
          post_auto_sync
        {% elif auto_setpoint_recent and (minutes_since_last_step | float(99999)) <= 4 and change_matches_cycle_step_sp %}
          setpoint_echo_from_device
        {% elif auto_setpoint_recent and recent_auto_cycle_window and change_matches_last_auto_sp %}
          device_report_lag
        {% elif auto_setpoint_recent %}
          autoaccion_reciente
        {% elif last_change_origin_normalized in ['auto_on','auto_off','cool_cycle_step','cool_sp_sync'] and recent_auto_cycle_window %}
          post_auto_sync
        {% elif last_change_origin_normalized in ['auto_on','auto_off'] and (minutes_since_last_auto | float(99999)) <= 0.5 %}
          origen_auto_reciente
        {% else %}
          none
        {% endif %}
      delta_sp: '{{ ((new_sp_num | float(0)) - (last_auto_setpoint | float(new_sp_num | float(0)))) | round(2) if new_sp_num is not none else none }}'
      manual_feedback_kind: >-
        {% if ignore_reason != 'none' %}ignored
        {% elif last_auto_setpoint is none %}manual_sp_without_auto_reference
        {% elif (delta_sp | float(0)) < -0.09 %}manual_sp_lower_than_auto
        {% elif (delta_sp | float(0)) > 0.09 %}manual_sp_higher_than_auto
        {% else %}manual_sp_equal_to_auto
        {% endif %}
      feedback_phase: >-
        {% if (runtime_min | float(99999)) <= 8 %}ajuste_inmediato_post_auto_on
        {% elif 20 <= (runtime_min | float(99999)) <= 40 %}ajuste_20_40_min
        {% else %}ajuste_intermedio
        {% endif %}
      stabilization_window_active: '{{ (runtime_min | float(99999)) <= 1 }}'
      apply_feedback: '{{ ignore_reason == ''none'' and manual_feedback_kind in [''manual_sp_lower_than_auto'',''manual_sp_higher_than_auto''] }}'
      feedback_policy: >-
        {% if not apply_feedback %}sin_feedback
        {% elif stabilization_window_active %}solo_aprendizaje_futuro
        {% elif manual_override_candidate %}aprendizaje_y_adopcion_inmediata
        {% else %}solo_aprendizaje_futuro
        {% endif %}
      manual_override_should_activate: '{{ feedback_policy == ''aprendizaje_y_adopcion_inmediata'' }}'
      learning_applied_this_cycle: '{{ feedback_policy == ''aprendizaje_y_adopcion_inmediata'' }}'
      sync_should_pause_after_feedback: '{{ feedback_policy == ''solo_aprendizaje_futuro'' and stabilization_window_active }}'
      feedback_mobile_notify: '{{ apply_feedback and (not stabilization_window_active) }}'
      manual_sp_override_active: '{{ is_state(''input_boolean.ac_manual_setpoint_override_active'',''on'') }}'
      effective_summary_raw: '{{ states(''input_text.ac_cool_effective_setpoint_map'') | trim }}'
      effective_bucket_helper: '{{ ''input_number.ac_cool_effective_sp_bucket_'' ~ (cool_bucket_selected | replace('':'',''_'') ) }}'
      # Dependencia crítica: el aprendizaje avanzado de setpoint toma primero el
      # helper por bucket; si aún no existe/cargó, usa el último resumen persistido.
      effective_bucket_summary_value: >-
        {% set raw = effective_summary_raw | default('', true) | trim %}
        {% set prefix = cool_bucket_selected ~ '=' %}
        {% if raw.startswith(prefix) %}
          {{ raw | replace(prefix, '', 1) | float(none) }}
        {% else %}
          {{ none }}
        {% endif %}
      effective_bucket_previous_value: >-
        {% set helper_raw = states(effective_bucket_helper) %}
        {% set helper_value = helper_raw | float(none) %}
        {{ helper_value if helper_value is not none else (effective_bucket_summary_value if effective_bucket_summary_value is not none else (last_auto_setpoint if last_auto_setpoint is not none else new_sp_num)) }}
      effective_sp_soft_gap: '{{ states(''input_number.ac_cool_effective_sp_soft_gap'') | float(0.8) }}'
      effective_sp_hard_gap: '{{ states(''input_number.ac_cool_effective_sp_hard_gap'') | float(1.4) }}'
      effective_sp_previous_delta_from_auto: >-
        {% if effective_bucket_previous_value is none or last_auto_setpoint is none %}
          {{ none }}
        {% else %}
          {{ ((effective_bucket_previous_value | float) - (last_auto_setpoint | float)) | abs | round(2) }}
        {% endif %}
      effective_sp_inconsistency_reason: >-
        {% if effective_sp_previous_delta_from_auto is none %}
          none
        {% elif (effective_sp_previous_delta_from_auto | float(0)) >= (effective_sp_hard_gap | float(1.4)) and feedback_phase == 'ajuste_inmediato_post_auto_on' %}
          hard_recent_feedback
        {% elif (effective_sp_previous_delta_from_auto | float(0)) >= (effective_sp_hard_gap | float(1.4)) %}
          hard_gap
        {% elif (effective_sp_previous_delta_from_auto | float(0)) >= (effective_sp_soft_gap | float(0.8)) %}
          soft_gap
        {% else %}
          none
        {% endif %}
      feedback_weight: >-
        {% if feedback_phase == 'ajuste_inmediato_post_auto_on' %}0.18
        {% elif feedback_phase == 'ajuste_20_40_min' %}0.55
        {% else %}0.40{% endif %}
      effective_sp_feedback_weight: >-
        {% if effective_sp_inconsistency_reason in ['hard_recent_feedback','hard_gap'] %}0
        {% elif stabilization_window_active %}{{ [feedback_weight | float(0.18), 0.12] | min }}
        {% elif effective_sp_inconsistency_reason == 'soft_gap' %}{{ [feedback_weight | float(0.4), 0.20] | min }}
        {% else %}{{ feedback_weight }}
        {% endif %}
      effective_sp_after: >-
        {% if not apply_feedback %}
          {{ effective_bucket_previous_value | float(none) }}
        {% elif (effective_sp_feedback_weight | float(0)) <= 0 %}
          {{ last_auto_setpoint | float(new_sp_num | float(0)) | round(2) }}
        {% else %}
          {% set base = effective_bucket_previous_value | float(last_auto_setpoint | float(new_sp_num | float(0))) %}
          {% set manual = new_sp_num | float(base) %}
          {% set weight = effective_sp_feedback_weight | float(0.4) %}
          {% set blended = (base * (1 - weight)) + (manual * weight) %}
          {{ [[blended, 24] | min, 20] | max | round(2) }}
        {% endif %}
      effective_summary: '{{ ((cool_bucket_selected ~ ''='' ~ (''%.2f'' | format(effective_sp_after | float(0))))[:255]) }}'
      cool_learning_summary_raw: '{{ states(''input_text.ac_cool_contextual_learning_map'') | trim }}'
      cool_learning_bucket_helper: '{{ ''input_number.ac_cool_learning_bucket_'' ~ (cool_bucket_selected | replace('':'',''_'') ) }}'
      cool_learning_bucket_summary_value: >-
        {% set raw = cool_learning_summary_raw | default('', true) | trim %}
        {% set prefix = cool_bucket_selected ~ '=' %}
        {% if raw.startswith(prefix) %}
          {{ raw | replace(prefix, '', 1) | float(none) }}
        {% else %}
          {{ none }}
        {% endif %}
      cool_learning_previous_value: >-
        {% set helper_raw = states(cool_learning_bucket_helper) %}
        {% set helper_value = helper_raw | float(none) %}
        {{ helper_value if helper_value is not none else (cool_learning_bucket_summary_value if cool_learning_bucket_summary_value is not none else ((last_auto_setpoint | float(new_sp_num | float(24))) + 0.5)) }}
      reinforce_effective_needed: '{{ apply_feedback and manual_feedback_kind == ''manual_sp_lower_than_auto'' and insufficient_progress }}'
      cool_learning_after: >-
        {% if not reinforce_effective_needed %}
          {{ cool_learning_previous_value | float(none) }}
        {% else %}
          {% set target = (new_sp_num | float(24)) + 0.5 %}
          {% set lowered = ((cool_learning_previous_value | float(target)) * 0.65) + (target * 0.35) %}
          {{ [[lowered, 25.7] | min, 22.4] | max | round(2) }}
        {% endif %}
      cool_learning_summary: >-
        {% set final_value = cool_learning_after if reinforce_effective_needed else cool_learning_previous_value %}
        {{ ((cool_bucket_selected ~ '=' ~ ('%.2f' | format(final_value | float(0))))[:255]) }}
      compact_context: >-
        tin={{ tin if tin is not none else 'na' }},tout={{ tout if tout is not none else 'na' }},h={{ hin if hin is not none else 'na' }},hr={{ now().strftime('%H:%M') }},p={{ '1' if presence_effective else '0' }},m={{ runtime_min }}
      audit_message: >-
        {% if apply_feedback %}
          sp_manual_feedback | política={{ 'solo aprendizaje futuro' if feedback_policy == 'solo_aprendizaje_futuro' else 'aprendizaje + adopción inmediata' }} | SP auto={{ last_auto_setpoint if last_auto_setpoint is not none else 'na' }} | SP manual={{ new_sp_num }} | ΔSP={{ delta_sp }} | tipo={{ manual_feedback_kind }} | fase={{ feedback_phase }} | SPh(hist_prev)={{ effective_bucket_previous_value if effective_bucket_previous_value is not none else 'na' }} | W={{ effective_sp_feedback_weight }} | sanity={{ effective_sp_inconsistency_reason }} | ctx={{ compact_context }} | bucket={{ cool_bucket_selected }}{% if reinforce_effective_needed %} | refuerzo=sp_efectivo{% endif %}{% if sync_should_pause_after_feedback %} | sync=pausado{% endif %}
        {% else %}
          sp_manual_feedback_ignored | SPsrc={{ 'device_echo' if ignore_reason in ['setpoint_echo_from_device','device_report_lag','post_auto_sync'] else 'manual_candidate' }} | SP auto={{ last_auto_setpoint if last_auto_setpoint is not none else 'na' }} | SP manual={{ new_sp_num if new_sp_num is not none else 'na' }} | ΔSP={{ delta_sp if delta_sp is not none else 'na' }} | SPh(hist_prev)={{ effective_bucket_previous_value if effective_bucket_previous_value is not none else 'na' }} | reason={{ ignore_reason if ignore_reason != 'none' else effective_sp_inconsistency_reason }} | ctx={{ compact_context }} | bucket={{ cool_bucket_selected }}
        {% endif %}
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ apply_feedback }}'
      sequence:
      - target:
          entity_id: input_text.ac_last_change_origin
        data:
          value: '{{ ''manual_override'' if manual_override_should_activate else (''manual_sp_feedback_future_only'' if sync_should_pause_after_feedback else ''manual_sp_feedback'') }}'
        service: input_text.set_value
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ manual_override_should_activate }}'
          sequence:
          - target:
              entity_id: input_boolean.ac_manual_setpoint_override_active
            action: input_boolean.turn_on
          - target:
              entity_id: input_datetime.ac_manual_setpoint_override_until
            data:
              datetime: '{{ manual_override_until_ts }}'
            action: input_datetime.set_datetime
          - target:
              entity_id: input_number.ac_cool_cycle_last_applied_setpoint
            data:
              value: '{{ new_sp_num if new_sp_num is not none else 0 }}'
            action: input_number.set_value
        default: []
      - target:
          entity_id: input_text.ac_last_manual_learning_type
        data:
          value: '{{ manual_feedback_kind }}:{{ feedback_phase }}:{{ effective_sp_inconsistency_reason }}{% if reinforce_effective_needed %}:refuerzo{% endif %}'
        service: input_text.set_value
      - target:
          entity_id: '{{ effective_bucket_helper }}'
        data:
          value: '{{ effective_sp_after }}'
        action: input_number.set_value
      - target:
          entity_id: input_text.ac_cool_effective_setpoint_map
        data:
          value: '{{ effective_summary }}'
        service: input_text.set_value
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ reinforce_effective_needed }}'
          sequence:
          - target:
              entity_id: '{{ cool_learning_bucket_helper }}'
            data:
              value: '{{ cool_learning_after }}'
            action: input_number.set_value
          - target:
              entity_id: input_text.ac_cool_contextual_learning_map
            data:
              value: '{{ cool_learning_summary }}'
            service: input_text.set_value
        default: []
      - target:
          entity_id: input_number.ac_last_manual_setpoint
        data:
          value: '{{ new_sp_num if new_sp_num is not none else 0 }}'
        action: input_number.set_value
      - action: logbook.log
        data:
          name: AC Manual SP
          message: '{{ audit_message }}'
          entity_id: '{{ climate_ent }}'
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ feedback_mobile_notify }}'
          sequence:
          - data:
              title: '{{ ''AC SP respetado'' if manual_override_should_activate else ''AC feedback SP'' }}'
              message: >-
                {% if manual_override_should_activate %}
                  {{ manual_override_notify_message }}{% if learning_applied_this_cycle %} || SP aprendido para próxima vez | {{ audit_message }}{% endif %}
                {% else %}
                  SP aprendido para próxima vez | {{ audit_message }}
                {% endif %}
              data:
                ttl: 0
                priority: high
            action: notify.mobile_app_samsung_s24
        default: []
    default:
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ manual_sp_override_active }}'
        sequence:
        - target:
            entity_id: input_text.ac_last_change_origin
          data:
            value: manual_override
          service: input_text.set_value
      - conditions:
        - condition: template
          value_template: "{{ ignore_reason in ['setpoint_echo_from_device','device_report_lag','post_auto_sync'] }}"
        sequence:
        - target:
            entity_id: input_text.ac_last_change_origin
          data:
            value: device_echo
          service: input_text.set_value
      default: []
    - action: logbook.log
      data:
        name: AC Manual SP
        message: '{{ audit_message }}'
        entity_id: '{{ climate_ent }}'
  mode: restart

- id: ac_cool_adaptive_setpoint_runtime
  alias: AC - Cool setpoint adaptativo en ciclo activo
  trigger:
  - platform: time_pattern
    minutes: '/5'
  - platform: state
    entity_id: climate.0200009211c7_climate
  condition: []
  action:
  - variables:
      climate_ent: climate.0200009211c7_climate
      t1: '{{ states(''sensor.lumi_lumi_weather_cuarto_temperatura'') | float(none) }}'
      t2: '{{ states(''sensor.lumi_lumi_weather_coco_temperatura'') | float(none) }}'
      tin: >-
        {% if t1 is not none and t2 is not none %}{{ ((t1 + t2) / 2) | round(2) }}
        {% elif t1 is not none %}{{ t1 | round(2) }}
        {% elif t2 is not none %}{{ t2 | round(2) }}
        {% else %}{{ none }}{% endif %}
      cycle_active: '{{ is_state(''input_boolean.ac_cool_adaptive_cycle_active'',''on'') }}'
      cur_mode: '{{ states(climate_ent) }}'
      last_auto_action: '{{ states(''input_text.ac_last_auto_action'') }}'
      last_auto_mode: '{{ states(''input_text.ac_last_auto_mode'') }}'
      active_bucket: '{{ states(''input_text.ac_last_auto_context_bucket'') | trim }}'
      cool_off_target: '{{ states(''input_number.ac_last_auto_tin'') | float(0) - (states(''input_number.ac_last_auto_setpoint'') | float(0) - 0.5) if states(''input_number.ac_last_auto_setpoint'') not in [''unknown'',''unavailable'',''none'',''''] else none }}'
      start_ts_raw: '{{ states(''input_datetime.ac_cool_cycle_started_at'') }}'
      last_step_ts_raw: '{{ states(''input_datetime.ac_cool_cycle_last_step_at'') }}'
      start_temp: '{{ states(''input_number.ac_cool_cycle_start_tin'') | float(none) }}'
      current_setpoint: '{{ state_attr(climate_ent,''temperature'') | float(states(''input_number.ac_cool_cycle_last_applied_setpoint'') | float(0)) }}'
      manual_sp_override_active: '{{ is_state(''input_boolean.ac_manual_setpoint_override_active'',''on'') }}'
      manual_sp_override_until_raw: '{{ states(''input_datetime.ac_manual_setpoint_override_until'') }}'
      manual_sp_override_minutes_left: >-
        {% if manual_sp_override_until_raw in ['unknown','unavailable','none',''] %}0
        {% else %}{{ [((as_timestamp(manual_sp_override_until_raw) - as_timestamp(now())) / 60), 0] | max | round(1) }}{% endif %}
      window_min: '{{ states(''input_number.ac_cool_adaptive_window_minutes'') | float(30) }}'
      initial_delay_min: '{{ states(''input_number.ac_cool_adaptive_initial_delay_minutes'') | float(30) }}'
      step_size: '{{ states(''input_number.ac_cool_adaptive_step'') | float(0.5) }}'
      min_setpoint: '{{ states(''input_number.ac_cool_adaptive_min_setpoint'') | float(20) }}'
      min_progress_per_window: '{{ states(''input_number.ac_cool_adaptive_min_progress_per_window'') | float(0.3) }}'
      close_enough_delta: '{{ states(''input_number.ac_cool_adaptive_close_enough_delta'') | float(0.2) }}'
      runtime_min: >-
        {% if start_ts_raw in ['unknown','unavailable','none',''] %}0
        {% else %}{{ ((as_timestamp(now()) - as_timestamp(start_ts_raw)) / 60) | round(1) }}{% endif %}
      minutes_since_last_step: >-
        {% if last_step_ts_raw in ['unknown','unavailable','none',''] %}99999
        {% else %}{{ ((as_timestamp(now()) - as_timestamp(last_step_ts_raw)) / 60) | round(1) }}{% endif %}
      progress_temp: >-
        {% if start_temp is none or tin is none %}{{ none }}
        {% else %}{{ ((start_temp | float) - (tin | float)) | round(2) }}{% endif %}
      remaining_delta: >-
        {% if tin is none or cool_off_target is none %}{{ none }}
        {% else %}{{ ((tin | float) - (cool_off_target | float)) | round(2) }}{% endif %}
      windows_elapsed: '{{ [((runtime_min | float(0)) / (window_min | float(30))), 0] | max | round(2) }}'
      expected_progress: '{{ ((windows_elapsed | float(0)) * (min_progress_per_window | float(0.3))) | round(2) }}'
      insufficient_progress: "{{ progress_temp is not none and remaining_delta is not none and (runtime_min | float(0)) >= (initial_delay_min | float(30)) and (minutes_since_last_step | float(99999)) >= (window_min | float(30)) and (remaining_delta | float(0)) > (close_enough_delta | float(0.2)) and ((progress_temp | float(0)) + 0.05) < (expected_progress | float(0)) }}"
      next_setpoint: '{{ [((current_setpoint | float(99)) - (step_size | float(0.5))), (min_setpoint | float(20))] | max | round(1) }}'
      can_reduce: '{{ (current_setpoint | float(99)) > (min_setpoint | float(20)) and (next_setpoint | float(99)) < (current_setpoint | float(99)) }}'
      effective_bucket: >-
        {% set raw = active_bucket %}
        {% if raw in ['','unknown','unavailable','none'] %}exterior_templado:humedad_normal:day:presencia
        {% else %}{{ raw.split(':subiendo')[0].split(':bajando')[0].split(':estable')[0] }}{% endif %}
      effective_bucket_helper: '{{ ''input_number.ac_cool_effective_sp_bucket_'' ~ (effective_bucket | replace('':'',''_'') ) }}'
      effective_summary: '{{ ((effective_bucket ~ ''='' ~ (''%.2f'' | format(current_setpoint | float)))[:255]) }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ cycle_active and (cur_mode != ''cool'' or last_auto_mode != ''cool'' or last_auto_action != ''auto_on'') }}'
      sequence:
      - target:
          entity_id: input_boolean.ac_cool_adaptive_cycle_active
        action: input_boolean.turn_off
      - stop: Ciclo adaptativo limpiado por cambio de modo.
    - conditions:
      - condition: template
        value_template: '{{ manual_sp_override_active and (manual_sp_override_minutes_left | float(0)) <= 0 }}'
      sequence:
      - target:
          entity_id: input_boolean.ac_manual_setpoint_override_active
        action: input_boolean.turn_off
      - action: logbook.log
        data:
          name: AC Auto Trace
          message: >-
            manual_override_expirado | ciclo_adaptativo_rehabilitado
          entity_id: '{{ climate_ent }}'
    - conditions:
      - condition: template
        value_template: '{{ cycle_active and cur_mode == ''cool'' and remaining_delta is not none and (remaining_delta | float(999)) <= (close_enough_delta | float(0.2)) }}'
      sequence:
      - target:
          entity_id: '{{ effective_bucket_helper }}'
        data:
          value: '{{ current_setpoint }}'
        action: input_number.set_value
      - target:
          entity_id: input_text.ac_cool_effective_setpoint_map
        data:
          value: '{{ effective_summary }}'
        service: input_text.set_value
      - action: logbook.log
        data:
          name: AC Auto Trace
          message: >-
            cool_adaptive_effective | bucket={{ effective_bucket }} | init={{ start_temp }} | now={{ tin }} | remain={{ remaining_delta }} | sp_final={{ current_setpoint }} | runtime={{ runtime_min }}
          entity_id: '{{ climate_ent }}'
    - conditions:
      - condition: template
        value_template: '{{ cycle_active and cur_mode == ''cool'' and manual_sp_override_active }}'
      sequence:
      - target:
          entity_id: input_text.ac_last_change_origin
        data:
          value: manual_override
        service: input_text.set_value
      - action: logbook.log
        data:
          name: AC Auto Trace
          message: >-
            cool_adaptive_suspendido | origen=manual_override | min_restantes={{ manual_sp_override_minutes_left }} | sp_actual={{ current_setpoint }}
          entity_id: '{{ climate_ent }}'
    - conditions:
      - condition: template
        value_template: '{{ cycle_active and cur_mode == ''cool'' and insufficient_progress and can_reduce and (not manual_sp_override_active) }}'
      sequence:
      - target:
          entity_id: climate.0200009211c7_climate
        data:
          temperature: '{{ next_setpoint }}'
        action: climate.set_temperature
      - target:
          entity_id: input_number.ac_last_auto_setpoint
        data:
          value: '{{ next_setpoint }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_cool_cycle_last_applied_setpoint
        data:
          value: '{{ next_setpoint }}'
        action: input_number.set_value
      - target:
          entity_id: input_text.ac_last_change_origin
        data:
          value: cool_cycle_step
        service: input_text.set_value
      - target:
          entity_id: input_datetime.ac_cool_cycle_last_step_at
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        action: input_datetime.set_datetime
      - action: logbook.log
        data:
          name: AC Auto Trace
          message: >-
            cool_adaptive_step | SPsrc=adaptive | bucket={{ effective_bucket }} | init={{ start_temp }} | now={{ tin }} | prog={{ progress_temp }} | remain={{ remaining_delta }} | run={{ runtime_min }} | exp={{ expected_progress }} | sp={{ current_setpoint }}→{{ next_setpoint }}
          entity_id: '{{ climate_ent }}'
    - conditions:
      - condition: template
        value_template: '{{ cycle_active and cur_mode == ''cool'' and insufficient_progress and (not can_reduce) }}'
      sequence:
      - action: logbook.log
        data:
          name: AC Auto Trace
          message: >-
            cool_adaptive_floor | bucket={{ effective_bucket }} | init={{ start_temp }} | now={{ tin }} | prog={{ progress_temp }} | remain={{ remaining_delta }} | run={{ runtime_min }} | sp_min={{ min_setpoint }}
          entity_id: '{{ climate_ent }}'
    default: []
  mode: single
