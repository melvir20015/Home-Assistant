    cool_sync_push_enabled: '{{ is_state(''input_boolean.ac_cool_sync_push_enabled'',''on'')
      }}'
    cool_sync_notify_window_min: 20
    last_cool_sync_notify_ts_raw: '{{ states(''input_datetime.ac_last_cool_sp_sync_notify_ts'')
      }}'
    minutes_since_cool_sync_notify: "{% if last_cool_sync_notify_ts_raw in ['unknown','unavailable','none','']
      %}\n  99999\n{% else %}\n  {{ ((as_timestamp(now()) - as_timestamp(last_cool_sync_notify_ts_raw))
      / 60) | round(1) }}\n{% endif %}"
    last_cool_sync_notified_sp: '{{ states(''input_number.ac_last_cool_sp_sync_notified'')
      | float(none) }}'
    last_auto_ts_raw: '{{ states(''input_datetime.ac_last_auto_ts'') }}'
    minutes_since_last_auto: "{% set raw = last_auto_ts_raw | default('', true) |
      trim %} {% set raw_lower = raw | lower %} {% if raw_lower in ['unknown', 'unavailable',
      'none', ''] %}\n  99999\n{% else %}\n  {% set ts = as_timestamp(raw, default=none)
      %}\n  {{ 99999 if ts is none else (((as_timestamp(now()) - ts) / 60) | round(1))
      }}\n{% endif %}"
    cool_sync_recent_auto_on: '{{ states(''input_text.ac_last_auto_action'') == ''auto_on''
      and states(''input_text.ac_last_auto_branch'') == ''cool_normal_on'' and (minutes_since_last_auto
      | float(99999)) <= 3 }}'
    last_auto_action: '{{ states(''input_text.ac_last_auto_action'') }}'
    last_auto_mode: '{{ states(''input_text.ac_last_auto_mode'') }}'
    last_auto_branch: '{{ states(''input_text.ac_last_auto_branch'') }}'
    recent_any_auto_on: "{{ last_auto_action == 'auto_on'\n   and (minutes_since_last_auto
      | float(99999)) <= 2 }}"
    manual_sp_lock_window_min: '{% set raw = states(''input_number.ac_manual_setpoint_override_hold_minutes'')
      | float(50) %} {{ [[raw, 60] | min, 45] | max }}'
    manual_sp_override_hold_minutes: '{{ manual_sp_lock_window_min }}'
    manual_sp_override_until_raw: '{{ states(''input_datetime.ac_manual_setpoint_override_until'')
      }}'
    manual_sp_override_until_ts: "{% set raw = manual_sp_override_until_raw | default('',
      true) | trim %} {% set raw_lower = raw | lower %} {% if raw_lower in ['unknown',
      'unavailable', 'none', ''] %}\n  0\n{% else %}\n  {{ as_timestamp(raw, default=0)
      | float(0) }}\n{% endif %}"
    manual_sp_override_minutes_left: "{% if (manual_sp_override_until_ts | float(0))
      <= 0 %}\n  0\n{% else %}\n  {{ [(((manual_sp_override_until_ts | float(0)) -
      as_timestamp(now())) / 60), 0] | max | round(1) }}\n{% endif %}"
    manual_sp_override_active: "{{ is_state('input_boolean.ac_manual_setpoint_override_active','on')\n
      \  and (manual_sp_override_until_ts | float(0)) > as_timestamp(now()) }}"
    manual_sp_lock_explicit: '{{ is_state(''input_boolean.ac_manual_setpoint_override_active'',''on'')
      }}'
    last_change_origin_raw: '{{ states(''input_text.ac_dda_last_change_origin'') | default('''',
      true) | trim }}'
    manual_sp_recent_user_evidence: "{{ last_auto_mode == 'cool'\n   and last_auto_branch
      == 'cool_normal_on'\n   and (minutes_since_last_auto | float(99999)) <= (manual_sp_lock_window_min
      | float(50))\n   and last_change_origin_raw in ['manual_override','manual_sp_feedback','manual_sp_feedback_future_only']
      }}"
    manual_sp_lock_active: "{{ manual_sp_lock_explicit\n   or manual_sp_recent_user_evidence
      }}"
    manual_sp_protected_lock_active: '{{ manual_sp_lock_active }}'
    manual_sp_lock_recently_expired: "{{ (not manual_sp_protected_lock_active)\n   and
      (manual_sp_override_minutes_left | float(0)) <= 5\n   and (manual_sp_override_until_ts
      | float(0)) > 0 }}"
    cool_setpoint_effective_soft_resume: "{% if cool_setpoint_effective is none or
      ac_set_effective_normalized is none %}\n  {{ cool_setpoint_effective }}\n{%
      elif manual_sp_lock_recently_expired %}\n  {% set step = 0.3 %}\n  {% set delta
      = (cool_setpoint_effective | float) - (ac_set_effective_normalized | float)
      %}\n  {% if (delta | abs) <= step %}\n    {{ cool_setpoint_effective }}\n  {%
      else %}\n    {{ ((ac_set_effective_normalized | float) + (step if delta > 0
      else -step)) | round(2) }}\n  {% endif %}\n{% else %}\n  {{ cool_setpoint_effective
      }}\n{% endif %}"
    manual_sp_feedback_future_only_active: "{{ states('input_text.ac_dda_last_change_origin')
      == 'manual_sp_feedback_future_only'\n   and (minutes_since_last_auto | float(99999))
      <= 2 }}"
    cool_adaptive_window_minutes: '{{ states(''input_number.ac_cool_adaptive_window_minutes'')
      | float(30) }}'
    cool_cycle_last_step_at_raw: '{{ states(''input_datetime.ac_cool_cycle_last_step_at'')
      | default('''', true) | trim }}'
    minutes_since_cool_cycle_step: "{% set raw = cool_cycle_last_step_at_raw | default('',
      true) | trim %} {% set raw_lower = raw | lower %} {% if raw_lower in ['unknown',
      'unavailable', 'none', ''] %}\n  99999\n{% else %}\n  {% set ts = as_timestamp(raw,
      default=none) %}\n  {{ 99999 if ts is none else (((as_timestamp(now()) - ts)
      / 60) | round(1)) }}\n{% endif %}"
    cool_cycle_step_recent_adaptive_window: "{{ (minutes_since_cool_cycle_step |
      float(99999)) <= (cool_adaptive_window_minutes | float(30)) }}"
    cool_sync_adaptive_owner_active: "{{ is_state('input_boolean.ac_cool_adaptive_cycle_active','on')\n
      \  and cool_cycle_step_recent_adaptive_window }}"
    cool_sync_recent_cycle_step: '{{ last_change_origin_raw == ''cool_cycle_step''
      and cool_cycle_step_recent_adaptive_window }}'
    cool_sync_unprotected_manual_change: "{{ last_change_origin_raw in ['manual_override','manual_sp_feedback','manual_sp_feedback_future_only']\n
      \  and (not manual_sp_protected_lock_active) }}"
    cool_sync_device_echo_change: '{{ last_change_origin_raw == ''device_echo'' }}'
    cool_sync_real_change_evidence: '{{ cool_sync_device_echo_change or cool_sync_unprotected_manual_change
      }}'
    cool_sp_sync_guard_allow: "{{ (not cool_sync_adaptive_owner_active)\n   and (not
      cool_sync_recent_cycle_step)\n   and cool_sync_real_change_evidence }}"
    cool_sp_sync_skip_reason: "{% if cool_sync_adaptive_owner_active %}\n  cool_sp_sync_skipped_adaptive_owner\n{%
      elif cool_sync_recent_cycle_step %}\n  cool_sp_sync_skipped_recent_cycle_step\n{%
      elif not cool_sync_real_change_evidence %}\n  cool_sp_sync_skipped_no_real_change_evidence\n{%
      else %}\n  none\n{% endif %}"
    cool_sync_should_notify: "{{ cool_sync_push_enabled\n   and (not manual_sp_override_active)\n
      \  and (not manual_sp_feedback_future_only_active)\n   and cool_sync_delta is
      not none\n   and (cool_sync_delta | float(0)) >= 0.2\n   and (\n     cool_sync_recent_auto_on\n
      \    or last_cool_sync_notified_sp is none\n     or ((last_cool_sync_notified_sp
      | float) - (cool_setpoint_effective | float)) | abs >= 0.2\n     or (minutes_since_cool_sync_notify
      | float(99999)) >= (cool_sync_notify_window_min | float(20))\n   )\n   and
      cool_sp_sync_guard_allow }}"
    last_manual_on_ts_raw: '{{ states(''input_datetime.ac_dda_last_manual_on_ts'') }}'
    last_manual_final_ts_raw: '{{ states(''input_datetime.ac_dda_last_manual_final_ts'')
      }}'
    manual_on_hold_minutes: 12
    last_manual_override_ts: '{% set on_ts = as_timestamp(last_manual_on_ts_raw, 0)
      %} {% set final_ts = as_timestamp(last_manual_final_ts_raw, 0) %} {{ [on_ts,
      final_ts] | max }}'
    minutes_since_manual_on: '{% if (last_manual_override_ts | float(0)) <= 0 %} 99999
      {% else %} {{ ((as_timestamp(now()) - (last_manual_override_ts | float(0)))
      / 60) | round(1) }} {% endif %}'
    manual_on_guard_active: '{{ (minutes_since_manual_on | float(99999)) < (manual_on_hold_minutes
      | float) }}'
    last_manual_event_type: '{{ states(''input_text.ac_dda_last_manual_event_type'') }}'
    manual_presence_override_active: '{{ last_manual_event_type in [''manual_on_due_to_presence_gap'',''manual_on_due_to_presence_gap_cool'',''manual_on_due_to_presence_gap_heat'']
      and presence_temp_from_manual }}'
    manual_override_active: '{{ manual_on_guard_active or manual_presence_override_active
      }}'
    last_manual_off_ts_raw: '{{ states(''input_datetime.ac_dda_last_manual_off_ts'') }}'
    manual_off_hold_minutes: 5
    minutes_since_manual_off: "{% if last_manual_off_ts_raw in ['unknown','unavailable','none','']
      %}\n  99999\n{% else %}\n  {{ ((as_timestamp(now()) - as_timestamp(last_manual_off_ts_raw))
      / 60) | round(1) }}\n{% endif %}"
    last_manual_event_type_raw: '{{ states(''input_text.ac_dda_last_manual_event_type'')
      | default('''', true) | trim }}'
    manual_off_event_active: "{{ last_manual_event_type_raw.startswith('manual_off_')\n
      \  or last_manual_event_type_raw == 'manual_off_detected' }}"
    manual_off_block: "{{ manual_off_event_active\n   and (minutes_since_manual_off
      | float(99999)) < (manual_off_hold_minutes | float) }}"
    manual_off_block_txt: '{{ ''ON'' if manual_off_block else ''OFF'' }}'
    auto_on_threshold_emergency_match: "{{ (not emergency_latched)\n   and emergency_hot\n
      \  and (\n     cur_mode != 'cool'\n     or (ac_set | float(0)) != (emergency_setpoint
      | float)\n     or ac_fan != emergency_fan_mode\n   ) }}"
    auto_on_threshold_heat_match: "{{ (not emergency_latched)\n   and heat_on is not
      none\n   and tin is not none\n   and (tin | float) <= (heat_on | float)\n   and
      (tout | float(99)) < (heat_force_off_outdoor | float)\n   and cur_mode != 'heat'
      }}"
    auto_on_threshold_cool_match: "{{ (not emergency_latched)\n   and cool_on is not
      none\n   and cool_setpoint is not none\n   and tin is not none\n   and (tin |
      float) >= (cool_on | float)\n   and cur_mode != 'cool' }}"
    auto_on_target_branch: "{% if auto_on_threshold_emergency_match %}\n  emergency_on\n{%
      elif auto_on_threshold_heat_match %}\n  heat_normal_on\n{% elif auto_on_threshold_cool_match
      %}\n  cool_normal_on\n{% else %}\n  none\n{% endif %}"
    auto_on_threshold_match: '{{ auto_on_target_branch != ''none'' }}'
    auto_on_locked_conflict: "{% if auto_on_target_branch == 'heat_normal_on' %}\n
      \ {{ (locked and (last_mode_no_fan in ['cool','emergency_cool'])) | bool }}\n{%
      elif auto_on_target_branch == 'cool_normal_on' %}\n  {{ (locked and (last_mode_no_fan
      == 'heat')) | bool }}\n{% elif auto_on_target_branch == 'none' %}\n  {{ false
      | bool }}\n{% else %}\n  {{ false | bool }}\n{% endif %}"
    auto_on_enable_final: "{{ auto_on_threshold_match\n   and auto_on_presence_gate\n
      \  and (not manual_off_block)\n   and (not recent_any_auto_on)\n   and (not
      auto_on_locked_conflict) }}"
    auto_on_block_reason: "{% if auto_on_enable_final %}\n  none\n{% elif not auto_on_threshold_match
      %}\n  threshold_no_match\n{% elif not auto_on_presence_gate %}\n  no_presence\n{%
      elif manual_off_block %}\n  manual_pause\n{% elif locked and auto_on_target_branch
      != 'none' and auto_on_locked_conflict %}\n  locked_cool_heat\n{% elif recent_any_auto_on
      %}\n  recent_auto_on\n{% else %}\n  compuerta\n{% endif %}"
    auto_on_should_audit_denied: "{{ (not auto_on_enable_final)\n   and auto_on_block_reason
      != 'none' }}"
    cool_main_control_demand: "{{ (not emergency_latched)\n   and cur_mode != 'cool'\n
      \  and tin is not none\n   and cool_on_validated is not none\n   and (tin |
      float) >= (cool_on_validated | float) }}"
    cool_main_control_error: "{{ cool_main_control_demand\n   and auto_on_enable_final\n
      \  and auto_on_target_branch == 'cool_normal_on'\n   and (cool_setpoint is
      none or cool_setpoint_effective is none) }}"
    cool_main_control_ready: "{{ cool_main_control_demand\n   and auto_on_enable_final\n
      \  and auto_on_target_branch == 'cool_normal_on'\n   and cool_setpoint is not
      none\n   and cool_setpoint_effective is not none }}"
    cool_main_control_blocked: '{{ cool_main_control_demand and (not cool_main_control_ready)
      and (not cool_main_control_error) }}'
    cool_main_control_block_reason: '{{ auto_on_block_reason }}'
    cool_main_control_audit: "{% if cool_main_control_error %}\n  main_control_error
      | branch=cool | reason=sp_template | Tin={{ tin if tin is not none else 'na'
      }} | On={{ cool_on_validated if cool_on_validated is not none else 'na' }} |
      SPt={{ cool_setpoint
      if cool_setpoint is not none else 'na' }} | SPe={{ cool_setpoint_effective if
      cool_setpoint_effective is not none else 'na' }} | Bucket={{ cool_context_detail
      }} | Trig={{ trig }} | Warn={{ 'reorden_on_off' if cool_limits_reordered else
      'none' }}\n{% elif cool_main_control_blocked %}\n  main_control_blocked
      | branch=cool | reason={{ cool_main_control_block_reason }} | Tin={{ tin if
      tin is not none else 'na' }} | On={{ cool_on_validated if cool_on_validated
      is not none else 'na' }} | Bucket={{ cool_context_detail }} | Trig={{ trig }}
      | Warn={{ 'reorden_on_off' if cool_limits_reordered else 'none' }}\n{% else
      %}\n  none\n{% endif %}"
    ts: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
    trig: "{% if trigger is defined %}\n  {% if trigger.platform == 'time_pattern'
      %}\n    /5min\n  {% elif trigger.platform == 'state' %}\n    {{ trigger.entity_id
      }}={{ trigger.to_state.state if trigger.to_state else 'n/a' }}\n  {% else %}\n
      \   {{ trigger.platform }}\n  {% endif %}\n{% else %}\n  manual\n{% endif %}"
  mode: single
- id: '1769981375282'
  alias: AC - Día dinámico aprendido (confirmación notify AUTO ON)
  trace:
    stored_traces: 50
  description: Confirmación desacoplada de notificación para AUTO ON efectivo en modo cool (solo franja diurna principal).
  trigger:
  - platform: state
    entity_id: climate.0200009211c7_climate
    to: cool
  condition:
  - condition: time
    after: 07:01:00
    before: '21:59:00'
  - condition: template
    value_template: '{{ states(''input_text.ac_dda_last_change_origin'') | trim in [''auto_on'',''cool_normal_on'',''cool_emergency_on''] }}'
  action:
  - variables:
      cycle_started_raw: '{{ states(''input_datetime.ac_dda_cool_cycle_contract_started_at'') | default('''', true) | trim }}'
      branch_raw: '{{ states(''input_text.ac_last_auto_branch'') | default('''', true) | trim }}'
      branch_on: "{% if branch_raw in ['cool_normal_on','cool_emergency_on'] %}{{ branch_raw }}{% else %}cool_normal_on{% endif %}"
      contract_on_raw: '{{ states(''input_number.ac_dda_cool_cycle_contract_on'') | float(none) }}'
      contract_off_raw: '{{ states(''input_number.ac_dda_cool_cycle_contract_off'') | float(none) }}'
      contract_valid: '{{ contract_on_raw is not none and contract_off_raw is not none and (contract_on_raw | float) > (contract_off_raw | float) and (contract_off_raw | float) >= 22 and (contract_off_raw | float) <= 25.7 and (contract_on_raw | float) <= 26.2 }}'
      contract_on_show: "{% if contract_valid %}{{ '%.1f' | format(contract_on_raw | float) }}{% else %}n/a{% endif %}"
      contract_off_show: "{% if contract_valid %}{{ '%.1f' | format(contract_off_raw | float) }}{% else %}n/a{% endif %}"
      tin_on: "{% set t1 = states('sensor.lumi_lumi_weather_cuarto_temperatura') | float(none) %}{% set t2 = states('sensor.lumi_lumi_weather_coco_temperatura') | float(none) %}{{ ((t1 + t2) / 2) | round(1) if t1 is not none and t2 is not none else (t1 | round(1) if t1 is not none else (t2 | round(1) if t2 is not none else none)) }}"
      tout_on: '{{ state_attr(''weather.openweathermap'',''temperature'') | float(none) }}'
      hout_on: '{{ state_attr(''weather.openweathermap'',''humidity'') | float(none) }}'
      sp_on: '{{ state_attr(''climate.0200009211c7_climate'', ''temperature'') | float(none) }}'
      fan_on: "{{ state_attr('climate.0200009211c7_climate','fan_mode') if state_attr('climate.0200009211c7_climate','fan_mode') is not none else 'n/a' }}"
      transition_token_raw: '{{ states(''input_text.ac_dda_transition_token'') | default('''', true) | trim }}'
      transition_ts_raw: '{{ states(''input_datetime.ac_dda_transition_ts'') | default('''', true) | trim }}'
      auto_ts_raw: '{{ states(''input_datetime.ac_last_auto_ts'') | default('''', true) | trim }}'
      auto_on_ts: "{% if auto_ts_raw not in ['', 'unknown', 'unavailable', 'none'] %}{{ auto_ts_raw }}{% elif transition_ts_raw not in ['', 'unknown', 'unavailable', 'none'] %}{{ transition_ts_raw }}{% elif cycle_started_raw not in ['', 'unknown', 'unavailable', 'none'] %}{{ cycle_started_raw }}{% else %}{{ now().isoformat() }}{% endif %}"
      cycle_token_on: "{% if transition_token_raw not in ['', 'unknown', 'unavailable', 'none'] %}{{ transition_token_raw }}{% else %}no_token{% endif %}"
      cycle_signature_v2: "token:{{ cycle_token_on }}|auto_on_ts:{{ auto_on_ts }}|branch:{{ branch_on }}|src:auto_on_v2"
      trace_id: '{{ now().strftime(''%Y%m%d%H%M%S%f'') }}-{{ range(100, 1000) | random }}-notify-auto-on-confirm'
      message_on: "{{ now().strftime('%I:%M %p') | regex_replace('^0','') }} Tin={{ '%.1f' | format(tin_on | float) if tin_on is not none else 'n/a' }} Tout={{ '%.1f' | format(tout_on | float) if tout_on is not none else 'n/a' }} H={{ '%.0f' | format(hout_on | float) if hout_on is not none else 'n/a' }} On={{ contract_on_show }} Off={{ contract_off_show }} SP={{ '%.1f' | format(sp_on | float) if sp_on is not none else 'n/a' }} Fan={{ fan_on if fan_on not in ['', 'unknown', 'unavailable', 'none'] else 'n/a' }} Src=AutoON"
  - service: logbook.log
    continue_on_error: true
    data:
      name: AC Auto Trace
      message: hito=notify_on_preparado | trace_id={{ trace_id }} | branch={{ branch_on }} | source=confirmacion_desacoplada
      entity_id: climate.0200009211c7_climate
  - service: script.ac_dda_notify_on_transaccional
    continue_on_error: true
    response_variable: notify_on_script_response
    data:
      trace_id: '{{ trace_id }}'
      title: Cool↑
      message: '{{ message_on }}'
      entity_id: climate.0200009211c7_climate
      src: AutoON
      branch: '{{ branch_on }}'
      notify_role: confirm
      cycle_signature_v2: '{{ cycle_signature_v2 }}'
  - variables:
      notify_on_script_status: "{{ notify_on_script_response if notify_on_script_response is mapping else {} }}"
      notify_on_script_error: "{{ notify_on_script_response is mapping and (\n  'error' in notify_on_script_status\n  or 'exception' in notify_on_script_status\n  or 'failed' in notify_on_script_status\n  or (notify_on_script_status.get('status') | default('') | string | lower) in ['error', 'failed', 'timeout']\n) }}"
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ notify_on_script_error }}"
      sequence:
      - service: logbook.log
        continue_on_error: true
        data:
          name: AC Auto Trace
          message: "hito=script_error | trace_id={{ trace_id }} | branch={{ branch_on }} | service=script.ac_dda_notify_on_transaccional | source=confirmacion_desacoplada | resp={{ notify_on_script_response if notify_on_script_response is defined else 'no_response' }}"
          entity_id: climate.0200009211c7_climate
      - service: persistent_notification.create
        continue_on_error: true
        data:
          title: "AC Auto ON script_error"
          message: "trace_id={{ trace_id }} | branch={{ branch_on }} | source=confirmacion_desacoplada | script=ac_dda_notify_on_transaccional | error_detected=true"
    default:
    - service: logbook.log
      continue_on_error: true
      data:
        name: AC Auto Trace
        message: "hito=script_invocado_ok | trace_id={{ trace_id }} | branch={{ branch_on }} | service=script.ac_dda_notify_on_transaccional | source=confirmacion_desacoplada"
        entity_id: climate.0200009211c7_climate
  mode: single
- id: '1769981375283'
  alias: AC - Iniciar bloqueo 2h al apagarse
  trace:
    stored_traces: 50
  description: ''
  triggers:
  - entity_id: climate.0200009211c7_climate
    to: 'off'
    trigger: state
  actions:
  - target:
      entity_id: input_boolean.ac_bloqueo_cambio_modo_2h
    action: input_boolean.turn_on
  - delay: 02:00:00
  - target:
      entity_id: input_boolean.ac_bloqueo_cambio_modo_2h
    action: input_boolean.turn_off
  mode: restart
- id: '1773894905330'
  alias: AC - Learning - Manual OFF feedback
  trace:
    stored_traces: 50
  description: 'Contrato v1: aprendizaje manual OFF unificado. Usa una sola definición
    de contexto y una sola semántica de aprendizaje (+0.25) sin ramas legacy.
    Presencia telefónica limitada a `device_tracker.samsung_s24` y `person.ivan`.

    '
  triggers:
  - trigger: state
    entity_id: input_datetime.ac_dda_last_manual_off_ts
  conditions:
  - condition: time
    after: 07:01:00
    before: '21:59:00'
  actions:
  - variables:
      contract_version: contract=v1
      ts: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      last_change_origin: '{{ states(''input_text.ac_dda_last_change_origin'') | trim }}'
      last_auto_action: '{{ states(''input_text.ac_last_auto_action'') | trim }}'
      last_auto_mode: '{{ states(''input_text.ac_last_auto_mode'') | trim }}'
      last_auto_ts_raw: '{{ states(''input_datetime.ac_last_auto_ts'') }}'
      feedback_window_min: '{{ states(''input_number.ac_dda_feedback_window_minutes'') | float(120) }}'
      auto_off_guard_window_s: 90
      auto_off_marker_ts_raw: '{{ states(''input_datetime.ac_last_auto_off_marker_ts'') | default('''', true) | trim }}'
      auto_off_marker_nonce_raw: '{{ states(''input_text.ac_last_auto_off_marker_nonce'') | default('''', true) | trim }}'
      auto_off_marker_ts_epoch: "{% if auto_off_marker_ts_raw | lower in ['unknown','unavailable','none',''] %}{{ none }}{% else %}{{ as_timestamp(auto_off_marker_ts_raw, default=none) }}{% endif %}"
      auto_off_marker_age_s: "{% if auto_off_marker_ts_epoch is none %}99999{% else %}{{ (as_timestamp(now()) - (auto_off_marker_ts_epoch | float)) | round(1) }}{% endif %}"
      auto_off_recent: "{{ auto_off_marker_nonce_raw | length > 0 and auto_off_marker_age_s | float(99999) >= 0 and auto_off_marker_age_s | float(99999) <= (auto_off_guard_window_s | float(30)) }}"
      mov_raw: '{{ states(''binary_sensor.presencia_movimiento_estable'') | lower }}'
      s24_raw: '{{ states(''device_tracker.samsung_s24'') | lower }}'
      person_raw: '{{ states(''person.ivan'') | lower }}'
      presence_ok: '{{ is_state(''binary_sensor.presencia_ok_estable'',''on'') }}'
      presence_real_now: '{{ mov_raw == ''on'' }}'
      presence_sensor_strict: '{{ presence_ok and presence_real_now }}'
      presence_phone_home: '{{ (s24_raw in [''home'',''on'']) or (person_raw == ''home'') }}'
      manual_presence_until_raw: '{{ states(''input_datetime.ac_dda_manual_presence_until'') }}'
      presence_temp_from_manual: "{% if manual_presence_until_raw in ['unknown','unavailable','none',''] %}\n  false\n{% else %}\n  {{ as_timestamp(now()) < as_timestamp(manual_presence_until_raw) }}\n{% endif %}"
      presence_source: "{% if presence_sensor_strict %}\n  movimiento\n{% elif presence_phone_home %}\n  s24_home\n{% elif presence_temp_from_manual %}\n  manual_temporal\n{% else %}\n  sin_presencia\n{% endif %}"
      contract_context_key: "{% set raw = states('input_text.ac_dda_last_context_bucket') | trim %}{{ raw if raw not in ['', 'unknown', 'unavailable', 'none'] else 'ctx_default:presencia' }}"
      contract_context_helper: '{{ ''input_number.ac_dda_cool_learning_bucket_'' ~ (contract_context_key | replace('':'',''_'') ) }}'
      context_prev_raw: '{{ states(contract_context_helper) }}'
      context_prev: "{% set v = context_prev_raw | float(none) %}{{ v if v is not none else (states('input_number.ac_dda_cool_off_learned') | float(24.0)) }}"
      minutes_since_last_auto: "{% set raw = last_auto_ts_raw | default('', true) | trim %}{% if raw | lower in ['unknown','unavailable','none',''] %}99999{% else %}{% set ts_auto = as_timestamp(raw, default=none) %}{{ 99999 if ts_auto is none else (((as_timestamp(now()) - ts_auto) / 60) | round(1)) }}{% endif %}"
      cycle_lock_active: '{{ is_state(''input_boolean.ac_dda_cycle_lock'',''on'') }}'
      auto_recent_window_s: 90
      auto_reciente: '{{ (minutes_since_last_auto | float(99999)) <= ((auto_recent_window_s | float(90)) / 60) }}'
      auto_origin_detected: '{{ last_change_origin in [''auto_off'', ''auto_on'', ''cool_normal_off'', ''cool_normal_on'', ''cool_emergency_off'', ''cool_emergency_on''] }}'
      origin_auto_recent: '{{ auto_reciente and last_change_origin in [''auto_off'', ''auto_on'', ''cool_normal_off'', ''cool_normal_on'', ''cool_emergency_off'', ''cool_emergency_on''] }}'
      last_manual_event_type_raw: '{{ states(''input_text.ac_dda_last_manual_event_type'') | trim }}'
      manual_event_confirmed: '{{ last_manual_event_type_raw == ''manual_off_final_valid_contract_v1'' }}'
      transition_guard_window_s: 180
      transition_token_raw: '{{ states(''input_text.ac_dda_transition_token'') | default('''', true) | trim }}'
      transition_ts_raw: '{{ states(''input_datetime.ac_dda_transition_ts'') | default('''', true) | trim }}'
      transition_ts_epoch: "{% if transition_ts_raw | lower in ['unknown','unavailable','none',''] %}{{ none }}{% else %}{{ as_timestamp(transition_ts_raw, default=none) }}{% endif %}"
      transition_age_s: "{% if transition_ts_epoch is none %}99999{% else %}{{ (as_timestamp(now()) - (transition_ts_epoch | float)) | round(1) }}{% endif %}"
      auto_transition_recent: "{{ transition_token_raw | length > 0 and transition_age_s | float(99999) >= 0 and transition_age_s | float(99999) <= (transition_guard_window_s | float(180)) }}"
      auto_flags_active: '{{ is_state(''input_boolean.ac_dda_on_por_automatizacion'',''on'') or is_state(''input_boolean.ac_dda_off_por_automatizacion'',''on'') }}'
      transition_origin_recent: '{{ auto_origin_detected or auto_reciente }}'
      auto_transition_active: '{{ auto_flags_active or (auto_transition_recent and transition_origin_recent) }}'
      off_classification: '{{ ''manual'' if last_change_origin == ''manual_off'' and manual_event_confirmed and (not auto_off_recent) and (not auto_transition_active) else ''auto'' }}'
      classification_reason: "{% if last_change_origin != 'manual_off' %}origin_not_manual_off{% elif not manual_event_confirmed %}manual_event_not_validated{% elif auto_transition_active %}auto_transition_active{% elif auto_off_recent %}auto_off_recent{% else %}manual_off_guard_validated{% endif %}"
      valid_feedback: '{{ last_change_origin == ''manual_off'' and manual_event_confirmed and (not auto_off_recent) and (not cycle_lock_active) and (not auto_reciente) and (not origin_auto_recent) and (not auto_transition_active) }}'
      manual_off_event_signature: '{{ states(''input_datetime.ac_dda_last_manual_off_ts'') ~ ''|'' ~ contract_context_key ~ ''|'' ~ last_auto_action ~ ''|'' ~ last_auto_mode }}'
      last_manual_off_event_signature: '{{ states(''input_text.ac_dda_learning_last_manual_off_signature'') | default('''', true) | trim }}'
      duplicate_event: '{{ manual_off_event_signature == last_manual_off_event_signature }}'
      learning_step: 0.25
      context_after: '{{ [[(context_prev | float) + (learning_step | float), 25.7] | min, 22.4] | max | round(2) }}'
      tin: "{% set t1 = states('sensor.lumi_lumi_weather_cuarto_temperatura') | float(none) %}{% set t2 = states('sensor.lumi_lumi_weather_coco_temperatura') | float(none) %}{{ ((t1 + t2) / 2) | round(1) if t1 is not none and t2 is not none else none }}"
      tout_owm: '{{ state_attr(''weather.openweathermap'',''temperature'') | float(none) }}'
      hout_owm: '{{ state_attr(''weather.openweathermap'',''humidity'') | float(none) }}'
      cond_owm: '{{ states(''weather.openweathermap'') | lower }}'
      tout: '{{ tout_owm if tout_owm is not none else none }}'
      hin: "{% set h1 = states('sensor.lumi_lumi_weather_cuarto_humedad') | float(none) %}{% set h2 = states('sensor.lumi_lumi_weather_coco_humedad') | float(none) %}{{ ((h1 + h2) / 2) | round(1) if h1 is not none and h2 is not none else none }}"
      contract_cycle_on_raw: '{{ states(''input_number.ac_dda_cool_cycle_contract_on'') }}'
      contract_cycle_off_raw: '{{ states(''input_number.ac_dda_cool_cycle_contract_off'') }}'
      contract_cycle_on: '{{ contract_cycle_on_raw | float(none) }}'
      contract_cycle_off: '{{ contract_cycle_off_raw | float(none) }}'
      contract_cycle_valid: '{{ contract_cycle_on is not none and contract_cycle_off is not none and (contract_cycle_on | float) > (contract_cycle_off | float) and (contract_cycle_off | float) >= 22 and (contract_cycle_off | float) <= 25.7 and (contract_cycle_on | float) <= 26.2 }}'
      contract_context_delta_on_helper: '{{ ''input_number.ac_dda_cool_delta_on_bucket_'' ~ (contract_context_key | replace('':'',''_'') ) }}'
      contract_context_delta_on: '{{ states(contract_context_delta_on_helper) | float(0) }}'
      contextual_off_candidate: "{% set v = context_prev_raw | float(none) %}{{ [[v, 25.7] | min, 22.0] | max | round(2) if v is not none else none }}"
      contextual_hysteresis_candidate: "{% set base = 0.52 %}{% set raw = (base + (contract_context_delta_on | float(0))) %}{{ [[raw, 1.1] | min, 0.35] | max | round(2) if contextual_off_candidate is not none else none }}"
      contextual_on_candidate: "{% if contextual_off_candidate is none or contextual_hysteresis_candidate is none %}{{ none }}{% else %}{{ [[((contextual_off_candidate | float) + (contextual_hysteresis_candidate | float)), 26.2] | min, ((contextual_off_candidate | float) + 0.35)] | max | round(2) }}{% endif %}"
      contextual_contract_valid: '{{ contextual_on_candidate is not none and contextual_off_candidate is not none and (contextual_on_candidate | float) > (contextual_off_candidate | float) }}'
      threshold_source: "{% if contract_cycle_valid %}cycle_contract_helpers{% elif contextual_contract_valid %}contextual_contract_recalc{% else %}no_disponible{% endif %}"
      fallback_used: '{{ ''yes'' if threshold_source == ''contextual_contract_recalc'' else ''no'' }}'
      cool_on_final: "{% if threshold_source == 'cycle_contract_helpers' %}{{ contract_cycle_on | round(2) }}{% elif threshold_source == 'contextual_contract_recalc' %}{{ contextual_on_candidate }}{% else %}{{ none }}{% endif %}"
      cool_off_final: "{% if threshold_source == 'cycle_contract_helpers' %}{{ contract_cycle_off | round(2) }}{% elif threshold_source == 'contextual_contract_recalc' %}{{ contextual_off_candidate }}{% else %}{{ none }}{% endif %}"
      contract_values_valid: '{{ cool_on_final is not none and cool_off_final is not none and (cool_on_final | float) > (cool_off_final | float) and (cool_off_final | float) >= 22 and (cool_off_final | float) <= 25.7 and (cool_on_final | float) <= 26.2 }}'
      contract_invalid_reason: "{% if cool_on_final is none or cool_off_final is none %}missing_contract_values{% else %}reject_invalid_contract_values{% endif %}"
      threshold_status: '{{ ''ok'' if contract_values_valid else ''no_disponible'' }}'
      sp_final: '{{ state_attr(''climate.0200009211c7_climate'', ''temperature'') | float(none) }}'
      fan_final: '{{ state_attr(''climate.0200009211c7_climate'', ''fan_mode'') | default(''na'', true) }}'
      ignored_reason_code: "{% if duplicate_event %}duplicate_event{% elif cycle_lock_active %}lock_activo{% elif origin_auto_recent %}origen_auto{% elif auto_reciente %}auto_reciente{% elif auto_transition_active %}auto_transition_active{% elif auto_off_recent %}auto_off_recent{% elif not manual_event_confirmed %}manual_event_not_validated{% elif last_change_origin != 'manual_off' %}origin_not_manual_off{% else %}unknown_discard{% endif %}"
      learning_off_discard_reason: "{% if apply_learning %}none{% else %}ignored:{{ ignored_reason_code }}{% endif %}"
      reason_short: "{% if ignored_reason_code == 'duplicate_event' %}dup{% elif ignored_reason_code == 'auto_off_recent' %}auto_recent{% elif ignored_reason_code == 'origin_not_manual_off' %}origen{% else %}descartado{% endif %}"
      delta_learning: '{{ (learning_step | float) if apply_learning else 0.0 }}'
      hhmm: '{{ now().strftime(''%I:%M %p'') | regex_replace(''^0'','''') }}'
      learning_type: "{% if apply_learning %}manual_off_learning_applied_contract_v1{% elif ignored_reason_code == 'duplicate_event' %}manual_off_learning_ignored_duplicate_event_contract_v1{% elif ignored_reason_code == 'auto_off_recent' %}manual_off_learning_ignored_auto_off_recent_contract_v1{% elif ignored_reason_code == 'origin_not_manual_off' %}manual_off_learning_ignored_not_manual_contract_v1{% else %}manual_off_learning_ignored_unknown_contract_v1{% endif %}"
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ apply_learning }}'
      sequence:
      - target:
          entity_id: '{{ contract_context_helper }}'
        data:
          value: '{{ context_after }}'
        action: input_number.set_value
      - target:
          entity_id: input_text.ac_dda_cool_contextual_learning_map
        data:
          value: '{{ contract_context_key ~ ''='' ~ (''%.2f'' | format(context_after | float)) }}'
        service: input_text.set_value
      - target:
          entity_id: input_datetime.ac_dda_last_manual_feedback_ts
        data:
          datetime: '{{ ts }}'
        action: input_datetime.set_datetime
    default: []
  - target:
      entity_id: input_text.ac_dda_last_manual_learning_type
    data:
      value: '{{ learning_type }}'
    service: input_text.set_value
  - target:
      entity_id: input_text.ac_dda_learning_last_manual_off_signature
    data:
      value: '{{ manual_off_event_signature }}'
    service: input_text.set_value
  - action: logbook.log
    data:
      name: AC Learning Manual OFF
      message: '{{ contract_version }} | manual_off_feedback | off_classification={{ off_classification }} | classification_reason={{ classification_reason }} | off_nonce={{ auto_off_marker_nonce_raw if auto_off_marker_nonce_raw | length > 0 else ''n/a'' }} | ctx={{ contract_context_key }} | apply={{ ''yes'' if apply_learning else ''no'' }} | step=+0.25 | off={{ ''%.2f'' | format(context_prev | float) }}->{{ ''%.2f'' | format(context_after | float) }} | min={{ minutes_since_last_auto }} | presence_source={{ presence_source }} | type={{ learning_type }} | reason_code={{ ''applied'' if apply_learning else ignored_reason_code }} | learning_off_discard_reason={{ learning_off_discard_reason }}'
      entity_id: climate.0200009211c7_climate
  - action: logbook.log
    data:
      name: AC Learning Manual OFF
      message: '{{ contract_version }} | threshold_validation | threshold_source={{ threshold_source }} | on_final={{ ''%.2f'' | format(cool_on_final | float) if cool_on_final is not none else ''no_disponible'' }} | off_final={{ ''%.2f'' | format(cool_off_final | float) if cool_off_final is not none else ''no_disponible'' }} | fallback_used={{ fallback_used }}'
      entity_id: climate.0200009211c7_climate
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ ignored_reason_code == ''auto_off_recent'' }}'
      sequence:
      - action: logbook.log
        data:
          name: AC Learning Manual OFF
          message: '{{ contract_version }} | learning_off_discard_reason=ignored:auto_off_recent | marker_age_s={{ auto_off_marker_age_s }} | marker_nonce_len={{ auto_off_marker_nonce_raw | length }}'
          entity_id: climate.0200009211c7_climate
    default: []
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ ignored_reason_code in [''lock_activo'', ''auto_reciente'', ''origen_auto''] }}'
      sequence:
      - action: logbook.log
        data:
          name: AC Learning Manual OFF
          message: '{{ contract_version }} | learning_off_discard_reason=ignored:{{ ignored_reason_code }} | lock={{ cycle_lock_active }} | auto_reciente={{ auto_reciente }} | origin={{ last_change_origin }}'
          entity_id: climate.0200009211c7_climate
    default: []
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ contract_values_valid }}'
      sequence:
      - target:
          entity_id: input_number.ac_dda_cool_cycle_contract_on
        data:
          value: '{{ cool_on_final }}'
        service: input_number.set_value
      - target:
          entity_id: input_number.ac_dda_cool_cycle_contract_off
        data:
          value: '{{ cool_off_final }}'
        service: input_number.set_value
      - target:
          entity_id: input_text.ac_dda_cool_cycle_contract_bucket
        data:
          value: '{{ contract_context_key }}'
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_dda_cool_cycle_contract_reason
        data:
          value: '{{ ''learning_feedback_refresh:'' ~ threshold_source }}'
        service: input_text.set_value
      - target:
          entity_id: input_datetime.ac_dda_cool_cycle_contract_started_at
        data:
          datetime: '{{ ts }}'
        service: input_datetime.set_datetime
    default:
    - target:
        entity_id: input_text.ac_dda_cool_cycle_contract_reason
      data:
        value: '{{ contract_invalid_reason }}'
      service: input_text.set_value
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ apply_learning }}'
      sequence:
      - service: notify.mobile_app_samsung_s24
        data:
          title: AC Learning OFF
          message: '{{ hhmm }} Tin={{ ''%.1f'' | format(tin | float) if tin is not none else ''n/a'' }} Tout={{ ''%.1f'' | format(tout | float) if tout is not none else ''n/a'' }} H={{ ''%.0f'' | format(hout_owm | float) if hout_owm is not none else ''n/a'' }} W={{ cond_owm if cond_owm not in ['''', ''unknown'', ''unavailable'', ''none''] else ''n/a'' }} On={{ ''%.1f'' | format(cool_on_final | float) if cool_on_final is not none else ''n/a'' }} Off={{ ''%.1f'' | format(cool_off_final | float) if cool_off_final is not none else ''n/a'' }} SP={{ ''%.1f'' | format(sp_final | float) if sp_final is not none else ''n/a'' }} Fan={{ fan_final }} Src=ManualOFF Delta={{ ''%+.2f'' | format(delta_learning | float) }} Resultado=aplicado Razón=manual_off type={{ learning_type }} reason_code=applied'
    default:
    - service: notify.mobile_app_samsung_s24
      data:
        title: AC Learning OFF
        message: '{{ hhmm }} Tin={{ ''%.1f'' | format(tin | float) if tin is not none else ''n/a'' }} Tout={{ ''%.1f'' | format(tout | float) if tout is not none else ''n/a'' }} H={{ ''%.0f'' | format(hout_owm | float) if hout_owm is not none else ''n/a'' }} W={{ cond_owm if cond_owm not in ['''', ''unknown'', ''unavailable'', ''none''] else ''n/a'' }} On={{ ''%.1f'' | format(cool_on_final | float) if cool_on_final is not none else ''n/a'' }} Off={{ ''%.1f'' | format(cool_off_final | float) if cool_off_final is not none else ''n/a'' }} SP={{ ''%.1f'' | format(sp_final | float) if sp_final is not none else ''n/a'' }} Fan={{ fan_final }} Src=ManualOFF Delta={{ ''%+.2f'' | format(delta_learning | float) }} Resultado=ignorado Razón={{ ignored_reason_code }} type={{ learning_type }} reason_code={{ ignored_reason_code }}'
  mode: restart
- id: '1773895045305'
  alias: TEMP - AC Learning ON trigger diagnóstico (desactivada)
  description: 'Temporal de diagnóstico para trazar disparo de Learning ON. Activar
    sólo durante validación y volver a desactivar.

    '
  initial_state: false
  triggers:
  - trigger: state
    entity_id: input_datetime.ac_dda_last_manual_on_ts
  actions:
  - service: notify.mobile_app_samsung_s24
    data:
      title: AC Learning ON Trigger
      message: "{% set raw = states('input_text.ac_dda_last_manual_on_trace_confirmed') | default('', true) | trim %}{% set parsed = raw | regex_findall_index('trace_id=([^|]+)', 0) %}AC Learning ON Triggered Trace={{ parsed if parsed is not none and parsed | string | length > 0 else 'trace_missing' }}"
  mode: restart
- id: '1773895045306'
  alias: AC - Learning - Manual ON feedback
  trace:
    stored_traces: 50
  description: 'Contrato v1: aprendizaje manual ON unificado. Espera 25s para consolidación,
    usa una sola definición de contexto y aplica semántica -0.25 sin ramas legacy.
    Presencia telefónica limitada a `device_tracker.samsung_s24` y `person.ivan`.

    '
  triggers:
  - trigger: state
    id: manual_on_ts
    entity_id: input_datetime.ac_dda_last_manual_on_ts
  - trigger: state
    id: manual_on_snapshot
    entity_id: input_text.ac_dda_last_manual_on_snapshot
  actions:
  - variables:
      contract_version: contract=v1
      trigger_id: '{{ trigger.id if trigger is defined and trigger.id is defined else ''unknown'' }}'
      trace_helper_actual_raw: '{{ states(''input_text.ac_dda_last_manual_on_trace_confirmed'') | default('''', true) | trim }}'
      trace_helper_actual: "{% set parsed = trace_helper_actual_raw | regex_findall_index('trace_id=([^|]+)', 0) %}{{ parsed if parsed is not none and parsed | string | length > 0 else 'trace_missing' }}"
  - continue_on_error: true
    action: logbook.log
    data:
      name: AC Learning Manual ON
      message: '{{ contract_version }} | hito=learning_on_started | trigger_id={{ trigger_id }} | Trace={{ trace_helper_actual }}'
      entity_id: climate.0200009211c7_climate
  - delay: 00:00:25
  - variables:
      contract_version: contract=v1
      ts: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      final_mode: '{{ states(''climate.0200009211c7_climate'') | trim }}'
      last_change_origin: '{{ states(''input_text.ac_dda_last_change_origin'') | trim }}'
      last_auto_action: '{{ states(''input_text.ac_last_auto_action'') | trim }}'
      last_auto_mode: '{{ states(''input_text.ac_last_auto_mode'') | trim }}'
      last_auto_ts_raw: '{{ states(''input_datetime.ac_last_auto_ts'') }}'
      manual_feedback_min_window_min: 3
      manual_feedback_max_window_min: 120
      manual_on_trace_confirmed_raw: '{{ states(''input_text.ac_dda_last_manual_on_trace_confirmed'') | default('''', true) | trim }}'
      trace_id: "{% set parsed = manual_on_trace_confirmed_raw | regex_findall_index('trace_id=([^|]+)', 0) %}{{ parsed if parsed is not none and parsed | string | length > 0 else 'trace_missing' }}"
      active_session_raw: '{{ states(''input_text.ac_dda_manual_on_active_session'') | default('''', true) | trim }}'
      active_session_trace_id: "{% set parsed = active_session_raw | regex_findall_index('trace_id=([^|]+)', 0) %}{{ parsed if parsed is not none and parsed | string | length > 0 else 'trace_missing' }}"
      active_session_status: "{% set parsed = active_session_raw | regex_findall_index('status=([^|]+)', 0) %}{{ parsed if parsed is not none and parsed | string | length > 0 else 'closed' }}"
      active_session_signature: "{% set parsed = active_session_raw | regex_findall_index('signature=([^|]+)', 0) %}{{ parsed if parsed is not none and parsed | string | length > 0 else 'sig_missing' }}"
      active_session_started_ts: "{% set parsed = active_session_raw | regex_findall_index('started_ts=([^|]+)', 0) %}{{ parsed if parsed is not none and parsed | string | length > 0 else 'ts_missing' }}"
      active_session_started_epoch: "{% if active_session_started_ts in ['ts_missing','unknown','unavailable','none',''] %}{{ none }}{% else %}{{ as_timestamp(active_session_started_ts, default=none) }}{% endif %}"
      manual_on_session_ttl_s: 110
      active_session_age_s: "{% if active_session_started_epoch is none %}99999{% else %}{{ (as_timestamp(now()) - (active_session_started_epoch | float)) | round(1) }}{% endif %}"
      active_session_ttl_valid: '{{ active_session_age_s | float(99999) >= 0 and active_session_age_s | float(99999) <= (manual_on_session_ttl_s | float(110)) }}'
      manual_on_snapshot_raw: '{{ states(''input_text.ac_dda_last_manual_on_snapshot'') | default('''', true) | trim }}'
      snapshot_trace_id: "{% set parsed = manual_on_snapshot_raw | regex_findall_index('trace_id=([^|]+)', 0) %}{{ parsed if parsed is not none and parsed | string | length > 0 else 'trace_missing' }}"
      snapshot_event_type: "{% set parsed = manual_on_snapshot_raw | regex_findall_index('event_type=([^|]+)', 0) %}{{ parsed if parsed is not none and parsed | string | length > 0 else 'event_missing' }}"
      snapshot_final_mode: "{% set parsed = manual_on_snapshot_raw | regex_findall_index('final_mode=([^|]+)', 0) %}{{ parsed if parsed is not none and parsed | string | length > 0 else 'mode_missing' }}"
      snapshot_ts: "{% set parsed = manual_on_snapshot_raw | regex_findall_index('ts=(.+)$', 0) %}{{ parsed if parsed is not none and parsed | string | length > 0 else 'ts_missing' }}"
      snapshot_ts_epoch: "{% if snapshot_ts in ['ts_missing','unknown','unavailable','none',''] %}{{ none }}{% else %}{{ as_timestamp(snapshot_ts, default=none) }}{% endif %}"
