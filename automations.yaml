- id: ac_memoria_y_bloqueo_2h_cool_heat
  alias: AC - Memoria último modo + Bloqueo 2h Cool/Heat (rolling, a prueba de fan_only)
  mode: single
  trigger:
  - platform: state
    entity_id: climate.0200009211c7_climate
    to:
    - cool
    - heat
    for: 00:00:02
  variables:
    to_mode: '{{ trigger.to_state.state if trigger.to_state else ''unknown'' }}'
  action:
  - service: input_select.select_option
    target:
      entity_id: input_select.ac_ultimo_modo_no_fan
    data:
      option: '{{ to_mode }}'
    # Sólo `cool` y `heat` se conservan aquí como memoria operativa útil; si luego
    # el sistema entra en reposo, otra rama debe resetear el helper a `off`.
  - service: input_datetime.set_datetime
    target:
      entity_id: input_datetime.ac_ultimo_cambio_modo
    data:
      timestamp: '{{ now().timestamp() }}'
  - service: input_boolean.turn_on
    target:
      entity_id: input_boolean.ac_bloqueo_cambio_modo_2h
- id: ac_bloqueo_cambio_modo_2h_expira
  alias: AC - Bloqueo cambio modo 2h (expira por timestamp, rolling)
  mode: single
  trigger:
  - platform: time_pattern
    minutes: /1
  - platform: state
    entity_id:
    - input_datetime.ac_ultimo_cambio_modo
    - input_select.ac_ultimo_modo_no_fan
  variables:
    last_ts: '{{ state_attr(''input_datetime.ac_ultimo_cambio_modo'',''timestamp'')
      | float(0) }}'
    last_mode: '{{ states(''input_select.ac_ultimo_modo_no_fan'') }}'
    expired: '{{ last_ts > 0 and (now().timestamp() - last_ts) >= 7200 }}'
    invalid_mode: '{{ last_mode not in [''cool'',''heat''] }}'
  action:
  - choose:
    - conditions: '{{ expired or invalid_mode or last_ts == 0 }}'
      sequence:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.ac_bloqueo_cambio_modo_2h
    default: []
- id: ac_dinamico_por_tendencia_con_ac_off
  alias: AC - Modo dinámico por tendencia con AC OFF (23:00-07:00) + cooldown afinado
  mode: single
  trigger:
  - platform: time_pattern
    minutes: /5
  condition:
  - condition: time
    after: '23:00:00'
    before: 07:00:00
  - condition: template
    value_template: '{{ states(''climate.0200009211c7_climate'') in [''off'',''fan_only'']
      }}'
  variables:
    t_cuarto: '{{ states(''sensor.lumi_lumi_weather_cuarto_temperatura'') | float(0)
      }}'
    t_coco: '{{ states(''sensor.lumi_lumi_weather_coco_temperatura'') | float(0) }}'
    cap: 0.7
    t_coco_filtrado: "{% if (t_coco - t_cuarto) > cap %}\n  {{ (t_cuarto + cap) |
      round(2) }}\n{% else %}\n  {{ t_coco | round(2) }}\n{% endif %}"
    avg: '{{ ((t_cuarto + (t_coco_filtrado | float(0))) / 2) | round(2) }}'
    prev: '{{ states(''input_number.ac_off_avg_previo_dinamico'') | float(0) }}'
    delta: '{{ (avg - prev) | round(2) }}'
    umbral: 0.1
    cooldown_min: 15
    last_off_ts: '{{ state_attr(''input_datetime.ac_ultimo_apagado'', ''timestamp'')
      | float(0) }}'
    cooldown_ok: '{{ last_off_ts > 0 and (now().timestamp() - last_off_ts) >= (cooldown_min
      * 60) }}'
    prev_inicializado: '{{ prev > 0 }}'
  action:
  - choose:
    - conditions: '{{ not cooldown_ok }}'
      sequence: []
    - conditions: '{{ cooldown_ok and not prev_inicializado }}'
      sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.ac_off_avg_previo_dinamico
        data:
          value: '{{ avg }}'
    - conditions: '{{ cooldown_ok and prev_inicializado }}'
      sequence:
      - choose:
        - conditions: '{{ delta >= umbral }}'
          sequence:
          - service: input_select.select_option
            target:
              entity_id: input_select.ac_modo_dinamico
            data:
              option: cool
        - conditions: '{{ delta <= (0 - umbral) }}'
          sequence:
          - service: input_select.select_option
            target:
              entity_id: input_select.ac_modo_dinamico
            data:
              option: heat
      - service: input_number.set_value
        target:
          entity_id: input_number.ac_off_avg_previo_dinamico
        data:
          value: '{{ avg }}'
- id: ac_dormitorio_noche_on
  alias: AC - Noche Enciende Cool sobre 22.7 con tendencia
  description: 'Enciende el AC en modo COOL si está dentro del horario nocturno y
    el selector activo lo permite. Respeta bloqueo anti-cambio cool<->heat 2h. Presencia
    válida: (S24 home) OR (movimiento ON por 5 min).

    '
  triggers:
  - entity_id: sensor.lumi_lumi_weather_cuarto_temperatura
    above: 22.7
    trigger: numeric_state
  - entity_id: sensor.lumi_lumi_weather_coco_temperatura
    above: 22.7
    trigger: numeric_state
  - entity_id: binary_sensor.tze204_gkfbdvyx_ts0601
    to: 'on'
    for: 00:05:00
    id: presencia_on
    trigger: state
  - entity_id: device_tracker.samsung_s24
    to: home
    for: 00:10:00
    id: s24_home
    trigger: state
  - entity_id: input_select.ac_modo_noche_2200
    trigger: state
  - entity_id: input_select.ac_modo_dinamico
    trigger: state
  - entity_id: input_boolean.calefaccion_reciente
    to: 'off'
    trigger: state
  - entity_id: input_boolean.ac_bloqueo_cambio_modo_2h
    to: 'off'
    trigger: state
  conditions:
  - condition: or
    conditions:
    - condition: time
      after: '22:00:00'
    - condition: time
      before: 07:00:00
  - condition: template
    value_template: "{% set hm = now().strftime('%H:%M:%S') %} {% if hm >= '22:00:00'
      and hm < '23:00:00' %}\n  {{ is_state('input_select.ac_modo_noche_2200','cool')
      }}\n{% else %}\n  {{ is_state('input_select.ac_modo_dinamico','cool') }}\n{%
      endif %}"
  - condition: state
    entity_id: climate.0200009211c7_climate
    state:
    - 'off'
    - cool
    - fan_only
  - condition: template
    value_template: "{% set last = states('input_select.ac_ultimo_modo_no_fan') %}
      {% if last == 'heat' %}\n  {{ is_state('input_boolean.ac_bloqueo_cambio_modo_2h','off')
      }}\n{% else %}\n  true\n{% endif %}"
  - condition: state
    entity_id: input_boolean.calefaccion_reciente
    state: 'off'
  - condition: numeric_state
    entity_id: sensor.lumi_lumi_weather_cuarto_temperatura
    above: 22.7
  - condition: numeric_state
    entity_id: sensor.lumi_lumi_weather_coco_temperatura
    above: 22.7
  - condition: or
    conditions:
    - condition: state
      entity_id: device_tracker.samsung_s24
      state: home
    - condition: state
      entity_id: binary_sensor.tze204_gkfbdvyx_ts0601
      state: 'on'
  actions:
  - target:
      entity_id: climate.0200009211c7_climate
    action: climate.turn_on
  - target:
      entity_id: climate.0200009211c7_climate
    data:
      hvac_mode: cool
    action: climate.set_hvac_mode
  - target:
      entity_id: climate.0200009211c7_climate
    data:
      temperature: 20
    action: climate.set_temperature
  - target:
      entity_id: climate.0200009211c7_climate
    data:
      fan_mode: Low
    action: climate.set_fan_mode
  - target:
      entity_id: input_boolean.ac_bloqueo_modo_noche
    action: input_boolean.turn_on
  mode: single
