    entity_id: device_tracker.samsung_s24
    to: not_home
    id: s24_away
  - trigger: state
    entity_id: device_tracker.samsung_s24
    to: home
    id: s24_home
  - trigger: state
    entity_id: person.ivan
    to: home
    id: person_home
  - trigger: state
    entity_id: climate.0200009211c7_climate
