      recheck_auto_off_recent: "{{ recheck_auto_marker_nonce_raw | length > 0 and recheck_auto_marker_age_s | float(99999) >= 0 and recheck_auto_marker_age_s | float(99999) <= (auto_off_guard_window_s | float(90)) }}"
      recheck_last_origin_raw: '{{ states(''input_text.ac_dda_last_change_origin'') | default('''', true) | trim }}'
      recheck_abort_reason: "{% if recheck_auto_off_flag %}auto_off_flag_on_recheck{% elif recheck_auto_off_recent %}auto_off_recent_recheck{% elif recheck_last_origin_raw in ['auto_off','cool_normal_off'] %}origin_auto_off_recheck{% else %}none{% endif %}"
  - choose:
