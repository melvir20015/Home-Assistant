- id: notifica_movimiento_despues_1h
  alias: Notificación - Movimiento después de 1h sin actividad
  description: Notifica cuando hay movimiento tras 60+ min sin actividad (08:00-20:00).
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.tze204_gkfbdvyx_ts0601
    to: 'on'
  condition:
  - condition: time
    after: 08:00:00
    before: '20:00:00'
  - condition: template
    value_template: "{{ trigger.from_state is not none\n   and trigger.from_state.state
      == 'off'\n   and (as_timestamp(trigger.to_state.last_changed)\n        - as_timestamp(trigger.from_state.last_changed))
      >= 3600 }}"
  action:
  - service: notify.mobile_app_samsung_s24
    data:
      title: Movimiento detectado en casa
      message: Hubo movimiento después de 1 hora o mas sin actividad.
- id: aviso_afuera_mas_fresco_cool
  alias: Aviso - Afuera más fresco que adentro (AC en cool, Met.no)
  description: Notifica si el AC está en cool y afuera está 5°C más fresco (solo de
    día).
  mode: single
  trigger:
  - platform: state
    entity_id:
    - climate.0200009211c7_climate
    - sensor.lumi_lumi_weather_cuarto_temperatura
    - sensor.lumi_lumi_weather_coco_temperatura
    - sensor.temperatura_exterior_metno
  - platform: time_pattern
    minutes: /10
  condition:
  - condition: time
    after: 08:00:00
    before: '20:00:00'
  - condition: state
    entity_id: climate.0200009211c7_climate
    state: cool
  - condition: template
    value_template: '{% set t_cuarto = states(''sensor.lumi_lumi_weather_cuarto_temperatura'')|float(0)
      %} {% set t_coco   = states(''sensor.lumi_lumi_weather_coco_temperatura'')|float(0)
      %} {% set t_in     = (t_cuarto + t_coco) / 2 %} {% set t_out    = states(''sensor.temperatura_exterior_metno'')|float(100)
      %} {{ t_in - t_out >= 5 }}'
  action:
  - service: notify.mobile_app_samsung_s24
    data:
      title: Afuera está más fresco
      message: El aire acondicionado está en modo COOL y afuera está al menos 5 °C
        más fresco que adentro.
- id: shield_programa_apagado_30m
  alias: TV Dormitorio - Programar apagado 30 min
  description: Inicia o cancela el timer de apagado de la SHIELD
  mode: restart
  trigger:
  - platform: state
    entity_id: input_boolean.apagar_shield_en_30_min
  action:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.apagar_shield_en_30_min
        state: 'on'
      sequence:
      - service: timer.start
        target:
          entity_id: timer.timer_apagado_tv_dormitorio
    - conditions:
      - condition: state
        entity_id: input_boolean.apagar_shield_en_30_min
        state: 'off'
      sequence:
      - service: timer.cancel
        target:
          entity_id: timer.timer_apagado_tv_dormitorio
- id: shield_apaga_al_terminar_timer_30m
  alias: TV Dormitorio - Apaga SHIELD al terminar timer
  description: Apaga la SHIELD cuando termina el timer de 30 min
  mode: single
  trigger:
  - platform: event
    event_type: timer.finished
    event_data:
      entity_id: timer.timer_apagado_tv_dormitorio
  condition:
  - condition: state
    entity_id: media_player.shield_android_tv_2
    state: 'on'
  action:
  - service: media_player.turn_off
    target:
      entity_id: media_player.shield_android_tv_2
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.apagar_shield_en_30_min
- id: '1766870769686'
  alias: AC - Guardar último apagado (solo OFF)
  mode: single
  trigger:
  - platform: state
    entity_id: climate.0200009211c7_climate
    to: 'off'
  action:
  - service: input_datetime.set_datetime
    target:
      entity_id: input_datetime.ac_ultimo_apagado
    data:
      timestamp: '{{ now().timestamp() }}'
- id: '1768016118285'
  alias: AC - Noche dinámico (OpenWeather) + Presencia estable + Fan Low + Notificaciones
  description: '21:00–07:00: Control nocturno inteligente HEAT/COOL/OFF usando temperatura
    interior vs exterior (OpenWeather apparent_temperature), presencia estable, histéresis,
    bloqueo 2h y ajuste de emergencia por humedad (punto de rocío). Emergencia COOL
    SOLO si exterior aparente < 17°C. Promedio de 2 sensores (temp y humedad). Notifica
    SOLO cuando hace ON/OFF.

    '
  triggers:
  - minutes: /5
    trigger: time_pattern
  - entity_id:
    - weather.openweathermap
    - sensor.lumi_lumi_weather_cuarto_temperatura
    - sensor.lumi_lumi_weather_coco_temperatura
    - sensor.lumi_lumi_weather_cuarto_humedad
    - sensor.lumi_lumi_weather_coco_humedad
    - input_boolean.ac_bloqueo_cambio_modo_2h
    - binary_sensor.presencia_ok_estable
    - binary_sensor.presencia_s24_estable
    - binary_sensor.presencia_movimiento_estable
    trigger: state
  - entity_id: binary_sensor.presencia_movimiento_estable
    to: 'on'
    trigger: state
  - entity_id: binary_sensor.presencia_s24_estable
    to: 'on'
    trigger: state
  conditions:
  - condition: time
    after: '21:00:00'
    before: 07:00:00
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ (not presence_ok) and cur_mode != ''off'' }}'
      sequence:
      - target:
          entity_id: '{{ climate_ent }}'
        data:
          hvac_mode: 'off'
        action: climate.set_hvac_mode
      - data:
          title: AC OFF (sin presencia)
          message: '{{ notif_base }} | Prev={{ cur_mode }} | R=sin_pres'
        action: '{{ notify_service }}'
    - conditions:
      - condition: template
        value_template: '{{ tin is none or tout is none }}'
      sequence: []
    - conditions:
      - condition: template
        value_template: '{{ cur_mode==''cool'' and tout < cool_emergency_outdoor_min
          }}'
      sequence:
      - target:
          entity_id: '{{ climate_ent }}'
        data:
          hvac_mode: 'off'
        action: climate.set_hvac_mode
      - data:
          title: AC OFF (cool bloqueado por frío exterior)
          message: '{{ notif_base }} | Prev=cool | R=ext_bajo | Min={{ cool_emergency_outdoor_min
            }}'
        action: '{{ notify_service }}'
    - conditions:
      - condition: template
        value_template: '{{ cur_mode==''heat'' and tout >= heat_force_off_outdoor
          }}'
      sequence:
      - target:
          entity_id: '{{ climate_ent }}'
        data:
          hvac_mode: 'off'
        action: climate.set_hvac_mode
      - data:
          title: AC OFF (heat bloqueado por exterior templado)
          message: '{{ notif_base }} | Prev=heat | R=ext_templ | Umbral={{ heat_force_off_outdoor
            }}'
        action: '{{ notify_service }}'
    - conditions:
      - condition: template
        value_template: '{{ cur_mode==''heat'' and heat_off is not none and tin>=heat_off
          }}'
      sequence:
      - target:
          entity_id: '{{ climate_ent }}'
        data:
          hvac_mode: 'off'
        action: climate.set_hvac_mode
      - data:
          title: AC AUTO OFF
          message: '{{ notif_base }} | Prev=heat | R=heat_off | On={{ heat_on }} Off={{
            heat_off }}'
        action: '{{ notify_service }}'
    - conditions:
      - condition: template
        value_template: "{{ cur_mode == 'cool'\n   and tin is not none and tout is
          not none\n   and (cool_off_reason | trim) != 'none'\n}}"
      sequence:
      - target:
          entity_id: '{{ climate_ent }}'
        data:
          hvac_mode: 'off'
        action: climate.set_hvac_mode
      - data:
          title: AC AUTO OFF
          message: '{{ notif_base }} | Prev=cool | Act=Off | Stop={{ (cool_emergency_off|float)
            if (tout|float) < 17 else (cool_stop_threshold|float) }} | R={{ ''cool_emergency_off''
            if (tout|float) < 17 else ''cool_off/cool_sensor_off'' }} | Source={{
            cool_off_reason | trim }} | TriggerSensor={{ cool_sensor_off_name if (cool_off_reason
            | trim) != ''Promedio'' else ''Promedio'' }} | SensorDelta={{ sensor_temp_delta
            }} | SensorColdEnabled={{ ''ON'' if cool_sensor_off_enabled else ''OFF''
            }} | Ctx={{ ''Emerg'' if (tout|float) < 17 else ''Normal'' }} | On={{
            cool_on }} | Off={{ cool_off }} | Bedroom={{ bedroom_temp }} | Cold={{
            cold_sensor_name }}={{ cold_temp }} | SensorOFF={{ cool_sensor_off_name
            }}={{ cool_sensor_off_temp }}<= {{ cool_sensor_off_trigger if (tout|float)
            >= 17 else ''n/a'' }} | EOn={{ cool_emergency_on }} EOff={{ cool_emergency_off
            }} | LastUseful={{ last_effective_setpoint }} | Set={{ cool_setpoint_emerg
            if (tout|float) < 17 else cool_setpoint_normal }}'
        action: '{{ notify_service }}'
    - conditions:
      - condition: template
        value_template: "{{ cur_mode == 'cool'\n   and tout is not none\n   and (tout|float)
          < 17\n   and (tout|float) >= (cool_emergency_outdoor_min|float)\n   and
          tin is not none\n   and (cool_emergency_off is not none)\n   and (tin|float)
          > (cool_emergency_off|float)\n}}"
      sequence:
      - target:
          entity_id: '{{ climate_ent }}'
        data:
          temperature: '{{ cool_setpoint_emerg }}'
        action: climate.set_temperature
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ state_attr(climate_ent,'fan_modes') is not none and\n
              \  'Low' in state_attr(climate_ent,'fan_modes') }}"
          sequence:
          - target:
              entity_id: '{{ climate_ent }}'
            data:
              fan_mode: Low
            action: climate.set_fan_mode
        default: []
    - conditions:
      - condition: template
        value_template: "{{ heat_on is not none\n   and tin is not none and (tin|float)
          <= (heat_on|float)\n   and (tout|float) < (heat_force_off_outdoor|float)\n
          \  and cur_mode != 'heat'\n   and (not locked or last_mode_no_fan == 'heat'
          or last_mode_no_fan not in ['cool','heat'])\n}}"
      sequence:
      - target:
          entity_id: '{{ climate_ent }}'
        data:
          hvac_mode: heat
        action: climate.set_hvac_mode
      - target:
          entity_id: '{{ climate_ent }}'
        data:
          temperature: 28
        action: climate.set_temperature
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ state_attr(climate_ent,'fan_modes') is not none and\n
              \  'Low' in state_attr(climate_ent,'fan_modes') }}"
          sequence:
          - target:
              entity_id: '{{ climate_ent }}'
            data:
              fan_mode: Low
            action: climate.set_fan_mode
        default: []
      - data:
          title: AC HEAT ON
          message: '{{ notif_base }} | Act=HEAT | On={{ heat_on }} Off={{ heat_off
            }} | Set=28 Fan=Low | Prev={{ cur_mode }}'
        action: '{{ notify_service }}'
    - conditions:
      - condition: template
        value_template: "{{ cur_mode != 'cool'\n   and tin is not none and tout is
          not none\n   and (\n     (\n       (tout|float) < 17\n       and (tout|float)
          >= (cool_emergency_outdoor_min|float)\n       and (cool_emergency_on is
          not none)\n       and (tin|float) >= (cool_emergency_on|float)\n     )\n
          \    or\n     (\n       (tout|float) >= 17\n       and cool_on is not none\n
          \      and (tin|float) >= (cool_on|float)\n     )\n   )\n   and (not locked
          or last_mode_no_fan == 'cool' or last_mode_no_fan not in ['cool','heat'])\n
          and (not night_ramp_in_progress)\n   and ((minutes_since_last_off | float(99999))
          >= cool_ramp_short_cycle_guard_min)\n}}"
      sequence:
      - variables:
          cool_context: "{{ 'emergency' if ((tout|float) < 17) else 'normal' }}"
          cool_stop_threshold_selected: "{{ cool_emergency_off if ((tout|float) <
            17) else cool_stop_threshold }}"
          cool_initial_setpoint_selected: "{{ cool_setpoint_emerg if ((tout|float)
            < 17) else cool_ramp_initial_setpoint }}"
          cool_learning_reference_selected: "{{ cool_setpoint_emerg if ((tout|float)
            < 17) else cool_last_useful_setpoint }}"
      - target:
          entity_id: input_boolean.ac_on_por_automatizacion
        action: input_boolean.turn_on
      - target:
          entity_id: input_boolean.ac_night_cool_bootstrap_in_progress
        action: input_boolean.turn_on
      - target:
          entity_id: input_select.ac_ultimo_modo_no_fan
        data:
          option: 'cool'
        action: input_select.select_option
      - target:
          entity_id:
          - input_datetime.ac_ultimo_cambio_modo
          - input_datetime.ac_last_auto_ts
          - input_datetime.ac_night_cool_last_bootstrap_ts
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        action: input_datetime.set_datetime
      - target:
          entity_id: input_text.ac_last_auto_branch
        data:
          value: cool_night_ramp_start
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_auto_action
        data:
          value: ramp_start
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_change_origin
        data:
          value: auto_on
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_auto_mode
        data:
          value: cool
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_auto_fan
        data:
          value: Low
        service: input_text.set_value
      - target:
          entity_id: input_number.ac_last_auto_setpoint
        data:
          value: '{{ cool_initial_setpoint_selected | float }}'
        action: input_number.set_value
      - target:
          entity_id: '{{ climate_ent }}'
        data:
          hvac_mode: cool
        action: climate.set_hvac_mode
      - target:
          entity_id: '{{ climate_ent }}'
        data:
          temperature: '{{ cool_initial_setpoint_selected }}'
        action: climate.set_temperature
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ state_attr(climate_ent,'fan_modes') is not none and\n
              \  'Low' in state_attr(climate_ent,'fan_modes') }}"
          sequence:
          - target:
              entity_id: '{{ climate_ent }}'
            data:
              fan_mode: Low
            action: climate.set_fan_mode
        default: []
      - action: logbook.log
        data:
          name: AC Auto Trace
          message: >-
            cool_night_ramp_start | ctx={{ cool_context }} | init={{ cool_initial_setpoint_selected
            }} | stop={{ cool_stop_threshold_selected }} | learn_ref={{ cool_learning_reference_selected
            }} | wait_initial={{ cool_ramp_initial_wait_min }}m | wait_step={{ cool_ramp_followup_wait_min
            }}m
          entity_id: '{{ climate_ent }}'
      - variables:
          cool_push_reason: >-
            {{ 'Mot=auto emergencia' if cool_context == 'emergency' else 'Mot=auto umbral' }}
          cool_push_summary: 'Rampa térmica | Init={{ cool_initial_setpoint_selected }} | Espera={{ cool_ramp_initial_wait_min }}m/{{ cool_ramp_followup_wait_min }}m | Stop={{ cool_stop_threshold_selected }} | Learn={{ cool_learning_reference_selected }}'
          cool_mobile_title_local: Cool noche
          cool_mobile_message_local: >-
            {% set reason = cool_push_reason | default('', true) | trim %}
            {% set summary = cool_push_summary | default('', true) | trim %}
            {{ (reason if reason else 'Mot=sin detalle') ~ ' | ' ~ (summary if summary else 'Sin detalle') }}
      - data:
          title: '{{ cool_mobile_title_local }}'
          message: '{{ cool_mobile_message_local }}'
          data:
            ttl: 0
            priority: high
        action: '{{ notify_service }}'
      - repeat:
          sequence:
          - variables:
              ramp_wait_minutes: '{{ cool_ramp_initial_wait_min if repeat.index ==
                1 else cool_ramp_followup_wait_min }}'
          - delay:
              minutes: '{{ ramp_wait_minutes | int }}'
          - variables:
              loop_hvac_mode: '{{ states(climate_ent) }}'
              loop_setpoint: '{{ state_attr(climate_ent, ''temperature'') | float(cool_initial_setpoint_selected)
                }}'
              loop_cycle_active: "{{ loop_hvac_mode == 'cool' and presence_ok and tin
                is not none and cool_stop_threshold_selected is not none and (tin|float)
                > (cool_stop_threshold_selected|float) }}"
              loop_can_reduce: '{{ loop_cycle_active and (loop_setpoint | float(99))
                > (cool_ramp_min_setpoint | float(0)) }}'
              loop_next_setpoint: '{{ [((loop_setpoint | float) - cool_ramp_step),
                cool_ramp_min_setpoint] | max | round(1) }}'
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ not presence_ok }}'
              sequence:
              - target:
                  entity_id: input_text.ac_last_auto_branch
                data:
                  value: cool_night_ramp_presence_exit
                service: input_text.set_value
              - target:
                  entity_id: input_text.ac_last_auto_action
                data:
                  value: ramp_presence_exit
                service: input_text.set_value
              - action: logbook.log
                data:
                  name: AC Auto Trace
                  message: >-
                    cool_night_ramp_presence_exit | idx={{ repeat.index }} | set={{
                    loop_setpoint }}
                  entity_id: '{{ climate_ent }}'
              - target:
                  entity_id: input_boolean.ac_night_cool_bootstrap_in_progress
                action: input_boolean.turn_off
              - target:
                  entity_id: input_boolean.ac_on_por_automatizacion
                action: input_boolean.turn_off
              - stop: Rampa detenida por pérdida de presencia.
            - conditions:
              - condition: template
                value_template: '{{ loop_hvac_mode != ''cool'' }}'
              sequence:
              - target:
                  entity_id: input_text.ac_last_auto_branch
                data:
                  value: cool_night_ramp_hvac_exit
                service: input_text.set_value
              - target:
                  entity_id: input_text.ac_last_auto_action
                data:
                  value: ramp_hvac_exit
                service: input_text.set_value
              - action: logbook.log
                data:
                  name: AC Auto Trace
                  message: >-
                    cool_night_ramp_hvac_exit | idx={{ repeat.index }} | hvac={{ loop_hvac_mode
                    }} | set={{ loop_setpoint }}
                  entity_id: '{{ climate_ent }}'
              - target:
                  entity_id: input_boolean.ac_night_cool_bootstrap_in_progress
                action: input_boolean.turn_off
              - target:
                  entity_id: input_boolean.ac_on_por_automatizacion
                action: input_boolean.turn_off
              - stop: Rampa detenida porque el equipo salió de cool.
            - conditions:
              - condition: template
                value_template: '{{ tin is not none and cool_stop_threshold_selected
                  is not none and (tin|float) <= (cool_stop_threshold_selected|float)
                  }}'
              sequence:
              - target:
                  entity_id: input_number.ac_night_cool_last_effective_setpoint
                data:
                  value: '{{ loop_setpoint }}'
                action: input_number.set_value
              - target:
                  entity_id: input_datetime.ac_night_cool_last_effective_ts
                data:
                  datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
                action: input_datetime.set_datetime
              - target:
                  entity_id: input_number.ac_last_auto_setpoint
                data:
                  value: '{{ loop_setpoint }}'
                action: input_number.set_value
              - target:
                  entity_id: input_text.ac_last_auto_branch
                data:
                  value: cool_night_ramp_ready_for_comfort_off
                service: input_text.set_value
              - target:
                  entity_id: input_text.ac_last_auto_action
                data:
                  value: ramp_ready_for_off
                service: input_text.set_value
              - action: logbook.log
                data:
                  name: AC Auto Trace
                  message: >-
                    cool_night_ramp_ready_for_comfort_off | idx={{ repeat.index }}
                    | useful_set={{ loop_setpoint }} | tin={{ tin }} | stop={{ cool_stop_threshold_selected
                    }}
                  entity_id: '{{ climate_ent }}'
              - target:
                  entity_id: input_boolean.ac_night_cool_bootstrap_in_progress
                action: input_boolean.turn_off
              - target:
                  entity_id: input_boolean.ac_on_por_automatizacion
                action: input_boolean.turn_off
              - stop: Rampa detenida; sigue apagado normal por confort.
            - conditions:
              - condition: template
                value_template: '{{ loop_can_reduce }}'
              sequence:
              - target:
                  entity_id: '{{ climate_ent }}'
                data:
                  temperature: '{{ loop_next_setpoint }}'
                action: climate.set_temperature
              - target:
                  entity_id: input_number.ac_last_auto_setpoint
                data:
                  value: '{{ loop_next_setpoint }}'
                action: input_number.set_value
              - target:
                  entity_id: input_text.ac_last_auto_branch
                data:
                  value: cool_night_ramp_step
                service: input_text.set_value
              - target:
                  entity_id: input_text.ac_last_auto_action
                data:
                  value: ramp_step
                service: input_text.set_value
              - action: logbook.log
                data:
                  name: AC Auto Trace
                  message: >-
                    cool_night_ramp_step | idx={{ repeat.index }} | wait={{ ramp_wait_minutes
                    }}m | from={{ loop_setpoint }} | to={{ loop_next_setpoint }} |
                    tin={{ tin }} | stop={{ cool_stop_threshold_selected }}
                  entity_id: '{{ climate_ent }}'
            default:
            - target:
                entity_id: input_text.ac_last_auto_branch
              data:
                value: cool_night_ramp_hold
              service: input_text.set_value
            - target:
                entity_id: input_text.ac_last_auto_action
              data:
                value: ramp_hold
              service: input_text.set_value
            - action: logbook.log
              data:
                name: AC Auto Trace
                message: >-
                  cool_night_ramp_hold | idx={{ repeat.index }} | set={{ loop_setpoint
                  }} | tin={{ tin }} | stop={{ cool_stop_threshold_selected }}
                entity_id: '{{ climate_ent }}'
          until:
          - condition: template
            value_template: '{{ false }}'
      - target:
          entity_id: input_boolean.ac_night_cool_bootstrap_in_progress
        action: input_boolean.turn_off
      - delay: 00:00:10
      - target:
          entity_id: input_boolean.ac_on_por_automatizacion
        action: input_boolean.turn_off
    default: []
  mode: single
  variables:
    climate_ent: climate.0200009211c7_climate
    notify_service: notify.mobile_app_samsung_s24
    t1: '{{ states(''sensor.lumi_lumi_weather_cuarto_temperatura'')|float(none) }}'
    t2: '{{ states(''sensor.lumi_lumi_weather_coco_temperatura'')|float(none) }}'
    h1: '{{ states(''sensor.lumi_lumi_weather_cuarto_humedad'')|float(none) }}'
    h2: '{{ states(''sensor.lumi_lumi_weather_coco_humedad'')|float(none) }}'
    tin: "{% if t1 is not none and t2 is not none %}\n  {{ ((t1 + t2) / 2) | round(2)
      }}\n{% elif t1 is not none %}\n  {{ t1 | round(2) }}\n{% elif t2 is not none
      %}\n  {{ t2 | round(2) }}\n{% else %}\n  {{ none }}\n{% endif %}"
    hin: "{% if h1 is not none and h2 is not none %}\n  {{ ((h1 + h2) / 2) | round(1)
      }}\n{% elif h1 is not none %}\n  {{ h1 | round(1) }}\n{% elif h2 is not none
      %}\n  {{ h2 | round(1) }}\n{% else %}\n  {{ none }}\n{% endif %}"
    hot_temp: "{% if t1 is none and t2 is none %}\n  {{ none }}\n{% elif t2 is none
      %}\n  {{ t1 | round(2) }}\n{% elif t1 is none %}\n  {{ t2 | round(2) }}\n{%
      else %}\n  {{ (t1 if t1 >= t2 else t2) | round(2) }}\n{% endif %}"
    hot_sensor_name: "{% if t1 is none and t2 is none %}\n  none\n{% elif t2 is none
      %}\n  Cuarto\n{% elif t1 is none %}\n  Sala\n{% else %}\n  {{ 'Cuarto' if t1
      >= t2 else 'Sala' }}\n{% endif %}"
    cold_temp: "{% if t1 is none and t2 is none %}\n  {{ none }}\n{% elif t2 is none
      %}\n  {{ t1 | round(2) }}\n{% elif t1 is none %}\n  {{ t2 | round(2) }}\n{%
      else %}\n  {{ (t1 if t1 <= t2 else t2) | round(2) }}\n{% endif %}"
    cold_sensor_name: "{% if t1 is none and t2 is none %}\n  none\n{% elif t2 is
      none %}\n  Cuarto\n{% elif t1 is none %}\n  Sala\n{% else %}\n  {{ 'Cuarto'
      if t1 <= t2 else 'Sala' }}\n{% endif %}"
    bedroom_temp: "{% if t1 is not none %}\n  {{ t1 | round(2) }}\n{% elif cold_temp
      is not none %}\n  {{ cold_temp | round(2) }}\n{% else %}\n  {{ none }}\n{%
      endif %}"
    dewpoint: "{% if tin is none or hin is none %}\n  {{ none }}\n{% else %}\n  {%
      set T = tin|float %}\n  {% set RH = hin|float %}\n  {% set a = 17.62 %}\n  {%
      set b = 243.12 %}\n  {% set gamma = (a*T/(b+T)) + (RH/100)|log %}\n  {{ ((b*gamma)/(a-gamma))
      | round(2) }}\n{% endif %}"
    dp_offset: "{% if dewpoint is none %}\n  {{ 0 }}\n{% else %}\n  {% set dp = dewpoint|float
      %}\n  {% if dp >= 20 %}\n    {{ -0.6 }}\n  {% elif dp >= 18 %}\n    {{ -0.4
      }}\n  {% elif dp >= 16 %}\n    {{ -0.2 }}\n  {% elif dp >= 14 %}\n    {{ -0.1
      }}\n  {% else %}\n    {{ 0 }}\n  {% endif %}\n{% endif %}"
    tout: '{{ state_attr(''weather.openweathermap'',''apparent_temperature'')|float(none)
      }}'
    wind_kmh: '{{ state_attr(''weather.openweathermap'',''wind_speed'')|float(0) }}'
    wind: '{{ (wind_kmh / 3.6) | round(2) }}'
    month: '{{ now().month }}'
    cur_mode: '{{ states(climate_ent) }}'
    locked: '{{ is_state(''input_boolean.ac_bloqueo_cambio_modo_2h'',''on'') }}'
    last_mode_no_fan: '{{ states(''input_select.ac_ultimo_modo_no_fan'') }}'
    presence_ok: '{{ is_state(''binary_sensor.presencia_ok_estable'',''on'') }}'
    sensor_temp_delta: "{% if t1 is not none and t2 is not none %}\n  {{ ((t1 - t2)
      | abs) | round(2) }}\n{% else %}\n  {{ none }}\n{% endif %}"
    cool_sensor_off_delta_max: 1.0
    cool_sensor_off_enabled: "{% if sensor_temp_delta is none %}\n  {{ true }}\n{%
      else %}\n  {{ (sensor_temp_delta | float(99)) <= (cool_sensor_off_delta_max
      | float(1)) }}\n{% endif %}"
    night_ramp_in_progress: '{{ is_state(''input_boolean.ac_night_cool_bootstrap_in_progress'',''on'') }}'
    last_off_ts: '{{ state_attr(''input_datetime.ac_ultimo_apagado'', ''timestamp'') | float(0) }}'
    minutes_since_last_off: '{{ ((as_timestamp(now()) - last_off_ts) / 60) if last_off_ts else 99999 }}'
    last_effective_ts: '{{ state_attr(''input_datetime.ac_night_cool_last_effective_ts'', ''timestamp'') | float(0) }}'
    hours_since_last_effective: '{{ ((as_timestamp(now()) - last_effective_ts) / 3600) if last_effective_ts else 99999 }}'
    last_effective_setpoint: '{{ states(''input_number.ac_night_cool_last_effective_setpoint'') | float(none) }}'
    cool_last_useful_memory_hours: 72
    cool_ramp_short_cycle_guard_min: 8
    cool_ramp_step: 0.5
    cool_ramp_initial_wait_min: 30
    cool_ramp_followup_wait_min: 10
    cool_ramp_min_setpoint: 20
    heat_force_off_outdoor: 20
    cool_emergency_outdoor_min: 8
    cool_emergency_on_base: 24
    cool_emergency_on: '{{ (cool_emergency_on_base + (dp_offset|float)) | round(2)
      }}'
    cool_emergency_off: '{{ (cool_emergency_on|float - 0.3) | round(2) }}'
    cool_setpoint_emerg: '{{ max(((cool_emergency_off|float) - 2) | round(0,''floor''),
      16) | int }}'
    # Rama COOL nocturna suavizada por confort en recámara: el arranque puede
    # seguir usando el promedio, pero el apagado prioriza confort local del cuarto
    # para evitar sobreenfriamiento nocturno aunque el promedio aún siga arriba.
    # Histéresis promedio nocturna ampliada a 0.5 °C en meses templados
    # [11,12,1,2,3] para reducir ciclos frecuentes y mejorar estabilidad térmica
    # en recámara sin acercar demasiado el setpoint inicial al umbral de apagado.
    cool_on: "{% if tout is none %}\n  {{ none }}\n{% elif tout >= 17 %}\n  {{ 23.5
      if month in [11,12,1,2,3] else 22.8 if (month in [6,7,8,9] and tout>=30) else
      23.3 }}\n{% else %}\n  {{ none }}\n{% endif %}"
    cool_off: "{% if cool_on is none %}\n  {{ none }}\n{% else %}\n  {{ 23.0 if month
      in [11,12,1,2,3] else 21.3 if (month in [6,7,8,9] and tout>=30) else 22.5 }}\n{%
      endif %}"
    cool_stop_threshold: '{{ cool_off }}'
    cool_last_useful_base_setpoint: "{% if cool_stop_threshold is none %}\n  {{ none
      }}\n{% else %}\n  {{ [((cool_stop_threshold | float) - 0.5), cool_ramp_min_setpoint]
      | max | round(1) }}\n{% endif %}"
    cool_last_useful_setpoint: "{% set memory_valid = last_effective_setpoint is not
      none and (hours_since_last_effective | float(99999)) <= (cool_last_useful_memory_hours
      | float) %}\n{% if cool_last_useful_base_setpoint is none %}\n  {{ none }}\n{%
      elif memory_valid %}\n  {{ (((cool_last_useful_base_setpoint | float) * 0.7)
      + ((last_effective_setpoint | float) * 0.3)) | round(1) }}\n{% else %}\n  {{
      cool_last_useful_base_setpoint | float | round(1) }}\n{% endif %}"
    # La rampa nocturna conserva la banda `cool_on`/`cool_off` para decidir el ciclo.
    # El setpoint inicial arranca en `cool_off - 0.5` y la memoria guarda el último
    # setpoint útil aplicado justo antes del apagado por confort para reutilizarlo
    # sólo como aprendizaje contextual, sin depender de consumo ni condensador.
    cool_ramp_initial_setpoint: "{% if cool_last_useful_base_setpoint is none %}\n
      \  {{ none }}\n{% else %}\n  {{ cool_last_useful_base_setpoint | float | round(1)
      }}\n{% endif %}"
    cool_setpoint_normal: '{{ cool_last_useful_setpoint }}'
    # En meses templados se conserva un corte protector explícito de recámara a
    # 23.2 °C (0.2 °C arriba del apagado por promedio de 23.0 °C) para seguir
    # priorizando confort local / sensor más frío sin perder la nueva histéresis.
    cool_sensor_off_trigger: "{% if cool_off is none %}\n  {{ none }}\n{% elif month in [11,12,1,2,3] %}\n  {{ 23.2 }}\n{% else %}\n  {{ cool_off | round(1) }}\n{% endif %}"
    cool_sensor_off_temp: "{% if bedroom_temp is not none %}\n  {{ bedroom_temp |
      round(2) }}\n{% elif cold_temp is not none %}\n  {{ cold_temp | round(2) }}\n{%
      else %}\n  {{ none }}\n{% endif %}"
    cool_sensor_off_name: "{% if bedroom_temp is not none %}\n  Cuarto\n{% elif
      cold_sensor_name is not none %}\n  {{ cold_sensor_name }}\n{% else %}\n  none\n{%
      endif %}"
    cool_off_reason: "{% if cur_mode != 'cool' or tin is none or tout is none %}\n
      \  none\n{% elif (tout|float) < 17 and (tout|float) >= (cool_emergency_outdoor_min|float)
      and (cool_emergency_off is not none) and (tin|float) <= (cool_emergency_off|float)
      %}\n  Promedio\n{% elif (tout|float) >= 17 and (cool_off is not none) %}\n
      \ {% if (tin|float) <= (cool_off|float) %}\n    Promedio\n  {% elif cool_sensor_off_enabled
      and (cool_sensor_off_temp is not none) and (cool_sensor_off_trigger is not
      none) and ((cool_sensor_off_temp|float) <= (cool_sensor_off_trigger|float))
      %}\n    {{ cool_sensor_off_name }}\n  {% else %}\n    none\n  {% endif %}\n{%
      else %}\n  none\n{% endif %}"
    cool_emergency_active: "{{ tout is not none and tin is not none\n   and (tout|float)
      < 17\n   and (tout|float) >= (cool_emergency_outdoor_min|float)\n   and (\n
      \    (tin|float) >= (cool_emergency_on|float)\n     or (cur_mode == 'cool' and
      (tin|float) > (cool_emergency_off|float))\n   )\n}}"
    heat_on: "{% if tout is none %}\n  {{ none }}\n{% else %}\n  {% set base = 23.0
      if tout <= 5 else 22.0 if tout >= 17 else (23.0 - ((tout-5)/12)) %}\n  {{ (base
      + min(wind*0.05,0.8)) | round(2) }}\n{% endif %}"
    heat_off: '{{ (heat_on + 2) if heat_on is not none else none }}'
    trig: "{% if trigger is defined %}\n  {% if trigger.platform == 'time_pattern'
      %}\n    t(/5)\n  {% elif trigger.platform == 'state' %}\n    s:{{ trigger.entity_id.split('.')[-1]
      }}=>{{ trigger.to_state.state if trigger.to_state else 'n/a' }}\n  {% else %}\n
      \   {{ trigger.platform }}\n  {% endif %}\n{% else %}\n  manual\n{% endif %}"
    notif_base: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }} | Trig={{ trig }} | C_T={{
      t1 }}°C S_T={{ t2 }}°C PromT={{ tin }}°C | C_H={{ h1 }}% S_H={{ h2 }}% PromH={{
      hin }}% | DP={{ dewpoint }}°C | Ext={{ tout }}°C V={{ wind }}m/s | Pres={{ ''ON''
      if presence_ok else ''OFF'' }} | Lock={{ ''ON'' if locked else ''OFF'' }} |
      Last={{ last_mode_no_fan }}'
- id: '1768159303322'
  alias: AC - Día dinámico aprendido (principal)
  description: 'Automatización principal diurna 07:01–20:59. Usa fórmula base + sesgos
    aprendidos. Respeta presencia jerárquica, pausa manual de 5 min, presencia temporal
    por encendido manual y aprendizaje por feedback. En `input_select.ac_ultimo_modo_no_fan`,
    `off` representa reposo/sin modo recordado; no se usa `idle`.

    '
  triggers:
  - trigger: time_pattern
    minutes: /5
  - trigger: state
    entity_id:
    - weather.openweathermap
    - sensor.lumi_lumi_weather_cuarto_temperatura
    - sensor.lumi_lumi_weather_coco_temperatura
    - sensor.lumi_lumi_weather_cuarto_humedad
    - sensor.lumi_lumi_weather_coco_humedad
    - binary_sensor.presencia_ok_estable
    - binary_sensor.presencia_movimiento_estable
    - device_tracker.samsung_s24
    - person.ivan
    - input_boolean.ac_bloqueo_cambio_modo_2h
    - input_select.ac_ultimo_modo_no_fan
  conditions:
  - condition: time
    after: 07:01:00
    before: '20:59:00'
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ cool_main_control_error }}'
      sequence:
      - action: logbook.log
        data:
          name: AC Main
          message: '{{ cool_main_control_audit }}'
          entity_id: climate.0200009211c7_climate
      - data:
          title: AC ctrl!
          message: '{{ cool_main_control_audit }}'
          data:
            ttl: 0
            priority: high
        action: notify.mobile_app_samsung_s24
    - conditions:
      - condition: template
        value_template: '{{ cool_main_control_blocked }}'
      sequence:
      - action: logbook.log
        data:
          name: AC Main
          message: '{{ cool_main_control_audit }}'
          entity_id: climate.0200009211c7_climate
    - conditions:
      - condition: template
        value_template: '{{ cur_mode == ''off'' and last_mode_no_fan == ''emergency_cool''
          and (minutes_since_last_auto | float(99999)) > 2 }}'
      sequence:
      - target:
          entity_id: input_select.ac_ultimo_modo_no_fan
        data:
          option: 'off'
        # Limpiar a `off` deja explícito que no se desea conservar memoria operativa
        # del modo previo una vez descartado el latch de emergencia.
        action: input_select.select_option
      - action: logbook.log
        data:
          name: AC Auto Trace
          message: >-
            latch_emergency_cleared | reason=ac_off | last_mode_no_fan={{ last_mode_no_fan }}
          entity_id: climate.0200009211c7_climate
    - conditions:
      - condition: template
        value_template: '{{ presence_away_30m and cur_mode != ''off'' and (not manual_override_active) }}'
      sequence:
      - target:
          entity_id: input_boolean.ac_off_por_automatizacion
        action: input_boolean.turn_on
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ cur_mode == ''cool'' }}'
          sequence:
          - target:
              entity_id: climate.0200009211c7_climate
            data:
              hvac_mode: fan_only
            action: climate.set_hvac_mode
          - choose:
            - conditions:
              - condition: template
                value_template: "{{ state_attr(climate_ent,'fan_modes') is not none\n
                  \  and 'Low' in state_attr(climate_ent,'fan_modes') }}"
              sequence:
              - target:
                  entity_id: climate.0200009211c7_climate
                data:
                  fan_mode: Low
                action: climate.set_fan_mode
            default: []
          - delay: '{{ fan_dry_delay }}'
        default: []
      - target:
          entity_id:
          - input_datetime.ac_ultimo_apagado
          - input_datetime.ac_last_auto_ts
        data:
          datetime: '{{ ts }}'
        action: input_datetime.set_datetime
      - target:
          entity_id: input_text.ac_last_auto_branch
        data:
          value: presence_off
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_auto_action
        data:
          value: auto_off
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_change_origin
        data:
          value: auto_off
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_auto_mode
        data:
          value: '{{ cur_mode }}'
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_auto_fan
        data:
          value: '{{ ac_fan }}'
        service: input_text.set_value
      - target:
          entity_id: input_number.ac_last_auto_tin
        data:
          value: '{{ tin if tin is not none else 0 }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_t1
        data:
          value: '{{ t1 if t1 is not none else 0 }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_t2
        data:
          value: '{{ t2 if t2 is not none else 0 }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_hin
        data:
          value: '{{ hin if hin is not none else 0 }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_tout
        data:
          value: '{{ tout if tout is not none else 0 }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_setpoint
        data:
          value: '{{ ac_set if ac_set is not none else 0 }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_sensor_delta
        data:
          value: '{{ sensor_delta }}'
        action: input_number.set_value
      - target:
          entity_id: climate.0200009211c7_climate
        data:
          hvac_mode: 'off'
        action: climate.set_hvac_mode
      - target:
          entity_id: input_select.ac_ultimo_modo_no_fan
        data:
          option: 'off'
        # `off` es el reposo del helper; no existe un estado `idle` válido aquí.
        action: input_select.select_option
      - variables:
          cool_push_kind: off
          cool_push_reason: Mot=auto ausencia
          cool_push_summary: 'Modo={{ cur_mode }} | Aus=30m'
          # `cool_push_*` vive sólo en esta rama; el título/mensaje se renderiza aquí mismo.
          cool_mobile_title_local: 'Cool↓'
          cool_mobile_message_local: >-
            {% set reason = cool_push_reason | default('', true) | trim %}
            {% set summary = cool_push_summary | default('', true) | trim %}
            {{ (reason if reason else 'Mot=sin detalle') ~ ' | ' ~ (summary if summary else 'Sin detalle') }}
      - data:
          title: '{{ cool_mobile_title_local }}'
          message: '{{ cool_mobile_message_local }}'
          data:
            ttl: 0
            priority: high
        action: notify.mobile_app_samsung_s24
      - delay: 00:00:45
      - target:
          entity_id: input_boolean.ac_off_por_automatizacion
        action: input_boolean.turn_off
    - conditions:
      - condition: template
        value_template: "{{ auto_on_allowed\n   and (not recent_any_auto_on)\n   and
          emergency_hot\n   and (not emergency_latched)\n   and (\n     cur_mode !=
          'cool'\n     or (ac_set | float(0)) != (emergency_setpoint | float)\n     or
          ac_fan != emergency_fan_mode\n   ) }}"
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ (minutes_since_manual_off | float(99999)) < 5 }}'
          sequence:
          - stop: 'AUTO ON abortado: manual OFF < 5 min.'
        default: []
      - target:
          entity_id: input_boolean.ac_on_por_automatizacion
        action: input_boolean.turn_on
      - target:
          entity_id: input_select.ac_ultimo_modo_no_fan
        data:
          option: 'emergency_cool'
        # `emergency_cool` sólo se guarda cuando la rama de enfriamiento de emergencia
        # toma control para mitigar calor severo fuera del flujo normal.
        action: input_select.select_option
      - target:
          entity_id:
          - input_datetime.ac_ultimo_cambio_modo
          - input_datetime.ac_last_auto_ts
        data:
          datetime: '{{ ts }}'
        action: input_datetime.set_datetime
      - target:
          entity_id: input_text.ac_last_auto_branch
        data:
          value: cool_emergency_on
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_auto_action
        data:
          value: auto_on
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_change_origin
        data:
          value: auto_on
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_auto_mode
        data:
          value: cool
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_auto_fan
        data:
          value: '{{ emergency_fan_mode }}'
        service: input_text.set_value
      - target:
          entity_id: input_number.ac_last_auto_tin
        data:
          value: '{{ tin if tin is not none else 0 }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_t1
        data:
          value: '{{ t1 if t1 is not none else 0 }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_t2
        data:
          value: '{{ t2 if t2 is not none else 0 }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_hin
        data:
          value: '{{ hin if hin is not none else 0 }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_tout
        data:
          value: '{{ tout if tout is not none else 0 }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_setpoint
        data:
          value: '{{ emergency_setpoint }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_last_auto_sensor_delta
        data:
          value: '{{ sensor_delta }}'
        action: input_number.set_value
      - target:
          entity_id:
          - input_datetime.ac_cool_cycle_started_at
          - input_datetime.ac_cool_cycle_last_step_at
        data:
          datetime: '{{ ts }}'
        action: input_datetime.set_datetime
      - target:
          entity_id: input_number.ac_cool_cycle_start_tin
        data:
          value: '{{ tin if tin is not none else 0 }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_cool_cycle_last_applied_setpoint
        data:
          value: '{{ emergency_setpoint if emergency_setpoint is not none else 0 }}'
        action: input_number.set_value
      - target:
          entity_id: input_boolean.ac_manual_setpoint_override_active
        action: input_boolean.turn_off
      - target:
          entity_id: input_datetime.ac_manual_setpoint_override_until
        data:
          datetime: '{{ ts }}'
        action: input_datetime.set_datetime
      - target:
          entity_id: input_boolean.ac_cool_adaptive_cycle_active
        action: input_boolean.turn_on
      - target:
          entity_id: climate.0200009211c7_climate
        data:
          hvac_mode: cool
        action: climate.set_hvac_mode
      - target:
          entity_id: input_text.ac_last_change_origin
        data:
          value: cool_emergency_on
        service: input_text.set_value
      - target:
          entity_id: climate.0200009211c7_climate
        data:
          temperature: '{{ emergency_setpoint }}'
        action: climate.set_temperature
      - action: logbook.log
        data:
          name: AC Auto Trace
          message: >-
            cool_emergency_on | SPsrc=emergency | SP={{ emergency_setpoint }} | Fan={{ emergency_fan_mode }} | Vent={{ emergency_window }} | Tin={{ tin }} | Tout={{ tout }}
          entity_id: climate.0200009211c7_climate
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ state_attr(climate_ent,'fan_modes') is not none\n
              \  and emergency_fan_mode in state_attr(climate_ent,'fan_modes') }}"
          sequence:
          - target:
              entity_id: climate.0200009211c7_climate
            data:
              fan_mode: '{{ emergency_fan_mode }}'
            action: climate.set_fan_mode
        - conditions:
          - condition: template
            value_template: "{{ state_attr(climate_ent,'fan_modes') is not none\n
              \  and 'Auto' in state_attr(climate_ent,'fan_modes') }}"
          sequence:
          - target:
              entity_id: climate.0200009211c7_climate
            data:
              fan_mode: Auto
            action: climate.set_fan_mode
        default: []
      - variables:
          cool_push_kind: on
          cool_push_reason: Mot=auto emergencia
          cool_push_summary: 'SP={{ emergency_setpoint }} | Fan={{ emergency_fan_mode }} | Vent={{ emergency_window }}'
          # `cool_push_*` vive sólo en esta rama; el título/mensaje se renderiza aquí mismo.
