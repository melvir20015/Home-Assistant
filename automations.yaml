                cool_sph_ignored_inconsistency | bucket={{ cool_context_bucket }} | SPt={{ cool_setpoint }} | SPh_prev={{ cool_effective_sp_entry if cool_effective_sp_entry is not none else 'none' }} | Δ={{ cool_effective_sp_delta if cool_effective_sp_delta is not none else 'none' }} | reason={{ cool_effective_sp_inconsistency_reason }} | hits={{ cool_effective_sp_reset_hits }}
              entity_id: climate.0200009211c7_climate
        default: []
