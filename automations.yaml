        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_manual_sp_result_summary
        data:
          value: '{{ manual_sp_resumen }}'
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_learning_metadata
        data:
          value: '{{ (''ts='' ~ now().strftime(''%Y-%m-%d %H:%M:%S'') ~ ''|src=manual_sp|ctx='' ~ cool_bucket_selected ~ ''|before='' ~ (effective_bucket_previous_value if effective_bucket_previous_value is not none else ''na'') ~ ''|after='' ~ (effective_sp_after if effective_sp_after is not none else ''na''))[:255] }}'
        service: input_text.set_value
      - target:
          entity_id: input_text.ac_last_learning_context_key
        data:
          value: '{{ cool_bucket_selected }}'
        service: input_text.set_value
      - target:
          entity_id: '{{ effective_bucket_helper }}'
        data:
          value: '{{ effective_sp_after }}'
        action: input_number.set_value
      - target:
          entity_id: input_text.ac_dda_cool_effective_setpoint_map
        data:
          value: '{{ effective_summary }}'
        service: input_text.set_value
      - target:
          entity_id: '{{ cool_learning_bucket_helper }}'
        data:
          value: '{{ cool_learning_after }}'
        action: input_number.set_value
      - target:
          entity_id: input_text.ac_dda_cool_contextual_learning_map
        data:
          value: '{{ cool_learning_summary }}'
        service: input_text.set_value
      - target:
          entity_id: input_number.ac_dda_last_manual_setpoint
        data:
          value: '{{ new_sp_num if new_sp_num is not none else 0 }}'
        action: input_number.set_value
      - action: logbook.log
        data:
          name: AC Auto Trace
          message: sp_write | writer=manual_override | before={{ prev_sp_num if prev_sp_num
            is not none else 'na' }} | target={{ new_sp_num if new_sp_num is not none
            else 'na' }} | lock={{ manual_sp_lock_active }} | blocked_by_manual_lock=no
            | bucket={{ cool_bucket_selected }} | after={{ new_sp_num if new_sp_num
            is not none else 'na' }} | status=applied
          entity_id: '{{ climate_ent }}'
      - action: logbook.log
        data:
          name: AC Manual SP
          message: '{{ manual_sp_result_log }}'
          entity_id: '{{ climate_ent }}'
      - action: logbook.log
        data:
          name: AC Manual SP
          message: '{{ audit_message }}'
          entity_id: '{{ climate_ent }}'
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ feedback_mobile_notify }}'
          sequence:
          - data:
              title: AC SP manual
              message: '{{ now().strftime(''%I:%M %p'') | regex_replace(''^0'','''') }} Tin={{ ''%.1f'' | format(tin | float) if tin is not none else ''n/a'' }} Tout={{ ''%.1f'' | format(tout | float) if tout is not none else ''n/a'' }} H={{ ''%.0f'' | format(hout_owm | float) if hout_owm is not none else ''n/a'' }} W={{ cond_owm if cond_owm not in ['''', ''unknown'', ''unavailable'', ''none''] else ''n/a'' }} On={{ ''%.1f'' | format(contract_on_display | float) if contract_on_display is not none else ''n/a'' }} Off={{ ''%.1f'' | format(contract_off_display | float) if contract_off_display is not none else ''n/a'' }} SP={{ ''%.1f'' | format(new_sp_num | float) if new_sp_num is not none else ''n/a'' }} Fan={{ state_attr(climate_ent,''fan_mode'') if state_attr(climate_ent,''fan_mode'') is not none else ''n/a'' }} Src=ManualSP Delta={{ ''%+.2f'' | format(delta_sp | float(0)) if delta_sp is not none else ''n/a'' }} Resultado={{ ''aplicado'' if feedback_or_override_apply else ''ignorado'' }} Razón={{ manual_sp_reason_output }}'
              data:
                ttl: 0
                priority: high
            action: notify.mobile_app_samsung_s24
        default: []
    default:
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ manual_sp_override_active }}'
        sequence:
        - target:
            entity_id: input_text.ac_dda_last_change_origin
          data:
            value: manual_override
          service: input_text.set_value
      - conditions:
        - condition: template
          value_template: '{{ ignore_reason in [''setpoint_echo_from_device'',''device_report_lag'',''post_auto_sync'',''eco_inmediato_mismo_valor'']
            }}'
        sequence:
        - target:
            entity_id: input_text.ac_dda_last_change_origin
          data:
            value: device_echo
          service: input_text.set_value
      default: []
    - action: logbook.log
      data:
        name: AC Manual SP
        message: '{{ manual_sp_result_log }}'
        entity_id: '{{ climate_ent }}'
    - target:
        entity_id: input_text.ac_last_manual_sp_result_summary
      data:
        value: '{{ manual_sp_resumen }}'
      service: input_text.set_value
    - action: logbook.log
      data:
        name: AC Manual SP
        message: '{{ audit_message }}'
        entity_id: '{{ climate_ent }}'
    - data:
        title: AC SP manual
        message: '{{ now().strftime(''%I:%M %p'') | regex_replace(''^0'','''') }} Tin={{ ''%.1f'' | format(tin | float) if tin is not none else ''n/a'' }} Tout={{ ''%.1f'' | format(tout | float) if tout is not none else ''n/a'' }} H={{ ''%.0f'' | format(hout_owm | float) if hout_owm is not none else ''n/a'' }} W={{ cond_owm if cond_owm not in ['''', ''unknown'', ''unavailable'', ''none''] else ''n/a'' }} On={{ ''%.1f'' | format(contract_on_display | float) if contract_on_display is not none else ''n/a'' }} Off={{ ''%.1f'' | format(contract_off_display | float) if contract_off_display is not none else ''n/a'' }} SP={{ ''%.1f'' | format(new_sp_num | float) if new_sp_num is not none else ''n/a'' }} Fan={{ state_attr(climate_ent,''fan_mode'') if state_attr(climate_ent,''fan_mode'') is not none else ''n/a'' }} Src=ManualSP Delta={{ ''%+.2f'' | format(delta_sp | float(0)) if delta_sp is not none else ''n/a'' }} Resultado=ignorado Razón={{ manual_sp_reason_output }}'
        data:
          ttl: 0
          priority: high
      action: notify.mobile_app_samsung_s24
  mode: restart
- id: ac_cool_adaptive_setpoint_runtime
  alias: AC - Cool setpoint adaptativo en ciclo activo
  trace:
    stored_traces: 50
  trigger:
  - platform: time_pattern
    minutes: /5
  - platform: state
    entity_id: climate.0200009211c7_climate
  condition: []
  action:
  - variables:
      climate_ent: climate.0200009211c7_climate
      t1: '{{ states(''sensor.lumi_lumi_weather_cuarto_temperatura'') | float(none)
        }}'
      t2: '{{ states(''sensor.lumi_lumi_weather_coco_temperatura'') | float(none)
        }}'
      tin: '{% if t1 is not none and t2 is not none %}{{ ((t1 + t2) / 2) | round(2)
        }} {% elif t1 is not none %}{{ t1 | round(2) }} {% elif t2 is not none %}{{
        t2 | round(2) }} {% else %}{{ none }}{% endif %}'
      cycle_active: '{{ is_state(''input_boolean.ac_cool_adaptive_cycle_active'',''on'')
        }}'
      cur_mode: '{{ states(climate_ent) }}'
      last_auto_action: '{{ states(''input_text.ac_last_auto_action'') }}'
      last_auto_mode: '{{ states(''input_text.ac_last_auto_mode'') }}'
      active_bucket: '{{ states(''input_text.ac_dda_last_context_bucket'') | trim
        }}'
      cool_off_target: '{{ states(''input_number.ac_last_auto_tin'') | float(0) -
        (states(''input_number.ac_last_auto_setpoint'') | float(0) - 0.5) if states(''input_number.ac_last_auto_setpoint'')
        not in [''unknown'',''unavailable'',''none'',''''] else none }}'
      start_ts_raw: '{{ states(''input_datetime.ac_cool_cycle_started_at'') }}'
      last_step_ts_raw: '{{ states(''input_datetime.ac_cool_cycle_last_step_at'')
        }}'
      start_temp: '{{ states(''input_number.ac_cool_cycle_start_tin'') | float(none)
        }}'
      current_setpoint: '{{ state_attr(climate_ent,''temperature'') | float(states(''input_number.ac_cool_cycle_last_applied_setpoint'')
        | float(0)) }}'
      manual_sp_override_until_raw: '{{ states(''input_datetime.ac_manual_setpoint_override_until'')
        }}'
      manual_sp_override_active: "{{ is_state('input_boolean.ac_manual_setpoint_override_active','on')\n
        \  and manual_sp_override_until_raw not in ['unknown','unavailable','none','']\n
        \  and as_timestamp(manual_sp_override_until_raw, 0) > as_timestamp(now())
        }}"
      manual_sp_lock_explicit: '{{ is_state(''input_boolean.ac_manual_setpoint_override_active'',''on'')
        }}'
      last_auto_ts_raw: '{{ states(''input_datetime.ac_last_auto_ts'') }}'
      minutes_since_last_auto: "{% set raw = last_auto_ts_raw | default('', true)
        | trim %} {% set raw_lower = raw | lower %} {% if raw_lower in ['unknown',
        'unavailable', 'none', ''] %}\n  99999\n{% else %}\n  {% set ts = as_timestamp(raw,
        default=none) %}\n  {{ 99999 if ts is none else (((as_timestamp(now()) - ts)
        / 60) | round(1)) }}\n{% endif %}"
      last_change_origin_raw: '{{ states(''input_text.ac_dda_last_change_origin'') | default('''',
        true) | trim }}'
      manual_sp_lock_window_min: '{% set raw = states(''input_number.ac_manual_setpoint_override_hold_minutes'')
        | float(50) %} {{ [[raw, 60] | min, 45] | max }}'
      manual_sp_override_hold_minutes: '{{ manual_sp_lock_window_min }}'
      manual_sp_recent_user_evidence: "{{ last_auto_mode == 'cool'\n   and last_auto_action
        == 'auto_on'\n   and (minutes_since_last_auto | float(99999)) <= (manual_sp_lock_window_min
        | float(50))\n   and last_change_origin_raw in ['manual_override','manual_sp_feedback','manual_sp_feedback_future_only']
        }}"
      manual_sp_lock_active: "{{ manual_sp_lock_explicit\n   or manual_sp_recent_user_evidence
        }}"
      manual_sp_protected_lock_active: '{{ manual_sp_lock_active }}'
      manual_sp_override_minutes_left: '{% if manual_sp_override_until_raw in [''unknown'',''unavailable'',''none'','''']
        %}0 {% else %}{{ [((as_timestamp(manual_sp_override_until_raw) - as_timestamp(now()))
        / 60), 0] | max | round(1) }}{% endif %}'
      window_min: '{{ states(''input_number.ac_cool_adaptive_window_minutes'') | float(30)
        }}'
      initial_delay_min: '{{ states(''input_number.ac_cool_adaptive_initial_delay_minutes'')
        | float(30) }}'
      step_size: '{{ states(''input_number.ac_cool_adaptive_step'') | float(0.5) }}'
      min_setpoint: '{{ states(''input_number.ac_cool_adaptive_min_setpoint'') | float(20)
        }}'
      min_progress_per_window: '{{ states(''input_number.ac_cool_adaptive_min_progress_per_window'')
        | float(0.3) }}'
      close_enough_delta: '{{ states(''input_number.ac_cool_adaptive_close_enough_delta'')
        | float(0.2) }}'
      runtime_min: '{% if start_ts_raw in [''unknown'',''unavailable'',''none'','''']
        %}0 {% else %}{{ ((as_timestamp(now()) - as_timestamp(start_ts_raw)) / 60)
        | round(1) }}{% endif %}'
      minutes_since_last_step: '{% if last_step_ts_raw in [''unknown'',''unavailable'',''none'','''']
        %}99999 {% else %}{{ ((as_timestamp(now()) - as_timestamp(last_step_ts_raw))
        / 60) | round(1) }}{% endif %}'
      progress_temp: '{% if start_temp is none or tin is none %}{{ none }} {% else
        %}{{ ((start_temp | float) - (tin | float)) | round(2) }}{% endif %}'
      remaining_delta: '{% if tin is none or cool_off_target is none %}{{ none }}
        {% else %}{{ ((tin | float) - (cool_off_target | float)) | round(2) }}{% endif
        %}'
      windows_elapsed: '{{ [((runtime_min | float(0)) / (window_min | float(30))),
        0] | max | round(2) }}'
      expected_progress: '{{ ((windows_elapsed | float(0)) * (min_progress_per_window
        | float(0.3))) | round(2) }}'
      insufficient_progress: '{{ progress_temp is not none and remaining_delta is
        not none and (runtime_min | float(0)) >= (initial_delay_min | float(30)) and
        (minutes_since_last_step | float(99999)) >= (window_min | float(30)) and (remaining_delta
        | float(0)) > (close_enough_delta | float(0.2)) and ((progress_temp | float(0))
        + 0.05) < (expected_progress | float(0)) }}'
      next_setpoint: '{{ [((current_setpoint | float(99)) - (step_size | float(0.5))),
        (min_setpoint | float(20))] | max | round(1) }}'
      can_reduce: '{{ (current_setpoint | float(99)) > (min_setpoint | float(20))
        and (next_setpoint | float(99)) < (current_setpoint | float(99)) }}'
      manual_sp_lock_recently_expired: "{{ (not manual_sp_protected_lock_active)\n
        \  and (manual_sp_override_minutes_left | float(0)) <= 5\n   and manual_sp_override_until_raw
        not in ['unknown','unavailable','none',''] }}"
      next_setpoint_soft_resume: "{% if next_setpoint is none or current_setpoint
        is none %}\n  {{ next_setpoint }}\n{% elif manual_sp_lock_recently_expired
        %}\n  {% set step = 0.3 %}\n  {% set delta = (next_setpoint | float) - (current_setpoint
        | float) %}\n  {% if (delta | abs) <= step %}\n    {{ next_setpoint }}\n  {%
        else %}\n    {{ ((current_setpoint | float) + (step if delta > 0 else -step))
        | round(1) }}\n  {% endif %}\n{% else %}\n  {{ next_setpoint }}\n{% endif
        %}"
      effective_bucket: '{% set raw = active_bucket %} {% if raw in ['''',''unknown'',''unavailable'',''none'']
        %}exterior_templado:humedad_normal:franja_1001_1500:desconocido:presencia
        {% else %}{{ raw.split('':subiendo'')[0].split('':bajando'')[0].split('':estable'')[0]
        }}{% endif %}'
      effective_bucket_helper: '{{ ''input_number.ac_dda_cool_effective_sp_bucket_'' ~
        (effective_bucket | replace('':'',''_'') ) }}'
      effective_summary: '{{ ((effective_bucket ~ ''='' ~ (''%.2f'' | format(current_setpoint
        | float)))[:255]) }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ cycle_active and (cur_mode != ''cool'' or last_auto_mode
          != ''cool'' or last_auto_action != ''auto_on'') }}'
      sequence:
      - target:
          entity_id: input_boolean.ac_cool_adaptive_cycle_active
        action: input_boolean.turn_off
      - stop: Ciclo adaptativo limpiado por cambio de modo.
    - conditions:
      - condition: template
        value_template: '{{ manual_sp_override_active and (manual_sp_override_minutes_left
          | float(0)) <= 0 }}'
      sequence:
      - target:
          entity_id: input_boolean.ac_manual_setpoint_override_active
        action: input_boolean.turn_off
      - action: logbook.log
        data:
          name: AC Auto Trace
          message: manual_override_expirado | ciclo_adaptativo_rehabilitado
          entity_id: '{{ climate_ent }}'
    - conditions:
      - condition: template
        value_template: '{{ cycle_active and cur_mode == ''cool'' and remaining_delta
          is not none and (remaining_delta | float(999)) <= (close_enough_delta |
          float(0.2)) }}'
      sequence:
      - target:
          entity_id: '{{ effective_bucket_helper }}'
        data:
          value: '{{ current_setpoint }}'
        action: input_number.set_value
      - target:
          entity_id: input_text.ac_dda_cool_effective_setpoint_map
        data:
          value: '{{ effective_summary }}'
        service: input_text.set_value
      - action: logbook.log
        data:
          name: AC Auto Trace
          message: cool_adaptive_effective | bucket={{ effective_bucket }} | init={{
            start_temp }} | now={{ tin }} | remain={{ remaining_delta }} | sp_final={{
            current_setpoint }} | runtime={{ runtime_min }}
          entity_id: '{{ climate_ent }}'
    - conditions:
      - condition: template
        value_template: '{{ cycle_active and cur_mode == ''cool'' and manual_sp_protected_lock_active
          }}'
      sequence:
      - variables:
          sp_before: '{{ state_attr(climate_ent, ''temperature'') | float(none) }}'
          sp_target: '{{ next_setpoint_soft_resume }}'
          writer_id: cool_cycle_step
          manual_lock_state: '{{ manual_sp_lock_active }}'
          bucket: '{{ effective_bucket }}'
      - target:
          entity_id: input_text.ac_dda_last_change_origin
        data:
          value: manual_override
        service: input_text.set_value
      - variables:
          sp_after: '{{ state_attr(climate_ent, ''temperature'') | float(none) }}'
          sp_write_status: blocked
      - action: logbook.log
        data:
          name: AC Auto Trace
          message: sp_write | writer={{ writer_id }} | before={{ sp_before if sp_before
            is not none else 'na' }} | target={{ sp_target if sp_target is not none
            else 'na' }} | lock={{ manual_lock_state }} | blocked_by_manual_lock=yes
            | bucket={{ bucket if bucket is not none else 'na' }} | after={{ sp_after
            if sp_after is not none else 'na' }} | status={{ sp_write_status }}
          entity_id: '{{ climate_ent }}'
      - target:
          entity_id: input_number.ac_cool_cycle_last_applied_setpoint
        data:
          value: '{{ current_setpoint if current_setpoint is not none else (sp_before
            if sp_before is not none else 0) }}'
        action: input_number.set_value
      - action: logbook.log
        data:
          name: AC Auto Trace
          message: writer={{ writer_id }} blocked_by=manual_sp_lock
          entity_id: '{{ climate_ent }}'
      - action: logbook.log
        data:
          name: AC Auto Trace
          message: cool_adaptive_suspendido | sp_writer=manual_lock | origen=manual_override
            | min_restantes={{ manual_sp_override_minutes_left }} | sp_actual={{ current_setpoint
            }} | lock_explicit={{ manual_sp_lock_explicit }} | evidence_recent={{
            manual_sp_recent_user_evidence }}
          entity_id: '{{ climate_ent }}'
    - conditions:
      - condition: template
        value_template: '{{ cycle_active and cur_mode == ''cool'' and insufficient_progress
          and can_reduce and (not manual_sp_protected_lock_active) }}'
      sequence:
      - variables:
          sp_before: '{{ state_attr(climate_ent, ''temperature'') | float(none) }}'
          sp_target: '{{ next_setpoint_soft_resume }}'
          writer_id: cool_cycle_step
          manual_lock_state: '{{ manual_sp_lock_active }}'
          bucket: '{{ effective_bucket }}'
      - target:
          entity_id: input_text.ac_dda_last_change_origin
        data:
          value: cool_cycle_step
        service: input_text.set_value
      - target:
          entity_id: climate.0200009211c7_climate
        data:
          temperature: '{{ next_setpoint_soft_resume }}'
        action: climate.set_temperature
      - variables:
          sp_after: '{{ state_attr(climate_ent, ''temperature'') | float(none) }}'
          sp_write_status: "{% if sp_after is not none and sp_target is not none and
            ((sp_after | float) - (sp_target | float)) | abs < 0.11 %}\n  applied\n{%
            else %}\n  blocked\n{% endif %}"
      - action: logbook.log
        data:
          name: AC Auto Trace
          message: sp_write | writer={{ writer_id }} | before={{ sp_before if sp_before
            is not none else 'na' }} | target={{ sp_target if sp_target is not none
            else 'na' }} | lock={{ manual_lock_state }} | blocked_by_manual_lock={{
            'yes' if manual_lock_state else 'no' }} | bucket={{ bucket if bucket is
            not none else 'na' }} | after={{ sp_after if sp_after is not none else
            'na' }} | status={{ sp_write_status }}
          entity_id: '{{ climate_ent }}'
      - target:
          entity_id: input_number.ac_last_auto_setpoint
        data:
          value: '{{ next_setpoint_soft_resume }}'
        action: input_number.set_value
      - target:
          entity_id: input_number.ac_cool_cycle_last_applied_setpoint
        data:
          value: '{{ next_setpoint_soft_resume }}'
        action: input_number.set_value
      - target:
          entity_id: input_datetime.ac_cool_cycle_last_step_at
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        action: input_datetime.set_datetime
      - action: logbook.log
        data:
          name: AC Auto Trace
          message: cool_adaptive_step | sp_writer=adaptive | SPsrc=adaptive | bucket={{
            effective_bucket }} | init={{ start_temp }} | now={{ tin }} | prog={{
            progress_temp }} | remain={{ remaining_delta }} | run={{ runtime_min }}
            | exp={{ expected_progress }} | sp={{ current_setpoint }}→{{ next_setpoint_soft_resume
            }}
          entity_id: '{{ climate_ent }}'
    - conditions:
      - condition: template
        value_template: '{{ cycle_active and cur_mode == ''cool'' and insufficient_progress
          and (not can_reduce) }}'
      sequence:
      - action: logbook.log
        data:
          name: AC Auto Trace
          message: cool_adaptive_floor | bucket={{ effective_bucket }} | init={{ start_temp
            }} | now={{ tin }} | prog={{ progress_temp }} | remain={{ remaining_delta
            }} | run={{ runtime_min }} | sp_min={{ min_setpoint }}
          entity_id: '{{ climate_ent }}'
    default: []
  mode: single
- id: '1775000000001'
  alias: AC - Watchdog recuperación de lock rancio
  description: 'Recupera ac_dda_cycle_lock cuando queda prendido sin transición AUTO activa
    o reciente.

    '
  triggers:
  - trigger: time_pattern
    minutes: /1
  conditions: []
  actions:
  - variables:
      lock_active: '{{ is_state(''input_boolean.ac_dda_cycle_lock'',''on'') }}'
      auto_flags_active: '{{ is_state(''input_boolean.ac_dda_on_por_automatizacion'',''on'')
        or is_state(''input_boolean.ac_dda_off_por_automatizacion'',''on'') }}'
      transition_guard_window_s: 180
      transition_ts_raw: '{{ states(''input_datetime.ac_dda_transition_ts'') | default('''', true)
        | trim }}'
      transition_ts_epoch: "{% if transition_ts_raw | lower in ['unknown','unavailable','none','']
        %}{{ none }}{% else %}{{ as_timestamp(transition_ts_raw, default=none) }}{% endif
        %}"
      transition_age_s: "{% if transition_ts_epoch is none %}99999{% else %}{{ (as_timestamp(now())
        - (transition_ts_epoch | float)) | round(1) }}{% endif %}"
      recent_transition: '{{ (transition_age_s | float(99999)) >= 0 and (transition_age_s
        | float(99999)) <= (transition_guard_window_s | float(180)) }}'
      lock_since_raw: '{{ states(''input_datetime.ac_dda_cycle_lock_since'') | default('''',
        true) | trim }}'
      lock_since_epoch: "{% if lock_since_raw | lower in ['unknown','unavailable','none','']
        %}{{ none }}{% else %}{{ as_timestamp(lock_since_raw, default=none) }}{% endif %}"
      lock_age_s: "{% if lock_since_epoch is none %}99999{% elif not lock_active %}0{% else
        %}{{ (as_timestamp(now()) - (lock_since_epoch | float)) | round(1) }}{% endif
        %}"
      recover_stale_lock: '{{ lock_active and (not auto_flags_active) and (not recent_transition)
        }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ recover_stale_lock }}'
      sequence:
      - target:
          entity_id: input_boolean.ac_dda_cycle_lock
        action: input_boolean.turn_off
      - action: logbook.log
        data:
          name: AC Auto Trace
          message: lock_recovered_stale | age_s={{ lock_age_s }} | auto_flags_active={{ auto_flags_active
            }} | recent_transition={{ recent_transition }} | transition_age_s={{ transition_age_s
            }}
          entity_id: climate.0200009211c7_climate
    default: []
  mode: single
- id: '1774567690253'
  alias: Enciende Ventilador por deteccion de Gas
  description: ''
  triggers:
  - type: unsafe
    device_id: af2b927ca1f543338752460f251edaff
