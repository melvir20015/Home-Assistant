          message: off_classification=auto | classification_reason=auto_off_transition | off_nonce={{ states('input_text.ac_last_auto_off_marker_nonce') | default('n/a', true) }} | hito=off_enviado | {{ cool_cycle_final_message }}
          entity_id: climate.0200009211c7_climate
      - service: logbook.log
