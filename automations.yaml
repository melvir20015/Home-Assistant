- id: '1773939304415'
  alias: AC - Manual OFF guard + pausa 5 min
  trace:
    stored_traces: 50
  description: 'Contrato v1: guard de apagado manual con pausa de 5 min y secado post-cool
    de 3 min en fan_only. El aprendizaje se resuelve en la automatización dedicada.

    '
  triggers:
  - trigger: state
    entity_id: climate.0200009211c7_climate
    to: 'off'
  conditions:
  - condition: time
    after: 07:01:00
    before: '21:59:00'
  actions:
  - variables:
      auto_off_guard_window_s: 90
      auto_off_marker_ts_raw: '{{ states(''input_datetime.ac_last_auto_off_marker_ts'') | default('''', true) | trim }}'
      auto_off_marker_nonce_raw: '{{ states(''input_text.ac_last_auto_off_marker_nonce'') | default('''', true) | trim }}'
      auto_off_marker_ts_epoch: "{% if auto_off_marker_ts_raw | lower in ['unknown','unavailable','none',''] %}{{ none }}{% else %}{{ as_timestamp(auto_off_marker_ts_raw, default=none) }}{% endif %}"
      auto_off_marker_age_s: "{% if auto_off_marker_ts_epoch is none %}99999{% else %}{{ (as_timestamp(now()) - (auto_off_marker_ts_epoch | float)) | round(1) }}{% endif %}"
      auto_off_recent: "{{ auto_off_marker_nonce_raw | length > 0 and auto_off_marker_age_s | float(99999) >= 0 and auto_off_marker_age_s | float(99999) <= (auto_off_guard_window_s | float(30)) }}"
      last_change_origin_raw: '{{ states(''input_text.ac_dda_last_change_origin'') | default('''', true) | trim }}'
      cycle_lock_active: '{{ is_state(''input_boolean.ac_dda_cycle_lock'',''on'') }}'
      cycle_lock_ttl_s: 180
      cycle_lock_since_raw: '{{ states(''input_datetime.ac_dda_cycle_lock_since'') | default('''', true) | trim }}'
      cycle_lock_since_epoch: "{% if cycle_lock_since_raw | lower in ['unknown','unavailable','none',''] %}{{ none }}{% else %}{{ as_timestamp(cycle_lock_since_raw, default=none) }}{% endif %}"
      cycle_lock_age_s: "{% if cycle_lock_since_epoch is none %}99999{% elif not cycle_lock_active %}0{% else %}{{ (as_timestamp(now()) - (cycle_lock_since_epoch | float)) | round(1) }}{% endif %}"
      cycle_lock_is_stale: '{{ cycle_lock_active and (cycle_lock_age_s | float(99999)) > (cycle_lock_ttl_s | float(180)) }}'
      cycle_lock_effective_active: '{{ cycle_lock_active and not cycle_lock_is_stale }}'
      last_auto_ts_raw: '{{ states(''input_datetime.ac_last_auto_ts'') }}'
      auto_recent_window_s: 90
      last_auto_age_s: "{% set raw = last_auto_ts_raw | default('', true) | trim %}{% if raw | lower in ['unknown','unavailable','none',''] %}99999{% else %}{% set ts_auto = as_timestamp(raw, default=none) %}{{ 99999 if ts_auto is none else ((as_timestamp(now()) - ts_auto) | round(1)) }}{% endif %}"
      auto_reciente: '{{ (last_auto_age_s | float(99999)) >= 0 and (last_auto_age_s | float(99999)) <= (auto_recent_window_s | float(90)) }}'
      origin_auto_recent: '{{ auto_reciente and last_change_origin_raw in [''auto_off'', ''auto_on'', ''cool_normal_off'', ''cool_normal_on'', ''cool_emergency_off'', ''cool_emergency_on''] }}'
      transition_guard_window_s: 180
      transition_token_raw: '{{ states(''input_text.ac_dda_transition_token'') | default('''', true) | trim }}'
      transition_ts_raw: '{{ states(''input_datetime.ac_dda_transition_ts'') | default('''', true) | trim }}'
      transition_ts_epoch: "{% if transition_ts_raw | lower in ['unknown','unavailable','none',''] %}{{ none }}{% else %}{{ as_timestamp(transition_ts_raw, default=none) }}{% endif %}"
      transition_age_s: "{% if transition_ts_epoch is none %}99999{% else %}{{ (as_timestamp(now()) - (transition_ts_epoch | float)) | round(1) }}{% endif %}"
      auto_transition_recent: "{{ transition_token_raw | length > 0 and transition_age_s | float(99999) >= 0 and transition_age_s | float(99999) <= (transition_guard_window_s | float(180)) }}"
      auto_transition_active: '{{ is_state(''input_boolean.ac_dda_on_por_automatizacion'',''on'') or is_state(''input_boolean.ac_dda_off_por_automatizacion'',''on'') or auto_transition_recent }}'
      manual_guard_discard_reason: "{% if is_state('input_boolean.ac_dda_off_por_automatizacion','on') %}auto_off_flag_on{% elif auto_off_recent %}auto_off_recent{% elif auto_transition_active %}auto_transition_active{% elif cycle_lock_effective_active %}lock_activo{% elif origin_auto_recent %}origen_auto{% elif auto_reciente %}auto_reciente{% else %}none{% endif %}"
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ cycle_lock_is_stale }}'
      sequence:
      - target:
          entity_id: input_boolean.ac_dda_cycle_lock
        service: input_boolean.turn_off
