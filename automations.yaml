    - conditions:
      - condition: template
        value_template: '{{ action_target == ''turn_off'' }}'
      sequence:
      - service: input_text.set_value
        target:
          entity_id: input_text.ac_matriz_160_auto_origin_kind
        data:
          value: '{{ auto_origin_kind }}'
