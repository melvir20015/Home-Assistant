- id: ac_matriz_160_presencia_ausencia_v1
  alias: AC-Matriz 160 - Presencia/Ausencia
  description: Gestión dedicada de apagado por ausencia usando S24 y movimiento crudo, desacoplada de la lógica térmica principal.
  mode: queued
  max: 5
  trace:
    stored_traces: 50
  triggers:
  - trigger: state
    entity_id: device_tracker.samsung_s24
    to: not_home
    id: s24_away
  - trigger: state
    entity_id: device_tracker.samsung_s24
    to: home
    id: s24_home
  - trigger: state
    entity_id: person.ivan
    to: home
    id: person_home
  - trigger: state
    entity_id: binary_sensor.tze204_gkfbdvyx_ts0601
    to: 'off'
    for: 00:30:00
    id: movimiento_crudo_off_30m
  conditions: []
  actions:
  - variables:
      trace_id: '{{ now().strftime(''%Y%m%d%H%M%S%f'') ~ ''-pa'' }}'
      s24_state: '{{ states(''device_tracker.samsung_s24'') }}'
      movimiento_crudo_state: '{{ states(''binary_sensor.tze204_gkfbdvyx_ts0601'') }}'
      movimiento_estable_state: '{{ states(''binary_sensor.presencia_movimiento_estable'') }}'
      hvac_mode: '{{ states(''climate.0200009211c7_climate'') }}'
      t1: '{{ states(''sensor.lumi_lumi_weather_cuarto_temperatura'')|float(none) }}'
      t2: '{{ states(''sensor.lumi_lumi_weather_coco_temperatura'')|float(none) }}'
      h1: '{{ states(''sensor.lumi_lumi_weather_cuarto_humedad'')|float(none) }}'
      h2: '{{ states(''sensor.lumi_lumi_weather_coco_humedad'')|float(none) }}'
      tin: '{% if t1 is not none and t2 is not none %}{{ ((t1 + t2) / 2) | round(2) }}{% elif t1 is not none %}{{ t1 | round(2) }}{% elif t2 is not none %}{{ t2 | round(2) }}{% else %}{{ none }}{% endif %}'
      hin: '{% if h1 is not none and h2 is not none %}{{ ((h1 + h2) / 2) | round(1) }}{% elif h1 is not none %}{{ h1 | round(1) }}{% elif h2 is not none %}{{ h2 | round(1) }}{% else %}{{ none }}{% endif %}'
      tout: '{{ state_attr(''weather.openweathermap'',''temperature'')|float(none) }}'
      wx_raw: '{{ states(''weather.openweathermap'') | lower }}'
      slot_name: '{% set t = now().strftime(''%H:%M'') %}{% if ''07:01'' <= t <= ''10:00'' %}07:01 am - 10:00 am{% elif ''10:01'' <= t <= ''13:00'' %}10:01 am - 01:00 pm{% elif ''13:01'' <= t <= ''16:00'' %}01:01 pm - 04:00 pm{% elif ''16:01'' <= t <= ''19:00'' %}04:01 pm - 07:00 pm{% else %}07:01 pm - 09:59 pm{% endif %}'
      slot_idx: '{% set t = now().strftime(''%H:%M'') %}{% if ''07:01'' <= t <= ''10:00'' %}0{% elif ''10:01'' <= t <= ''13:00'' %}1{% elif ''13:01'' <= t <= ''16:00'' %}2{% elif ''16:01'' <= t <= ''19:00'' %}3{% else %}4{% endif %}'
      season_name: '{% set m = now().month %}{% if m in [12,1,2] %}Invierno{% elif m in [3,4,5] %}Primavera{% elif m in [6,7,8] %}Verano{% else %}Otoño{% endif %}'
      season_idx: '{% set m = now().month %}{% if m in [3,4,5] %}0{% elif m in [6,7,8] %}1{% elif m in [9,10,11] %}2{% else %}3{% endif %}'
      weather_cat: '{% set s = wx_raw %}{% if ''thunder'' in s %}Tormenta{% elif ''snow'' in s or ''sleet'' in s or ''ice'' in s %}Nieve - Hielo{% elif ''fog'' in s or ''mist'' in s or ''haze'' in s %}Niebla - Neblina{% elif ''heavy'' in s and ''rain'' in s %}Lluvia fuerte{% elif ''rain'' in s or ''drizzle'' in s %}Lluvia suave{% elif ''cloud'' in s and (''few'' in s or ''scattered'' in s or ''partly'' in s) %}Parcialmente nublado{% elif ''cloud'' in s %}Nublado{% else %}Despejado{% endif %}'
      weather_idx: '{% set c = weather_cat %}{% if c == ''Despejado'' %}0{% elif c == ''Parcialmente nublado'' %}1{% elif c == ''Nublado'' %}2{% elif c == ''Lluvia suave'' %}3{% elif c == ''Lluvia fuerte'' %}4{% elif c == ''Tormenta'' %}5{% elif c == ''Niebla - Neblina'' %}6{% else %}7{% endif %}'
      col_idx: '{{ (weather_idx|int * 20) + (season_idx|int * 5) + (slot_idx|int) + 1 }}'
      col_humana: '{{ weather_cat }} | {{ season_name }} | Horario {{ slot_name }}'
      ajuste_temp_previo: '{{ state_attr(''climate.0200009211c7_climate'',''temperature'') }}'
      hvac_scope_ok: '{{ hvac_mode in [''cool'',''heat''] }}'
      override_until_raw: '{{ states(''input_datetime.ac_matriz_160_manual_presence_override_until'') }}'
      override_until_ts: >-
        {% if override_until_raw in ['unknown','unavailable','none',''] %}{{ 0 }}{% else %}{{ as_timestamp(override_until_raw, default=0) }}{% endif %}
      manual_presence_override_active: '{{ as_timestamp(now()) < (override_until_ts | float(0)) }}'
      auto_origin_expires_at: '{{ (now() + timedelta(seconds=30)).strftime(''%Y-%m-%d %H:%M:%S'') }}'
      event_signature: '{{ trigger.id ~ ''|'' ~ s24_state ~ ''|'' ~ movimiento_crudo_state ~ ''|'' ~ hvac_mode ~ ''|'' ~ now().strftime(''%Y-%m-%d %H:%M'') }}'
      dedup_window_s: 90
      dedup_last_signature: '{{ states(''input_text.ac_matriz_160_no_presencia_firma'') | default('''', true) | trim }}'
      dedup_last_ts_raw: '{{ states(''input_datetime.ac_matriz_160_no_presencia_firma_ts'') }}'
      dedup_last_ts: >-
        {% if dedup_last_ts_raw in ['unknown','unavailable','none',''] %}{{ 0 }}{% else %}{{ as_timestamp(dedup_last_ts_raw, default=0) }}{% endif %}
      dedup_in_window: '{{ (as_timestamp(now()) - (dedup_last_ts | float(0))) < (dedup_window_s | float(90)) }}'
      dedup_ok: '{{ event_signature != dedup_last_signature or not dedup_in_window }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ trigger.id in [''s24_home'',''person_home''] }}'
      sequence:
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: hito=auto_off_no_presencia_cancelado | trace_id={{ trace_id }} | modo_previo={{ hvac_mode }} | s24_state={{ s24_state }} | movimiento_crudo_state={{ movimiento_crudo_state }} | movimiento_estable_state={{ movimiento_estable_state }} | resultado_terminal=cancelado | razon=s24_en_casa | override_activo={{ manual_presence_override_active }} | override_until={{ override_until_raw }}
          entity_id: climate.0200009211c7_climate
    - conditions:
      - condition: template
        value_template: '{{ manual_presence_override_active }}'
      sequence:
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: hito=auto_off_no_presencia_cancelado_por_override | trace_id={{ trace_id }} | modo_previo={{ hvac_mode }} | s24_state={{ s24_state }} | movimiento_crudo_state={{ movimiento_crudo_state }} | resultado_terminal=cancelado | razon=override_activo | override_until={{ override_until_raw }}
          entity_id: climate.0200009211c7_climate
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''s24_away'' and not dedup_ok }}'
      sequence:
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: hito=auto_off_no_presencia_cancelado | trace_id={{ trace_id }} | modo_previo={{ hvac_mode }} | s24_state={{ s24_state }} | movimiento_crudo_state={{ movimiento_crudo_state }} | resultado_terminal=cancelado | razon=dedup_ventana
          entity_id: climate.0200009211c7_climate
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''s24_away'' and dedup_ok }}'
      sequence:
      - service: input_text.set_value
        target:
          entity_id: input_text.ac_matriz_160_no_presencia_firma
        data:
          value: '{{ event_signature }}'
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ac_matriz_160_no_presencia_firma_ts
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ movimiento_crudo_state == ''off'' }}'
          sequence:
          - delay: 00:10:00
          - variables:
              modo_previo: '{{ states(''climate.0200009211c7_climate'') }}'
              s24_guard_ok: '{{ states(''device_tracker.samsung_s24'') == ''not_home'' }}'
              motion_guard_ok: '{{ states(''binary_sensor.tze204_gkfbdvyx_ts0601'') == ''off'' }}'
              hvac_guard_ok: '{{ modo_previo in [''cool'',''heat''] }}'
              override_guard_ok: >-
                {% set raw = states('input_datetime.ac_matriz_160_manual_presence_override_until') %}
                {% set ts = 0 if raw in ['unknown','unavailable','none',''] else as_timestamp(raw, default=0) %}
                {{ as_timestamp(now()) >= (ts | float(0)) }}
              auto_origin_expires_at: '{{ (now() + timedelta(seconds=30)).strftime(''%Y-%m-%d %H:%M:%S'') }}'
              hito_apagado: turn_off_por_ausencia_10m_s24_away
              razon_apagado: s24_fuera_y_movimiento_crudo_off_10m
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ s24_guard_ok and motion_guard_ok and hvac_guard_ok and override_guard_ok }}'
              sequence: &ac_matriz_160_apagado_ausencia
              - service: input_text.set_value
                target:
                  entity_id: input_text.ac_matriz_160_auto_origin_kind
                data:
                  value: automatico_ac_matriz_160
              - service: input_text.set_value
                target:
                  entity_id: input_text.ac_matriz_160_auto_origin_trace
                data:
                  value: '{{ trace_id }}'
              - service: input_text.set_value
                target:
                  entity_id: input_text.ac_matriz_160_auto_origin_expires_at
                data:
                  value: '{{ auto_origin_expires_at }}'
              - service: input_text.set_value
                target:
                  entity_id: input_text.ac_matriz_160_auto_origin_last_action
                data:
                  value: turn_off
              - service: input_text.set_value
                target:
                  entity_id: input_text.ac_matriz_160_auto_origin_consumed
                data:
                  value: 'false'
              - service: climate.turn_off
                target:
                  entity_id: climate.0200009211c7_climate
              - service: notify.mobile_app_samsung_s24
                data:
                  title: AC-Matriz Diurna
                  message: '{{ now().strftime(''%I:%M:%S %p'') }} — Apagado automático\n\nMotivo: Sin presencia\n\nModo anterior: {{ ''Frío'' if modo_previo == ''cool'' else ''Calor'' if modo_previo == ''heat'' else modo_previo }}\n\nInterior: {{ tin }} °C\n\nHumedad interior: {{ hin }} %{% if tout is not none %}\n\nExterior: {{ tout }} °C{% endif %}\n\nAjuste de temp. anterior: {{ ajuste_temp_previo }} °C\n\nContexto: Columna {{ col_idx }} ({{ col_humana }})'
              - service: logbook.log
                data:
                  name: AC-Matriz 160
                  message: hito={{ hito_apagado }} | trace_id={{ trace_id }} | modo_previo={{ modo_previo }} | s24_state={{ states('device_tracker.samsung_s24') }} | movimiento_crudo_state={{ states('binary_sensor.tze204_gkfbdvyx_ts0601') }} | movimiento_estable_state={{ states('binary_sensor.presencia_movimiento_estable') }} | auto_origin=automatico_ac_matriz_160 | resultado_terminal=aplicado | razon={{ razon_apagado }}
                  entity_id: climate.0200009211c7_climate
            default:
            - service: logbook.log
              data:
                name: AC-Matriz 160
                message: hito=auto_off_no_presencia_cancelado | trace_id={{ trace_id }} | modo_previo={{ modo_previo }} | s24_state={{ states('device_tracker.samsung_s24') }} | movimiento_crudo_state={{ states('binary_sensor.tze204_gkfbdvyx_ts0601') }} | resultado_terminal=cancelado | razon=guardas_no_cumplidas_10m | override_activo={{ not override_guard_ok }}
                entity_id: climate.0200009211c7_climate
        default:
        - service: logbook.log
          data:
            name: AC-Matriz 160
            message: hito=auto_off_no_presencia_cancelado | trace_id={{ trace_id }} | modo_previo={{ hvac_mode }} | s24_state={{ s24_state }} | movimiento_crudo_state={{ movimiento_crudo_state }} | resultado_terminal=cancelado | razon=movimiento_crudo_activo_en_s24_away
            entity_id: climate.0200009211c7_climate
    - conditions:
      - condition: template
        value_template: '{{ trigger.id == ''movimiento_crudo_off_30m'' }}'
      sequence:
      - variables:
          modo_previo: '{{ states(''climate.0200009211c7_climate'') }}'
          s24_guard_ok: '{{ states(''device_tracker.samsung_s24'') != ''home'' }}'
          motion_guard_ok: '{{ states(''binary_sensor.tze204_gkfbdvyx_ts0601'') == ''off'' }}'
          hvac_guard_ok: '{{ modo_previo in [''cool'',''heat''] }}'
          override_guard_ok: >-
            {% set raw = states('input_datetime.ac_matriz_160_manual_presence_override_until') %}
            {% set ts = 0 if raw in ['unknown','unavailable','none',''] else as_timestamp(raw, default=0) %}
            {{ as_timestamp(now()) >= (ts | float(0)) }}
          auto_origin_expires_at: '{{ (now() + timedelta(seconds=30)).strftime(''%Y-%m-%d %H:%M:%S'') }}'
          hito_apagado: turn_off_por_ausencia_30m_movimiento_off
          razon_apagado: movimiento_crudo_off_30m_y_s24_fuera
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ s24_guard_ok and motion_guard_ok and hvac_guard_ok and override_guard_ok }}'
          sequence: *ac_matriz_160_apagado_ausencia
        default:
        - service: logbook.log
          data:
            name: AC-Matriz 160
            message: hito=auto_off_no_presencia_cancelado | trace_id={{ trace_id }} | modo_previo={{ modo_previo }} | s24_state={{ states('device_tracker.samsung_s24') }} | movimiento_crudo_state={{ states('binary_sensor.tze204_gkfbdvyx_ts0601') }} | resultado_terminal=cancelado | razon=guardas_no_cumplidas_30m | override_activo={{ not override_guard_ok }}
            entity_id: climate.0200009211c7_climate
- id: ac_matriz_160_context_memory_forecast_v1
  alias: AC-Matriz 160 - Memoria contextual y forecast
  description: Mantiene memoria térmica exterior/interior y forecast auxiliar para la fórmula COOL de AC-Matriz 160 sin cambiar HVAC.
  triggers:
  - trigger: homeassistant
    event: start
  - trigger: time_pattern
    minutes: /15
  - trigger: state
    entity_id:
    - weather.openweathermap
    - sensor.lumi_lumi_weather_cuarto_temperatura
    - sensor.lumi_lumi_weather_coco_temperatura
  actions:
  - service: weather.get_forecasts
    continue_on_error: true
    target:
      entity_id: weather.openweathermap
    data:
      type: hourly
    response_variable: ac_matriz_160_forecast_response
  - variables:
      now_ts: '{{ as_timestamp(now()) }}'
      now_str: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      tout_current: '{{ state_attr(''weather.openweathermap'',''temperature'') | float(none) }}'
      tin_current: >-
        {% set vals = [states('sensor.lumi_lumi_weather_cuarto_temperatura') | float(none), states('sensor.lumi_lumi_weather_coco_temperatura') | float(none)] | reject('equalto', none) | list %}
        {{ (vals | average | round(2)) if vals | count > 0 else none }}
      tout_memory_ts_raw: '{{ states(''input_datetime.ac_matriz_160_tout_memory_updated_ts'') }}'
      tin_memory_ts_raw: '{{ states(''input_datetime.ac_matriz_160_tin_memory_updated_ts'') }}'
      tout_memory_ts: >-
        {% if tout_memory_ts_raw in ['unknown','unavailable','none',''] %}0{% else %}{{ as_timestamp(tout_memory_ts_raw, default=0) }}{% endif %}
      tin_memory_ts: >-
        {% if tin_memory_ts_raw in ['unknown','unavailable','none',''] %}0{% else %}{{ as_timestamp(tin_memory_ts_raw, default=0) }}{% endif %}
      tout_memory_mature: '{{ tout_memory_ts | float(0) > 0 and (now_ts | float(0) - tout_memory_ts | float(0)) >= 3300 }}'
      tin_memory_mature: '{{ tin_memory_ts | float(0) > 0 and (now_ts | float(0) - tin_memory_ts | float(0)) >= 1500 }}'
      forecast_items: >-
        {% set payload = ac_matriz_160_forecast_response | default({}) %}
        {% if payload is mapping and 'weather.openweathermap' in payload and payload['weather.openweathermap'].forecast is defined %}
          {{ payload['weather.openweathermap'].forecast[:2] }}
        {% else %}
          {{ [] }}
        {% endif %}
      forecast_count: '{{ forecast_items | count }}'
      forecast_max_temp_2h: >-
        {% set ns = namespace(vals=[]) %}
        {% for item in forecast_items if item.temperature is defined and item.temperature | float(none) is not none %}
          {% set ns.vals = ns.vals + [item.temperature | float] %}
        {% endfor %}
        {{ (ns.vals | max | round(2)) if ns.vals | count > 0 else none }}
      forecast_rain_probability_2h: >-
        {% set ns = namespace(vals=[]) %}
        {% for item in forecast_items if item.precipitation_probability is defined and item.precipitation_probability | float(none) is not none %}
          {% set ns.vals = ns.vals + [item.precipitation_probability | float] %}
        {% endfor %}
        {{ (ns.vals | max | round(0)) if ns.vals | count > 0 else 0 }}
      forecast_rain_amount_2h: >-
        {% set ns = namespace(total=0) %}
        {% for item in forecast_items if item.precipitation is defined and item.precipitation | float(none) is not none %}
          {% set ns.total = ns.total + (item.precipitation | float(0)) %}
        {% endfor %}
        {{ ns.total | round(2) }}
      forecast_ok: '{{ forecast_max_temp_2h | float(none) is not none }}'
      reliability_state: >-
        {% if tout_current is none or tin_current is none %}
          error_controlado
        {% elif forecast_ok and tout_memory_mature and tin_memory_mature %}
          ok
        {% elif not forecast_ok and not (tout_memory_mature and tin_memory_mature) %}
          parcial_sin_forecast_sin_historial
        {% elif not forecast_ok %}
          sin_forecast
        {% elif not (tout_memory_mature and tin_memory_mature) %}
          sin_historial
        {% else %}
          parcial
        {% endif %}
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ tout_current is not none and (tout_memory_ts | float(0) == 0 or (now_ts | float(0) - tout_memory_ts | float(0)) >= 3600) }}'
      sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.ac_matriz_160_tout_1h_ago
        data:
          value: '{{ tout_current | float | round(1) }}'
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ac_matriz_160_tout_memory_updated_ts
        data:
          datetime: '{{ now_str }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ tin_current is not none and (tin_memory_ts | float(0) == 0 or (now_ts | float(0) - tin_memory_ts | float(0)) >= 1800) }}'
      sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.ac_matriz_160_tin_30m_ago
        data:
          value: '{{ tin_current | float | round(1) }}'
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ac_matriz_160_tin_memory_updated_ts
        data:
          datetime: '{{ now_str }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ forecast_ok }}'
      sequence:
      - service: input_number.set_value
        target:
          entity_id: input_number.ac_matriz_160_forecast_max_temp_2h
        data:
          value: '{{ forecast_max_temp_2h | float | round(1) }}'
      - service: input_number.set_value
        target:
          entity_id: input_number.ac_matriz_160_forecast_rain_probability_2h
        data:
          value: '{{ forecast_rain_probability_2h | float(0) | round(0) }}'
      - service: input_number.set_value
        target:
          entity_id: input_number.ac_matriz_160_forecast_rain_amount_2h
        data:
          value: '{{ forecast_rain_amount_2h | float(0) | round(1) }}'
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ac_matriz_160_forecast_updated_ts
        data:
          datetime: '{{ now_str }}'
    default:
    - service: input_number.set_value
      target:
        entity_id: input_number.ac_matriz_160_forecast_rain_probability_2h
      data:
        value: 0
    - service: input_number.set_value
      target:
        entity_id: input_number.ac_matriz_160_forecast_rain_amount_2h
      data:
        value: 0
  - service: input_text.set_value
    target:
      entity_id: input_text.ac_matriz_160_contextual_reliability
    data:
      value: '{{ reliability_state }}'
  mode: single

- id: ac_matriz_160_learning_manual_v1
  alias: AC-Matriz 160 - Aprendizaje manual por columna
  description: Aprende offset por columna y modo desde ON/OFF manual con clasificación
    explícita y notificación transaccional.
  mode: queued
  max: 20
  trace:
    stored_traces: 250
  triggers:
  - trigger: state
    entity_id: climate.0200009211c7_climate
  conditions:
  - condition: time
    after: 07:01:00
    before: '21:59:59'
  actions:
  - variables:
      ts_evento: '{{ now().strftime(''%Y-%m-%d %H:%M:%S.%f'') }}'
      hora_evento: '{{ now().strftime(''%I:%M:%S %p'') }}'
      modo_anterior: '{{ trigger.from_state.state | lower if trigger.from_state is
        not none else ''unknown'' }}'
      modo_nuevo: '{{ trigger.to_state.state | lower if trigger.to_state is not none
        else ''unknown'' }}'
      tin: '{{ [states(''sensor.lumi_lumi_weather_cuarto_temperatura'')|float(0),
        states(''sensor.lumi_lumi_weather_coco_temperatura'')|float(0)] | average
        | round(2) }}'
      transicion_real: '{{ modo_anterior != modo_nuevo }}'
      transicion_hvac_directa_real: '{{ (modo_anterior == ''off'' and modo_nuevo in [''cool'',''heat''])
        or (modo_nuevo == ''off'' and modo_anterior in [''cool'',''heat'']) }}'
      transicion_compuesta_inicio_valida: '{{ modo_anterior == ''off'' and modo_nuevo == ''fan_only'' }}'
      transicion_hvac_real: '{{ transicion_hvac_directa_real }}'
      modo_aprendizaje: '{% if modo_nuevo in [''cool'',''heat''] %}{{ modo_nuevo }}{%
        elif modo_anterior in [''cool'',''heat''] %}{{ modo_anterior }}{% else %}fuera_alcance{%
        endif %}'
      evento_manual_tipo: '{% if transicion_real and modo_nuevo in [''cool'',''heat'']
        and modo_anterior == ''off'' %}encendido_manual{% elif transicion_real and
        modo_nuevo == ''off'' and modo_anterior in [''cool'',''heat''] %}apagado_manual{%
        else %}ignorado{% endif %}'
      contexto: '{{ states(''input_text.ac_matriz_160_columna_activa_humana'') | default(''Contexto
        no disponible'', true) }}'
      col_idx: '{{ states(''input_text.ac_matriz_160_columna_activa_idx'') | int(0)
        }}'
      slot_name_resuelto: '{% set t = now().strftime(''%H:%M'') %}{% if ''07:01''
        <= t <= ''10:00'' %}07:01 am - 10:00 am{% elif ''10:01'' <= t <= ''13:00'' %}10:01 am - 01:00 pm{%
        elif ''13:01'' <= t <= ''16:00'' %}01:01 pm - 04:00 pm{% elif ''16:01'' <= t <= ''19:00''
        %}04:01 pm - 07:00 pm{% else %}07:01 pm - 09:59 pm{% endif %}'
      slot_idx_resuelto: '{% set t = now().strftime(''%H:%M'') %}{% if ''07:01'' <=
        t <= ''10:00'' %}0{% elif ''10:01'' <= t <= ''13:00'' %}1{% elif ''13:01''
        <= t <= ''16:00'' %}2{% elif ''16:01'' <= t <= ''19:00'' %}3{% else %}4{%
        endif %}'
      season_name_resuelto: '{% set m = now().month %}{% if m in [12,1,2] %}Invierno{%
        elif m in [3,4,5] %}Primavera{% elif m in [6,7,8] %}Verano{% else %}Otoño{%
        endif %}'
      season_idx_resuelto: '{% if season_name_resuelto == ''Primavera'' %}0{% elif
        season_name_resuelto == ''Verano'' %}1{% elif season_name_resuelto == ''Otoño''
        %}2{% else %}3{% endif %}'
      wx_raw_resuelto: '{{ states(''weather.openweathermap'') | lower }}'
      weather_cat_resuelto: '{% set s = wx_raw_resuelto %}{% if ''thunder'' in s %}Tormenta{%
        elif ''snow'' in s or ''sleet'' in s or ''ice'' in s %}Nieve - Hielo{% elif
        ''fog'' in s or ''mist'' in s or ''haze'' in s %}Niebla - Neblina{% elif ''heavy''
        in s and ''rain'' in s %}Lluvia fuerte{% elif ''rain'' in s or ''drizzle''
        in s %}Lluvia suave{% elif ''cloud'' in s and (''few'' in s or ''scattered''
        in s or ''partly'' in s) %}Parcialmente nublado{% elif ''cloud'' in s %}Nublado{%
        else %}Despejado{% endif %}'
      weather_idx_resuelto: '{% set c = weather_cat_resuelto %}{% if c == ''Despejado'' %}0{% elif c == ''Parcialmente nublado'' %}1{% elif c == ''Nublado''
        %}2{% elif c == ''Lluvia suave'' %}3{% elif c == ''Lluvia fuerte'' %}4{% elif
        c == ''Tormenta'' %}5{% elif c == ''Niebla - Neblina'' %}6{% else %}7{% endif
        %}'
      contexto_resuelto: '{{ weather_cat_resuelto }} | {{ season_name_resuelto }}
        | Horario {{ slot_name_resuelto }}'
      col_idx_recalculado: '{{ (weather_idx_resuelto|int * 20) + (season_idx_resuelto|int
        * 5) + (slot_idx_resuelto|int) + 1 }}'
      col_idx_resuelto: '{{ col_idx_recalculado | int(0) }}'
      col_idx_helper_desfasado: '{{ col_idx|int > 0 and (col_idx|int != col_idx_recalculado|int) }}'
      col_formula_resuelta: weather_idx*20+season_idx*5+slot_idx+1
      season_index_schema: Primavera=0,Verano=1,Otoño=2,Invierno=3
      contexto_activo_resuelto: '{{ contexto_resuelto }}'
      marker_kind: '{{ states(''input_text.ac_matriz_160_auto_origin_kind'') | trim
        }}'
      marker_trace_id: '{{ states(''input_text.ac_matriz_160_auto_origin_trace'')
        | trim }}'
      marker_last_action: '{{ states(''input_text.ac_matriz_160_auto_origin_last_action'')
        | trim }}'
      marker_expires_raw: '{{ states(''input_text.ac_matriz_160_auto_origin_expires_at'')
        | trim }}'
      marker_consumed_raw: '{{ states(''input_text.ac_matriz_160_auto_origin_consumed'')
        | trim | lower }}'
      marker_expires_ts: '{% if marker_expires_raw in [''unknown'',''unavailable'',''none'','''']
        %}{{ 0 }}{% else %}{{ as_timestamp(marker_expires_raw, default=0) }}{% endif
        %}'
      marker_consumed: '{{ marker_consumed_raw in [''true'',''1'',''yes'',''on'']
        }}'
      marker_vigente: '{{ marker_kind == ''automatico_ac_matriz_160'' and (not marker_consumed)
        and as_timestamp(now()) < (marker_expires_ts | float(0)) }}'
      marker_turn_off_recent_expired: '{{ marker_kind == ''automatico_ac_matriz_160'' and marker_last_action == ''turn_off'' and (not marker_consumed) and modo_nuevo == ''off'' and modo_anterior in [''cool'',''heat''] and as_timestamp(now()) >= (marker_expires_ts | float(0)) and (as_timestamp(now()) - (marker_expires_ts | float(0))) <= 300 }}'
      marker_transition_expected: '{% if marker_last_action == ''turn_on_cool'' %}off->cool{%
        elif marker_last_action == ''turn_on_heat'' %}off->heat{% elif marker_last_action
        == ''turn_off'' and modo_anterior in [''cool'',''heat''] %}{{ modo_anterior
        ~ ''->off'' }}{% elif marker_last_action == ''turn_off'' %}*->off{% else %}none{%
        endif %}'
      marker_transition_observed: '{{ modo_anterior ~ ''->'' ~ modo_nuevo }}'
      marker_transition_observed_inmediata: '{{ marker_transition_observed }}'
      marker_compatible: '{{ marker_vigente and (marker_transition_expected == marker_transition_observed
        or (marker_transition_expected == ''*->off'' and modo_nuevo == ''off'')) }}'
      evento_last_changed_ts: '{{ as_timestamp(trigger.to_state.last_changed, default=0)
        | int(0) if trigger.to_state is not none else 0 }}'
      evento_last_changed_iso: '{{ as_local(trigger.to_state.last_changed).strftime(''%Y-%m-%d
        %H:%M:%S'') if trigger.to_state is not none else ''unknown'' }}'
      evento_context_id: '{{ trigger.to_state.context.id if trigger.to_state is not
        none and trigger.to_state.context is not none else ''no_context'' }}'
      evento_parent_id: '{{ trigger.to_state.context.parent_id if trigger.to_state is not none and trigger.to_state.context is not none and trigger.to_state.context.parent_id is not none else '''' }}'
      evento_user_id: '{{ trigger.to_state.context.user_id if trigger.to_state is not none and trigger.to_state.context is not none and trigger.to_state.context.user_id is not none else '''' }}'
      evento_from_context_id: '{{ trigger.from_state.context.id if trigger.from_state is not none and trigger.from_state.context is not none else '''' }}'
      evento_from_parent_id: '{{ trigger.from_state.context.parent_id if trigger.from_state is not none and trigger.from_state.context is not none and trigger.from_state.context.parent_id is not none else '''' }}'
      evento_transition: '{{ modo_anterior ~ ''->'' ~ modo_nuevo }}'
      evento_causal_root_id: '{{ evento_parent_id if evento_parent_id|length > 0 else evento_context_id }}'
      firma_causal_evento: '{{ modo_aprendizaje ~ ''|'' ~ col_idx_resuelto ~ ''|'' ~ evento_causal_root_id ~ ''|'' ~ evento_transition }}'
      auto_chain_context_raw: '{{ states(''input_text.ac_matriz_160_auto_origin_chain_context'') | trim }}'
      manual_causal_signature_raw: '{{ states(''input_text.ac_matriz_160_learning_manual_causal_signature'') | trim }}'
      manual_reconcile_marker_raw: '{{ states(''input_text.ac_matriz_160_manual_learning_reconcile_marker'') | trim }}'
      manual_reconcile_marker_active: '{{ ''kind=manual_learning_reconcile_ac_matriz_160'' in manual_reconcile_marker_raw and (''root_id='' ~ evento_causal_root_id) in manual_reconcile_marker_raw and (''expires_at='' in manual_reconcile_marker_raw) and as_timestamp(now()) < as_timestamp((manual_reconcile_marker_raw | regex_findall(''expires_at=([^|]+)'') | first | default(''1970-01-01 00:00:00'', true)), default=0) }}'
      manual_on_hold_until_raw: '{{ states(''input_datetime.ac_matriz_160_manual_on_hold_until'') | trim }}'
      manual_on_hold_until_ts: '{% if manual_on_hold_until_raw in [''unknown'',''unavailable'',''none'',''''] %}{{ 0 }}{% else %}{{ as_timestamp(manual_on_hold_until_raw, default=0) }}{% endif %}'
      manual_on_hold_active: '{{ as_timestamp(now()) < (manual_on_hold_until_ts | float(0)) }}'
      learning_bucket_corto: '{{ (as_timestamp(now()) | int(0) // 15) }}'
      learning_bucket_error_5s: '{{ (as_timestamp(now()) | int(0) // 5) }}'
      firma_evento: '{{ evento_context_id ~ ''|'' ~ evento_last_changed_ts ~ ''|''
        ~ modo_anterior ~ ''->'' ~ modo_nuevo ~ ''|'' ~ modo_aprendizaje ~ ''|'' ~
        learning_bucket_corto }}'
      firma_learning_manual: '{{ evento_last_changed_ts ~ ''|'' ~ evento_context_id
        ~ ''|'' ~ modo_anterior ~ ''->'' ~ modo_nuevo }}'
      firma_learning_manual_previa: '{{ states(''input_text.ac_matriz_160_learning_manual_evento_firma'')
        | trim }}'
      firma_previa: '{{ states(''input_text.ac_matriz_160_learning_last_signature'')
        | trim }}'
      dedup_ok: '{{ firma_previa != firma_evento }}'
      helper_offset_resuelto: '{{ ''input_number.ac_matriz_160_offset_'' ~ modo_aprendizaje
        ~ ''_col_'' ~ col_idx_resuelto }}'
      helper_offset_previo: '{{ ''input_number.ac_matriz_160_offset_'' ~ modo_aprendizaje
        ~ ''_col_'' ~ col_idx }}'
      helper_offset: '{{ helper_offset_resuelto }}'
      offset_actual: '{{ states(helper_offset_resuelto) | float(0) if modo_aprendizaje
        in [''cool'',''heat''] else 0 }}'
      horario_aprendizaje_habilitado: '{{ now().strftime(''%H:%M:%S'') >= ''07:01:00''
        and now().strftime(''%H:%M:%S'') <= ''21:59:59'' }}'
      origen_clasificacion: '{% if not transicion_hvac_real %}sin_transicion_real
        {% elif marker_compatible %}automatico_ac_matriz_160 {% else %}manual_externo
        {% endif %}'
      manual_off_rebound_until_raw: '{{ states(''input_datetime.ac_matriz_160_manual_off_rebound_until'')
        | trim }}'
      manual_off_rebound_until_ts: '{% if manual_off_rebound_until_raw in [''unknown'',''unavailable'',''none'','''']
        %}{{ 0 }}{% else %}{{ as_timestamp(manual_off_rebound_until_raw, default=0)
        }}{% endif %}'
      manual_off_rebound_active: '{{ as_timestamp(now()) < (manual_off_rebound_until_ts
        | float(0)) }}'
      hvac_min_sp: '{{ state_attr(''climate.0200009211c7_climate'', ''min_temp'')
        | float(17) | round(0, ''floor'') | int }}'
      hvac_max_sp: '{{ state_attr(''climate.0200009211c7_climate'', ''max_temp'')
        | float(23) | round(0, ''floor'') | int }}'
      helper_t_off_cool: '{{ states(''input_number.ac_matriz_160_t_off_cool'') | float(24)
        }}'
      helper_t_on_cool: '{{ states(''input_number.ac_matriz_160_t_on_cool'') | float(25)
        }}'
      helper_t_off_heat: '{{ states(''input_number.ac_matriz_160_t_off_heat'') | float(22)
        }}'
      helper_t_on_heat: '{{ states(''input_number.ac_matriz_160_t_on_heat'') | float(21)
        }}'
      transicion_consolidada_from: '{{ modo_anterior }}'
      transicion_consolidada_to: '{{ modo_nuevo }}'
      transicion_observada_consolidada: '{{ transicion_consolidada_from ~ ''->'' ~ transicion_consolidada_to }}'
      cierre_compuesto_valido: '{{ false }}'
      transicion_hvac_real: '{{ (transicion_consolidada_from == ''off'' and transicion_consolidada_to in [''cool'',''heat''])
        or (transicion_consolidada_to == ''off'' and transicion_consolidada_from in [''cool'',''heat'']) }}'
      modo_aprendizaje: '{% if transicion_consolidada_to in [''cool'',''heat''] %}{{ transicion_consolidada_to }}{% elif transicion_consolidada_from in [''cool'',''heat''] %}{{ transicion_consolidada_from }}{% else %}fuera_alcance{% endif %}'
      evento_manual_tipo: '{% if transicion_hvac_real and transicion_consolidada_to in [''cool'',''heat'']
        and transicion_consolidada_from == ''off'' %}encendido_manual{% elif transicion_hvac_real and
        transicion_consolidada_to == ''off'' and transicion_consolidada_from in [''cool'',''heat''] %}apagado_manual{% else %}ignorado{% endif %}'
      off_vigente: '{% if modo_aprendizaje == ''cool'' %}{{ helper_t_off_cool | float(24)
        }}{% elif modo_aprendizaje == ''heat'' %}{{ helper_t_off_heat | float(22)
        }}{% else %}0{% endif %}'
      on_vigente: '{% if modo_aprendizaje == ''cool'' %}{{ helper_t_on_cool | float(25)
        }}{% elif modo_aprendizaje == ''heat'' %}{{ helper_t_on_heat | float(21)
        }}{% else %}0{% endif %}'
      histeresis_aprendizaje: 1.0
      anchor_encendido_manual_cool_bajo_off: '{{ modo_aprendizaje == ''cool'' and evento_manual_tipo == ''encendido_manual''
        and tin | float(0) < off_vigente | float(0) }}'
      anchor_apagado_manual_cool_sobre_on: '{{ modo_aprendizaje == ''cool'' and evento_manual_tipo == ''apagado_manual''
        and tin | float(0) > on_vigente | float(0) }}'
      anchor_encendido_manual_heat_sobre_off: '{{ modo_aprendizaje == ''heat'' and evento_manual_tipo == ''encendido_manual''
        and tin | float(0) > off_vigente | float(0) }}'
      fuera_rango_anchor: '{{ anchor_encendido_manual_cool_bajo_off or anchor_apagado_manual_cool_sobre_on
        or anchor_encendido_manual_heat_sobre_off }}'
      tipo_anchor: '{% if anchor_encendido_manual_cool_bajo_off %}anchor_encendido_manual_cool_bajo_off{% elif anchor_apagado_manual_cool_sobre_on %}anchor_apagado_manual_cool_sobre_on{% elif anchor_encendido_manual_heat_sobre_off %}anchor_encendido_manual_heat_sobre_off{% else %}none{% endif %}'
      on_obj_anchor: '{% if anchor_apagado_manual_cool_sobre_on %}{{ ((tin | float(0)) + 0.50) | round(2) }}{% elif modo_aprendizaje == ''cool'' %}{{ ((tin | float(0)) - 0.5 + (histeresis_aprendizaje | float(1.0))) | round(2) }}{% elif modo_aprendizaje == ''heat'' %}{{ ((tin | float(0)) + 0.5 - (histeresis_aprendizaje | float(1.0))) | round(2) }}{% else %}{{ on_vigente | float(0) }}{% endif %}'
      off_obj_anchor: '{% if anchor_apagado_manual_cool_sobre_on %}{{ ((on_obj_anchor | float(0)) - (histeresis_aprendizaje | float(1.0))) | round(2) }}{% elif modo_aprendizaje == ''cool'' %}{{ ((on_obj_anchor | float(0)) - (histeresis_aprendizaje | float(1.0))) | round(2) }}{% elif modo_aprendizaje == ''heat'' %}{{ ((on_obj_anchor | float(0)) + (histeresis_aprendizaje | float(1.0))) | round(2) }}{% else %}{{ off_vigente | float(0) }}{% endif %}'
      delta_anchor: '{% if anchor_apagado_manual_cool_sobre_on %}{{ ((on_obj_anchor | float(0)) - (on_vigente | float(0))) | round(2) }}{% elif fuera_rango_anchor %}{{ ((off_obj_anchor | float(0)) - (off_vigente | float(0))) | round(2) }}{% else %}0{% endif %}'
      rango_dist: '{% if modo_aprendizaje == ''cool'' and evento_manual_tipo == ''encendido_manual''
        %}{{ (tin | float(0)) - (on_vigente | float(0)) }}{% elif modo_aprendizaje
        == ''cool'' and evento_manual_tipo == ''apagado_manual'' %}{{ (tin |
        float(0)) - (off_vigente | float(0)) }}{% elif modo_aprendizaje == ''heat''
        and evento_manual_tipo == ''encendido_manual'' %}{{ (tin | float(0)) -
        (on_vigente | float(0)) }}{% elif modo_aprendizaje == ''heat'' and evento_manual_tipo
        == ''apagado_manual'' %}{{ (tin | float(0)) - (off_vigente | float(0)) }}{%
        else %}0{% endif %}'
      delta_tramo: '{% set d = (rango_dist | float(0)) | abs %}{% if d > 0.7 and d <= 1.0
        %}0.50{% elif d > 0.5 and d <= 0.7 %}0.25{% elif d > 0.2 and d <= 0.5 %}0.10{%
        elif d >= 0 and d < 0.2 %}0.05{% else %}0{% endif %}'
      delta: '{% if evento_manual_tipo not in [''encendido_manual'',''apagado_manual'']
        %}0 {% elif fuera_rango_anchor %}{{ delta_anchor | float(0) }} {% elif modo_aprendizaje
        == ''cool'' and evento_manual_tipo == ''encendido_manual'' %}{{ -1 * (delta_tramo
        | float(0)) }} {% elif modo_aprendizaje == ''cool'' and evento_manual_tipo
        == ''apagado_manual'' %}{{ delta_tramo | float(0) }} {% elif modo_aprendizaje
        == ''heat'' and evento_manual_tipo == ''encendido_manual'' %}{{ delta_tramo
        | float(0) }} {% elif modo_aprendizaje == ''heat'' and evento_manual_tipo
        == ''apagado_manual'' %}{{ -1 * (delta_tramo | float(0)) }} {% else %}0{% endif %}'
      helper_valido: '{{ col_idx_resuelto|int > 0 and modo_aprendizaje in [''cool'',''heat'']
        and states(helper_offset_resuelto) not in [''unknown'',''unavailable'',''none'','''']
        }}'
      offset_nuevo: '{{ [3.0, [-3.0, (offset_actual|float + delta|float)] | max] |
        min | round(2) }}'
      delta_aplicado_real: '{{ (offset_nuevo | float(0)) - (offset_actual | float(0))
        }}'
      anchor_limitado_por_clamp: '{{ fuera_rango_anchor and ((offset_actual | float(0) + delta_anchor | float(0)) != (offset_nuevo | float(0))) }}'
      off_nuevo: '{{ ((off_vigente | float(0)) + (delta_aplicado_real | float(0)))
        | round(2) }}'
      on_nuevo: '{% if modo_aprendizaje == ''cool'' %}{{ ((off_nuevo | float(0))
        + 1.0) | round(2) }}{% elif modo_aprendizaje == ''heat'' %}{{ ((off_nuevo
        | float(0)) - 1.0) | round(2) }}{% else %}{{ on_vigente | float(0) }}{% endif
        %}'
