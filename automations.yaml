          marker_transition_expected }} | marker_transition_observed={{ marker_transition_observed
          }} | expires_at={{ marker_expires_raw }} | resultado_terminal={{ resultado_terminal
          }} | razon={{ razon }} | from={{ modo_anterior }} | to={{ modo_nuevo }}
          | final_transition={{ transicion_final_from ~ "->" ~ transicion_final_to
          }} | absorbed={{ intermediate_changes_absorbed }} | dedup_ok={{ dedup_ok
          }}
        entity_id: climate.0200009211c7_climate
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ not dedup_ok }}'
      sequence:
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: hito=learning_manual_dedup_descartado | firma_evento={{ firma_evento
            }} | firma_previa={{ firma_previa }} | evento_last_changed={{ evento_last_changed_iso
            }} | evento_context_id={{ evento_context_id }} | trace_id={{ trace_id_learning
            }} | from={{ modo_anterior }} | to={{ modo_nuevo }} | final_transition={{
            transicion_final_from ~ "->" ~ transicion_final_to }} | absorbed={{ intermediate_changes_absorbed
            }} | modo={{ modo_aprendizaje }} | razon_terminal=dedup_consolidado
          entity_id: climate.0200009211c7_climate
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ dedup_ok and evento_estable }}'
      sequence:
      - service: input_text.set_value
        target:
          entity_id: input_text.ac_matriz_160_learning_last_signature
        data:
          value: '{{ firma_evento }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ resultado_terminal != ''aplicado'' and evento_manual_tipo
          in [''encendido_manual'',''apagado_manual''] and origen_clasificacion !=
          ''manual_externo'' }}'
      sequence:
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: hito=intento_modificar_offset_bloqueado | origen={{ origen_clasificacion
            }} | razon={{ razon }} | resultado_terminal={{ resultado_terminal }} |
            trace_id={{ trace_id_learning }} | helper={{ helper_offset_resuelto }}
            | from={{ modo_anterior }} | to={{ modo_nuevo }} | final_transition={{
            transicion_final_from ~ "->" ~ transicion_final_to }} | absorbed={{ intermediate_changes_absorbed
            }} | contexto={{ contexto_activo_resuelto }} | ts={{ ts_evento }}
          entity_id: climate.0200009211c7_climate
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ resultado_terminal == ''error_controlado'' and notificacion_error_dedup_ok
          }}'
      sequence:
      - service: notify.mobile_app_samsung_s24
        data:
          title: AC-Matriz 160 aprendizaje manual
          message: Error controlado en aprendizaje manual. Revisa logbook.
      - service: input_text.set_value
        target:
          entity_id: input_text.ac_matriz_160_learning_error_last_signature
        data:
          value: '{{ firma_error_learning }}'
    - conditions:
      - condition: template
        value_template: '{{ resultado_terminal == ''error_controlado'' and not notificacion_error_dedup_ok
          }}'
      sequence:
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: hito=error_controlado_suprimido_dedup | trace_id={{ trace_id_learning
            }} | firma_error={{ firma_error_learning }} | firma_previa={{ firma_error_learning_previa
            }} | from={{ modo_anterior }} | to={{ modo_nuevo }} | razon={{ razon }}
            | bucket_5s={{ learning_bucket_error_5s }}
          entity_id: climate.0200009211c7_climate
  - service: input_text.set_value
    target:
      entity_id: input_text.ac_matriz_160_ultimo_estado_notificacion
    data:
      value: '{{ envio_estado }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ evento_manual_tipo == ''apagado_manual'' and resultado_terminal
          == ''aplicado'' }}'
      sequence:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ac_matriz_160_manual_off_block_until
        data:
          datetime: '{{ (now() + timedelta(minutes=5)).strftime(''%Y-%m-%d %H:%M:%S'')
            }}'
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: hito=manual_off_bloqueo_largo_set | trace_id={{ trace_id_learning
            }} | block_until={{ (now() + timedelta(minutes=5)).strftime('%Y-%m-%d
            %H:%M:%S') }} | origen={{ origen_clasificacion }} | resultado_terminal={{
            resultado_terminal }} | razon={{ razon }}
          entity_id: climate.0200009211c7_climate
  - service: input_text.set_value
    target:
      entity_id: input_text.ac_matriz_160_ultima_accion
    data:
      value: '{{ ''learning|'' ~ resultado_terminal ~ ''|'' ~ razon ~ ''|'' ~ modo_anterior
        ~ ''->'' ~ modo_nuevo }}'
  - service: input_text.set_value
    target:
      entity_id: input_text.ac_matriz_160_ultimo_resultado_validacion
    data:
      value: '{{ ''learning|'' ~ resultado_terminal ~ ''|'' ~ razon }}'


- id: ac_night_matrix_v1
  alias: AC Night Matriz Contextual
  trace:
    stored_traces: 200
  mode: restart
  trigger:
  - platform: time_pattern
    minutes: "/5"
  - platform: state
    entity_id:
    - weather.openweathermap
    - sensor.lumi_lumi_weather_cuarto_temperatura
    - sensor.lumi_lumi_weather_coco_temperatura
    - sensor.lumi_lumi_weather_cuarto_humedad
    - sensor.lumi_lumi_weather_coco_humedad
    - binary_sensor.presencia_ok_estable
  condition:
  - condition: state
    entity_id: input_boolean.ac_night_auto_habilitado
    state: 'on'
  - condition: time
    after: '22:00:00'
    before: '07:00:00'
  action:
  - variables:
      climate_ent: climate.0200009211c7_climate
      notify_service: notify.mobile_app_samsung_s24
      tin: "{{ ([states('sensor.lumi_lumi_weather_cuarto_temperatura')|float(0), states('sensor.lumi_lumi_weather_coco_temperatura')|float(0)] | average) | round(2) }}"
      hin: "{{ ([states('sensor.lumi_lumi_weather_cuarto_humedad')|float(0), states('sensor.lumi_lumi_weather_coco_humedad')|float(0)] | average) | round(1) }}"
      tout: "{{ state_attr('weather.openweathermap','temperature')|float(0) }}"
      hout: "{{ state_attr('weather.openweathermap','humidity')|float(60) }}"
      weather_raw: "{{ states('weather.openweathermap')|lower }}"
      weather_state: "{% if weather_raw in ['clear-night','clear','sunny'] %}despejado{% elif weather_raw in ['partlycloudy','partly cloudy','few clouds','scattered clouds'] %}parcial{% elif weather_raw in ['cloudy','overcast','broken clouds'] %}nublado{% elif weather_raw in ['rainy','rain','drizzle','pouring'] %}lluvia{% elif 'thunder' in weather_raw %}tormenta{% elif weather_raw in ['fog','mist','haze','smoky'] %}niebla{% elif 'snow' in weather_raw or 'sleet' in weather_raw %}hielo{% else %}despejado{% endif %}"
      month: "{{ now().month }}"
      estacion: "{% if month in [12,1,2] %}invierno{% elif month in [3,4,5] %}primavera{% elif month in [6,7,8] %}verano{% else %}otono{% endif %}"
      franja: "{% set h=now().hour %}{% if h in [22,23,0] %}2200_0059{% elif h in [1,2,3] %}0100_0359{% elif h in [4,5] %}0400_0559{% else %}0600_0700{% endif %}"
      presencia_ok: "{{ is_state('binary_sensor.presencia_ok_estable','on') }}"
      col_idx: "{% set est=['verano','otono','invierno','primavera'] %}{% set fra=['2200_0059','0100_0359','0400_0559','0600_0700'] %}{% set cli=['despejado','nublado','parcial','lluvia','tormenta','niebla','hielo'] %}{{ (est.index(estacion)*28)+(fra.index(franja)*7)+(cli.index(weather_state))+1 }}"
      off_cool_base: "{{ [25.7, [22.0, 24.2 + ((tout-24)*-0.05) + ((hout-60)*-0.01) + ((hin-55)*-0.015)] | max] | min | round(2) }}"
      off_heat_base: "{{ [24.0, [17.0, 20.5 + ((12-tout)*0.05) + ((hout-60)*0.005)] | max] | min | round(2) }}"
      hysteresis: "{{ states('input_number.ac_night_hysteresis_base')|float(0.8) }}"
      off_cool: "{{ ([states('input_number.ac_night_offset_cool_col_' ~ col_idx)|float(0) + off_cool_base, 25.7] | min) | round(2) }}"
      on_cool: "{{ (off_cool + hysteresis) | round(2) }}"
      off_heat: "{{ ([states('input_number.ac_night_offset_heat_col_' ~ col_idx)|float(0) + off_heat_base, 24.0] | min) | round(2) }}"
      on_heat: "{{ (off_heat - hysteresis) | round(2) }}"
      hvac_min_sp: "{{ state_attr(climate_ent, 'min_temp') | float(17) | round(0, 'floor') | int }}"
      hvac_max_sp: "{{ state_attr(climate_ent, 'max_temp') | float(23) | round(0, 'floor') | int }}"
      off_cool_floor: "{{ (off_cool | float) | round(0, 'floor') | int }}"
      sp_cool_target_raw: "{{ (off_cool_floor | int) - 1 }}"
      sp_cool_target: "{{ [hvac_max_sp|int, [hvac_min_sp|int, (sp_cool_target_raw|int)] | max] | min | int }}"
      sp_heat_target_base: 24
      sp_heat_target: "{{ [hvac_max_sp|int, [hvac_min_sp|int, (sp_heat_target_base|int)] | max] | min | int }}"
      hvac_mode: "{{ states(climate_ent) }}"
  - service: input_text.set_value
    target: {entity_id: input_text.ac_night_contexto_firma_activa}
    data: {value: "{{ estacion ~ '|' ~ franja ~ '|' ~ weather_state }}"}
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ not presencia_ok and hvac_mode in ['cool','heat'] }}"
      sequence:
      - service: input_text.set_value
        target: {entity_id: input_text.ac_night_auto_origin_payload}
        data:
          value: "kind=night_auto|trace_id={{ context.id|default('na') }}|last_action=turn_off|expected_transition={{ hvac_mode }}->off|expires_at={{ (as_timestamp(now()) + 30) | int }}|consumed=0"
      - service: climate.turn_off
        target: {entity_id: "{{ climate_ent }}"}
      - service: notify.mobile_app_samsung_s24
        data: {title: "AC Night · OFF", message: "Sin presencia efectiva."}
    - conditions:
      - condition: template
        value_template: "{{ hvac_mode == 'cool' and tin <= off_cool }}"
      sequence:
      - service: climate.set_hvac_mode
        target: {entity_id: "{{ climate_ent }}"}
        data: {hvac_mode: fan_only}
      - service: climate.set_fan_mode
        target: {entity_id: "{{ climate_ent }}"}
        data: {fan_mode: Low}
      - delay: "00:00:45"
      - service: input_text.set_value
        target: {entity_id: input_text.ac_night_auto_origin_payload}
        data:
          value: "kind=night_auto|trace_id={{ context.id|default('na') }}|last_action=turn_off|expected_transition=cool->off|expires_at={{ (as_timestamp(now()) + 30) | int }}|consumed=0"
      - service: climate.turn_off
        target: {entity_id: "{{ climate_ent }}"}
    - conditions:
      - condition: template
        value_template: "{{ hvac_mode == 'heat' and tin >= off_heat }}"
      sequence:
      - service: input_text.set_value
        target: {entity_id: input_text.ac_night_auto_origin_payload}
        data:
          value: "kind=night_auto|trace_id={{ context.id|default('na') }}|last_action=turn_off|expected_transition=heat->off|expires_at={{ (as_timestamp(now()) + 30) | int }}|consumed=0"
      - service: climate.turn_off
        target: {entity_id: "{{ climate_ent }}"}
    - conditions:
      - condition: template
        value_template: "{{ hvac_mode != 'cool' and tin >= on_cool and presencia_ok }}"
      sequence:
      - service: input_text.set_value
        target: {entity_id: input_text.ac_night_auto_origin_payload}
        data:
          value: "kind=night_auto|trace_id={{ context.id|default('na') }}|last_action=turn_on_cool|expected_transition=off->cool|expires_at={{ (as_timestamp(now()) + 30) | int }}|consumed=0"
      - service: climate.set_hvac_mode
        target: {entity_id: "{{ climate_ent }}"}
        data: {hvac_mode: cool}
      - service: climate.set_temperature
        target: {entity_id: "{{ climate_ent }}"}
        data: {temperature: "{{ sp_cool_target }}"}
      - service: climate.set_fan_mode
        target: {entity_id: "{{ climate_ent }}"}
        data: {fan_mode: Low}
    - conditions:
      - condition: template
        value_template: "{{ hvac_mode != 'heat' and tin <= on_heat and presencia_ok }}"
      sequence:
      - service: input_text.set_value
        target: {entity_id: input_text.ac_night_auto_origin_payload}
        data:
          value: "kind=night_auto|trace_id={{ context.id|default('na') }}|last_action=turn_on_heat|expected_transition=off->heat|expires_at={{ (as_timestamp(now()) + 30) | int }}|consumed=0"
      - service: climate.set_hvac_mode
        target: {entity_id: "{{ climate_ent }}"}
        data: {hvac_mode: heat}
      - service: climate.set_temperature
        target: {entity_id: "{{ climate_ent }}"}
        data: {temperature: "{{ sp_heat_target }}"}
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ 'Low' in (state_attr(climate_ent,'fan_modes') | default([], true)) }}"
          sequence:
          - service: climate.set_fan_mode
            target: {entity_id: "{{ climate_ent }}"}
            data: {fan_mode: Low}
        default:
        - service: logbook.log
          data:
            name: AC Night
            message: "resultado=fan_heat_no_soportado | fan=Low | col={{ col_idx }} | tin={{ tin }} | hvac_mode={{ hvac_mode }}"
    default:
    - service: logbook.log
      data:
        name: AC Night
        message: "resultado=sin_cambio | col={{ col_idx }} | tin={{ tin }} | hvac_mode={{ hvac_mode }} | sp_cool_target={{ sp_cool_target }} | sp_heat_target={{ sp_heat_target }} | fan=Low | on_cool={{ on_cool }} | off_cool={{ off_cool }} | on_heat={{ on_heat }} | off_heat={{ off_heat }}"


- id: ac_night_learning_manual_v1
  alias: AC Night - Aprendizaje manual por columna
  trace:
    stored_traces: 200
  mode: queued
  trigger:
  - platform: state
    entity_id: climate.0200009211c7_climate
  condition:
  - condition: time
    after: '22:00:00'
    before: '07:00:00'
  action:
  - variables:
      climate_ent: climate.0200009211c7_climate
      from_state: "{{ trigger.from_state.state if trigger.from_state is not none else '' }}"
      to_state: "{{ trigger.to_state.state if trigger.to_state is not none else '' }}"
      transicion: "{{ from_state ~ '->' ~ to_state }}"
      valid_transition: "{{ transicion in ['off->cool','cool->off','off->heat','heat->off'] }}"
      month: "{{ now().month }}"
      estacion: "{% if month in [12,1,2] %}invierno{% elif month in [3,4,5] %}primavera{% elif month in [6,7,8] %}verano{% else %}otono{% endif %}"
      franja: "{% set h=now().hour %}{% if h in [22,23,0] %}2200_0059{% elif h in [1,2,3] %}0100_0359{% elif h in [4,5] %}0400_0559{% else %}0600_0700{% endif %}"
      weather_raw: "{{ states('weather.openweathermap')|lower }}"
      weather_state: "{% if weather_raw in ['clear-night','clear','sunny'] %}despejado{% elif weather_raw in ['partlycloudy','partly cloudy','few clouds','scattered clouds'] %}parcial{% elif weather_raw in ['cloudy','overcast','broken clouds'] %}nublado{% elif weather_raw in ['rainy','rain','drizzle','pouring'] %}lluvia{% elif 'thunder' in weather_raw %}tormenta{% elif weather_raw in ['fog','mist','haze','smoky'] %}niebla{% elif 'snow' in weather_raw or 'sleet' in weather_raw %}hielo{% else %}despejado{% endif %}"
      col_idx: "{% set est=['verano','otono','invierno','primavera'] %}{% set fra=['2200_0059','0100_0359','0400_0559','0600_0700'] %}{% set cli=['despejado','nublado','parcial','lluvia','tormenta','niebla','hielo'] %}{{ (est.index(estacion)*28)+(fra.index(franja)*7)+(cli.index(weather_state))+1 }}"
      signature: "{{ (trigger.to_state.context.id if trigger.to_state is not none else 'na') ~ '|' ~ (as_timestamp(trigger.to_state.last_changed)|int if trigger.to_state is not none else 0) ~ '|' ~ transicion ~ '|col=' ~ col_idx }}"
      last_signature: "{{ states('input_text.ac_night_learning_last_signature') }}"
      marker_raw: "{{ states('input_text.ac_night_auto_origin_payload') }}"
      marker_kind: "{{ marker_raw.split('kind=')[1].split('|')[0] if 'kind=' in marker_raw else '' }}"
      marker_expected: "{{ marker_raw.split('expected_transition=')[1].split('|')[0] if 'expected_transition=' in marker_raw else '' }}"
      marker_exp: "{{ marker_raw.split('expires_at=')[1].split('|')[0] | int(0) if 'expires_at=' in marker_raw else 0 }}"
      marker_consumed: "{{ marker_raw.split('consumed=')[1].split('|')[0] if 'consumed=' in marker_raw else '1' }}"
      marker_valid: "{{ marker_kind == 'night_auto' and marker_expected == transicion and marker_consumed == '0' and as_timestamp(now())|int <= marker_exp }}"
      origen_clasificacion: "{{ 'automatico_night' if marker_valid else 'manual_externo' }}"
      helper_target: "{{ 'input_number.ac_night_offset_cool_col_' ~ col_idx if transicion in ['off->cool','cool->off'] else 'input_number.ac_night_offset_heat_col_' ~ col_idx }}"
      modo: "{{ 'cool' if transicion in ['off->cool','cool->off'] else ('heat' if transicion in ['off->heat','heat->off'] else 'na') }}"
      delta: "{% if transicion == 'off->cool' %}-0.10{% elif transicion == 'cool->off' %}+0.10{% elif transicion == 'off->heat' %}+0.10{% elif transicion == 'heat->off' %}-0.10{% else %}0{% endif %}"
      offset_prev: "{{ states(helper_target) | float(0) if valid_transition else 0 }}"
      offset_new: "{{ [3.0, [-3.0, (offset_prev + (delta|float(0)))] | max] | min | round(2) if valid_transition else offset_prev }}"
      trace_id: "{{ trigger.to_state.context.id if trigger.to_state is not none else context.id|default('na') }}"
  - choose:
    - conditions:
      - condition: template
        value_template: "{{ not valid_transition }}"
      sequence:
      - service: logbook.log
        data:
          name: AC Night Learning
          message: "trace_id={{ trace_id }} | col_idx={{ col_idx }} | modo={{ modo }} | transicion={{ transicion }} | origen_clasificacion=n/a | delta=0 | offset_anterior=0 | offset_nuevo=0 | resultado_terminal=ignorado | razon=transicion_fuera_de_alcance"
    - conditions:
      - condition: template
        value_template: "{{ signature == last_signature }}"
      sequence:
      - service: logbook.log
        data:
          name: AC Night Learning
          message: "trace_id={{ trace_id }} | col_idx={{ col_idx }} | modo={{ modo }} | transicion={{ transicion }} | origen_clasificacion={{ origen_clasificacion }} | delta={{ delta }} | offset_anterior={{ offset_prev }} | offset_nuevo={{ offset_prev }} | resultado_terminal=ignorado | razon=dedup_signature_repetida"
    default:
    - service: input_text.set_value
      target: {entity_id: input_text.ac_night_learning_last_signature}
      data: {value: "{{ signature }}"}
    - choose:
      - conditions:
        - condition: template
          value_template: "{{ marker_valid }}"
        sequence:
        - service: input_text.set_value
          target: {entity_id: input_text.ac_night_auto_origin_payload}
          data:
            value: "{{ marker_raw.replace('consumed=0','consumed=1') if 'consumed=0' in marker_raw else marker_raw }}"
    - choose:
      - conditions:
        - condition: template
          value_template: "{{ origen_clasificacion == 'manual_externo' }}"
        sequence:
        - service: input_number.set_value
          target: {entity_id: "{{ helper_target }}"}
          data: {value: "{{ offset_new }}"}
        - service: logbook.log
          data:
            name: AC Night Learning
            message: "trace_id={{ trace_id }} | col_idx={{ col_idx }} | modo={{ modo }} | transicion={{ transicion }} | origen_clasificacion={{ origen_clasificacion }} | delta={{ delta }} | offset_anterior={{ offset_prev }} | offset_nuevo={{ offset_new }} | resultado_terminal=aplicado | razon=manual_externo_aplicado"
      default:
      - service: logbook.log
        data:
          name: AC Night Learning
          message: "trace_id={{ trace_id }} | col_idx={{ col_idx }} | modo={{ modo }} | transicion={{ transicion }} | origen_clasificacion={{ origen_clasificacion }} | delta={{ delta }} | offset_anterior={{ offset_prev }} | offset_nuevo={{ offset_prev }} | resultado_terminal=ignorado | razon=origen_automatico_night"
