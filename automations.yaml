          - variables:
              sp_reportado_despues: "{{ state_attr(climate_ent, 'temperature') | float(none) }}"
              sp_confirmado: "{{ sp_reportado_despues is not none and (sp_reportado_despues | float) == (sp_solicitado | float) }}"
              sp_intento: 1
          - choose:
            - conditions:
              - condition: template
                value_template: "{{ not sp_confirmado }}"
              sequence:
              - service: climate.set_temperature
                target: {entity_id: "{{ climate_ent }}"}
                data: {temperature: "{{ sp_solicitado }}"}
              - delay: "00:00:03"
              - variables:
                  sp_reportado_despues: "{{ state_attr(climate_ent, 'temperature') | float(none) }}"
                  sp_confirmado: "{{ sp_reportado_despues is not none and (sp_reportado_despues | float) == (sp_solicitado | float) }}"
                  sp_intento: 2
          - service: logbook.log
            data:
              name: AC Night
              message: "hito=night_sp_context_resync | trace_id={{ context.id|default('na') }} | col_idx={{ col_idx }} | tin={{ tin }} | off_cool={{ off_cool }} | sp_contractual={{ sp_contractual }} | sp_solicitado={{ sp_solicitado }} | sp_reportado_antes={{ sp_reportado_antes if sp_reportado_antes is not none else 'none' }} | sp_reportado_final={{ sp_reportado_despues if sp_reportado_despues is not none else 'none' }} | intento={{ sp_intento }} | confirmado={{ sp_confirmado }} | sp_efectivo={{ sp_reportado_despues if sp_confirmado else 'none' }} | refuerzos={{ night_reinforcement_count }} | minutos_ciclo={{ night_cycle_elapsed_min }} | motivo=contrato_nocturno_o_sp_desalineado | contrato={{ night_contract_signature }} | resultado_terminal={{ 'resync' if sp_confirmado else 'sp_no_confirmado' }}"
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ night_resync_fan_needed }}"
          sequence:
          - service: climate.set_fan_mode
            target: {entity_id: "{{ climate_ent }}"}
            data: {fan_mode: "{{ humidity_fan_target }}"}
          - service: logbook.log
            data:
              name: AC Night
              message: "hito=night_humidity_fan_adjustment | trace_id={{ context.id|default('na') }} | col_idx={{ col_idx }} | tin={{ tin }} | off_cool={{ off_cool }} | sp_cool_target={{ sp_cool_target }} | sp_efectivo={{ sp_cool_effective }} | refuerzos={{ night_reinforcement_count }} | minutos_ciclo={{ night_cycle_elapsed_min }} | motivo=fan_nocturno_desalineado | fan_previo={{ fan_mode_actual }} | fan={{ humidity_fan_target }} | compressor_state={{ compressor_state }} | muggy_high={{ muggy_high }} | muggy_severe={{ muggy_severe }} | resultado_terminal=resync"
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ (not night_resync_sp_needed) or (sp_confirmado | default(false)) }}"
          sequence:
          - service: input_text.set_value
            target: {entity_id: input_text.ac_night_cool_cycle_signature}
            data: {value: "{{ night_contract_signature }}"}
    - conditions:
      - condition: template
        value_template: "{{ hvac_mode == 'heat' and tin >= off_heat }}"
      sequence:
      - variables:
          modo_previo_label: Calor
      - service: input_text.set_value
        target: {entity_id: input_text.ac_night_auto_origin_payload}
        data:
          value: "kind=night_auto|trace_id={{ context.id|default('na') }}|last_action=turn_off|auto_event=AUTO_OFF_NIGHT_UMBRAL|expected_transition=heat->off|expires_at={{ (as_timestamp(now()) + 30) | int }}|consumed=0"
      - service: climate.turn_off
        target: {entity_id: "{{ climate_ent }}"}
      - service: notify.mobile_app_samsung_s24
        data:
          title: AC-Matriz Nocturna
          message: "{{ now().strftime('%I:%M:%S %p') }} — Apagado automático\n\nMotivo: Temp. alcanzada.\n\nModo anterior: {{ modo_previo_label }}\n\nInterior: {{ tin }} °C\n\nHumedad interior: {{ hin }} %\n\nExterior: {{ tout }} °C\n\nAjuste de temp. anterior: {{ sp_heat_target }} °C\n\nUmbral de apagado: {{ off_heat }} °C\n\nContexto: Columna {{ col_idx }} ({{ weather_label_es }} | {{ estacion_label }} | Horario {{ franja_label }})"
      - service: logbook.log
        data:
          name: AC Night
          message: "hito=night_auto_off_notified | trace_id={{ context.id|default('na') }} | modo=heat | col_idx={{ col_idx }} | resultado_terminal=turn_off"
    - conditions:
      - condition: template
        value_template: "{{ hvac_mode != 'cool' and tin >= on_cool and presencia_ok and manual_off_block_active }}"
      sequence:
      - service: logbook.log
        data:
          name: AC Night
          message: "hito=night_auto_on_cool_bloqueado_post_manual_off | trace_id={{ context.id|default('na') }} | modo={{ hvac_mode }} | col_idx={{ col_idx }} | Tin={{ tin }} | on_cool={{ on_cool }} | block_until={{ manual_off_block_until_raw }} | now_ts={{ as_timestamp(now()) | int }} | presencia_ok={{ presencia_ok }} | resultado_terminal=blocked | razon=manual_off_block_activo"
    - conditions:
      - condition: template
        value_template: "{{ hvac_mode != 'cool' and tin >= on_cool and presencia_ok and not manual_off_block_active }}"
      sequence:
      - variables:
          sp_contractual: "{{ sp_cool_target | int }}"
          sp_objetivo: "{{ sp_cool_target | int }}"
          sp_reportado_antes: "{{ state_attr(climate_ent, 'temperature') | float(none) }}"
          sp_reportado_equipo: "{{ sp_reportado_antes }}"
          sp_confirmado_ok: "{{ sp_reportado_equipo is not none and (sp_reportado_equipo | float) == (sp_objetivo | float) }}"
          sp_intento: 0
      - service: input_text.set_value
        target: {entity_id: input_text.ac_night_auto_origin_payload}
        data:
          value: "kind=night_auto|trace_id={{ context.id|default('na') }}|last_action=turn_on_cool|expected_transition=off->cool|expires_at={{ (as_timestamp(now()) + 30) | int }}|consumed=0"
      - service: input_datetime.set_datetime
        target: {entity_id: input_datetime.ac_night_cool_cycle_started_ts}
        data: {datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"}
      - service: input_datetime.set_datetime
        target: {entity_id: input_datetime.ac_night_compressor_last_active_ts}
        data: {datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"}
      - service: input_datetime.set_datetime
        target: {entity_id: input_datetime.ac_night_last_humidity_check_ts}
        data: {datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"}
      - service: input_number.set_value
        target: {entity_id: input_number.ac_night_tin_at_cycle_start}
        data: {value: "{{ tin }}"}
      - service: input_number.set_value
        target: {entity_id: input_number.ac_night_hin_at_cycle_start}
        data: {value: "{{ hin }}"}
      - service: input_number.set_value
        target: {entity_id: input_number.ac_night_dew_at_cycle_start}
        data: {value: "{{ dew_point_night }}"}
      - service: climate.set_hvac_mode
        target: {entity_id: "{{ climate_ent }}"}
        data: {hvac_mode: cool}
      - service: climate.set_temperature
        target: {entity_id: "{{ climate_ent }}"}
        data: {temperature: "{{ sp_cool_target }}"}
      - delay: "00:00:03"
      - variables:
          sp_reportado_equipo: "{{ state_attr(climate_ent, 'temperature') | float(none) }}"
          sp_confirmado_ok: "{{ sp_reportado_equipo is not none and (sp_reportado_equipo | float) == (sp_objetivo | float) }}"
          sp_intento: 1
      - service: logbook.log
        data:
          name: AC Night
          message: "hito=night_sp_check_initial | trace_id={{ context.id|default('na') }} | sp_objetivo={{ sp_objetivo }} | sp_reportado_equipo={{ sp_reportado_equipo if sp_reportado_equipo is not none else 'none' }} | sp_confirmado_ok={{ sp_confirmado_ok }}"
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ not sp_confirmado_ok }}"
          sequence:
          - service: climate.set_temperature
            target: {entity_id: "{{ climate_ent }}"}
            data: {temperature: "{{ sp_objetivo }}"}
          - delay: "00:00:03"
          - variables:
              sp_reportado_equipo: "{{ state_attr(climate_ent, 'temperature') | float(none) }}"
              sp_confirmado_ok: "{{ sp_reportado_equipo is not none and (sp_reportado_equipo | float) == (sp_objetivo | float) }}"
              sp_intento: 2
          - service: logbook.log
            data:
              name: AC Night
              message: "hito=night_sp_retry_terminal | trace_id={{ context.id|default('na') }} | sp_objetivo={{ sp_objetivo }} | sp_reportado_equipo={{ sp_reportado_equipo if sp_reportado_equipo is not none else 'none' }} | sp_confirmado_ok={{ sp_confirmado_ok }} | resultado_terminal={{ 'confirmado' if sp_confirmado_ok else 'no_confirmado' }}"
      - service: climate.set_fan_mode
        target: {entity_id: "{{ climate_ent }}"}
        data: {fan_mode: Low}
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ sp_confirmado_ok }}"
          sequence:
          - service: input_number.set_value
            target: {entity_id: input_number.ac_night_cool_reinforcement_count}
            data: {value: 0}
          - service: input_text.set_value
            target: {entity_id: input_text.ac_night_cool_cycle_signature}
            data: {value: "{{ night_contract_signature }}"}
          - service: input_text.set_value
            target: {entity_id: input_text.ac_night_cool_reinforcement_pending_payload}
            data: {value: sin_pending}
      - service: notify.mobile_app_samsung_s24
        data:
          title: AC-Matriz Nocturna
          message: "{{ now().strftime('%I:%M:%S %p') }} — Frío encendido auto\n\nInterior: {{ tin }} °C\n\nHumedad interior: {{ hin }} %\n\nExterior: {{ tout }} °C\n\nAjuste de temp.: {{ sp_objetivo }} °C\n\nUmbral de apagado: {{ off_cool }} °C\n\nContexto: Columna {{ col_idx }} ({{ weather_label_es }} | {{ estacion_label }} | Horario {{ franja_label }})"
      - service: logbook.log
        data:
          name: AC Night
          message: "hito=night_auto_on_notified | trace_id={{ context.id|default('na') }} | modo=cool | col_idx={{ col_idx }} | bochorno_score={{ bochorno_score }} | hysteresis_eff={{ hysteresis_eff }} | comfort={{ night_comfort_pressure }} | dew={{ dew_point_night }} | pull={{ comfort_pull }} | ext_adj={{ exterior_adjust_cool }} | on_cool_cap_night_dynamic={{ on_cool_cap_night_dynamic }} | sp_contractual={{ sp_contractual }} | sp_solicitado={{ sp_objetivo }} | sp_reportado_antes={{ sp_reportado_antes if sp_reportado_antes is not none else 'none' }} | sp_reportado_final={{ sp_reportado_equipo if sp_reportado_equipo is not none else 'none' }} | intento={{ sp_intento }} | confirmado={{ sp_confirmado_ok }} | sp_efectivo={{ sp_reportado_equipo if sp_confirmado_ok else 'none' }} | resultado_terminal={{ 'turn_on_cool' if sp_confirmado_ok else 'sp_no_confirmado' }}"
    - conditions:
      - condition: template
        value_template: "{{ hvac_mode != 'heat' and tin <= on_heat and presencia_ok }}"
      sequence:
      - service: input_text.set_value
        target: {entity_id: input_text.ac_night_auto_origin_payload}
        data:
          value: "kind=night_auto|trace_id={{ context.id|default('na') }}|last_action=turn_on_heat|expected_transition=off->heat|expires_at={{ (as_timestamp(now()) + 30) | int }}|consumed=0"
      - service: climate.set_hvac_mode
        target: {entity_id: "{{ climate_ent }}"}
        data: {hvac_mode: heat}
      - service: climate.set_temperature
        target: {entity_id: "{{ climate_ent }}"}
        data: {temperature: "{{ sp_heat_target }}"}
      - delay: "00:00:02"
      - service: climate.set_temperature
        target: {entity_id: "{{ climate_ent }}"}
        data: {temperature: "{{ sp_heat_target }}"}
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ 'Low' in (state_attr(climate_ent,'fan_modes') | default([], true)) }}"
          sequence:
          - service: climate.set_fan_mode
            target: {entity_id: "{{ climate_ent }}"}
            data: {fan_mode: Low}
        default:
        - service: logbook.log
          data:
            name: AC Night
            message: "resultado=fan_heat_no_soportado | fan=Low | col={{ col_idx }} | tin={{ tin }} | hvac_mode={{ hvac_mode }}"
      - service: notify.mobile_app_samsung_s24
        data:
          title: AC-Matriz Nocturna
          message: "{{ now().strftime('%I:%M:%S %p') }} — Calor encendido auto\n\nInterior: {{ tin }} °C\n\nHumedad interior: {{ hin }} %\n\nExterior: {{ tout }} °C\n\nAjuste de temp.: {{ sp_heat_target }} °C\n\nUmbral de apagado: {{ off_heat }} °C\n\nContexto: Columna {{ col_idx }} ({{ weather_label_es }} | {{ estacion_label }} | Horario {{ franja_label }})"
      - service: logbook.log
        data:
          name: AC Night
          message: "hito=night_auto_on_notified | trace_id={{ context.id|default('na') }} | modo=heat | col_idx={{ col_idx }} | resultado_terminal=turn_on_heat"
    - conditions:
      - condition: template
        value_template: "{{ hvac_mode != 'cool' and night_cycle_active }}"
      sequence:
      - service: input_datetime.set_datetime
        target: {entity_id: input_datetime.ac_night_cool_cycle_started_ts}
        data: {datetime: '1970-01-01 00:00:00'}
      - service: input_number.set_value
        target: {entity_id: input_number.ac_night_cool_reinforcement_count}
        data: {value: 0}
      - service: input_text.set_value
        target: {entity_id: input_text.ac_night_cool_cycle_signature}
        data: {value: sin_ciclo}
      - service: input_text.set_value
        target: {entity_id: input_text.ac_night_cool_reinforcement_pending_payload}
        data: {value: sin_pending}
      - service: logbook.log
        data:
          name: AC Night
          message: "hito=night_cool_cycle_reset | trace_id={{ context.id|default('na') }} | col_idx={{ col_idx }} | tin={{ tin }} | off_cool={{ off_cool }} | sp_cool_target={{ sp_cool_target }} | sp_efectivo={{ sp_cool_effective }} | refuerzos={{ night_reinforcement_count }} | minutos_ciclo={{ night_cycle_elapsed_min }} | motivo=hvac_dejo_de_estar_en_cool | hvac_mode={{ hvac_mode }} | resultado_terminal=reset"
    - conditions:
      - condition: template
        value_template: "{{ hot_learning_recalc_requested and hvac_mode == 'cool' }}"
      sequence:
      - variables:
          sp_contractual: "{{ sp_cool_target | int }}"
          sp_solicitado: "{{ sp_cool_target | int }}"
          sp_reportado_antes: "{{ state_attr(climate_ent, 'temperature') | float(none) }}"
      - service: climate.set_temperature
        target: {entity_id: "{{ climate_ent }}"}
        data: {temperature: "{{ sp_solicitado }}"}
      - delay: "00:00:03"
      - variables:
          sp_reportado_despues: "{{ state_attr(climate_ent, 'temperature') | float(none) }}"
          sp_confirmado: "{{ sp_reportado_despues is not none and (sp_reportado_despues | float) == (sp_solicitado | float) }}"
          sp_intento: 1
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ not sp_confirmado }}"
          sequence:
          - service: climate.set_temperature
            target: {entity_id: "{{ climate_ent }}"}
            data: {temperature: "{{ sp_solicitado }}"}
          - delay: "00:00:03"
          - variables:
              sp_reportado_despues: "{{ state_attr(climate_ent, 'temperature') | float(none) }}"
              sp_confirmado: "{{ sp_reportado_despues is not none and (sp_reportado_despues | float) == (sp_solicitado | float) }}"
              sp_intento: 2
      - service: logbook.log
        data:
          name: AC Night
          message: "hito=night_hot_learning_recalc_setpoint_reapplied | trace_id={{ context.id|default('na') }} | modo=cool | col_idx={{ col_idx }} | off_cool={{ off_cool }} | on_cool={{ on_cool }} | sp_contractual={{ sp_contractual }} | sp_solicitado={{ sp_solicitado }} | sp_reportado_antes={{ sp_reportado_antes if sp_reportado_antes is not none else 'none' }} | sp_reportado_final={{ sp_reportado_despues if sp_reportado_despues is not none else 'none' }} | intento={{ sp_intento }} | confirmado={{ sp_confirmado }} | sp_efectivo={{ sp_reportado_despues if sp_confirmado else 'none' }} | night_comfort_pressure={{ night_comfort_pressure }} | comfort_pull={{ comfort_pull }} | exterior_adjust_cool={{ exterior_adjust_cool }} | payload={{ hot_learning_recalc_payload }} | resultado_terminal={{ 'setpoint_reapplied' if sp_confirmado else 'sp_no_confirmado' }}"
    - conditions:
      - condition: template
        value_template: "{{ hot_learning_recalc_requested and hvac_mode == 'heat' }}"
      sequence:
      - service: climate.set_temperature
        target: {entity_id: "{{ climate_ent }}"}
        data: {temperature: "{{ sp_heat_target }}"}
      - service: logbook.log
        data:
          name: AC Night
          message: "hito=night_hot_learning_recalc_setpoint_reapplied | trace_id={{ context.id|default('na') }} | modo=heat | col_idx={{ col_idx }} | off_heat={{ off_heat }} | on_heat={{ on_heat }} | sp_heat_target={{ sp_heat_target }} | payload={{ hot_learning_recalc_payload }} | resultado_terminal=setpoint_reapplied"
    default:
    - service: logbook.log
      data:
        name: AC Night
        message: "resultado=sin_cambio | col={{ col_idx }} | tin={{ tin }} | hvac_mode={{ hvac_mode }} | bochorno_score={{ bochorno_score }} | hysteresis_eff={{ hysteresis_eff }} | comfort={{ night_comfort_pressure }} | dew={{ dew_point_night }} | pull={{ comfort_pull }} | ext_adj={{ exterior_adjust_cool }} | on_cool_cap_night_dynamic={{ on_cool_cap_night_dynamic }} | sp_cool_target={{ sp_cool_target }} | sp_heat_target={{ sp_heat_target }} | fan=Low | on_cool={{ on_cool }} | off_cool={{ off_cool }} | on_heat={{ on_heat }} | off_heat={{ off_heat }}"


- id: ac_night_learning_manual_v1
  alias: AC Night - Aprendizaje manual por columna
  trace:
    stored_traces: 250
  mode: queued
  trigger:
  - platform: state
    entity_id: climate.0200009211c7_climate
  condition:
  - condition: time
    after: '22:00:00'
    before: '07:00:00'
  action:
  - variables:
      climate_ent: climate.0200009211c7_climate
      from_state: "{{ trigger.from_state.state if trigger.from_state is not none else '' }}"
      to_state: "{{ trigger.to_state.state if trigger.to_state is not none else '' }}"
      transicion: "{{ from_state ~ '->' ~ to_state }}"
      valid_transition: "{{ transicion in ['off->cool','cool->off','off->heat','heat->off'] }}"
      month: "{{ now().month }}"
      estacion: "{% if month in [12,1,2] %}invierno{% elif month in [3,4,5] %}primavera{% elif month in [6,7,8] %}verano{% else %}otono{% endif %}"
      franja: "{% set h=now().hour %}{% if h in [22,23,0] %}2200_0059{% elif h in [1,2,3] %}0100_0359{% elif h in [4,5] %}0400_0559{% else %}0600_0700{% endif %}"
      weather_raw: "{{ states('weather.openweathermap')|lower }}"
      weather_state: "{% if weather_raw in ['clear-night','clear','sunny'] %}despejado{% elif weather_raw in ['partlycloudy','partly cloudy','few clouds','scattered clouds'] %}parcial{% elif weather_raw in ['cloudy','overcast','broken clouds'] %}nublado{% elif weather_raw in ['rainy','rain','drizzle','pouring'] %}lluvia{% elif 'thunder' in weather_raw %}tormenta{% elif weather_raw in ['fog','mist','haze','smoky'] %}niebla{% elif 'snow' in weather_raw or 'sleet' in weather_raw %}hielo{% else %}despejado{% endif %}"
      col_idx: "{% set est=['verano','otono','invierno','primavera'] %}{% set fra=['2200_0059','0100_0359','0400_0559','0600_0700'] %}{% set cli=['despejado','nublado','parcial','lluvia','tormenta','niebla','hielo'] %}{{ (est.index(estacion)*28)+(fra.index(franja)*7)+(cli.index(weather_state))+1 }}"
      signature: "{{ (trigger.to_state.context.id if trigger.to_state is not none else 'na') ~ '|' ~ (as_timestamp(trigger.to_state.last_changed)|int if trigger.to_state is not none else 0) ~ '|' ~ transicion ~ '|col=' ~ col_idx }}"
      last_signature: "{{ states('input_text.ac_night_learning_last_signature') }}"
      trigger_context_id: "{{ trigger.to_state.context.id if trigger.to_state is not none and trigger.to_state.context is not none else '' }}"
      trigger_parent_id: "{{ trigger.to_state.context.parent_id if trigger.to_state is not none and trigger.to_state.context is not none and trigger.to_state.context.parent_id is not none else '' }}"
      trigger_user_id: "{{ trigger.to_state.context.user_id if trigger.to_state is not none and trigger.to_state.context is not none and trigger.to_state.context.user_id is not none else '' }}"
      marker_raw: "{{ states('input_text.ac_night_auto_origin_payload') }}"
      marker_kind: "{{ marker_raw.split('kind=')[1].split('|')[0] if 'kind=' in marker_raw else '' }}"
      marker_trace_id: "{{ marker_raw.split('trace_id=')[1].split('|')[0] if 'trace_id=' in marker_raw else '' }}"
      marker_expected: "{{ marker_raw.split('expected_transition=')[1].split('|')[0] if 'expected_transition=' in marker_raw else '' }}"
      marker_last_action: "{{ marker_raw.split('last_action=')[1].split('|')[0] if 'last_action=' in marker_raw else '' }}"
      marker_auto_event: "{{ marker_raw.split('auto_event=')[1].split('|')[0] if 'auto_event=' in marker_raw else '' }}"
      marker_reason: "{{ marker_raw.split('reason=')[1].split('|')[0] if 'reason=' in marker_raw else '' }}"
      marker_exp: "{{ marker_raw.split('expires_at=')[1].split('|')[0] | int(0) if 'expires_at=' in marker_raw else 0 }}"
      marker_consumed: "{{ marker_raw.split('consumed=')[1].split('|')[0] if 'consumed=' in marker_raw else '1' }}"
      marker_consumed_open: "{{ (marker_consumed | int(1)) == 0 }}"
      marker_valid: "{{ marker_kind == 'night_auto' and marker_expected == transicion and (marker_consumed | int(1)) == 0 and as_timestamp(now())|int <= marker_exp }}"
      marker_chain_ttl_valid: "{{ marker_kind == 'night_auto' and marker_trace_id not in ['', 'unknown', 'unavailable'] and marker_last_action in ['turn_off','turn_on_cool','turn_on_heat'] and as_timestamp(now())|int <= ((marker_exp | int(0)) + 60) }}"
      marker_expected_echo_transition: "{% if marker_expected == 'cool->off' %}off->cool{% elif marker_expected == 'off->cool' %}cool->off{% elif marker_expected == 'heat->off' %}off->heat{% elif marker_expected == 'off->heat' %}heat->off{% else %}{% endif %}"
      context_match_auto: "{{ trigger_user_id == '' and marker_chain_ttl_valid and (trigger_context_id == marker_trace_id or trigger_parent_id == marker_trace_id) }}"
      marker_auto_chain_guard_valid: "{{ context_match_auto and transicion in [marker_expected, marker_expected_echo_transition] }}"
      helper_target: "{{ 'input_number.ac_night_offset_cool_col_' ~ col_idx if transicion in ['off->cool','cool->off'] else 'input_number.ac_night_offset_heat_col_' ~ col_idx }}"
      modo: "{{ 'cool' if transicion in ['off->cool','cool->off'] else ('heat' if transicion in ['off->heat','heat->off'] else 'na') }}"
