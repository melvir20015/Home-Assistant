  - service: input_datetime.set_datetime
    target:
      entity_id: input_datetime.ac_matriz_160_ultima_accion_ts
    data:
      datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
  - service: logbook.log
    data:
      name: AC-Matriz 160
      message: hito=migracion_control_exclusivo | ac_dda_desactivado=true | controlador_activo=AC-Matriz 160
      entity_id: climate.0200009211c7_climate

- id: ac_matriz_160_learning_manual_v1
  alias: AC-Matriz 160 - Aprendizaje manual por columna
  description: Aprende offset por columna y modo desde ON/OFF manual con clasificación explícita y notificación transaccional.
  mode: queued
  max: 20
  triggers:
  - trigger: state
    entity_id: climate.0200009211c7_climate
  actions:
  - variables:
      ts_evento: '{{ now().strftime(''%Y-%m-%d %H:%M:%S.%f'') }}'
      hora_evento: '{{ now().strftime(''%I:%M:%S %p'') }}'
      modo_anterior: '{{ trigger.from_state.state | lower if trigger.from_state is not none else ''unknown'' }}'
      modo_nuevo: '{{ trigger.to_state.state | lower if trigger.to_state is not none else ''unknown'' }}'
      transicion_real: '{{ modo_anterior != modo_nuevo }}'
      modo_aprendizaje: '{% if modo_nuevo in [''cool'',''heat''] %}{{ modo_nuevo }}{% elif modo_anterior in [''cool'',''heat''] %}{{ modo_anterior }}{% else %}fuera_alcance{% endif %}'
      evento_manual_tipo: '{% if transicion_real and modo_nuevo in [''cool'',''heat''] and modo_anterior == ''off'' %}encendido_manual{% elif transicion_real and modo_nuevo == ''off'' and modo_anterior in [''cool'',''heat''] %}apagado_manual{% else %}ignorado{% endif %}'
      contexto: '{{ states(''input_text.ac_matriz_160_columna_activa_humana'') | default(''Contexto no disponible'', true) }}'
      col_idx: '{{ states(''input_text.ac_matriz_160_columna_activa_idx'') | int(0) }}'
      marker_kind: '{{ states(''input_text.ac_matriz_160_auto_origin_kind'') | trim }}'
      marker_trace_id: '{{ states(''input_text.ac_matriz_160_auto_origin_trace'') | trim }}'
      marker_last_action: '{{ states(''input_text.ac_matriz_160_auto_origin_last_action'') | trim }}'
      marker_expires_raw: '{{ states(''input_text.ac_matriz_160_auto_origin_expires_at'') | trim }}'
      marker_expires_ts: '{% if marker_expires_raw in [''unknown'',''unavailable'',''none'',''''] %}{{ 0 }}{% else %}{{ as_timestamp(marker_expires_raw, default=0) }}{% endif %}'
      marker_vigente: '{{ marker_kind == ''automatico_ac_matriz_160'' and as_timestamp(now()) < (marker_expires_ts | float(0)) }}'
      marker_transition_expected: '{% if marker_last_action == ''turn_on_cool'' %}off->cool{% elif marker_last_action == ''turn_on_heat'' %}off->heat{% elif marker_last_action == ''turn_off'' and modo_anterior in [''cool'',''heat''] %}{{ modo_anterior ~ ''->off'' }}{% elif marker_last_action == ''turn_off'' %}*->off{% else %}none{% endif %}'
      marker_transition_observed: '{{ modo_anterior ~ ''->'' ~ modo_nuevo }}'
      marker_compatible: '{{ marker_vigente and (marker_transition_expected == marker_transition_observed or (marker_transition_expected == ''*->off'' and modo_nuevo == ''off'')) }}'
      evento_last_changed_ts: '{{ as_timestamp(trigger.to_state.last_changed, default=0) | int(0) if trigger.to_state is not none else 0 }}'
      evento_last_changed_iso: '{{ as_local(trigger.to_state.last_changed).strftime(''%Y-%m-%d %H:%M:%S'') if trigger.to_state is not none else ''unknown'' }}'
      evento_context_id: '{{ trigger.to_state.context.id if trigger.to_state is not none and trigger.to_state.context is not none else ''no_context'' }}'
      learning_bucket_corto: '{{ (as_timestamp(now()) | int(0) // 15) }}'
      learning_bucket_error_5s: '{{ (as_timestamp(now()) | int(0) // 5) }}'
      firma_evento: '{{ evento_context_id ~ ''|'' ~ evento_last_changed_ts ~ ''|'' ~ modo_anterior ~ ''->'' ~ modo_nuevo ~ ''|'' ~ modo_aprendizaje ~ ''|'' ~ learning_bucket_corto }}'
      firma_learning_manual: '{{ evento_last_changed_ts ~ ''|'' ~ evento_context_id ~ ''|'' ~ modo_anterior ~ ''->'' ~ modo_nuevo }}'
      firma_learning_manual_previa: '{{ states(''input_text.ac_matriz_160_learning_manual_evento_firma'') | trim }}'
      firma_previa: '{{ states(''input_text.ac_matriz_160_learning_last_signature'') | trim }}'
      dedup_ok: '{{ firma_previa != firma_evento }}'
      helper_offset: '{{ ''input_number.ac_matriz_160_offset_'' ~ modo_aprendizaje ~ ''_col_'' ~ col_idx }}'
      offset_actual: '{{ states(helper_offset) | float(0) if modo_aprendizaje in [''cool'',''heat''] else 0 }}'
      horario_aprendizaje_habilitado: '{{ now().strftime(''%H:%M:%S'') >= ''07:01:00'' and now().strftime(''%H:%M:%S'') <= ''21:59:59'' }}'
      origen_clasificacion: '{% if marker_compatible %}automatico_ac_matriz_160{% elif not transicion_real %}automatico_recovery{% else %}manual_externo{% endif %}'
      manual_off_rebound_until_raw: '{{ states(''input_datetime.ac_matriz_160_manual_off_rebound_until'') | trim }}'
      manual_off_rebound_until_ts: '{% if manual_off_rebound_until_raw in [''unknown'',''unavailable'',''none'',''''] %}{{ 0 }}{% else %}{{ as_timestamp(manual_off_rebound_until_raw, default=0) }}{% endif %}'
      manual_off_rebound_active: '{{ as_timestamp(now()) < (manual_off_rebound_until_ts | float(0)) }}'
      delta: >-
        {% if modo_aprendizaje == 'cool' and evento_manual_tipo == 'encendido_manual' %}-0.25
        {% elif modo_aprendizaje == 'cool' and evento_manual_tipo == 'apagado_manual' %}0.25
        {% elif modo_aprendizaje == 'heat' and evento_manual_tipo == 'encendido_manual' %}0.25
        {% elif modo_aprendizaje == 'heat' and evento_manual_tipo == 'apagado_manual' %}-0.25
        {% else %}0
        {% endif %}
      helper_valido: '{{ col_idx > 0 and modo_aprendizaje in [''cool'',''heat''] and states(helper_offset) not in [''unknown'',''unavailable'',''none'',''''] }}'
      offset_nuevo: '{{ [3.0, [-3.0, (offset_actual|float + delta|float)] | max] | min | round(2) }}'
      resultado_terminal: '{% if not evento_estable %}ignorado{% elif not horario_aprendizaje_habilitado %}ignorado{% elif origen_clasificacion != ''manual_externo'' %}ignorado{% elif evento_manual_tipo == ''encendido_manual'' and manual_off_rebound_active %}ignorado{% elif evento_manual_tipo == ''ignorado'' %}ignorado{% elif not dedup_ok %}ignorado{% elif not helper_valido %}error_controlado{% else %}aplicado{% endif %}'
      razon: '{% if not evento_estable %}transicion_inestable{% elif not horario_aprendizaje_habilitado %}out_of_scope_daytime_main{% elif origen_clasificacion == ''automatico_ac_matriz_160'' %}origen_automatico_ac_matriz{% elif origen_clasificacion == ''automatico_recovery'' %}estado_recovery{% elif evento_manual_tipo == ''encendido_manual'' and manual_off_rebound_active %}rebote_post_manual_off{% elif evento_manual_tipo == ''ignorado'' %}evento_no_transicion{% elif not dedup_ok %}dedup_consolidado{% elif not helper_valido %}helper_invalido{% else %}manual_externo_aplicado{% endif %}'
      envio_estado: '{{ ''emitida'' if resultado_terminal == ''aplicado'' else ''fallback'' if resultado_terminal == ''ignorado'' else ''error_controlado'' }}'
      mensaje_humano: '{% set tipo_humano = ''Encendido Manual'' if evento_manual_tipo == ''encendido_manual'' else ''Apagado Manual'' if evento_manual_tipo == ''apagado_manual'' else ''Sin Transición'' %}{% set modo_humano = ''Frío'' if modo_aprendizaje == ''cool'' else ''Calor'' if modo_aprendizaje == ''heat'' else ''Fuera de Alcance'' %}{% set envio_humano = ''Emitida'' if envio_estado == ''emitida'' else ''Fallback'' if envio_estado == ''fallback'' else ''Error Controlado'' %}{{ hora_evento }} | TIPO= {{ tipo_humano }} | MODO= {{ modo_humano }} | COLUMNA= {{ col_idx }} ({{ contexto }}) | DELTA= {{ ''+0.25'' if delta|float > 0 else ''-0.25'' if delta|float < 0 else ''0.00'' }} | OFFSET= {{ offset_nuevo if resultado_terminal == ''aplicado'' else offset_actual }} | ENVÍO= {{ envio_humano }}'

  - service: input_text.set_value
    target:
      entity_id: input_text.ac_matriz_160_learning_manual_evento_firma
    data:
      value: '{{ firma_learning_manual }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ evento_manual_tipo == ''apagado_manual'' and origen_clasificacion == ''manual_externo'' and dedup_ok }}'
      sequence:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ac_matriz_160_manual_off_rebound_until
        data:
          datetime: '{{ (now() + timedelta(seconds=15)).strftime(''%Y-%m-%d %H:%M:%S'') }}'
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: 'hito=manual_off_rebound_bloqueo_set | trace_id={{ marker_trace_id if marker_trace_id|length > 0 else (evento_context_id ~ ''-'' ~ evento_last_changed_ts) }} | rebound_until={{ (now() + timedelta(seconds=15)).strftime(''%Y-%m-%d %H:%M:%S'') }} | ttl_s=15 | origen={{ origen_clasificacion }} | dedup_ok={{ dedup_ok }} | from={{ modo_anterior }} | to={{ modo_nuevo }}'
          entity_id: climate.0200009211c7_climate
  - delay:
      seconds: 3
  - variables:
      estado_actual_estabilizacion: '{{ states(''climate.0200009211c7_climate'') | lower }}'
      last_changed_actual_ts: '{{ as_timestamp(states.climate.0200009211c7_climate.last_changed, default=0) | int(0) }}'
      firma_actual_estabilizacion: '{{ last_changed_actual_ts ~ ''|'' ~ estado_actual_estabilizacion }}'
      evento_estable: '{{ last_changed_actual_ts == (evento_last_changed_ts | int(0)) and estado_actual_estabilizacion == modo_nuevo }}'
      transicion_final_from: '{{ modo_anterior if evento_estable else (states.climate.0200009211c7_climate.state | lower) }}'
      transicion_final_to: '{{ modo_nuevo if evento_estable else estado_actual_estabilizacion }}'
      intermediate_changes_absorbed: '{{ 0 if evento_estable else 1 }}'
      trace_id_learning: '{{ marker_trace_id if marker_trace_id|length > 0 else (evento_context_id ~ ''-'' ~ evento_last_changed_ts) }}'
      firma_error_learning: '{{ trace_id_learning ~ ''|'' ~ modo_anterior ~ ''->'' ~ modo_nuevo ~ ''|'' ~ razon ~ ''|'' ~ learning_bucket_error_5s }}'
      firma_error_learning_previa: '{{ states(''input_text.ac_matriz_160_learning_error_last_signature'') | trim }}'
      notificacion_error_dedup_ok: '{{ firma_error_learning != firma_error_learning_previa }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ resultado_terminal == ''aplicado'' }}'
      sequence:
      - service: input_number.set_value
        target:
          entity_id: '{{ helper_offset }}'
        data:
          value: '{{ offset_nuevo }}'
      - service: notify.mobile_app_samsung_s24
        data:
          title: AC-Matriz 160
          message: '{{ mensaje_humano }}'
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: 'hito=learning_manual_columna | trace_id={{ trace_id_learning }} | origen_clasificacion={{ origen_clasificacion }} | horario_habilitado={{ horario_aprendizaje_habilitado }} | marker_vigente={{ marker_vigente }} | marker_compatible={{ marker_compatible }} | marker_transition_expected={{ marker_transition_expected }} | marker_transition_observed={{ marker_transition_observed }} | expires_at={{ marker_expires_raw }} | resultado_terminal={{ resultado_terminal }} | razon={{ razon }} | evento={{ evento_manual_tipo }} | modo={{ modo_aprendizaje }} | columna={{ col_idx }} | contexto={{ contexto }} | before={{ offset_actual }} | delta={{ delta }} | after={{ offset_nuevo }} | ts={{ ts_evento }}'
          entity_id: climate.0200009211c7_climate
    default:
    - service: logbook.log
      data:
        name: AC-Matriz 160
        message: 'hito=learning_manual_ignorado | trace_id={{ trace_id_learning }} | origen_clasificacion={{ origen_clasificacion }} | horario_habilitado={{ horario_aprendizaje_habilitado }} | marker_vigente={{ marker_vigente }} | marker_compatible={{ marker_compatible }} | marker_transition_expected={{ marker_transition_expected }} | marker_transition_observed={{ marker_transition_observed }} | expires_at={{ marker_expires_raw }} | resultado_terminal={{ resultado_terminal }} | razon={{ razon }} | from={{ modo_anterior }} | to={{ modo_nuevo }} | final_transition={{ transicion_final_from ~ '->' ~ transicion_final_to }} | absorbed={{ intermediate_changes_absorbed }} | dedup_ok={{ dedup_ok }}'
        entity_id: climate.0200009211c7_climate


  - choose:
    - conditions:
      - condition: template
        value_template: '{{ not dedup_ok }}'
      sequence:
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: 'hito=learning_manual_dedup_descartado | firma_evento={{ firma_evento }} | firma_previa={{ firma_previa }} | evento_last_changed={{ evento_last_changed_iso }} | evento_context_id={{ evento_context_id }} | trace_id={{ trace_id_learning }} | from={{ modo_anterior }} | to={{ modo_nuevo }} | final_transition={{ transicion_final_from ~ '->' ~ transicion_final_to }} | absorbed={{ intermediate_changes_absorbed }} | modo={{ modo_aprendizaje }} | razon_terminal=dedup_consolidado'
          entity_id: climate.0200009211c7_climate

  - choose:
    - conditions:
      - condition: template
        value_template: '{{ dedup_ok and evento_estable }}'
      sequence:
      - service: input_text.set_value
        target:
          entity_id: input_text.ac_matriz_160_learning_last_signature
        data:
          value: '{{ firma_evento }}'

  - choose:
    - conditions:
      - condition: template
        value_template: '{{ resultado_terminal != ''aplicado'' and evento_manual_tipo in [''encendido_manual'',''apagado_manual''] and origen_clasificacion != ''manual_externo'' }}'
      sequence:
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: 'hito=intento_modificar_offset_bloqueado | origen={{ origen_clasificacion }} | razon={{ razon }} | resultado_terminal={{ resultado_terminal }} | trace_id={{ trace_id_learning }} | helper={{ helper_offset }} | from={{ modo_anterior }} | to={{ modo_nuevo }} | final_transition={{ transicion_final_from ~ '->' ~ transicion_final_to }} | absorbed={{ intermediate_changes_absorbed }} | contexto={{ contexto }} | ts={{ ts_evento }}'
          entity_id: climate.0200009211c7_climate
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ resultado_terminal == ''error_controlado'' and notificacion_error_dedup_ok }}'
      sequence:
      - service: notify.mobile_app_samsung_s24
        data:
          title: AC-Matriz 160 aprendizaje manual
          message: 'Error controlado en aprendizaje manual. Revisa logbook.'
      - service: input_text.set_value
        target:
          entity_id: input_text.ac_matriz_160_learning_error_last_signature
        data:
          value: '{{ firma_error_learning }}'
    - conditions:
      - condition: template
        value_template: '{{ resultado_terminal == ''error_controlado'' and not notificacion_error_dedup_ok }}'
      sequence:
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: 'hito=error_controlado_suprimido_dedup | trace_id={{ trace_id_learning }} | firma_error={{ firma_error_learning }} | firma_previa={{ firma_error_learning_previa }} | from={{ modo_anterior }} | to={{ modo_nuevo }} | razon={{ razon }} | bucket_5s={{ learning_bucket_error_5s }}'
          entity_id: climate.0200009211c7_climate
  - service: input_text.set_value
    target:
      entity_id: input_text.ac_matriz_160_ultimo_estado_notificacion
    data:
      value: '{{ envio_estado }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ evento_manual_tipo == ''apagado_manual'' and resultado_terminal == ''aplicado'' }}'
      sequence:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ac_matriz_160_manual_off_block_until
        data:
          datetime: '{{ (now() + timedelta(minutes=5)).strftime(''%Y-%m-%d %H:%M:%S'') }}'
      - service: logbook.log
        data:
          name: AC-Matriz 160
          message: 'hito=manual_off_bloqueo_largo_set | trace_id={{ trace_id_learning }} | block_until={{ (now() + timedelta(minutes=5)).strftime(''%Y-%m-%d %H:%M:%S'') }} | origen={{ origen_clasificacion }} | resultado_terminal={{ resultado_terminal }} | razon={{ razon }}'
          entity_id: climate.0200009211c7_climate
  - service: input_text.set_value
    target:
      entity_id: input_text.ac_matriz_160_ultima_accion
    data:
      value: '{{ ''learning|'' ~ resultado_terminal ~ ''|'' ~ razon ~ ''|'' ~ modo_anterior ~ ''->'' ~ modo_nuevo }}'
  - service: input_text.set_value
    target:
      entity_id: input_text.ac_matriz_160_ultimo_resultado_validacion
    data:
      value: '{{ ''learning|'' ~ resultado_terminal ~ ''|'' ~ razon }}'
