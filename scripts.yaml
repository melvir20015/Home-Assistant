ac_dda_notify_on_transaccional:
  alias: AC DDA - Notificación móvil transaccional unificada
  description: >-
    Envía notificación móvil contractual en español para cualquier hito AC-DDA,
    conserva hitos de traza, anti-duplicado por ciclo y aplica fallback consistente a
    persistent_notification/logbook.
  mode: parallel
  fields:
    trace_id:
      description: Identificador de traza extremo a extremo.
      example: notify-on-20260408-001
    title:
      description: Título de la notificación.
      example: Cool↑
    message:
      description: Mensaje contractual validado.
    entity_id:
      description: Entidad asociada para logbook.
      example: climate.0200009211c7_climate
    src:
      description: Fuente del evento ON.
      example: AutoON
    branch:
      description: Rama lógica origen del AUTO ON.
      example: cool_normal_on
    notify_role:
      description: Prioridad del llamador para anti-duplicado (primary o confirm).
      example: primary
    cycle_signature_v2:
      description: Firma anti-duplicado v2 con identificador único real de ciclo.
      example: token:20260409143500999123|auto_ts:2026-04-09T14:35:00.999123+00:00|cool_normal_on|25.4|24.8|auto_on
    log_detail:
      description: Detalle técnico para logbook (no visible al usuario móvil).
    notify_kind:
      description: Tipo humano de evento (encendido_auto, apagado_auto, manual_on, manual_off, cierre_learning_on, cierre_learning_off, vinculado).
      example: encendido_auto
  sequence:
    - variables:
        trace_local: "{{ trace_id | default('trace_missing', true) }}"
        title_local: "{{ title | default('Cool↑', true) }}"
        message_local: "{{ message | default('n/a', true) }}"
        entity_local: "{{ entity_id | default('climate.0200009211c7_climate', true) }}"
        src_local: "{{ src | default('AutoON', true) }}"
        branch_local: "{{ branch | default('n/a', true) }}"
        log_detail_local: "{{ log_detail | default('sin_detalle', true) }}"
        notify_kind_local: "{{ notify_kind | default('vinculado', true) }}"
        role_local:
          "{{ notify_role if notify_role is defined and (notify_role | string | trim | lower) in ['primary', 'confirm']
          else 'primary' }}"
        src_is_auto_on: "{{ src_local | lower == 'autoon' }}"
        duplicate_window_s: 10
        cycle_signature_local: "{{ cycle_signature_v2 | default('', true) | trim }}"
        last_signature_record:
          "{{ states('input_text.ac_dda_last_notify_on_cycle_signature')
          | default('', true) | trim }}"
        last_record_parts: "{{ last_signature_record.split('||') if last_signature_record != '' else [] }}"
        last_signature:
          "{{ last_record_parts[0] | trim if (last_record_parts | count) >= 1 else '' }}"
        last_role:
          "{{ (last_record_parts[1] | trim | lower) if (last_record_parts | count) >= 2 else 'unknown' }}"
        last_sent_epoch: "{{ (last_record_parts[2] | float(0)) if (last_record_parts | count) >= 3 else 0 }}"
        last_skip_epoch: "{{ (last_record_parts[3] | float(0)) if (last_record_parts | count) >= 4 else 0 }}"
        now_epoch: "{{ as_timestamp(now()) | float(0) }}"
        age_since_last_send_s: "{{ (now_epoch | float(0)) - (last_sent_epoch | float(0)) }}"
        age_since_last_skip_s: "{{ (now_epoch | float(0)) - (last_skip_epoch | float(0)) }}"
        incoming_priority: "{{ 2 if role_local == 'primary' else 1 }}"
        last_priority:
          "{% if last_role == 'primary' %}2{% elif last_role == 'confirm' %}1{% else
          %}0{% endif %}"
        same_cycle_signature:
          "{{ cycle_signature_local != '' and cycle_signature_local == last_signature }}"
        duplicate_candidate:
          "{{ same_cycle_signature and (incoming_priority | int(0)) <= (last_priority | int(0)) }}"
        duplicate_short_window:
          "{{ duplicate_candidate and (age_since_last_send_s | float(99999)) >= 0 and (age_since_last_send_s | float(99999)) <= (duplicate_window_s | float(15)) }}"
        skip_already_done_in_window:
          "{{ (age_since_last_skip_s | float(99999)) >= 0 and (age_since_last_skip_s | float(99999)) <= (duplicate_window_s | float(15)) }}"
        allow_controlled_skip:
          "{{ duplicate_short_window and (not skip_already_done_in_window) }}"
        duplicate_cycle_signature:
          "{{ (not src_is_auto_on) and duplicate_candidate and allow_controlled_skip }}"
        duplicate_but_resend:
          "{{ duplicate_candidate and (not allow_controlled_skip) }}"
        should_store_signature:
          "{{ cycle_signature_local != '' and ((not same_cycle_signature) or (incoming_priority | int(0)) > (last_priority | int(0)) or duplicate_but_resend) }}"
        signature_record_to_store: "{{ cycle_signature_local ~ '||' ~ role_local ~ '||' ~ (now_epoch | string) ~ '||0' }}"
        signature_record_skip_to_store: "{{ cycle_signature_local ~ '||' ~ last_role ~ '||' ~ (last_sent_epoch | string) ~ '||' ~ (now_epoch | string) }}"
        entity_mode_now: "{{ states(entity_local) | default('unknown', true) | lower }}"
        entity_is_cool: "{{ entity_mode_now == 'cool' }}"
        force_observable_exit: "{{ src_is_auto_on and entity_is_cool }}"
    - service: logbook.log
      continue_on_error: true
      data:
        name: AC Auto Trace
        message:
          hito=notify_payload_ready | notify_kind={{ notify_kind_local }} | notify_stage=payload_ready | trace_id={{ trace_local
          }} | src={{ src_local }} | branch={{ branch_local }} | cycle_signature_v2={{ cycle_signature_local
          }} | mode_now={{ entity_mode_now }} | detail={{ log_detail_local }}
        entity_id: "{{ entity_local }}"
    - service: logbook.log
      continue_on_error: true
      data:
        name: AC Auto Trace
        message:
          hito=notify_dedupe_check | notify_stage=dedupe_check | trace_id={{ trace_local
          }} | duplicate_candidate={{ 'true' if duplicate_candidate else 'false' }} |
          duplicate_cycle_signature={{ 'true' if duplicate_cycle_signature else 'false'
          }} | short_window_s={{ duplicate_window_s }} | age_since_last_send_s={{ age_since_last_send_s
          | round(2) }} | cycle_signature_v2={{ cycle_signature_local }} | last_signature={{ last_signature
          }}
        entity_id: "{{ entity_local }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ duplicate_cycle_signature }}"
          sequence:
            - service: logbook.log
              continue_on_error: true
              data:
                name: AC Auto Trace
                message:
                  hito=notify_on_omitido_duplicado | notify_stage=dedupe_check | trace_id={{ trace_local }} | branch={{ branch_local
                  }} | src={{ src_local }} | role_actual={{ role_local }} | role_prev={{ last_role
                  }} | cycle_signature_v2={{ cycle_signature_local }} | last_signature={{ last_signature
                  }} | duplicate=true | short_window_s={{ duplicate_window_s }} | age_since_last_send_s={{ age_since_last_send_s
                  | round(2) }} | force_observable_exit={{ 'true' if force_observable_exit else 'false' }}
                entity_id: "{{ entity_local }}"
            - service: logbook.log
              continue_on_error: true
              data:
                name: AC Auto Trace
                message:
                  hito=notify_on_resultado | notify_stage=send_result | send_result=duplicate_omitted | trace_id={{ trace_local
                  }} | src={{ src_local }} | branch={{ branch_local }} | mode_now={{ entity_mode_now }}
                entity_id: "{{ entity_local }}"
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ cycle_signature_local != '' }}"
                  sequence:
                    - service: input_text.set_value
                      continue_on_error: true
                      target:
                        entity_id: input_text.ac_dda_last_notify_on_cycle_signature
                      data:
                        value: "{{ signature_record_skip_to_store[:255] }}"
              default: []
      default:
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ should_store_signature }}"
              sequence:
                - service: input_text.set_value
                  continue_on_error: true
                  target:
                    entity_id: input_text.ac_dda_last_notify_on_cycle_signature
                  data:
                    value: "{{ signature_record_to_store[:255] }}"
          default: []
        - service: logbook.log
          continue_on_error: true
          data:
            name: AC Auto Trace
            message:
              hito=notify_on_preparado | notify_stage=payload_ready | trace_id={{ trace_local }} | src={{ src_local
              }} | branch={{ branch_local }} | title={{ title_local }} | cycle_signature_v2={{ cycle_signature_local
              }} | last_signature={{ last_signature }} | duplicate={{ 'true' if duplicate_candidate else 'false'
              }}
            entity_id: "{{ entity_local }}"
        - service: logbook.log
          continue_on_error: true
          data:
            name: AC Auto Trace
            message:
              hito=notify_on_intentado | notify_stage=send_attempt | trace_id={{ trace_local }} | channel=mobile_app_s24
              | src={{ src_local }} | branch={{ branch_local }}
            entity_id: "{{ entity_local }}"
        - service: notify.mobile_app_samsung_s24
          continue_on_error: true
          data:
            title: "{{ title_local }}"
            message: "{{ message_local }}"
            data:
              ttl: 0
              priority: high
        - service: logbook.log
          continue_on_error: true
          data:
            name: AC Auto Trace
            message: >-
              hito=notify_on_intentado | notify_stage=send_result |
              send_result=mobile_attempted_no_ack | trace_id={{ trace_local }} |
              src={{ src_local }} | branch={{ branch_local }}
            entity_id: "{{ entity_local }}"
        - service: input_text.set_value
          continue_on_error: true
          target:
            entity_id: input_text.ac_dda_last_notify_status
          data:
            value: "{{ trace_local ~ '|kind=' ~ notify_kind_local ~ '|stage=terminal|channel=mobile|result=attempted|ts=' ~ now().strftime('%Y-%m-%d %H:%M:%S') }}"
