ac_matriz_160_reporte_diagnostico:
  alias: AC-Matriz 160 - Reporte diagnóstico bajo demanda
  mode: single
  sequence:
    - variables:
        hvac_mode: "{{ states('climate.0200009211c7_climate') }}"
        tin: "{{ [states('sensor.lumi_lumi_weather_cuarto_temperatura')|float(0), states('sensor.lumi_lumi_weather_coco_temperatura')|float(0)] | average | round(2) }}"
        hin: "{{ [states('sensor.lumi_lumi_weather_cuarto_humedad')|float(0), states('sensor.lumi_lumi_weather_coco_humedad')|float(0)] | average | round(2) }}"
        tout: "{{ state_attr('weather.openweathermap','temperature') | float(none) }}"
        hout_raw: "{{ state_attr('weather.openweathermap','humidity') | float(none) }}"
        hout: "{{ hout_raw if hout_raw is not none else 60 }}"
        weather_state_raw: "{{ states('weather.openweathermap') | lower }}"
        weather_desc_raw: "{{ state_attr('weather.openweathermap', 'forecast') }}"
        prev_diag_snapshot_raw: "{{ states('input_text.ac_matriz_160_diag_demanda_snapshot') }}"
        prev_diag_parts: "{{ prev_diag_snapshot_raw.split('|') if prev_diag_snapshot_raw not in ['unknown','unavailable','none','','sin_snapshot'] else [] }}"
        prev_tin: "{{ prev_diag_parts[0] | float(tin) if prev_diag_parts | count > 0 else tin }}"
        prev_hin: "{{ prev_diag_parts[1] | float(hin) if prev_diag_parts | count > 1 else hin }}"
        prev_tout: "{{ prev_diag_parts[2] | float(tout if tout is not none else 0) if prev_diag_parts | count > 2 else (tout if tout is not none else 0) }}"
        prev_hout: "{{ prev_diag_parts[3] | float(hout) if prev_diag_parts | count > 3 else hout }}"
        trend_tin: "{% if tin > (prev_tin|float) %}↑{% elif tin < (prev_tin|float) %}↓{% else %}{% endif %}"
        trend_hin: "{% if hin > (prev_hin|float) %}↑{% elif hin < (prev_hin|float) %}↓{% else %}{% endif %}"
        trend_tout: "{% set tout_cmp = tout if tout is not none else 0 %}{% if tout_cmp > (prev_tout|float) %}↑{% elif tout_cmp < (prev_tout|float) %}↓{% else %}{% endif %}"
        trend_hout: "{% if hout > (prev_hout|float) %}↑{% elif hout < (prev_hout|float) %}↓{% else %}{% endif %}"
        tin_fmt: "{{ '%.2f' | format(tin|float) }}"
        hin_fmt: "{{ '%.2f' | format(hin|float) }}"
        tout_fmt: "{{ '%.2f' | format((tout if tout is not none else 0)|float) }}"
        hout_fmt: "{{ '%.2f' | format(hout|float) }}"
        clima_actual: >-
          {% set w = weather_state_raw %}
          {% if w in ['clear', 'sunny', 'clear-night'] %}Despejado
          {% elif w in ['partlycloudy', 'partly cloudy', 'few clouds', 'scattered clouds'] %}Parcialmente nublado
          {% elif w in ['cloudy', 'overcast', 'broken clouds'] %}Nublado
          {% elif w in ['rainy', 'rain', 'pouring', 'drizzle'] %}Lluvioso
          {% elif w in ['lightning', 'lightning-rainy', 'thunderstorm'] %}Tormenta
          {% elif w in ['fog', 'mist', 'haze', 'smoky'] %}Neblina
          {% elif w in ['snowy', 'snow', 'snowy-rainy'] %}Nevando
          {% else %}Condición no disponible
          {% endif %}
        presence_motion: "{{ is_state('binary_sensor.presencia_movimiento_estable','on') }}"
        presence_s24: "{{ is_state('device_tracker.samsung_s24','home') or is_state('person.ivan','home') }}"
        presence_ok: "{{ presence_motion or presence_s24 }}"
        manual_presence_override_until_raw: "{{ states('input_datetime.ac_matriz_160_manual_presence_override_until') }}"
        manual_presence_override_until_ts: "{% if manual_presence_override_until_raw in ['unknown','unavailable','none',''] %}{{ 0 }}{% else %}{{ as_timestamp(manual_presence_override_until_raw, default=0) }}{% endif %}"
        manual_presence_override_active: "{{ as_timestamp(now()) < (manual_presence_override_until_ts | float(0)) }}"
        presence_ok_effective: "{{ presence_ok or manual_presence_override_active }}"
        cool_off: "{{ states('input_number.ac_matriz_160_t_off_cool') | float(none) }}"
        cool_on: "{{ states('input_number.ac_matriz_160_t_on_cool') | float(none) }}"
        heat_off: "{{ states('input_number.ac_matriz_160_t_off_heat') | float(none) }}"
        heat_on: "{{ states('input_number.ac_matriz_160_t_on_heat') | float(none) }}"
        manual_off_block_until_raw: "{{ states('input_datetime.ac_matriz_160_manual_off_block_until') }}"
        manual_off_block_until_ts: "{% if manual_off_block_until_raw in ['unknown','unavailable','none',''] %}{{ 0 }}{% else %}{{ as_timestamp(manual_off_block_until_raw, default=0) }}{% endif %}"
        manual_off_block_active: "{{ as_timestamp(now()) < (manual_off_block_until_ts | float(0)) }}"
        heat_block_until_raw: "{{ states('input_datetime.ac_matriz_160_heat_block_until') }}"
        heat_block_until_ts: "{% if heat_block_until_raw in ['unknown','unavailable','none',''] %}{{ 0 }}{% else %}{{ as_timestamp(heat_block_until_raw, default=0) }}{% endif %}"
        heat_block_active: "{{ as_timestamp(now()) < (heat_block_until_ts | float(0)) }}"
        cool_block_until_raw: "{{ states('input_datetime.ac_matriz_160_cool_block_until') }}"
        cool_block_until_ts: "{% if cool_block_until_raw in ['unknown','unavailable','none',''] %}{{ 0 }}{% else %}{{ as_timestamp(cool_block_until_raw, default=0) }}{% endif %}"
        cool_block_active: "{{ as_timestamp(now()) < (cool_block_until_ts | float(0)) }}"
        turn_on_cool: "{{ (cool_on is not none) and (tin|float >= cool_on|float) }}"
        turn_on_heat: "{{ (heat_on is not none) and (tin|float <= heat_on|float) }}"
        modo_demandado: "{% if turn_on_cool and not turn_on_heat %}cool{% elif turn_on_heat and not turn_on_cool %}heat{% elif turn_on_cool and turn_on_heat %}cool{% else %}cool{% endif %}"
        razones_modo_demandado: >-
          {% if modo_demandado == 'cool' %}
            {% set razones = [] %}
            {% if manual_off_block_active %}{% set razones = razones + ['Bloqueo manual activo hasta ' ~ manual_off_block_until_raw] %}{% endif %}
            {% if cool_block_active %}{% set razones = razones + ['Bloqueo anti-reversa cool activo hasta ' ~ cool_block_until_raw] %}{% endif %}
            {% if not presence_ok_effective %}{% set razones = razones + ['Sin presencia efectiva (movimiento=' ~ presence_motion ~ ', s24=' ~ presence_s24 ~ ', override=' ~ manual_presence_override_active ~ ')'] %}{% endif %}
            {% if cool_on is none %}{% set razones = razones + ['Umbral cool_on no disponible'] %}{% elif not turn_on_cool %}{% set razones = razones + ['Tin ' ~ tin ~ ' < cool_on ' ~ (cool_on|round(2))] %}{% endif %}
            {{ razones | join(' | ') if razones | length > 0 else 'Condiciones de encendido COOL cumplidas.' }}
          {% else %}
            {% set razones = [] %}
            {% if manual_off_block_active %}{% set razones = razones + ['Bloqueo manual activo hasta ' ~ manual_off_block_until_raw] %}{% endif %}
            {% if heat_block_active %}{% set razones = razones + ['Bloqueo anti-reversa heat activo hasta ' ~ heat_block_until_raw] %}{% endif %}
            {% if not presence_ok_effective %}{% set razones = razones + ['Sin presencia efectiva (movimiento=' ~ presence_motion ~ ', s24=' ~ presence_s24 ~ ', override=' ~ manual_presence_override_active ~ ')'] %}{% endif %}
            {% if heat_on is none %}{% set razones = razones + ['Umbral heat_on no disponible'] %}{% elif not turn_on_heat %}{% set razones = razones + ['Tin ' ~ tin ~ ' > heat_on ' ~ (heat_on|round(2))] %}{% endif %}
            {{ razones | join(' | ') if razones | length > 0 else 'Condiciones de encendido HEAT cumplidas.' }}
          {% endif %}
        hvac_encendido: "{{ hvac_mode in ['cool','heat','fan_only','auto'] }}"
        demanda_label: "{{ 'Enfriar' if modo_demandado == 'cool' else 'Calentar' }}"
        tin_comp_umbral: >-
          {% if hvac_encendido %}
            {% if modo_demandado == 'cool' %}{{ cool_off if cool_off is not none else none }}{% else %}{{ heat_off if heat_off is not none else none }}{% endif %}
          {% else %}
            {% if modo_demandado == 'cool' %}{{ cool_on if cool_on is not none else none }}{% else %}{{ heat_on if heat_on is not none else none }}{% endif %}
          {% endif %}
        comp_operador: >-
          {% if hvac_encendido %}
            {% if modo_demandado == 'cool' %}>{% else %}<{% endif %}
          {% else %}
            {% if modo_demandado == 'cool' %}<{% else %}>{% endif %}
          {% endif %}
        umbral_fmt: "{{ '%.2f' | format((tin_comp_umbral if tin_comp_umbral is not none else 0)|float) }}"
        resultado_reporte: "{{ 'off_solo_no_encendido' if hvac_mode == 'off' else 'on_con_evaluacion_apagado' }}"
    - service: logbook.log
      data:
        name: AC-Matriz 160
        message: "hito=diagnostico_bajo_demanda_reporte | modo_demandado={{ modo_demandado }} | hvac_state={{ hvac_mode }} | resultado_reporte={{ resultado_reporte }} | razones={{ razones_modo_demandado }}"
    - service: notify.mobile_app_samsung_s24
      data:
        title: "AC-Matriz 160 · Reporte diagnóstico"
        message: >-
          Estado HVAC: {{ 'Encendido' if hvac_encendido else 'Apagado' }}
          Condiciones: {{ clima_actual }} | Tin: {{ trend_tin }}{{ tin_fmt }}°C | Hin: {{ trend_hin }}{{ hin_fmt }}% | Tout: {{ trend_tout }}{{ tout_fmt }}°C | Hout: {{ trend_hout }}{{ hout_fmt }}%

          Demanda: {{ demanda_label }} | Tin: {{ tin_fmt }}°C {{ comp_operador }} {{ umbral_fmt }}°C
    - service: input_text.set_value
      target:
        entity_id: input_text.ac_matriz_160_diag_demanda_snapshot
      data:
        value: "{{ tin_fmt }}|{{ hin_fmt }}|{{ tout_fmt }}|{{ hout_fmt }}"
